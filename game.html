            const minSpeed = effects.appleMinSpeed || 260;
            const maxSpeed = Math.max(minSpeed, effects.appleMaxSpeed || 560);
            const apple = {
                ownerId: fighter.id,
                x: size / 2 + Math.random() * Math.max(1, battle.arenaSize - size),
                y: -size * (0.5 + index * 0.22),
                size,
                speed: minSpeed + Math.random() * (maxSpeed - minSpeed),
                rotation: Math.random() * 360,
                damage: effects.appleDamage || 50,
                heal: effects.appleHeal || 100,
                element: document.createElement("div")
            };

            apple.element.className = "kim-gibeom-apple";
            apple.element.style.left = `${apple.x}px`;
            apple.element.style.top = `${apple.y}px`;
            apple.element.style.width = `${apple.size}px`;
            apple.element.style.height = `${apple.size}px`;
            apple.element.innerHTML = `<img alt="사과" ${imageAttrs(effects.appleImageSrc || "images/사과.png", effects.appleImageFallbackSrcs)}>`;
            arena.appendChild(apple.element);
            battle.activeKimGibeomApples.push(apple);
        }

        function triggerKimGibeomAppleDrop(fighter, now) {
            const effects = kimGibeomEffects(fighter);
            const count = Math.max(1, effects.appleDropCount || 5);
            for (let index = 0; index < count; index += 1) {
                createKimGibeomApple(fighter, now, index);
            }
            floatText("사과!", fighter.x, fighter.y - fighterRadius(fighter) * 1.4, fighter.definition.color);
        }

        function updateKimGibeomApples(dt, now) {
            [...battle.activeKimGibeomApples].forEach((apple) => {
                const owner = getFighterById(apple.ownerId);
                if (!owner || owner.dead || !apple.element?.isConnected) {
                    removeKimGibeomApple(apple);
                    return;
                }

                apple.y += scaledSpeed(apple.speed) * dt;
                apple.rotation += apple.speed * dt * 1.4;
                apple.element.style.left = `${apple.x}px`;
                apple.element.style.top = `${apple.y}px`;
                apple.element.style.transform = `translate(-50%, -50%) rotate(${apple.rotation}deg)`;

                if (apple.y > battle.arenaSize + apple.size) {
                    removeKimGibeomApple(apple);
                    return;
                }

                for (const target of battle.fighters) {
                    if (target.dead || target.offMapUntil > now) {
                        continue;
                    }
                    if (Math.hypot(target.x - apple.x, target.y - apple.y) > fighterRadius(target) + apple.size * 0.42) {
                        continue;
                    }

                    if (target === owner) {
                        const healed = healFighter(owner, apple.heal, owner, {
                            offsetY: fighterRadius(owner),
                            color: "#006d36",
                            silent: true
                        });
                        if (healed > 0) {
                            floatText(`+${Math.round(healed)}`, owner.x, owner.y - fighterRadius(owner), "#006d36");
                            effectRing(owner.x, owner.y, battle.ballSize * 1.12, owner.definition.color);
                        }
                        removeKimGibeomApple(apple);
                        return;
                    }

                    if (!areAllies(owner, target)) {
                        applyDamage(target, apple.damage, owner, "skill", { unavoidable: true });
                        impactStar(target.x, target.y, owner.definition.color);
                        burst(target.x, target.y, owner.definition.color, 5);
                        removeKimGibeomApple(apple);
                        return;
                    }
                }
            });
        }

        function shakeArena() {
            arena.classList.remove("is-earthquake");
            void arena.offsetWidth;
            arena.classList.add("is-earthquake");
            setTimeout(() => arena.classList.remove("is-earthquake"), 620);
        }

        function triggerKimGibeomEarthquake(fighter, now) {
            const effects = kimGibeomEffects(fighter);
            const damage = effects.earthquakeDamage || 40;
            const slowDuration = (effects.earthquakeSlowDuration || 2) * 1000;
            const slowMultiplier = effects.earthquakeSlowMultiplier || 0.45;

            shakeArena();
            screenFlash(fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 2.45, fighter.definition.color);
            megaBurst(fighter.x, fighter.y, fighter.definition.color, 12);
            floatText("땅울림!", fighter.x, fighter.y - battle.ballSize, fighter.definition.color);
            triggerKimGibeomAppleDrop(fighter, now);

            battle.fighters.forEach((target) => {
                if (target.dead || target.offMapUntil > now) {
                    return;
                }

                if (tryKwonSoonbeomEffectBlock(target, fighter, "earthquake", now)) {
                    return;
                }
                target.slowUntil = Math.max(target.slowUntil || 0, now + slowDuration);
                target.slowMultiplier = Math.min(target.slowMultiplier || 1, slowMultiplier);
                applyDamage(target, damage, fighter, "skill", { unavoidable: true });
            });
        }

        function keepKangComboDuringKnockback(fighter, color, now = performance.now()) {
            if (!isKangComboing(fighter)) {
                return false;
            }

            fighter.windmillMomentum = null;
            fighter.afterimageUntil = Math.max(fighter.afterimageUntil || 0, now + 420);
            fighter.nextAfterimageAt = 0;
            floatText("연타 유지", fighter.x, fighter.y - battle.ballSize / 2, color || fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.18, fighter.definition.color);
            return true;
        }

        function reflectKnockbackToSource(target, source, direction, speed, options = {}) {
            if (!source || source.dead || source === target || isKimGibeom(source)) {
                return false;
            }

            const effects = kimGibeomEffects(target);
            const range = effects.reflectRange || battle.ballSize * (effects.reflectRangeMultiplier || 1.45);
            const origin = options.origin || source;
            if (Math.hypot(origin.x - target.x, origin.y - target.y) > range) {
                return false;
            }

            const pushDirection = normalize(source.x - target.x || direction.x, source.y - target.y || direction.y);
            const pushSpeed = speed || effects.reflectedKnockbackSpeed || 1200;
            if (keepKangComboDuringKnockback(source, target.definition.color)) {
                return true;
            }
            if (options.windmill) {
                startWindmillFlight(source, pushDirection, target, options.windmill);
            } else {
                source.vx = pushDirection.x * scaledSpeed(pushSpeed);
                source.vy = pushDirection.y * scaledSpeed(pushSpeed);
                source.afterimageUntil = performance.now() + 420;
                source.nextAfterimageAt = 0;
            }

            floatText("반사", source.x, source.y - battle.ballSize / 2, target.definition.color);
            effectRing(target.x, target.y, battle.ballSize * 1.25, target.definition.color);
            return true;
        }

        function ignoreOrReflectKnockback(target, source, direction, speed, options = {}) {
            const now = performance.now();
            if (tryKwonSoonbeomEffectBlock(target, source, "knockback", now, options)) {
                return true;
            }
            if (tryKimSihyeonKnockbackDodge(target, source, now)) {
                return true;
            }

            if (keepKangComboDuringKnockback(target, target.definition.color, now)) {
                return true;
            }

            if (!isKimGibeom(target)) {
                return false;
            }

            reflectKnockbackToSource(target, source, direction, speed, options);
            target.windmillMomentum = null;
            floatText("버팀", target.x, target.y - battle.ballSize / 2, target.definition.color);
            effectRing(target.x, target.y, battle.ballSize * 1.1, target.definition.color);
            return true;
        }

        function isKangComboing(fighter) {
            return isKangInchan(fighter) && Boolean(fighter.kangComboTargetId);
        }

        function updateKangComboAuraTrigger(fighter, now) {
            if (!isKangInchan(fighter) || isPassiveForbidden(fighter, now) || fighter.dead || fighter.offMapUntil > now || isKangComboing(fighter) || isKangFinishing(fighter) || (fighter.skillCooldown || 0) > 0) {
                return false;
            }
            const effects = kangEffects(fighter);
            const radius = bossAttackRange(fighter, effects.comboTriggerRadius || 100);
            const target = livingEnemiesOf(fighter)
                .filter((enemy) => Math.hypot(enemy.x - fighter.x, enemy.y - fighter.y) <= radius + fighterRadius(enemy))
                .sort((a, b) => Math.hypot(a.x - fighter.x, a.y - fighter.y) - Math.hypot(b.x - fighter.x, b.y - fighter.y))[0] || null;
            if (!target) {
                return false;
            }
            if ((fighter.kangMastery || 0) <= 0) {
                addKangMastery(fighter, effects.comboTriggerMasteryGain || 1, { silent: true });
            }
            const started = startKangCombo(fighter, target, now, effects.comboInterval || 0.1);
            if (started) {
                floatText("감지 연타", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
                effectRing(fighter.x, fighter.y, radius * 2, fighter.definition.color);
            }
            return started;
        }

        function addKangMastery(fighter, amount, options = {}) {
            const now = options.now || performance.now();
            if (!isKangInchan(fighter) || isPassiveForbidden(fighter, now) || !Number.isFinite(amount) || amount <= 0) {
                return false;
            }

            fighter.kangMastery = Math.max(0, (fighter.kangMastery || 0) + amount);
            if (!options.silent) {
                floatText(`숙련도 ${fighter.kangMastery}`, fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            }
            if (options.target && options.now && !options.deferFinisher) {
                return tryStartKangFinisherFromMastery(fighter, options.target, options.now);
            }
            return false;
        }

        function tryStartKangFinisherFromMastery(fighter, target, now) {
            if (!isKangInchan(fighter) || fighter.dead || !target || target.dead || isKangFinishing(fighter)) {
                return false;
            }
            const effects = kangEffects(fighter);
            const threshold = effects.finisherMasteryThreshold || 15;
            if ((fighter.kangMastery || 0) < threshold) {
                return false;
            }

            fighter.kangComboTargetId = null;
            fighter.kangComboCount = 0;
            fighter.kangComboNextAt = 0;
            fighter.kangComboSpeedMultiplier = 0;
            fighter.skillCooldown = skillCooldownDuration(fighter);
            return startKangFinisher(fighter, target, now);
        }

        function pushTargetFromKang(attacker, defender) {
            const effects = kangEffects(attacker);
            const direction = normalize(defender.x - attacker.x, defender.y - attacker.y);
            const pushSpeed = effects.contactPushSpeed || 260;
            if (ignoreOrReflectKnockback(defender, attacker, direction, pushSpeed)) {
                return;
            }
            defender.vx += direction.x * scaledSpeed(pushSpeed);
            defender.vy += direction.y * scaledSpeed(pushSpeed);
            defender.x = clampToArena(defender.x + direction.x * battle.ballSize * 0.14);
            defender.y = clampToArena(defender.y + direction.y * battle.ballSize * 0.14);
        }

        function isKangFinishing(fighter) {
            return isKangInchan(fighter) && Boolean(fighter.kangFinisherTargetId);
        }

        function startGlobalSlowMotion(now, duration, multiplier) {
            battle.globalSlowUntil = Math.max(battle.globalSlowUntil || 0, now + Math.max(0, duration) * 1000);
            battle.globalSlowMultiplier = Math.min(battle.globalSlowMultiplier || 1, multiplier || 0.35);
            screenFlash("#7c3aed");
        }

        function createKangPathAfterimages(fighter, startX, startY, endX, endY, count = 7) {
            const ghosts = scaledAfterimageCount(Math.max(3, Math.min(12, count)), 2);
            for (let index = 0; index < ghosts; index += 1) {
                const ratio = ghosts === 1 ? 1 : index / (ghosts - 1);
                createAfterimage(fighter, {
                    x: startX + (endX - startX) * ratio,
                    y: startY + (endY - startY) * ratio,
                    opacity: Math.max(0.2, 0.56 - ratio * 0.22),
                    scale: Math.max(0.82, 1 - ratio * 0.08),
                    lifetime: 680 + index * 32
                });
            }
        }

        function clearKangFinisher(fighter) {
            fighter.kangFinisherTargetId = null;
            fighter.kangFinisherPhase = "";
            fighter.kangFinisherChargeAt = 0;
        }

        function startKangFinisher(fighter, target, now) {
            if (!isKangInchan(fighter) || fighter.dead || !target || target.dead || isKangFinishing(fighter)) {
                return false;
            }

            const effects = kangEffects(fighter);
            const threshold = effects.finisherMasteryThreshold || 20;
            if ((fighter.kangMastery || 0) < threshold) {
                return false;
            }

            const away = normalize(fighter.x - target.x, fighter.y - target.y);
            const startX = fighter.x;
            const startY = fighter.y;
            const backDistance = effects.finisherBackDistance || 700;
            const endX = clampToArena(fighter.x + away.x * backDistance);
            const endY = clampToArena(fighter.y + away.y * backDistance);

            screenFlash("#7c3aed");
            createKangPathAfterimages(fighter, startX, startY, endX, endY, 8);
            fighter.x = endX;
            fighter.y = endY;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.afterimageUntil = Math.max(fighter.afterimageUntil || 0, now + 900);
            fighter.nextAfterimageAt = 0;
            fighter.kangFinisherTargetId = target.id;
            fighter.kangFinisherPhase = "backstep";
            fighter.kangFinisherChargeAt = now + (effects.finisherChargeDelay || 0.42) * 1000;
            fighter.forceMoveUntil = fighter.kangFinisherChargeAt + 260;
            kangFinisherLabel(fighter);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.45, fighter.definition.color);
            return true;
        }

        function releaseKangFinisher(fighter, target, now) {
            const effects = kangEffects(fighter);
            const direction = normalize(target.x - fighter.x, target.y - fighter.y);
            const startX = fighter.x;
            const startY = fighter.y;
            const endX = clampToArena(target.x - direction.x * battle.ballSize * 0.92);
            const endY = clampToArena(target.y - direction.y * battle.ballSize * 0.92);

            createKangPathAfterimages(fighter, startX, startY, endX, endY, 10);
            fighter.x = endX;
            fighter.y = endY;
            fighter.vx = direction.x * scaledSpeed(fighter.speed * 4.8);
            fighter.vy = direction.y * scaledSpeed(fighter.speed * 4.8);
            fighter.afterimageUntil = Math.max(fighter.afterimageUntil || 0, now + 620);
            fighter.nextAfterimageAt = 0;

            const threshold = effects.finisherMasteryThreshold || 15;
            const masteryOverThreshold = Math.max(0, (fighter.kangMastery || 0) - threshold);
            const extraDamage = masteryOverThreshold * (effects.finisherExtraDamagePerMasteryOverThreshold ?? 2);
            const totalDamage = (effects.finisherDamage || 200) + extraDamage;
            const dealt = applyDamage(target, totalDamage, fighter, "skill", { unavoidable: true });
            const finisherHeal = masteryOverThreshold * (effects.finisherHealPerMasteryOverThreshold ?? 1);
            if (finisherHeal > 0) {
                healFighter(fighter, finisherHeal, fighter, {
                    offsetY: fighterRadius(fighter),
                    color: "#006d36"
                });
            }
            impactStar(target.x, target.y, fighter.definition.color);
            burst(target.x, target.y, fighter.definition.color, 12);
            effectRing(target.x, target.y, battle.ballSize * 1.65, fighter.definition.color);
            if (dealt > 0 && !target.dead) {
                const knockbackSpeed = effects.finisherKnockbackSpeed || 8000;
                if (!ignoreOrReflectKnockback(target, fighter, direction, knockbackSpeed, { origin: target })) {
                    if (isKangComboing(target)) {
                        finishKangCombo(target);
                    }
                    target.windmillMomentum = {
                        source: fighter,
                        phase: "toWall",
                        speed: knockbackSpeed,
                        reboundSpeed: effects.finisherReboundSpeed || Math.max(1400, knockbackSpeed * 0.62),
                        decayAmount: effects.finisherReboundDecayAmount || 650,
                        decayInterval: (effects.finisherReboundDecayInterval || 0.08) * 1000,
                        nextDecayAt: 0,
                        wallDamage: effects.finisherWallDamage || 10,
                        nextAfterimageAt: 0,
                        afterimageInterval: scaledAfterimageInterval((effects.finisherAfterimageInterval || 0.035) * 1000),
                        afterimageLifetime: 420
                    };
                    target.vx = direction.x * scaledSpeed(knockbackSpeed);
                    target.vy = direction.y * scaledSpeed(knockbackSpeed);
                    target.afterimageUntil = Math.max(target.afterimageUntil || 0, now + 520);
                    target.nextAfterimageAt = 0;
                }
            }
            fighter.kangMastery = effects.finisherResetMastery ?? 10;
            floatText(`숙련도 ${fighter.kangMastery}`, fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            clearKangFinisher(fighter);
        }

        function updateKangFinisher(fighter, now) {
            if (!isKangFinishing(fighter) || fighter.dead) {
                return false;
            }

            const target = getFighterById(fighter.kangFinisherTargetId);
            if (!target || target.dead || target.offMapUntil > now) {
                clearKangFinisher(fighter);
                return false;
            }

            fighter.vx = 0;
            fighter.vy = 0;
            updateAfterimageWindow(fighter, now);
            if (now < fighter.kangFinisherChargeAt) {
                return true;
            }

            releaseKangFinisher(fighter, target, now);
            return true;
        }

        function startKangCombo(fighter, target, now, delay = 0.1, options = {}) {
            if (!isKangInchan(fighter) || fighter.dead || !target || target.dead || (fighter.kangMastery || 0) <= 0) {
                return false;
            }
            if (!isKangComboing(fighter) && (fighter.skillCooldown || 0) > 0) {
                return false;
            }

            const effects = kangEffects(fighter);
            const speedMultiplier = options.speedMultiplier || effects.comboDashSpeedMultiplier || 2.8;
            if (isKangComboing(fighter)) {
                fighter.kangComboTargetId = target.id;
                fighter.kangComboSpeedMultiplier = Math.max(fighter.kangComboSpeedMultiplier || 0, speedMultiplier);
                return true;
            }

            fighter.kangComboTargetId = target.id;
            fighter.kangComboCount = 0;
            fighter.kangComboNextAt = now + delay * 1000;
            fighter.kangComboSequenceId += 1;
            fighter.kangComboSpeedMultiplier = speedMultiplier;
            return true;
        }

        function finishKangCombo(fighter, options = {}) {
            const target = options.target || getFighterById(fighter.kangComboTargetId);
            const now = options.now || performance.now();
            const effects = kangEffects(fighter);
            const shouldStartFinisher = options.completed
                && target
                && !target.dead
                && (fighter.kangMastery || 0) >= (effects.finisherMasteryThreshold || 20);

            fighter.kangComboTargetId = null;
            fighter.kangComboCount = 0;
            fighter.kangComboNextAt = 0;
            fighter.kangComboSpeedMultiplier = 0;
            if (options.completed) {
                fighter.skillCooldown = skillCooldownDuration(fighter);
            }
            if (shouldStartFinisher) {
                startKangFinisher(fighter, target, now);
            }
        }

        function handleKangBasicHit(attacker, defender, now) {
            if (!isKangInchan(attacker) || attacker.dead || defender.dead || isKangComboing(attacker)) {
                return;
            }

            const effects = kangEffects(attacker);
            pushTargetFromKang(attacker, defender);
            if (addKangMastery(attacker, effects.masteryGainOnBasic || 1, { silent: true, target: defender, now })) {
                return;
            }
            if ((attacker.kangComboCount || 0) < (attacker.kangMastery || 0)) {
                startKangCombo(attacker, defender, now, effects.comboInterval || 0.1);
            }
        }

        function tryKangDodge(target, source, now) {
            if (!isKangInchan(target) || isPassiveForbidden(target, now) || isKangComboing(target) || isKangFinishing(target) || !source || source === target || source.dead || target.dead || target.invulnerableUntil > now || target.offMapUntil > now) {
                return false;
            }

            const effects = kangEffects(target);
            if (Math.random() >= (effects.dodgeChance || 0.2)) {
                return false;
            }

            const away = normalize(target.x - source.x, target.y - source.y);
            const counterDelay = effects.dodgeCounterDelay || 0.5;
            const startX = target.x;
            const startY = target.y;
            const endX = clampToArena(target.x + away.x * battle.ballSize * (effects.dodgeBackDistanceMultiplier || 1.35));
            const endY = clampToArena(target.y + away.y * battle.ballSize * (effects.dodgeBackDistanceMultiplier || 1.35));
            for (let index = 0; index < 6; index += 1) {
                const ratio = index / 5;
                createAfterimage(target, {
                    x: startX + (endX - startX) * ratio,
                    y: startY + (endY - startY) * ratio,
                    opacity: Math.max(0.18, 0.56 - ratio * 0.24),
                    scale: Math.max(0.82, 1 - ratio * 0.08),
                    lifetime: 620 + index * 35
                });
            }
            target.x = endX;
            target.y = endY;
            target.vx = 0;
            target.vy = 0;
            target.forceMoveUntil = now + counterDelay * 1000;
            target.afterimageUntil = now + counterDelay * 1000 + 420;
            target.nextAfterimageAt = 0;
            if (!addKangMastery(target, effects.dodgeMasteryGain || 3, { silent: true, target: source, now })) {
                startKangCombo(target, source, now, counterDelay, {
                    speedMultiplier: effects.counterDashSpeedMultiplier || 4.8
                });
            }
            return true;
        }

        function updateKangCombo(fighter, now) {
            if (!isKangComboing(fighter) || fighter.dead) {
                return false;
            }

            const target = getFighterById(fighter.kangComboTargetId);
            if (!target || target.dead || target.offMapUntil > now) {
                finishKangCombo(fighter);
                return false;
            }

            const effects = kangEffects(fighter);
            const mastery = fighter.kangMastery || 0;
            const finisherMasteryThreshold = effects.finisherMasteryThreshold || 20;
            const finisherHitThreshold = effects.comboFinisherHitThreshold || finisherMasteryThreshold;
            if (mastery >= finisherMasteryThreshold) {
                finishKangCombo(fighter, { completed: true, target, now });
                return false;
            }
            const reachedFinisherHitThreshold = (fighter.kangComboCount || 0) >= finisherHitThreshold
                && mastery >= finisherMasteryThreshold;
            if (reachedFinisherHitThreshold || (fighter.kangComboCount || 0) >= mastery) {
                finishKangCombo(fighter, { completed: true, target, now });
                return false;
            }

            if (now < fighter.kangComboNextAt) {
                fighter.vx = 0;
                fighter.vy = 0;
                return true;
            }

            const direction = normalize(target.x - fighter.x, target.y - fighter.y);
            const chaseSpeed = fighter.speed * (fighter.kangComboSpeedMultiplier || effects.comboDashSpeedMultiplier || 2.8);
            fighter.vx = direction.x * scaledSpeed(chaseSpeed);
            fighter.vy = direction.y * scaledSpeed(chaseSpeed);

            createAfterimage(fighter, { opacity: 0.46, scale: 0.95, lifetime: 520 });
            fighter.x = clampToArena(target.x - direction.x * battle.ballSize * 0.92);
            fighter.y = clampToArena(target.y - direction.y * battle.ballSize * 0.92);
            applyDamage(target, effects.comboDamage || 10, fighter, "combo", { ignoreLeeShield: true });
            const comboHeal = effects.comboHealPerHit || 0;
            if (comboHeal > 0 && fighter.hp < fighter.maxHp) {
                healFighter(fighter, comboHeal, fighter, {
                    offsetY: battle.ballSize / 2,
                    color: "#006d36"
                });
            }
            impactStar(target.x, target.y, fighter.definition.color);
            burst(target.x, target.y, fighter.definition.color, 5);
            floatText("연타", target.x, target.y - battle.ballSize / 2, fighter.definition.color);

            fighter.kangComboCount += 1;
            const shouldForceFinisher = fighter.kangComboCount >= finisherHitThreshold
                && mastery >= finisherMasteryThreshold;
            if (shouldForceFinisher || fighter.kangComboCount >= mastery) {
                finishKangCombo(fighter, { completed: true, target, now });
            } else {
                fighter.kangComboNextAt = now + (effects.comboInterval || 0.1) * 1000;
            }
            return true;
        }

        function applyDamage(target, amount, source, kind, options = {}) {
            const now = performance.now();
            if (!target || target.dead || !Number.isFinite(amount) || amount <= 0) {
                return 0;
            }
            if (kind === "passive" && source && isPassiveEffectForbidden(source, now)) {
                return 0;
            }

            if (source && source !== target && areAllies(source, target) && !options.allowFriendlyFire) {
                return 0;
            }

            if (!Number.isFinite(target.hp)) {
                target.hp = Math.max(1, target.maxHp);
            }

            if (isJiDeveloperReviving(target)) {
                floatText("부활 대기", target.x, target.y - battle.ballSize / 2, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.1, target.definition.color);
                return 0;
            }

            if (isKimDonggyuDefibing(target, now)) {
                return damageKimDonggyuDefib(target, amount, source, now, options);
            }

            if (isKimDonggyu(target) && target.kimDonggyuEscapeInvulnerableUntil > now) {
                floatText("무적", target.x, target.y - battle.ballSize / 2, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.1, target.definition.color);
                return 0;
            }

            if (
                !options.unavoidable
                && isYuYejun(target)
                && source
                && source.id === target.yuIgnoredSourceId
                && target.yuChaseIgnoreUntil > now
            ) {
                floatText("무시", target.x, target.y - battle.ballSize / 2, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.1, target.definition.color);
                return 0;
            }

            if (isLeeDribbling(target, now) && !options.ignoreLeeDribble) {
                floatText("MISS", target.x, target.y - battle.ballSize / 2, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.1, target.definition.color);
                return 0;
            }

            if (!options.unavoidable && tryKangDodge(target, source, now)) {
                return 0;
            }

            const parkPassiveRushTarget = isParkSungbinPassiveRush(target);
            if (!options.unavoidable && ((target.invulnerableUntil > now && !parkPassiveRushTarget) || target.offMapUntil > now)) {
                floatText("MISS", target.x, target.y - battle.ballSize / 2, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.1, target.definition.color);
                return 0;
            }

            if (tryLeeShieldBlock(target, amount, source, kind, options, now)) {
                return 0;
            }

            if (tryKwonSoonbeomShieldBlock(target, amount, source, kind, options, now)) {
                return 0;
            }

            if (kind === "basic" && target.definition.immuneToBasic) {
                floatText("IMMUNE", target.x, target.y - battle.ballSize / 2, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.2, target.definition.color);
                return 0;
            }

            if (!options.ignoreAdminDonggyuBarrier && isAdminKimDonggyu(target) && damageAdminDonggyuBarrier(target, amount, source, now)) {
                return 0;
            }

            let damageToHp = amount;
            if (source && source !== target && isKimSihyeonBuffed(source, now)) {
                const effects = kimSihyeonEffects(source);
                damageToHp *= 1 + (effects.damageBonusRatio || 0);
            }
            if (source && source !== target && !areAllies(source, target) && (source.protestAllyBuffUntil || 0) > now) {
                damageToHp *= source.protestAllyDamageMultiplier || 1.5;
            }
            damageToHp = applyKimDonggyuCritical(source, damageToHp, target, now, options);
            if (source && isLeeSungwon(source) && target.leeSungwonMarkedById === source.id) {
                damageToHp *= 1 + (leeSungwonEffects(source).markedDamageBonus || 0.2);
            }
            if (source && isLeeSungwon(source) && source.leeSungwonAwakened && !options.noLeeSungwonCritical) {
                const effects = leeSungwonEffects(source);
                if (Math.random() < (effects.awakenCriticalChance ?? 0.3)) {
                    damageToHp *= effects.awakenCriticalMultiplier || 2;
                    floatText("CRIT", target.x, target.y - fighterRadius(target) * 1.45, source.definition.color);
                }
            }
            if (isAsleep(target, now)) {
                damageToHp *= target.sleepDamageMultiplier || 1.5;
            }
            damageToHp *= protestTargetDamageMultiplier(target, source, now);
            damageToHp *= leeSungwonComboDamageTakenMultiplier(target);
            if (isKimSihyeonBuffed(target, now)) {
                const effects = kimSihyeonEffects(target);
                damageToHp *= effects.damageTakenMultiplier ?? 0.31;
            }
            if (isLeeDohyunOffsideBusy(target)) {
                const effects = leeDohyunSkillEffects(target);
                damageToHp *= effects.damageTakenMultiplier ?? 0.5;
            }
            if (target.definition.id === "kim-suyeong" && (target.skillCooldown || 0) > 0) {
                const effects = target.definition.skill?.effects || {};
                damageToHp *= effects.cooldownDamageTakenMultiplier ?? 0.5;
            }
            if (isKangComboing(target)) {
                const effects = kangEffects(target);
                damageToHp *= effects.comboDamageTakenMultiplier ?? 0.5;
            }
            if (parkPassiveRushTarget && !isPassiveForbidden(target, now)) {
                const effects = parkSungbinPassiveEffects(target);
                damageToHp *= effects.rushDamageTakenMultiplier ?? 0.5;
            }
            if ((target.protestAllyBuffUntil || 0) > now) {
                damageToHp *= target.protestAllyDamageTakenMultiplier || 0.8;
            }
            const passiveDamageTakenMultiplier = target.definition.id === "admin-ball"
                ? target.definition.passive?.effects?.damageTakenMultiplier
                : null;
            if (Number.isFinite(passiveDamageTakenMultiplier) && !isPassiveForbidden(target, now)) {
                damageToHp *= passiveDamageTakenMultiplier;
            }
            const jaeyoonDomainMultiplier = jaeyoonDomainDamageTakenMultiplier(target);
            if (jaeyoonDomainMultiplier < 1) {
                damageToHp *= jaeyoonDomainMultiplier;
            }
            damageToHp = splitYuYejunDamageToPets(target, damageToHp, source, now, options);
            if (isLeeSungwon(target) && (target.leeSungwonShield || 0) > 0 && damageToHp > 0) {
                const absorbed = Math.min(target.leeSungwonShield || 0, damageToHp);
                target.leeSungwonShield = Math.max(0, (target.leeSungwonShield || 0) - absorbed);
                damageToHp = Math.max(0, damageToHp - absorbed);
                floatText(`보호막 -${Math.round(absorbed)}`, target.x, target.y - fighterRadius(target) * 1.35, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.1, target.definition.color);
                if (damageToHp <= 0) {
                    return 0;
                }
            }
            const actual = Math.min(target.hp, damageToHp);
            target.hp -= actual;
            const shouldApplyKimSihyeonDarkness = actual > 0
                && target.hp > 0
                && !options.skipKimSihyeonDarkness
                && source
                && source !== target
                && isKimSihyeonBuffed(source, now)
                && !areAllies(source, target);
            if (actual > 0) {
                recordDamageStats(source, target, actual);
                registerKimDonggyuHpLoss(target, actual, now);
                registerAdminDonggyuHpLoss(target, actual, now);
                if (target.definition.id === "gu-minchan") {
                    const effects = target.definition.passive?.effects || {};
                    addGuMinchanRage(target, effects.damageTakenRageGain || 1, now, { reason: "damage", silent: true });
                }
                stopKimSihyeonYawnHealing(target);
                if (source && isLeeDohyun(source)) {
                    clearLeeDohyunFoul(target);
                }
                if (source && source !== target && !areAllies(source, target)) {
                    interruptKimDonggyuAim(target, source, now);
                }
                triggerLeeDohyunLinePassive(source, target, actual, now, kind, options);
                if (source && isLeeSungwon(source) && source !== target && !areAllies(source, target)) {
                    if (kind === "basic") {
                        registerLeeSungwonHit(source, target, actual, now);
                    }
                    if (leeSungwonEffectiveComboCount(source) >= 5) {
                        const lifesteal = leeSungwonEffects(source).combo5LifestealRatio || 0.4;
                        healFighter(source, actual * lifesteal, source, {
                            color: source.definition.color,
                            offsetY: fighterRadius(source)
                        });
                    }
                    if (source.leeSungwonAwakened && kind === "basic" && leeSungwonEffectiveComboCount(source) >= 10 && !options.skipComboControl) {
                        const effects = leeSungwonEffects(source);
                        if (stun(target, effects.combo10StunDuration || 0.7, now, source)) {
                            applyJiCooldownSlow(target, now, effects.combo10CooldownSlowDuration || 2, effects.combo10CooldownSlowMultiplier || 0.4, source);
                        }
                    }
                    if (source.leeSungwonAwakened && !options.skipLeeSungwonBrand) {
                        applyLeeSungwonBrand(source, target, now);
                    }
                }
            }
            updateKimGibeomAttack(target);

            if (!options.silent) {
                floatText(`-${Math.round(actual)}`, target.x, target.y - battle.ballSize / 2);
                impactStar(target.x, target.y, source ? source.definition.color : "#ba1a1a");
            }

            if (kind === "skill" && !options.silent) {
                effectRing(target.x, target.y, battle.ballSize * 1.35, source ? source.definition.color : "#ba1a1a");
            }

            if (!isStunned(target, now)) {
                reduceCooldown(target, target.definition.cooldownOnDamageTaken);
            }

            if (target.hp <= 0 && !target.isSummon && startKimDonggyuSelfRevive(target, now)) {
                return actual;
            }

            if (target.hp <= 0 && !target.isSummon && triggerGwonDeathSave(target, now)) {
                return actual;
            }

            if (target.hp <= 0 && !target.isSummon && startJiDeveloperRevive(target, now)) {
                return actual;
            }

            if (target.hp <= 0) {
                defeatFighter(target, now, source);
            }

            if (shouldApplyKimSihyeonDarkness && !target.dead) {
                addKimSihyeonDarknessStack(target, source, now, 1);
            }

            return actual;
        }

        function stun(target, seconds, now, source = null, options = {}) {
            if (target.dead) {
                return false;
            }
            if (source && tryKwonSoonbeomEffectBlock(target, source, "stun", now, options)) {
                return false;
            }

            if (!isStunned(target, now)) {
                target.savedVelocity = { vx: target.vx, vy: target.vy };
            }

            target.stunnedUntil = Math.max(target.stunnedUntil, now + seconds * 1000);
            target.vx = 0;
            target.vy = 0;
            return true;
        }

        function restoreFromStun(fighter, now) {
            if (fighter.dead || fighter.stunnedUntil === 0 || isStunned(fighter, now)) {
                return;
            }

            if (fighter.savedVelocity) {
                fighter.vx = fighter.savedVelocity.vx;
                fighter.vy = fighter.savedVelocity.vy;
                setVelocitySpeed(fighter, moveSpeedOf(fighter, now));
            }

            fighter.savedVelocity = null;
            fighter.stunnedUntil = 0;
            if (!isAsleep(fighter, now)) {
                fighter.sleepDamageMultiplier = 1;
            }
        }

        function updateCachedCorners() {
            const radius = battle.ballSize / 2;
            cachedCorners = [
                { x: radius, y: radius },
                { x: battle.arenaSize - radius, y: radius },
                { x: battle.arenaSize - radius, y: battle.arenaSize - radius },
                { x: radius, y: battle.arenaSize - radius }
            ];
        }

        function arenaCorners() {
            return cachedCorners;
        }

        function createWindmill(source, now) {
            const effects = source.definition.skill.effects || {};
            const direction = normalize(source.vx || Math.random() - 0.5, source.vy || Math.random() - 0.5);
            const length = bossAttackRange(source, battle.ballSize * (effects.lengthMultiplier || 2.4));
            const width = bossAttackRange(source, battle.ballSize * (effects.widthMultiplier || 0.3));
            const attachOffset = battle.ballSize * (effects.attachOffsetMultiplier || 0);
            const x = clampToArena(source.x + direction.x * attachOffset);
            const y = clampToArena(source.y + direction.y * attachOffset);

            const element = document.createElement("div");
            element.className = "windmill-bar";
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;
            element.style.width = `${length}px`;
            element.style.height = `${width}px`;
            element.style.color = source.definition.color;
            arena.appendChild(element);

            battle.activeWindmills.push({
                source,
                element,
                x,
                y,
                length,
                width,
                baseAngle: Math.atan2(direction.y, direction.x),
                createdAt: now,
                expiresAt: now + (effects.duration || 2.4) * 1000,
                rotationSpeed: effects.rotationSpeed || 10,
                damage: effects.damage || 30,
                attachOffsetMultiplier: effects.attachOffsetMultiplier || 0,
                wallSlamSpeed: effects.wallSlamSpeed || 5000,
                reboundSpeed: effects.reboundSpeed || 4000,
                reboundDecayAmount: effects.reboundDecayAmount || 500,
                reboundDecayInterval: (effects.reboundDecayInterval || 0.1) * 1000,
                flightAfterimageInterval: (effects.flightAfterimageInterval || 0.04) * 1000,
                wallDamage: effects.wallDamage || 50,
                autoHitInReach: effects.autoHitInReach ?? true,
                hitCooldown: (effects.hitCooldown || 0.45) * 1000,
                hitTimes: new Map()
            });

            effectRing(x, y, length, source.definition.color);
        }

        function updateWindmills(now) {
            battle.activeWindmills = battle.activeWindmills.filter((windmill) => {
                if (windmill.source.dead || now >= windmill.expiresAt) {
                    windmill.element.remove();
                    return false;
                }

                const followDirection = normalize(
                    windmill.source.vx || Math.cos(windmill.baseAngle),
                    windmill.source.vy || Math.sin(windmill.baseAngle)
                );
                const attachOffset = battle.ballSize * windmill.attachOffsetMultiplier;
                windmill.x = clampToArena(windmill.source.x + followDirection.x * attachOffset);
                windmill.y = clampToArena(windmill.source.y + followDirection.y * attachOffset);
                const elapsed = (now - windmill.createdAt) / 1000;
                const frontAngle = Math.atan2(followDirection.y, followDirection.x);
                const fallbackAngle = frontAngle + Math.sin(elapsed * windmill.rotationSpeed) * (Math.PI / 2);
                const reachableTargets = battle.fighters
                    .filter((target) => (
                        target !== windmill.source
                        && !target.dead
                        && target.offMapUntil <= now
                        && !areAllies(windmill.source, target)
                    ))
                    .map((target) => {
                        const hitDistance = fighterRadius(target) + windmill.width / 2;
                        const distance = Math.hypot(target.x - windmill.x, target.y - windmill.y);
                        return { target, hitDistance, distance };
                    })
                    .filter((entry) => entry.distance <= windmill.length + entry.hitDistance);
                const autoTarget = windmill.autoHitInReach
                    ? reachableTargets.slice().sort((a, b) => a.distance - b.distance)[0]?.target
                    : null;
                const angle = autoTarget
                    ? Math.atan2(autoTarget.y - windmill.y, autoTarget.x - windmill.x)
                    : fallbackAngle;
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                const ax = windmill.x;
                const ay = windmill.y;
                const bx = windmill.x + cos * windmill.length;
                const by = windmill.y + sin * windmill.length;

                windmill.element.style.left = `${windmill.x}px`;
                windmill.element.style.top = `${windmill.y}px`;
                windmill.element.style.transform = `translate(0, -50%) rotate(${angle}rad)`;

                battle.fighters.forEach((target) => {
                    if (
                        target === windmill.source
                        || target.dead
                        || target.offMapUntil > now
                        || areAllies(windmill.source, target)
                    ) {
                        return;
                    }

                    const lastHitAt = windmill.hitTimes.get(target.id) || 0;
                    if (lastHitAt && now - lastHitAt < windmill.hitCooldown) {
                        return;
                    }

                    const hitDistance = fighterRadius(target) + windmill.width / 2;
                    const inAutoReach = windmill.autoHitInReach
                        && Math.hypot(target.x - windmill.x, target.y - windmill.y) <= windmill.length + hitDistance;
                    if (!inAutoReach && distanceToSegment(target.x, target.y, ax, ay, bx, by) > hitDistance) {
                        return;
                    }

                    windmill.hitTimes.set(target.id, now);
                    applyDamage(target, windmill.damage, windmill.source, "skill");
                    impactStar(target.x, target.y, windmill.source.definition.color);
                    burst(target.x, target.y, windmill.source.definition.color, 8);

                    if (target.definition.immuneToKnockback && !isKimGibeom(target)) {
                        floatText("NO PUSH", target.x, target.y - battle.ballSize / 2, target.definition.color);
                        return;
                    }

                    const wallDirection = directionToNearestWall(target);
                    const didLaunch = startWindmillFlight(target, wallDirection, windmill.source, windmill, { origin: target });
                    if (didLaunch) {
                        floatText("풍차!", target.x, target.y - battle.ballSize / 2, windmill.source.definition.color);
                    }
                });

                return true;
            });
        }

        function updateWindmillMomentum(fighter, now) {
            const momentum = fighter.windmillMomentum;
            if (!momentum || fighter.dead) {
                return false;
            }

            if (momentum.nextAfterimageAt <= now) {
                createAfterimage(fighter, {
                    opacity: momentum.phase === "toWall" ? 0.44 : 0.34,
                    scale: momentum.phase === "toWall" ? 0.96 : 0.9,
                    lifetime: momentum.afterimageLifetime
                });
                momentum.nextAfterimageAt = now + momentum.afterimageInterval;
            }

            if (momentum.phase === "rebound" && momentum.nextDecayAt > 0 && now >= momentum.nextDecayAt) {
                const decaySteps = Math.max(1, Math.floor((now - momentum.nextDecayAt) / momentum.decayInterval) + 1);
                momentum.speed = Math.max(0, momentum.speed - decaySteps * momentum.decayAmount);
                momentum.nextDecayAt += decaySteps * momentum.decayInterval;
            }

            if (momentum.speed <= 0) {
                fighter.windmillMomentum = null;
                setVelocitySpeed(fighter, moveSpeedOf(fighter, now));
                return false;
            }

            setVelocitySpeed(fighter, momentum.speed);
            return true;
        }

        function addGuMinchanRage(fighter, amount, now, options = {}) {
            if (fighter.definition.id !== "gu-minchan" || fighter.dead || isPassiveForbidden(fighter, now) || !Number.isFinite(amount) || amount <= 0) {
                return;
            }

            const effects = fighter.definition.passive?.effects || {};
            fighter.rageStacks += amount;
            fighter.skillCooldown = Math.max(0, fighter.skillCooldown - amount * (effects.cooldownReduction || 0));
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.3, fighter.definition.color);
            floatText(`분노 ${fighter.rageStacks}`, fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
        }

        function registerGuMinchanCollision(fighter, now) {
            if (fighter.definition.id !== "gu-minchan" || fighter.dead || isPassiveForbidden(fighter, now)) {
                return;
            }

            const effects = fighter.definition.passive?.effects || {};
            addGuMinchanRage(fighter, effects.collisionRageGain || 1, now, { reason: "collision" });
        }

        function updateRagePassive(fighter, now) {
            if (fighter.definition.id !== "gu-minchan") {
                return;
            }

            const effects = fighter.definition.passive?.effects || {};
            if (!Number.isFinite(effects.interval) || effects.interval <= 0) {
                return;
            }
            const intervalMs = effects.interval * 1000;
            if (!fighter.nextRageAt) {
                fighter.nextRageAt = now + intervalMs;
                return;
            }
            if (now < fighter.nextRageAt) {
                return;
            }

            let stacksGained = 0;
            while (now >= fighter.nextRageAt && stacksGained < 5) {
                fighter.nextRageAt += intervalMs;
                stacksGained += 1;
            }

            addGuMinchanRage(fighter, stacksGained, now, { reason: "time" });
        }

        function createVolleyball(source, now, options = {}) {
            const effects = source.definition.skill.effects || {};
            const target = nearestEnemy(source);
            const direction = target
                ? normalize(target.x - source.x, target.y - source.y)
                : normalize(source.vx || Math.random() - 0.5, source.vy || Math.random() - 0.5);
            const size = bossProjectileSize(source, battle.ballSize * (effects.sizeMultiplier || 0.5));
            const isSpike = Boolean(options.isSpike);
            const rageDamageBonus = !isSpike && source.definition.id === "gu-minchan"
                ? Math.max(0, (source.rageStacks || 0) - (effects.rageDamageThreshold || 10)) * (effects.damagePerRageOverThreshold || 1)
                : 0;
            const damage = (options.damage ?? effects.damage ?? 10) + rageDamageBonus;
            const projectileSpeed = options.projectileSpeed || effects.projectileSpeed || 430;
            const element = document.createElement("div");
            element.className = isSpike ? "volleyball-projectile is-spike" : "volleyball-projectile";
            element.style.left = `${source.x}px`;
            element.style.top = `${source.y}px`;
            element.style.width = `${size}px`;
            element.style.height = `${size}px`;
            element.innerHTML = `<img alt="배구공" ${imageAttrs(effects.imageSrc || "images/volleyball.png", effects.imageFallbackSrcs)}>`;
            arena.appendChild(element);

            battle.activeVolleyballs.push({
                source,
                element,
                x: source.x,
                y: source.y,
                vx: direction.x * scaledSpeed(projectileSpeed),
                vy: direction.y * scaledSpeed(projectileSpeed),
                size,
                damage,
                isSpike,
                createdAt: now,
                nextAfterimageAt: isSpike ? now : Infinity,
                afterimageInterval: isSpike ? scaledAfterimageInterval(24) : 0,
                afterimageLifetime: isSpike ? scaledAfterimageLifetime(640) : 0,
                bouncesRemaining: isSpike ? 0 : effects.maxBounces ?? 3,
                hitCooldown: (effects.bounceHitCooldown || 0.25) * 1000,
                hitTimes: new Map(),
                expiresAt: now + (effects.projectileDuration || 2.6) * 1000
            });

            effectRing(source.x, source.y, battle.ballSize * (isSpike ? 1.55 : 1.1), source.definition.color);
            floatText(isSpike ? "SPIKE !" : "배구공!", source.x, source.y - battle.ballSize / 2, source.definition.color);
        }

        function createVolleyballAfterimage(ball, now) {
            if (!ball.isSpike || ball.nextAfterimageAt > now) {
                return;
            }

            const ghost = document.createElement("div");
            const speedDirection = normalize(ball.vx, ball.vy);
            ghost.className = "volleyball-afterimage";
            ghost.style.left = `${ball.x - speedDirection.x * ball.size * 0.34}px`;
            ghost.style.top = `${ball.y - speedDirection.y * ball.size * 0.34}px`;
            ghost.style.width = `${ball.size * 0.92}px`;
            ghost.style.height = `${ball.size * 0.92}px`;
            ghost.style.transform = `translate(-50%, -50%) rotate(${(now - ball.createdAt) * 0.012}rad)`;
            ghost.style.animationDuration = `${ball.afterimageLifetime}ms`;
            ghost.innerHTML = ball.element.innerHTML;
            arena.appendChild(ghost);
            setTimeout(() => ghost.remove(), ball.afterimageLifetime);
            ball.nextAfterimageAt = now + ball.afterimageInterval;
        }

        function registerVolleyballHit(source, now) {
            if (!source || source.dead || source.definition.id !== "gu-minchan") {
                return;
            }

            const effects = source.definition.skill.effects || {};
            const requiredHits = effects.spikeEvery || 4;
            source.volleyballHits = (source.volleyballHits || 0) + 1;

            if (source.volleyballHits < requiredHits || source.pendingSpike) {
                return;
            }

            source.volleyballHits = 0;
            scheduleSpike(source, now, effects);
        }

        function consumeVolleyballBounce(ball) {
            if (ball.isSpike) {
                return false;
            }
            if ((ball.bouncesRemaining || 0) <= 0) {
                return false;
            }

            ball.bouncesRemaining -= 1;
            return true;
        }

        function redirectVolleyballAfterHit(ball, target, now) {
            const nextTarget = battle.fighters
                .filter((fighter) => (
                    fighter !== ball.source
                    && fighter !== target
                    && !fighter.dead
                    && fighter.offMapUntil <= now
                    && !areAllies(ball.source, fighter)
                ))
                .sort((a, b) => Math.hypot(a.x - ball.x, a.y - ball.y) - Math.hypot(b.x - ball.x, b.y - ball.y))[0];
            const direction = nextTarget
                ? normalize(nextTarget.x - ball.x, nextTarget.y - ball.y)
                : normalize(ball.vx, ball.vy);
            const speed = Math.hypot(ball.vx, ball.vy) || scaledSpeed(ball.source.definition.skill.effects.projectileSpeed || 430);

            ball.vx = direction.x * speed;
            ball.vy = direction.y * speed;
            ball.x = Math.max(ball.size / 2, Math.min(battle.arenaSize - ball.size / 2, ball.x + direction.x * (ball.size * 0.55 + 4)));
            ball.y = Math.max(ball.size / 2, Math.min(battle.arenaSize - ball.size / 2, ball.y + direction.y * (ball.size * 0.55 + 4)));
        }

        function updateVolleyballs(dt, now) {
            battle.activeVolleyballs = battle.activeVolleyballs.filter((ball) => {
                if (ball.source.dead || now >= ball.expiresAt) {
                    ball.element.remove();
                    return false;
                }

                ball.x += ball.vx * dt;
                ball.y += ball.vy * dt;
                const radius = ball.size / 2;

                const hitVerticalWall = ball.x < radius || ball.x > battle.arenaSize - radius;
                const hitHorizontalWall = ball.y < radius || ball.y > battle.arenaSize - radius;
                if (!ball.isSpike && (hitVerticalWall || hitHorizontalWall) && !consumeVolleyballBounce(ball)) {
                    ball.element.remove();
                    return false;
                }

                if (hitVerticalWall) {
                    ball.vx *= -1;
                    ball.x = Math.max(radius, Math.min(battle.arenaSize - radius, ball.x));
                }
                if (hitHorizontalWall) {
                    ball.vy *= -1;
                    ball.y = Math.max(radius, Math.min(battle.arenaSize - radius, ball.y));
                }
                if (!ball.isSpike && (hitVerticalWall || hitHorizontalWall)) {
                    effectRing(ball.x, ball.y, ball.size * 1.15, ball.source.definition.color);
                }

                ball.element.style.left = `${ball.x}px`;
                ball.element.style.top = `${ball.y}px`;
                ball.element.style.transform = `translate(-50%, -50%) rotate(${(now - ball.createdAt) * 0.012}rad)`;
                if (ball.isSpike) {
                    createVolleyballAfterimage(ball, now);
                }

                for (const target of battle.fighters) {
                    if (target === ball.source || target.dead || target.offMapUntil > now || areAllies(ball.source, target)) {
                        continue;
                    }

                    if (Math.hypot(target.x - ball.x, target.y - ball.y) > battle.ballSize * 0.5 + radius) {
                        continue;
                    }
                    if (!ball.isSpike) {
                        const lastHitAt = ball.hitTimes.get(target.id) || 0;
                        if (lastHitAt && now - lastHitAt < ball.hitCooldown) {
                            continue;
                        }
                        ball.hitTimes.set(target.id, now);
                    }

                    const dealt = applyDamage(target, ball.damage, ball.source, "skill");
                    impactStar(target.x, target.y, ball.source.definition.color);
                    burst(target.x, target.y, ball.source.definition.color, ball.isSpike ? 10 : 6);
                    if (!ball.isSpike && dealt > 0) {
                        registerVolleyballHit(ball.source, now);
                    }
                    if (!ball.isSpike) {
                        if (!consumeVolleyballBounce(ball)) {
                            ball.element.remove();
                            return false;
                        }

                        redirectVolleyballAfterHit(ball, target, now);
                        effectRing(target.x, target.y, battle.ballSize * 1.15, ball.source.definition.color);
                        return true;
                    }
                    if (ball.isSpike && dealt > 0) {
                        const knockback = ball.source.definition.skill.effects.spikeKnockback || 1200;
                        const push = normalize(ball.vx, ball.vy);
                        if (!ignoreOrReflectKnockback(target, ball.source, push, knockback, { origin: ball })) {
                            if (isKangComboing(target)) {
                                finishKangCombo(target);
                            }
                            target.vx = push.x * scaledSpeed(knockback);
                            target.vy = push.y * scaledSpeed(knockback);
                            effectRing(target.x, target.y, battle.ballSize * 1.5, ball.source.definition.color);
                        }
                    }
                    ball.element.remove();
                    return false;
                }

                return true;
            });
        }

        function handleWallBounce(fighter) {
            const radius = fighterRadius(fighter);
            let bounced = false;
            const now = performance.now();

            if (fighter.x < radius) {
                fighter.x = radius;
                fighter.vx = Math.abs(fighter.vx);
                bounced = true;
            } else if (fighter.x > battle.arenaSize - radius) {
                fighter.x = battle.arenaSize - radius;
                fighter.vx = -Math.abs(fighter.vx);
                bounced = true;
            }

            if (fighter.y < radius) {
                fighter.y = radius;
                fighter.vy = Math.abs(fighter.vy);
                bounced = true;
            } else if (fighter.y > battle.arenaSize - radius) {
                fighter.y = battle.arenaSize - radius;
                fighter.vy = -Math.abs(fighter.vy);
                bounced = true;
            }

            if (bounced) {
                if (fighter.windmillMomentum) {
                    const momentum = fighter.windmillMomentum;
                    if (momentum.phase === "toWall") {
                        momentum.phase = "rebound";
                        momentum.speed = momentum.reboundSpeed;
                        momentum.nextDecayAt = now + momentum.decayInterval;
                    }
                    momentum.nextAfterimageAt = 0;
                    applyDamage(fighter, momentum.wallDamage, momentum.source, "skill");
                    floatText(`벽충돌 +${momentum.wallDamage}`, fighter.x, fighter.y - battle.ballSize / 2, momentum.source.definition.color);
                    burst(fighter.x, fighter.y, momentum.source.definition.color, 8);
                    effectRing(fighter.x, fighter.y, battle.ballSize * 1.15, momentum.source.definition.color);
                    jitterVelocity(fighter, (Math.random() - 0.5) * 0.45, momentum.speed);
                    return;
                }

                if (isKimGibeom(fighter) && now >= (fighter.wallCrashCooldownUntil || 0)) {
                    const effects = kimGibeomEffects(fighter);
                    updateKimGibeomAttack(fighter);
                    fighter.wallCrashCooldownUntil = now + (effects.wallCrashCooldown || 0.75) * 1000;
                    fighter.slowUntil = now + (effects.wallCrashSlowDuration || 2) * 1000;
                    fighter.slowMultiplier = effects.wallCrashSlowMultiplier || 0.45;
                    applyDamage(fighter, fighter.attack, fighter, "wall");
                    floatText("슬로우", fighter.x, fighter.y - battle.ballSize * 0.82, fighter.definition.color);
                    burst(fighter.x, fighter.y, fighter.definition.color, 6);
                    if (fighter.dead) {
                        return;
                    }
                    fighter.wallCrashCount = (fighter.wallCrashCount || 0) + 1;
                    if (fighter.wallCrashCount >= (effects.earthquakeWallHits || 5)) {
                        fighter.wallCrashCount = 0;
                        triggerKimGibeomEarthquake(fighter, now);
                    }
                }

                jitterVelocity(fighter, (Math.random() - 0.5) * 0.75, moveSpeedOf(fighter, now));
                effectRing(fighter.x, fighter.y, battle.ballSize * 0.8, fighter.definition.color);
            }
        }

        function handleBasicAttack(attacker, defender, now) {
            if (attacker.dead || defender.dead || areAllies(attacker, defender) || isControlLocked(attacker, now) || isKangComboing(attacker) || attacker.definition.contactAttackDisabled) {
                return;
            }

            updateKimGibeomAttack(attacker);
            const passiveEffects = attacker.definition.passive?.effects || {};
            const basicBonusDamage = Math.max(0, defender.hp * (passiveEffects.basicCurrentHpBonusRatio || 0));
            const silentKangContact = isKangInchan(attacker) || isKangInchan(defender);
            const basicDamage = basicAttackDamageFor(attacker);
            const dealt = applyDamage(defender, basicDamage, attacker, "basic", { silent: silentKangContact });
            if (dealt > 0) {
                if (isParkSungbin(attacker)) {
                    floatText(`왼발 ${Math.round(basicDamage)}`, defender.x, defender.y - fighterRadius(defender), attacker.definition.color);
                }
                if (basicBonusDamage > 0 && !defender.dead) {
                    applyDamage(defender, basicBonusDamage, attacker, "passive", { silent: silentKangContact });
                }
                handleKangBasicHit(attacker, defender, now);
                reduceCooldown(attacker, attacker.definition.cooldownOnBasicHit);
            }
        }

        function handleCollisions(now) {
            for (let first = 0; first < battle.fighters.length; first += 1) {
                for (let second = first + 1; second < battle.fighters.length; second += 1) {
                    const a = battle.fighters[first];
                    const b = battle.fighters[second];
                    if (a.dead || b.dead || a.offMapUntil > now || b.offMapUntil > now || a.noCollisionUntil > now || b.noCollisionUntil > now || isAdminDonggyuHelicopter(a) || isAdminDonggyuHelicopter(b) || isJiTaehyeokBusy(a) || isJiTaehyeokBusy(b) || isLeeDohyunLineDashing(a) || isLeeDohyunLineDashing(b) || isYuAnimalDashing(a) || isYuAnimalDashing(b) || isParkSungbinRushBusy(a) || isParkSungbinRushBusy(b)) {
                        continue;
                    }

                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const distance = Math.sqrt(dx * dx + dy * dy) || 1;
                    const minDistance = fighterRadius(a) + fighterRadius(b);

                    if (distance > minDistance) {
                        continue;
                    }

                    triggerLeeSungwonBrandCollision(a, b, now);
                    if (a.dead || b.dead) {
                        continue;
                    }

                    handleLeeDribbleCollision(a, b, now);

                    const nx = dx / distance;
                    const ny = dy / distance;
                    const overlap = minDistance - distance;
                    const noPushPair = a.definition.noPushCollision || b.definition.noPushCollision;
                    const suppressContactEffects = isKangInchan(a) || isKangInchan(b);
                    const tangentX = -ny;
                    const tangentY = nx;
                    const randomSide = Math.random() < 0.5 ? -1 : 1;

                    if (noPushPair) {
                        if (a.definition.noPushCollision && !isControlLocked(a, now)) {
                            a.x -= nx * overlap;
                            a.y -= ny * overlap;
                        } else if (b.definition.noPushCollision && !isControlLocked(b, now)) {
                            b.x += nx * overlap;
                            b.y += ny * overlap;
                        }
                    } else {
                        const separation = overlap * 0.58 + 0.8;
                        if (!isControlLocked(a, now)) {
                            a.x -= nx * separation;
                            a.y -= ny * separation;
                        }
                        if (!isControlLocked(b, now)) {
                            b.x += nx * separation;
                            b.y += ny * separation;
                        }
                    }

                    const aVelocity = a.vx * nx + a.vy * ny;
                    const bVelocity = b.vx * nx + b.vy * ny;
                    const impulse = bVelocity - aVelocity;

                    if (!noPushPair && !isControlLocked(a, now)) {
                        a.vx += impulse * nx + tangentX * randomSide * scaledSpeed(18);
                        a.vy += impulse * ny + tangentY * randomSide * scaledSpeed(18);
                    }
                    if (!noPushPair && !isControlLocked(b, now)) {
                        b.vx -= impulse * nx + tangentX * randomSide * scaledSpeed(18);
                        b.vy -= impulse * ny + tangentY * randomSide * scaledSpeed(18);
                    }

                    if (!noPushPair) {
                        if (!a.windmillMomentum && !isControlLocked(a, now)) {
                            setVelocitySpeed(a, moveSpeedOf(a, now));
                            jitterVelocity(a, (Math.random() - 0.5) * 0.28, moveSpeedOf(a, now));
                        }
                        if (!b.windmillMomentum && !isControlLocked(b, now)) {
                            setVelocitySpeed(b, moveSpeedOf(b, now));
                            jitterVelocity(b, (Math.random() - 0.5) * 0.28, moveSpeedOf(b, now));
                        }
                        if (!suppressContactEffects) {
                            effectRing((a.x + b.x) / 2, (a.y + b.y) / 2, battle.ballSize * 1.15, "#1c1b1b");
                        }
                        if (!suppressContactEffects && now - (battle.lastImpactAt || 0) > 90) {
                            battle.lastImpactAt = now;
                            impactStar((a.x + b.x) / 2, (a.y + b.y) / 2, "#facc15");
                        }
                    }

                    const key = `${a.id}:${b.id}`;
                    const lastHit = battle.pairHits.get(key) || 0;
                    if (now - lastHit > 620) {
                        battle.pairHits.set(key, now);
                        if (!areAllies(a, b)) {
                            registerGuMinchanCollision(a, now);
                            registerGuMinchanCollision(b, now);
                        }
                        handleLeeDohyunCollisionCooldown(a, b, now);
                        handleYuAnimalCollisionPassive(a, b, now);
                        handleBasicAttack(a, b, now);
                        handleBasicAttack(b, a, now);
                        if (!suppressContactEffects) {
                            burst((a.x + b.x) / 2, (a.y + b.y) / 2, "#1c1b1b", 5);
                        }
                    }
                }
            }
        }

                const jaeyoonControlled = updateJaeyoonSummonAI(fighter, now) || updateKimJaeyoonOwnerFlee(fighter, now);
                if (fighter.jaeyoonRevivedOriginal) {

                const parkActiveSkillBusy = isParkSungbinActiveSkillBusy(fighter);
                const protestCooldownPassiveOnly = isProtestLeaderGuMinchan(fighter) && isProtestSkillActiveFor(fighter, now);
                if (!fighter.isSummon && !protestLocked && !protestCooldownPassiveOnly && !isLeeCharging(fighter) && !isKwonSoonbeomBusy(fighter, now) && !isJaeyoonDomainActiveFor(fighter) && !isLeeDohyunFouled(fighter) && !isParkSungbinMemoryBusy(fighter) && !parkActiveSkillBusy && !(isYuYejun(fighter) && hasYuAnimalPets(fighter))) {
                    const cooldownMultiplier = fighter.cooldownSlowUntil > now ? fighter.cooldownSlowMultiplier || 0.5 : 1;
                    fighter.skillCooldown = Math.max(0, fighter.skillCooldown - dt * cooldownMultiplier);
                }
                if (!fighter.isSummon && !protestLocked && fighter.skillCooldown <= 0 && fighter.definition.id !== "kang-inchan" && fighter.definition.id !== "ji-taehyeok" && fighter.definition.id !== "developer-ji-taehyeok" && !isLeeCharging(fighter) && !isKwonSoonbeomBusy(fighter, now) && !isParkSungbinMemoryBusy(fighter) && !parkActiveSkillBusy && !fighter.definition.skill?.passiveOnly && !(isYuYejun(fighter) && hasYuAnimalPets(fighter))) {

                if (updateWindmillMomentum(fighter, now)) {

                } else if (!jaeyoonControlled) {

                handleWallBounce(fighter);
                enforceJaeyoonDomainWall(fighter);

            updateWindmills(now);
