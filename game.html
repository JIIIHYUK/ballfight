    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .hard-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
        }

        .hard-shadow-sm {
            box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 1);
        }

        .brutal-border-thick {
            border: 4px solid #1c1b1b;
        }

        .brutal-border-thin {
            border: 2px solid #1c1b1b;
        }

        .btn-brutal {
            transition: all 0.1s ease;
        }

        .btn-brutal:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 1);
        }

        .fighter-ball {
            position: absolute;
            z-index: 12;
            border-radius: 9999px;
            border: 4px solid #1c1b1b;
            box-shadow: 4px 4px 0px 0px #1c1b1b;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
            user-select: none;
        }

        .fighter-ball.is-stunned::after {
            content: "!";
            position: absolute;
            inset: -4px;
            z-index: 4;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.72);
            color: #ba1a1a;
            font: 800 42px "Plus Jakarta Sans", sans-serif;
        }

        .fighter-ball.is-asleep::after {
            content: "Zzz";
            position: absolute;
            inset: -4px;
            z-index: 4;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.78);
            color: #2563eb;
            font: 900 28px "Plus Jakarta Sans", sans-serif;
            text-shadow: 2px 2px 0 #ffffff;
        }

        .fighter-ball.is-dead {
            filter: grayscale(1);
            opacity: 0.35;
        }

        .fighter-ball.is-jaeyoon-wraith {
            background: #f8fafc;
            border-color: #ffffff;
            box-shadow: 3px 3px 0 #1c1b1b, 0 0 22px rgba(255, 255, 255, 0.85);
            filter: grayscale(1) contrast(1.22);
            opacity: 0.88;
        }

        .fighter-ball.is-jaeyoon-revived {
            border-color: #ffffff;
            outline: 4px solid rgba(255, 255, 255, 0.92);
            outline-offset: 3px;
            box-shadow:
                4px 4px 0 #1c1b1b,
                0 0 0 7px rgba(107, 114, 128, 0.5),
                0 0 28px rgba(255, 255, 255, 0.95);
        }

        .fighter-ball.is-offmap {
            opacity: 0;
            transform: translate(-140px, -140px) !important;
        }

        .fighter-ball.is-raging::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: rgba(220, 38, 38, var(--rage-alpha, 0));
            mix-blend-mode: multiply;
        }

        .fighter-ball.is-kang-combo::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: rgba(124, 58, 237, 0.72);
            mix-blend-mode: multiply;
        }

        .fighter-ball.is-kim-sihyeon-buffed::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background:
                radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.54), transparent 26%),
                rgba(0, 0, 0, 0.46);
            mix-blend-mode: hard-light;
        }

        .fighter-ball.is-lee-dribbling {
            opacity: 0.64;
            filter: saturate(1.4) blur(0.7px);
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 24px rgba(239, 68, 68, 0.86);
        }

        .fighter-ball.is-lee-charging {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 28px rgba(239, 68, 68, 0.88);
        }

        .fighter-ball.is-lee-charging::before {
            content: "";
            position: absolute;
            inset: -3px;
            z-index: 3;
            pointer-events: none;
            border: 4px solid rgba(239, 68, 68, 0.92);
            border-radius: 9999px;
            box-shadow: inset 0 0 18px rgba(239, 68, 68, 0.45), 0 0 16px rgba(239, 68, 68, 0.62);
        }

        .fighter-ball.is-jaeyoon-revived::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            background: var(--jaeyoon-revive-color, rgba(107, 114, 128, 0.8));
            mix-blend-mode: multiply;
        }

        .fighter-ball.is-lee-dohyun-clone {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 24px rgba(37, 99, 235, 0.82);
            filter: saturate(1.2) brightness(0.82);
        }

        .fighter-ball.is-lee-dohyun-clone::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            background: rgba(30, 64, 175, 0.42);
            mix-blend-mode: multiply;
        }

        .fighter-ball.is-lee-dohyun-line-dashing {
            z-index: 28;
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 30px rgba(37, 99, 235, 0.92);
        }

        .fighter-ball.is-yu-animal-pet {
            box-shadow: 3px 3px 0 #1c1b1b, 0 0 22px rgba(65, 105, 225, 0.76);
        }

        .fighter-ball.is-yu-animal-dashing {
            z-index: 27;
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 30px rgba(65, 105, 225, 0.92);
        }

        .fighter-ball.is-yu-bleeding {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 24px rgba(220, 38, 38, 0.9);
        }

        .fighter-ball.is-ji-dunking {
            z-index: 29;
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 30px rgba(249, 115, 22, 0.92);
        }

        .fighter-ball.is-ji-skill-transparent {
            opacity: 0;
            filter: none;
        }

        .ji-caffeine {
            position: absolute;
            z-index: 12;
            pointer-events: none;
            transform: translate(-50%, -50%);
            overflow: hidden;
            border-radius: 8px;
            filter: drop-shadow(3px 3px 0 #1c1b1b) drop-shadow(0 0 12px rgba(249, 115, 22, 0.62));
        }

        .ji-caffeine img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .ji-three-zone,
        .ji-three-shadow {
            position: absolute;
            pointer-events: none;
            border-radius: 9999px;
            transform: translate(-50%, -50%);
        }

        .ji-three-zone.is-shock {
            z-index: 10;
            border: 4px dashed rgba(249, 115, 22, 0.7);
            background: rgba(249, 115, 22, 0.08);
            box-shadow: inset 0 0 28px rgba(249, 115, 22, 0.2);
        }

        .ji-three-zone.is-warning {
            z-index: 11;
            border: 5px solid rgba(220, 38, 38, 0.9);
            background: rgba(220, 38, 38, 0.14);
            box-shadow: 0 0 22px rgba(220, 38, 38, 0.6);
        }

        .ji-three-shadow {
            z-index: 12;
            border: 12px solid rgba(28, 27, 27, 0.48);
            animation: ji-shadow-tighten 2s linear forwards;
        }

        @keyframes ji-shadow-tighten {
            from {
                width: var(--shadow-start-size, 500px);
                height: var(--shadow-start-size, 500px);
                opacity: 0.3;
            }

            to {
                width: var(--shadow-end-size, 125px);
                height: var(--shadow-end-size, 125px);
                opacity: 0.72;
            }
        }

        .ji-basketball,
        .ji-basketball-ghost {
            position: absolute;
            z-index: 28;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border-radius: 9999px;
            overflow: hidden;
            filter: drop-shadow(4px 4px 0 rgba(28, 27, 27, 0.72));
        }

        .ji-basketball-ghost {
            z-index: 26;
            opacity: 0.34;
            animation: ji-ball-ghost-fade 420ms ease-out forwards;
        }

        .ji-basketball.is-held {
            z-index: 30;
            filter: drop-shadow(3px 3px 0 rgba(28, 27, 27, 0.82)) drop-shadow(0 0 12px rgba(249, 115, 22, 0.72));
        }

        .ji-basketball img,
        .ji-basketball-ghost img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        @keyframes ji-ball-ghost-fade {
            to {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.84);
            }
        }

        .kim-gibeom-apple {
            position: absolute;
            z-index: 23;
            pointer-events: none;
            border-radius: 9999px;
            transform: translate(-50%, -50%);
            filter: drop-shadow(4px 4px 0 rgba(28, 27, 27, 0.72));
            overflow: hidden;
        }

        .kim-gibeom-apple img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 45%;
            display: block;
            transform: scale(1.72);
            transform-origin: center center;
        }

        .kim-donggyu-projectile {
            position: absolute;
            z-index: 24;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            overflow: hidden;
        }

        .kim-donggyu-projectile img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .kim-donggyu-projectile.is-bullet {
            background: #facc15;
            border: 2px solid #1c1b1b;
            box-shadow: 2px 2px 0 #1c1b1b;
        }

        .kim-donggyu-aim-line {
            position: absolute;
            z-index: 13;
            height: 4px;
            pointer-events: none;
            transform-origin: 0 50%;
            background: linear-gradient(90deg, rgba(216, 195, 165, 0.18), rgba(255, 255, 255, 0.92), rgba(216, 195, 165, 0.86));
            border-top: 1px solid rgba(28, 27, 27, 0.74);
            border-bottom: 1px solid rgba(28, 27, 27, 0.46);
            box-shadow: 0 0 12px rgba(216, 195, 165, 0.92);
            opacity: 0.92;
        }

        .kim-donggyu-targeting {
            position: absolute;
            z-index: 14;
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0.78;
            border: 3px solid rgba(28, 27, 27, 0.82);
            border-radius: 9999px;
            filter: drop-shadow(0 0 8px rgba(216, 195, 165, 0.82));
        }

        .kim-donggyu-targeting::before,
        .kim-donggyu-targeting::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            background: rgba(28, 27, 27, 0.9);
            transform: translate(-50%, -50%);
        }

        .kim-donggyu-targeting::before {
            width: 112%;
            height: 3px;
        }

        .kim-donggyu-targeting::after {
            width: 3px;
            height: 112%;
        }

        .kim-donggyu-targeting .target-dot {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 32%;
            height: 32%;
            border-radius: 9999px;
            background: rgba(28, 27, 27, 0.9);
            transform: translate(-50%, -50%);
        }

        .fighter-ball.is-kim-donggyu-aiming {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 28px rgba(216, 195, 165, 0.95);
        }

        .fighter-ball.is-kim-donggyu-defib {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 30px rgba(107, 114, 128, 0.92);
            filter: grayscale(0.45) brightness(1.08);
        }

        .fighter-ball.is-kim-donggyu-bleeding {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 24px rgba(220, 38, 38, 0.9);
        }

        .kim-junsu-link {
            position: absolute;
            z-index: 23;
            height: 5px;
            pointer-events: none;
            transform-origin: 0 50%;
            border-radius: 9999px;
            box-shadow: 0 0 14px currentColor;
            animation: kim-junsu-link-fade 380ms ease-out forwards;
        }

        @keyframes kim-junsu-link-fade {
            from {
                opacity: 0.9;
            }

            to {
                opacity: 0;
            }
        }

        .fighter-ball.is-lee-dohyun-fouled {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 26px rgba(37, 99, 235, 0.86);
            filter: grayscale(0.35) brightness(0.75);
        }

        .fighter-ball.is-lee-dohyun-fouled::after {
            content: "반칙";
            position: absolute;
            left: 50%;
            top: -22px;
            z-index: 5;
            transform: translateX(-50%);
            padding: 2px 7px;
            border: 2px solid #1c1b1b;
            background: rgba(255, 255, 255, 0.92);
            color: #2563eb;
            font-family: "Black Han Sans", sans-serif;
            font-size: 14px;
            line-height: 1;
            white-space: nowrap;
            box-shadow: 2px 2px 0 #1c1b1b;
        }

        .fighter-ball.is-lee-dohyun-offside-rushing {
            z-index: 29;
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 34px rgba(37, 99, 235, 0.96);
        }

        .lee-dohyun-offside-line {
            position: absolute;
            left: 0;
            height: 0;
            z-index: 18;
            pointer-events: none;
            border-top: 4px dashed rgba(37, 99, 235, 0.92);
            filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.85));
            opacity: 0.95;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            transition-property: width, opacity;
            transition-timing-function: linear;
        }

        .lee-dohyun-offside-line.is-fading {
            opacity: 0;
        }

        .lee-dribble-ghost {
            position: absolute;
            pointer-events: none;
            z-index: 8;
            border-radius: 9999px;
            border: 3px solid rgba(239, 68, 68, 0.5);
            background: rgba(239, 68, 68, 0.28);
            box-shadow: 0 0 18px rgba(239, 68, 68, 0.68);
            overflow: hidden;
            opacity: 0.48;
            transform: translate(-50%, -50%) scale(0.96);
        }

        .lee-dribble-ghost img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0.62;
        }

        .lee-trajectory {
            position: absolute;
            pointer-events: none;
            z-index: 7;
            height: var(--trajectory-height, 44px);
            border: 2px solid rgba(239, 68, 68, 0.42);
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.18);
            box-shadow: 0 0 18px rgba(239, 68, 68, 0.38);
            transform-origin: left center;
            mix-blend-mode: multiply;
        }

        .lee-trajectory.is-firing {
            z-index: 19;
            animation: lee-trajectory-fade 620ms ease-out forwards;
        }

        .lee-soccer-ball {
            position: absolute;
            pointer-events: none;
            z-index: 30;
            border-radius: 9999px;
            border: 3px solid #1c1b1b;
            background: #ffffff;
            box-shadow: 3px 3px 0 #1c1b1b, 0 0 20px rgba(239, 68, 68, 0.72);
            overflow: hidden;
            transform: translate(-50%, -50%) rotate(0deg);
            transition-property: left, top, transform, opacity;
            transition-timing-function: cubic-bezier(0.12, 0.82, 0.18, 1);
        }

        .lee-soccer-ball img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes lee-trajectory-fade {
            from {
                opacity: 0.9;
                filter: saturate(1.4);
            }

            to {
                opacity: 0;
                filter: saturate(1.8) blur(2px);
            }
        }

        .volleyball-projectile {
            position: absolute;
            pointer-events: none;
            z-index: 24;
            border-radius: 9999px;
            border: 2px solid #1c1b1b;
            box-shadow: 3px 3px 0 #1c1b1b;
            overflow: hidden;
            background: #ffffff;
        }

        .volleyball-projectile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .volleyball-projectile.is-spike {
            border-width: 4px;
            box-shadow: 5px 5px 0 #1c1b1b, 0 0 18px rgba(220, 38, 38, 0.75);
        }

        .volleyball-afterimage {
            position: absolute;
            pointer-events: none;
            z-index: 22;
            border-radius: 9999px;
            border: 3px solid rgba(220, 38, 38, 0.55);
            box-shadow: 0 0 18px rgba(220, 38, 38, 0.7);
            overflow: hidden;
            background: rgba(255, 255, 255, 0.72);
            animation: volleyball-afterimage 640ms ease-out forwards;
        }

        .volleyball-afterimage img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0.62;
        }

        .effect-ring,
        .effect-burst,
        .damage-float,
        .skill-label,
        .impact-star,
        .arena-flash {
            position: absolute;
            pointer-events: none;
            z-index: 20;
        }

        .effect-ring {
            border: 4px solid currentColor;
            border-radius: 9999px;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.65);
            animation: ring-pop 520ms ease-out forwards;
        }

        .effect-burst {
            width: 14px;
            height: 14px;
            background: currentColor;
            border: 2px solid #1c1b1b;
            box-shadow: 2px 2px 0px 0px #1c1b1b;
            animation: burst-pop 460ms ease-out forwards;
        }

        .damage-float {
            padding: 3px 6px;
            background: #ffffff;
            border: 2px solid #1c1b1b;
            box-shadow: 2px 2px 0px 0px #1c1b1b;
            font: 700 14px "JetBrains Mono", monospace;
            animation: damage-float 780ms ease-out forwards;
            white-space: nowrap;
        }

        .skill-label {
            padding: 4px 8px;
            background: #1c1b1b;
            color: #ffffff;
            border: 2px solid #ffffff;
            font: 700 13px "JetBrains Mono", monospace;
            animation: skill-label 720ms ease-out forwards;
            white-space: nowrap;
        }

        .skill-label.is-spike-label {
            z-index: 36;
            padding: 8px 14px;
            color: #ffffff;
            background: #dc2626;
            border: 4px solid #ffffff;
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 22px rgba(220, 38, 38, 0.85);
            font: 900 28px "Plus Jakarta Sans", sans-serif;
            letter-spacing: 0;
            text-shadow: 2px 2px 0 #1c1b1b;
            animation: spike-label 900ms ease-out forwards;
        }

        .skill-label.is-kang-finisher-label {

    <script src="./effects.js"></script>
    <script>
        const arena = document.getElementById("arena");
        const hud = document.getElementById("hud");
        const countdown = document.getElementById("countdown");
        const matchTitle = document.getElementById("match-title");
        const elapsedTime = document.getElementById("elapsed-time");
        const allCharacters = window.HannamBalls.getCharacters();
        const storedSelection = JSON.parse(localStorage.getItem("hannamBallsSelection") || "[]");
        let selectedCharacters = storedSelection
            .map((id) => window.HannamBalls.getCharacter(id))
            .filter(Boolean);

        if (selectedCharacters.length < 2) {
            selectedCharacters = allCharacters.length === 1
                ? [allCharacters[0], allCharacters[0]]
                : allCharacters;
        }

        const battle = {
            fighters: [],
            arenaSize: 600,
            ballSize: 60.8,
            ballSizeScale: 0.8,
            startedAt: 0,
            fightStartedAt: 0,
            finishedAt: 0,
            countdownSeconds: 3,
            isRunning: false,
            isFinished: false,
            lastTime: 0,
            pairHits: new Map(),
            globalSlowUntil: 0,
            globalSlowMultiplier: 1,
            activeWindmills: [],
            activeVolleyballs: [],
            activeYuRushLines: [],
            activeKimGibeomApples: [],
            activeKimDonggyuProjectiles: [],
            activeParkMemoryZones: [],
            scenePauseUntil: 0,
            jaeyoonDomain: null,
            jaeyoonDomainSequence: 0
        };

        function scaledBallSize(arenaSize) {
            return Math.max(54, Math.min(82, arenaSize * 0.14)) * (battle.ballSizeScale || 1);
        }

        function fighterSize(fighter) {
            return battle.ballSize * (fighter?.sizeMultiplier || 1);
        }

        function fighterRadius(fighter) {
            return fighterSize(fighter) / 2;
        }

        const EFFECT_LIMITS = {
            bursts: 70,
            rings: 14,
            floatTexts: 18,
            stars: 12,
            flashes: 1
        };

        const activeEffects = {
            rings: 0,
            stars: 0,
            bursts: 0,
            floatTexts: 0,
            flashes: 0
        };

        let animationFrameId = null;
        let lastElapsedText = "";
        let cachedCorners = [];

        initEffects(arena, battle);

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function imageSources(primary, fallbacks = []) {
            return [...new Set([primary, ...fallbacks].filter(Boolean))];
        }

        function imageAttrs(primary, fallbacks = []) {
            const sources = imageSources(primary, fallbacks);
            return `src="${escapeHtml(sources[0])}" data-fallback-srcs="${escapeHtml(JSON.stringify(sources.slice(1)))}"`;
        }

        function colorWithAlpha(color, alpha) {
            const normalized = String(color || "").trim();
            const hex = normalized.startsWith("#") ? normalized.slice(1) : "";
            if (/^[0-9a-f]{3}$/i.test(hex)) {
                const [r, g, b] = hex.split("").map((part) => parseInt(part + part, 16));
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
            if (/^[0-9a-f]{6}$/i.test(hex)) {
                const r = parseInt(hex.slice(0, 2), 16);
                const g = parseInt(hex.slice(2, 4), 16);
                const b = parseInt(hex.slice(4, 6), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
            return `rgba(107, 114, 128, ${alpha})`;
        }

        document.addEventListener("error", (event) => {
            const image = event.target;
            if (!(image instanceof HTMLImageElement) || !image.dataset.fallbackSrcs) {
                return;
            }

            let sources = [];
            try {
                sources = JSON.parse(image.dataset.fallbackSrcs);
            } catch (error) {
                sources = [];
            }

            const nextSource = sources.shift();
            if (nextSource) {
                image.dataset.fallbackSrcs = JSON.stringify(sources);
                image.src = nextSource;
            } else {
                image.remove();
            }
        }, true);

        function normalize(x, y) {
            const length = Math.sqrt(x * x + y * y) || 1;
            return { x: x / length, y: y / length };
        }

        function arenaScale() {
            return Math.max(0.55, Math.min(1.05, battle.arenaSize / 600));
        }

        function scaledSpeed(speed) {
            return speed * arenaScale();
        }

        function moveSpeedOf(fighter, now = performance.now()) {
            let speed = fighter.speed;
            if (isKimSihyeonBuffed(fighter, now)) {
                const effects = kimSihyeonEffects(fighter);
                speed *= 1 + (effects.speedBonus || 0);
            }
            if (isLeeDribbling(fighter, now)) {
                const effects = leePassiveEffects(fighter);
                speed *= 1 + (effects.speedBonus || 0.5);
            }
            if (fighter.slowUntil > now) {
                speed *= fighter.slowMultiplier || 0.45;
            }
            return speed;
        }

        function skillCooldownDuration(fighter) {
            if (fighter.definition.skill?.passiveOnly) {
                return 1;
            }

            if (fighter.definition.id === "gu-minchan") {
                const effects = fighter.definition.passive?.effects || {};
                const baseCooldown = fighter.definition.skill.cooldown;
                const reduction = (fighter.rageStacks || 0) * (effects.cooldownReduction || 0);
                return Math.max(effects.minCooldown || 1, baseCooldown - reduction);
            }

            return fighter.definition.skill.cooldown;
        }

        function rotateVector(x, y, radians) {
            const cos = Math.cos(radians);
            const sin = Math.sin(radians);
            return {
                x: x * cos - y * sin,
                y: x * sin + y * cos
            };
        }

        function setVelocityDirection(fighter, x, y, speed) {
            const direction = normalize(x, y);
            const scaled = scaledSpeed(speed);
            fighter.vx = direction.x * scaled;
            fighter.vy = direction.y * scaled;
        }

        function jitterVelocity(fighter, radians, speed = moveSpeedOf(fighter)) {
            if (speed <= 0) {
                fighter.vx = 0;
                fighter.vy = 0;
                return;
            }

            const rotated = rotateVector(fighter.vx || Math.random() - 0.5, fighter.vy || Math.random() - 0.5, radians);
            setVelocityDirection(fighter, rotated.x, rotated.y, speed);
        }

        function maintainMotion(fighter, now, jitterStrength = 0.18) {
            const speed = moveSpeedOf(fighter, now);
            if (speed <= 0) {
                if (fighter.forceMoveUntil <= now) {
                    fighter.vx = 0;
                    fighter.vy = 0;
                }
                return;
            }
            if (isControlLocked(fighter, now)) {
                return;
            }

            const desired = scaledSpeed(speed);
            const current = Math.hypot(fighter.vx, fighter.vy);
            if (!Number.isFinite(current) || current < desired * 0.18) {
                setVelocityDirection(fighter, Math.random() - 0.5, Math.random() - 0.5, speed);
                return;
            }

            if (!fighter.nextWobbleAt || now >= fighter.nextWobbleAt) {
                fighter.nextWobbleAt = now + 420 + Math.random() * 760;
                jitterVelocity(fighter, (Math.random() - 0.5) * jitterStrength, speed);
            } else {
                setVelocityDirection(fighter, fighter.vx, fighter.vy, speed);
            }
        }

        function clampToArena(value) {
            const radius = battle.ballSize / 2;
            return Math.max(radius, Math.min(battle.arenaSize - radius, value));
        }

        function distanceToSegment(px, py, ax, ay, bx, by) {
            const dx = bx - ax;
            const dy = by - ay;
            const lengthSquared = dx * dx + dy * dy;
            if (lengthSquared <= 0.0001) {
                return Math.hypot(px - ax, py - ay);
            }

            const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lengthSquared));
            const nearestX = ax + dx * t;
            const nearestY = ay + dy * t;
            return Math.hypot(px - nearestX, py - nearestY);
        }

        function directionToNearestWall(fighter) {
            const radius = battle.ballSize / 2;
            const walls = [
                { distance: Math.max(0, fighter.x - radius), x: -1, y: 0 },
                { distance: Math.max(0, battle.arenaSize - radius - fighter.x), x: 1, y: 0 },
                { distance: Math.max(0, fighter.y - radius), x: 0, y: -1 },
                { distance: Math.max(0, battle.arenaSize - radius - fighter.y), x: 0, y: 1 }
            ];
            walls.sort((a, b) => a.distance - b.distance);
            return walls[0];
        }

        function startWindmillFlight(target, direction, source, windmill, options = {}) {
            if (ignoreOrReflectKnockback(target, source, direction, windmill.wallSlamSpeed, { ...options, windmill })) {
                return false;
            }
            if (isKangComboing(target)) {
                finishKangCombo(target);
            }
            target.windmillMomentum = {
                source,
                phase: "toWall",
                speed: windmill.wallSlamSpeed,
                reboundSpeed: windmill.reboundSpeed,
                decayAmount: windmill.reboundDecayAmount,
                decayInterval: windmill.reboundDecayInterval,
                nextDecayAt: 0,
                wallDamage: windmill.wallDamage,
                nextAfterimageAt: 0,
                afterimageInterval: windmill.flightAfterimageInterval,
                afterimageLifetime: 360
            };
            target.vx = direction.x * scaledSpeed(windmill.wallSlamSpeed);
            target.vy = direction.y * scaledSpeed(windmill.wallSlamSpeed);
            createAfterimage(target, { opacity: 0.4, scale: 0.95, lifetime: 360 });
            return true;
        }

        function dashWithFallback(fighter, preferredDirection, distance) {
            const startX = fighter.x;
            const startY = fighter.y;
            const base = normalize(preferredDirection.x, preferredDirection.y);
            const candidates = [
                base,
                rotateVector(base.x, base.y, Math.PI / 2),
                rotateVector(base.x, base.y, -Math.PI / 2),
                rotateVector(base.x, base.y, Math.PI / 4),
                rotateVector(base.x, base.y, -Math.PI / 4),
                normalize(battle.arenaSize / 2 - fighter.x, battle.arenaSize / 2 - fighter.y),
                normalize(Math.random() - 0.5, Math.random() - 0.5)
            ];
            let best = { x: startX, y: startY, moved: -1, direction: base };

            candidates.forEach((direction) => {
                const x = clampToArena(startX + direction.x * distance);
                const y = clampToArena(startY + direction.y * distance);
                const moved = Math.hypot(x - startX, y - startY);
                if (moved > best.moved) {
                    best = { x, y, moved, direction };
                }
            });

            fighter.x = best.x;
            fighter.y = best.y;
            if (best.moved > 1) {
                fighter.forceMoveUntil = performance.now() + 180;
                setVelocityDirection(fighter, best.direction.x, best.direction.y, Math.max(140, fighter.speed || 140));
            }
            return best.moved;
        }

        function formatElapsed(ms) {
            const totalSeconds = Math.max(0, ms) / 1000;
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds - minutes * 60;
            return `${String(minutes).padStart(2, "0")}:${seconds.toFixed(1).padStart(4, "0")}`;
        }

        function currentFightElapsed(now) {
            if (!battle.fightStartedAt) {
                return 0;
            }

            return (battle.finishedAt || now) - battle.fightStartedAt;
        }

        function updateElapsed(now) {
            elapsedTime.textContent = `TIME ${formatElapsed(currentFightElapsed(now))}`;
        }

        function setVelocitySpeed(fighter, speed) {
            const direction = normalize(fighter.vx, fighter.vy);
            const scaled = scaledSpeed(speed);
            fighter.vx = direction.x * scaled;
            fighter.vy = direction.y * scaled;
        }

        function createAfterimage(fighter, options = {}) {
            if (!fighter || !fighter.element) {
                return;
            }

            const ghost = document.createElement("div");
            const lifetime = options.lifetime || 900;
            ghost.className = "charge-ghost ball-afterimage";
            ghost.style.left = `${options.x ?? fighter.x}px`;
            ghost.style.top = `${options.y ?? fighter.y}px`;
            ghost.style.width = `${battle.ballSize * (options.scale || 1)}px`;
            ghost.style.height = `${battle.ballSize * (options.scale || 1)}px`;
            ghost.style.color = fighter.definition.color;
            ghost.style.background = fighter.definition.color;
            ghost.style.opacity = String(options.opacity ?? 0.45);
            ghost.style.animationDuration = `${lifetime}ms`;
            ghost.innerHTML = fighter.element.innerHTML;
            arena.appendChild(ghost);
            setTimeout(() => ghost.remove(), lifetime);
        }

        function updateAfterimageWindow(fighter, now) {
            if (!fighter.afterimageUntil || fighter.afterimageUntil <= now) {
                return;
            }
            if (fighter.nextAfterimageAt && fighter.nextAfterimageAt > now) {
                return;
            }

            const effects = fighter.definition.passive?.effects || {};
            const direction = normalize(fighter.vx, fighter.vy);
            const remaining = Math.max(0, fighter.afterimageUntil - now);
            createAfterimage(fighter, {
                x: fighter.x - direction.x * battle.ballSize * 0.22,
                y: fighter.y - direction.y * battle.ballSize * 0.22,
                opacity: 0.42,
                scale: 0.94,
                lifetime: Math.max(160, remaining + 80)
            });
            fighter.nextAfterimageAt = now + (effects.afterimageInterval || 0.08) * 1000;
        }

        function isStunned(fighter, now) {
            return fighter.stunnedUntil > now;
        }

        function isControlLocked(fighter, now) {
            return isStunned(fighter, now) || isKangFinishing(fighter) || isYuBusy(fighter) || isLeeCharging(fighter) || isLeeDohyunLineDashing(fighter) || isLeeDohyunFouled(fighter) || isLeeDohyunOffsideBusy(fighter) || isKimDonggyuBusy(fighter) || isJiTaehyeokBusy(fighter) || isParkSungbinMemoryBusy(fighter);
        }

        function avatarContent(definition) {
            if (definition.avatarSrc) {
                return `<img alt="${escapeHtml(definition.name)} 얼굴" class="w-full h-full object-cover" ${imageAttrs(definition.avatarSrc, definition.avatarFallbackSrcs)}>`;
            }

            return `<span class="font-headline-md text-headline-md">${escapeHtml(definition.avatarText)}</span>`;
        }

        function passiveHtml(definition) {
            if (!definition.passive) {
                return "";
            }

            return `
                <div class="bg-secondary-fixed brutal-border-thin p-2">

        function createFighter(definition, index, total, options = {}) {
            const element = document.createElement("div");
            element.className = "fighter-ball";
            if (options.summonType === "jaeyoon-wraith") {

                element.classList.add("is-yu-animal-pet");
            }

            element.style.color = definition.textColor;
            element.style.borderColor = definition.color;
            element.innerHTML = avatarContent(definition);

                gjeSequenceId: 0,

                guDamageTakenCount: 0,

                volleyballHits: 0,

                kangComboTargetId: null,
                kangComboNextAt: 0,
                kangComboSequenceId: 0,
                kangComboSpeedMultiplier: 0,
                kangFinisherTargetId: null,
                kangFinisherPhase: "",
                kangFinisherChargeAt: 0,
                sleepUntil: 0,
                sleepDamageMultiplier: 1,
                yawnHealingActive: false,
                nextYawnHealAt: 0,
                kimSihyeonBuffUntil: 0,
                nextKimSihyeonPassiveAt: 0,
                yuSpeedStacks: 0,
                yuBaseSpeed: definition.speed,
                yuNextSpeedStackAt: 0,
                yuAfterimageDistanceTravelled: 0,
                yuLastAfterimageX: null,
                yuLastAfterimageY: null,
                yuAfterimages: [],
                yuChaseTargetId: null,

                yuRushPhase: "",
                yuRushReleaseAt: 0,

            };
        }

        function getFighterById(id) {
            return battle.fighters.find((fighter) => fighter.id === id);
        }

        function areAllies(a, b) {
            if (!a || !b) {
                return false;
            }
            if (a.ownerId && (a.ownerId === b.id || a.ownerId === b.ownerId)) {
                return true;
            }
            if (b.ownerId && (b.ownerId === a.id || b.ownerId === a.ownerId)) {
                return true;
            }
            return false;
        }

        function livingEnemiesOf(fighter) {
            return battle.fighters.filter((target) => target !== fighter && !target.dead && target.offMapUntil <= performance.now() && !areAllies(fighter, target));
        }

        function layoutFighters() {
            const rect = arena.getBoundingClientRect();
            battle.arenaSize = rect.width;
            battle.ballSize = scaledBallSize(battle.arenaSize);
            updateCachedCorners();
            const center = battle.arenaSize / 2;
            const radius = Math.max(battle.ballSize, battle.arenaSize * 0.34);

            battle.fighters.forEach((fighter, index) => {
                const angle = -Math.PI / 2 + (Math.PI * 2 * index) / battle.fighters.length;
                fighter.x = center + Math.cos(angle) * radius;
                fighter.y = center + Math.sin(angle) * radius;
                const direction = normalize(center - fighter.x, center - fighter.y);
                fighter.vx = direction.x * scaledSpeed(moveSpeedOf(fighter)) * 1.45;
                fighter.vy = direction.y * scaledSpeed(moveSpeedOf(fighter)) * 1.45;
                fighter.element.style.width = `${fighterSize(fighter)}px`;
                fighter.element.style.height = `${fighterSize(fighter)}px`;
            });
        }

        function renderHud() {
            hud.innerHTML = battle.fighters.map((fighter) => `
                <div class="hud-card flex flex-col gap-1" data-hud-id="${fighter.id}">
                    <div class="flex items-center justify-between gap-2">
                        <span class="hud-name font-headline-md-mobile text-headline-md-mobile md:font-headline-md md:text-headline-md tracking-tight"
                            style="color:${fighter.definition.color};">${escapeHtml(fighter.definition.name)}</span>
                        <button class="info-button w-6 h-6 flex items-center justify-center brutal-border-thin text-[10px] font-bold hover:bg-surface-container-high transition-colors"
                            data-info-id="${fighter.definition.id}" title="캐릭터 정보">i</button>
                    </div>
                    <div class="w-full h-6 md:h-8 border-2 border-on-background bg-surface-container-highest relative">
                        <div class="hp-fill absolute top-0 left-0 h-full bg-primary" style="width:100%;"></div>
                        <div class="hp-text absolute inset-0 flex items-center justify-center font-label-numeric text-label-numeric text-on-primary drop-shadow-[1px_1px_0px_rgba(0,0,0,0.8)]">
                            HP ${fighter.maxHp} / ${fighter.maxHp}
                        </div>
                    </div>
                    <div class="w-full h-3 bg-surface-container-highest border-2 border-on-background relative">
                        <div class="skill-fill h-full" style="width:0%; background:${fighter.definition.color};"></div>
                    </div>
                    <div class="status-text font-label-numeric text-label-numeric text-on-surface-variant">
                        ${fighter.definition.skill?.passiveOnly
                            ? `패시브 ${escapeHtml(fighter.definition.skill.name)}`
                            : `CD ${escapeHtml(fighter.definition.skill.name)} ${skillCooldownDuration(fighter).toFixed(1)} / ${skillCooldownDuration(fighter).toFixed(1)}초`}
                    </div>
                    <div class="stat-bonus-text hidden font-label-numeric text-label-numeric text-primary">
                        ATK +0 / SPD +0%
                    </div>
                </div>
            `).join("");

            battle.fighters.forEach((fighter) => {
                const card = hud.querySelector(`[data-hud-id="${fighter.id}"]`);
                fighter.hudElement = card;
                fighter.hudHpFill = card.querySelector(".hp-fill");
                fighter.hudHpText = card.querySelector(".hp-text");
                fighter.hudSkillFill = card.querySelector(".skill-fill");
                fighter.hudStatus = card.querySelector(".status-text");
                fighter.hudStatBonus = card.querySelector(".stat-bonus-text");

                fighter.lastHpRatio = -1;
                fighter.lastHpText = "";
                fighter.lastHpFillColor = "";
                fighter.lastSkillReady = -1;
                fighter.lastStatusText = "";
                fighter.lastStatBonusText = "";
                fighter.lastDead = false;
                fighter.lastIsStunned = false;
                fighter.lastIsAsleep = false;
                fighter.lastIsOffmap = false;
                fighter.lastIsJiSkillTransparent = false;
                fighter.lastIsKimSihyeonBuffed = false;
            });

            hud.querySelectorAll(".info-button").forEach((button) => {
                button.addEventListener("click", () => {
                    const definition = allCharacters.find((character) => character.id === button.dataset.infoId)
                        || battle.fighters.find((fighter) => fighter.definition.id === button.dataset.infoId)?.definition;
                    showInfo(definition);
                });
            });
        }

        function updateHud(now) {
            battle.fighters.forEach((fighter) => {
                sanitizeFighterState(fighter);
                if (!fighter.hudElement) {
                    return;
                }

                updateKimGibeomAttack(fighter);
                const isDefibingForHud = isKimDonggyuDefibing(fighter, now);
                const defibEffects = isDefibingForHud ? kimDonggyuPassiveEffects(fighter) : {};
                const defibTempMax = Math.max(1, defibEffects.selfReviveTempHp || 100);
                const defibTempHp = Math.max(0, fighter.kimDonggyuDefibTempHp || 0);
                const hpRatio = isDefibingForHud
                    ? Math.max(0, Math.min(1, defibTempHp / defibTempMax))
                    : Math.max(0, fighter.hp / fighter.maxHp);
                const hpFillColor = isDefibingForHud ? "#6b7280" : "";
                const cooldownDuration = skillCooldownDuration(fighter);
                const skillReady = Math.max(0, 1 - fighter.skillCooldown / cooldownDuration);

                if (fighter.lastHpRatio !== hpRatio) {
                    fighter.hudHpFill.style.width = `${hpRatio * 100}%`;
                    fighter.lastHpRatio = hpRatio;
                }
                if (fighter.lastHpFillColor !== hpFillColor) {
                    fighter.hudHpFill.style.background = hpFillColor;
                    fighter.lastHpFillColor = hpFillColor;
                }

                let hpTextVal = isDefibingForHud
                    ? `임시 HP ${Math.ceil(defibTempHp)} / ${defibTempMax}`
                    : `HP ${Math.ceil(Math.max(0, fighter.hp))} / ${fighter.maxHp}`;
                if (fighter.lastHpText !== hpTextVal) {
                    fighter.hudHpText.textContent = hpTextVal;
                    fighter.lastHpText = hpTextVal;
                }

                if (fighter.lastSkillReady !== skillReady) {
                    fighter.hudSkillFill.style.width = `${skillReady * 100}%`;
                    fighter.lastSkillReady = skillReady;
                }

                let statusTextVal = "";
                let statusColor = "";
                if (fighter.dead) {
                    statusTextVal = "탈락";
                    statusColor = "#ba1a1a";
                } else if (isJiTaehyeokBusy(fighter)) {
                    const phase = fighter.jiSkill?.phase;
                    statusTextVal = phase === "dunk" ? "덩크" : "농구가 하고 싶어요";
                    statusColor = fighter.definition.color;
                } else if (fighter.offMapUntil > now) {
                    statusTextVal = `맵 밖 ${(Math.max(0, fighter.offMapUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (isAsleep(fighter, now)) {
                    statusTextVal = `수면 ${(Math.max(0, fighter.sleepUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = "#2563eb";
                } else if (isStunned(fighter, now)) {
                    statusTextVal = `행동 불가 ${(Math.max(0, fighter.stunnedUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = "#ba1a1a";
                } else if (isKangComboing(fighter)) {
                    const effects = kangEffects(fighter);
                    const comboLimit = Math.min(
                        fighter.kangMastery || 0,
                        effects.comboFinisherHitThreshold || effects.finisherMasteryThreshold || fighter.kangMastery || 0
                    );
                    statusTextVal = `연타 중 ${fighter.kangComboCount || 0}/${comboLimit}`;
                    statusColor = fighter.definition.color;
                } else if (isKangFinishing(fighter)) {
                    statusTextVal = "간파";
                    statusColor = fighter.definition.color;
                } else if (isYuAnimalDashing(fighter)) {
                    statusTextVal = "동물 특공대";
                    statusColor = fighter.definition.color;
                } else if (isKimDonggyuDefibing(fighter, now)) {
                    const tempHp = Math.max(0, fighter.kimDonggyuDefibTempHp || 0);
                    const remaining = Math.max(0, fighter.kimDonggyuDefibUntil - now) / 1000;
                    statusTextVal = `자가제세동 ${Math.ceil(tempHp)} / ${remaining.toFixed(1)}초`;
                    statusColor = "#6b7280";
                } else if (isKimDonggyuAiming(fighter)) {
                    const remaining = Math.max(0, (fighter.kimDonggyuAim?.releaseAt || now) - now) / 1000;
                    statusTextVal = `SR 조준 ${remaining.toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (fighter.definition.id === "yu-yejun" && fighter.yuRushPhase === "prepare") {
                    statusTextVal = `최고속도 준비 ${(Math.max(0, fighter.yuRushReleaseAt - now) / 1000).toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (fighter.definition.id === "yu-yejun" && fighter.yuChaseTargetId) {
                    statusTextVal = "잔상 추격";
                    statusColor = fighter.definition.color;
                } else if (isLeeCharging(fighter)) {
                    const effects = leeSkillEffects(fighter);
                    statusTextVal = `차징 보호막 ${fighter.leeShieldHitsRemaining || 0}/${effects.shieldHits || 5}`;
                    statusColor = fighter.definition.color;
                } else if (isLeeDribbling(fighter, now)) {
                    statusTextVal = `드리블 ${(Math.max(0, fighter.leeDribbleUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (fighter.definition.skill?.passiveOnly) {
                    statusTextVal = `패시브 ${fighter.definition.skill.name}`;
                    statusColor = fighter.definition.color;
                } else {
                    const remaining = Math.max(0, fighter.skillCooldown);
                    statusTextVal = remaining <= 0
                        ? `CD ${fighter.definition.skill.name} READY`
                        : `CD ${fighter.definition.skill.name} ${remaining.toFixed(1)} / ${cooldownDuration.toFixed(1)}초`;
                }

                if (fighter.lastStatusText !== statusTextVal) {
                    fighter.hudStatus.textContent = statusTextVal;
                    fighter.hudStatus.style.color = statusColor;
                    fighter.lastStatusText = statusTextVal;
                }

                const bonusParts = [];
                if (fighter.definition.id === "gu-minchan" && fighter.rageStacks > 0) {
                    bonusParts.push(`분노 ${fighter.rageStacks}회`);
                    const skillEffects = fighter.definition.skill?.effects || {};
                    const rageDamageBonus = Math.max(0, (fighter.rageStacks || 0) - (skillEffects.rageDamageThreshold || 10)) * (skillEffects.damagePerRageOverThreshold || 1);
                    if (rageDamageBonus > 0) {
                        bonusParts.push(`배구공 피해 +${rageDamageBonus}`);
                    }
                }
                if (fighter.definition.id === "gu-minchan") {
                    const effects = fighter.definition.passive?.effects || {};
                    bonusParts.push(`피격 ${fighter.guDamageTakenCount || 0}/${effects.damageTakenHitsPerRage || 2}`);
                }
                if (fighter.definition.id === "kang-inchan") {
                    bonusParts.push(`숙련도 ${fighter.kangMastery || 0}`);
                }
                if (fighter.definition.id === "kim-gibeom") {
                    bonusParts.push(`공격력 ${Math.round(fighter.attack)}`);
                    bonusParts.push(`벽충돌 ${fighter.wallCrashCount || 0}/${kimGibeomEffects(fighter).earthquakeWallHits || 5}`);
                    if (fighter.slowUntil > now) {
                        bonusParts.push(`슬로우 ${((fighter.slowUntil - now) / 1000).toFixed(1)}초`);
                    }
                }
                if (fighter.definition.id === "kim-sihyeon") {
                    if (isKimSihyeonBuffed(fighter, now)) {
                        bonusParts.push(`검은 영광 ${((fighter.kimSihyeonBuffUntil - now) / 1000).toFixed(1)}초`);
                    } else if (fighter.nextKimSihyeonPassiveAt > now) {
                        bonusParts.push(`패시브 ${((fighter.nextKimSihyeonPassiveAt - now) / 1000).toFixed(1)}초`);
                    }
                    if (fighter.yawnHealingActive) {
                        bonusParts.push("하품 힐");
                    }
                }
                if (fighter.definition.id === "yu-yejun") {
                    const pets = yuAnimalPets(fighter);
                    bonusParts.push(`동물 ${pets.length}/2`);
                    if (pets.length > 0) {
                        const returnAt = Math.max(...pets.map((pet) => pet.yuPetExpiresAt || now));
                        bonusParts.push(`귀환 ${((returnAt - now) / 1000).toFixed(1)}초`);
                    }
                    if ((fighter.yuAnimalPassiveReadyAt || 0) > now) {
                        bonusParts.push(`특공대 ${((fighter.yuAnimalPassiveReadyAt - now) / 1000).toFixed(1)}초`);
                    } else {
                        bonusParts.push("특공대 READY");
                    }
                }
                if (fighter.definition.id === "lee-taehwan") {
                    bonusParts.push(`앵클 ${fighter.leeAnkleBreakCount || 0}`);
                    if (isLeeCharging(fighter)) {
                        bonusParts.push(`차징 ${((now - (fighter.leeChargeStartedAt || now)) / 1000).toFixed(1)}초`);
                    }
                }
                if (fighter.definition.id === "kim-donggyu") {
                    bonusParts.push(`모드 ${kimDonggyuCurrentMode(fighter)}`);
                    if (fighter.kimDonggyuArShotsRemaining > 0) {
                        bonusParts.push(`AR ${fighter.kimDonggyuArShotsRemaining}`);
                    }
                    if (!fighter.kimDonggyuSelfReviveUsed) {
                        bonusParts.push("제세동 가능");
                    }
                }
                if (fighter.definition.id === "ji-taehyeok") {
                    const effects = jiPassiveEffects(fighter);
                    bonusParts.push(`카페인 ${fighter.jiCaffeineCharges || 0}/${effects.requiredCaffeine || 4}`);
                    if (fighter.jiRegenPerSecond > 0) {
                        bonusParts.push(`회복 ${Math.round(fighter.jiRegenPerSecond)}/s`);
                    }
                    bonusParts.push(`최대HP ${fighter.maxHp}`);
                }
                if (fighter.definition.id === "park-sungbin" && fighter.parkMemoryId) {
                    const zone = battle.activeParkMemoryZones.find((item) => item.id === fighter.parkMemoryId);
                    if (zone && !zone.collapsed) {
                        bonusParts.push(`회상벽 ${Math.max(0, Math.ceil(zone.hp))}/${zone.maxHp}`);
                    }
                }

                if (bonusParts.length > 0) {
                    const bonusTextVal = bonusParts.join(" / ");
                    if (fighter.lastStatBonusText !== bonusTextVal) {
                        fighter.hudStatBonus.classList.remove("hidden");
                        fighter.hudStatBonus.textContent = bonusTextVal;
                        fighter.lastStatBonusText = bonusTextVal;
                    }
                } else {
                    if (fighter.lastStatBonusText !== "hidden") {
                        fighter.hudStatBonus.classList.add("hidden");
                        fighter.lastStatBonusText = "hidden";
                    }
                }
            });
        }

        function renderFighters(now) {
            battle.fighters.forEach((fighter) => {
                const stunState = !fighter.dead && isStunned(fighter, now);
                if (fighter.lastIsStunned !== stunState) {
                    fighter.element.classList.toggle("is-stunned", stunState);
                    fighter.lastIsStunned = stunState;
                }

                const sleepState = !fighter.dead && isAsleep(fighter, now);
                if (fighter.lastIsAsleep !== sleepState) {
                    fighter.element.classList.toggle("is-asleep", sleepState);
                    fighter.lastIsAsleep = sleepState;
                }

                if (fighter.lastDead !== fighter.dead) {
                    fighter.element.classList.toggle("is-dead", fighter.dead);
                    fighter.lastDead = fighter.dead;
                }

                const offmapState = !fighter.dead && fighter.offMapUntil > now && !isJiTaehyeokBusy(fighter);
                if (fighter.lastIsOffmap !== offmapState) {
                    fighter.element.classList.toggle("is-offmap", offmapState);
                    fighter.lastIsOffmap = offmapState;
                }

                const jiSkillTransparentState = !fighter.dead && isJiTaehyeokBusy(fighter);
                if (fighter.lastIsJiSkillTransparent !== jiSkillTransparentState) {
                    fighter.element.classList.toggle("is-ji-skill-transparent", jiSkillTransparentState);
                    fighter.lastIsJiSkillTransparent = jiSkillTransparentState;
                }

                const rageState = !fighter.dead && fighter.definition.id === "gu-minchan" && fighter.rageStacks > 0;
                if (fighter.lastIsRaging !== rageState) {
                    fighter.element.classList.toggle("is-raging", rageState);
                    fighter.lastIsRaging = rageState;
                }
                if (fighter.definition.id === "gu-minchan") {
                    fighter.element.style.setProperty("--rage-alpha", Math.min(0.62, (fighter.rageStacks || 0) * 0.075).toFixed(3));
                }

                const kangComboState = !fighter.dead && isKangComboing(fighter);
                if (fighter.lastIsKangCombo !== kangComboState) {
                    fighter.element.classList.toggle("is-kang-combo", kangComboState);
                    fighter.lastIsKangCombo = kangComboState;
                }

                const ratio = (index + 1) / (count + 1);
                createAfterimage(target, {

                    y: startY + (endY - startY) * ratio,

        function gjeThrowToWall(caller, target, effects, now) {
            if (!target || target.dead) {
                return;
            }

            createGjeRushVisual(caller, target, effects);
            const wallDirection = directionToNearestWall(target);
            const fallbackDamage = effects.responseDamage || 1000;
            const initialDamage = effects.responseInitialDamage ?? Math.round(fallbackDamage / 2);
            const wallDamage = effects.responseWallDamage ?? Math.max(0, fallbackDamage - initialDamage);

            applyDamage(target, initialDamage, caller, "skill", { unavoidable: true });
            if (target.dead) {
                return;
            }

            if (ignoreOrReflectKnockback(target, caller, wallDirection, effects.responseThrowSpeed || 1400, { origin: target })) {
                impactStar(target.x, target.y, caller.definition.color);
                burst(target.x, target.y, caller.definition.color, 8);
                return;
            }
            const radius = battle.ballSize / 2;
            const startX = target.x;
            const startY = target.y;
            let endX = target.x;
            let endY = target.y;

            if (wallDirection.x < 0) {
                endX = radius;
            } else if (wallDirection.x > 0) {
                endX = battle.arenaSize - radius;
            }
            if (wallDirection.y < 0) {
                endY = radius;
            } else if (wallDirection.y > 0) {
                endY = battle.arenaSize - radius;
            }

            createWallThrowAfterimages(target, startX, startY, endX, endY, effects);
            target.windmillMomentum = null;
            if (isKangComboing(target)) {
                finishKangCombo(target);
            }
            target.x = endX;
            target.y = endY;
            target.vx = 0;
            target.vy = 0;
            target.afterimageUntil = now + (effects.targetAfterimageDuration || 0.75) * 1000;
            target.nextAfterimageAt = 0;

            impactStar(target.x, target.y, caller.definition.color);
            burst(target.x, target.y, caller.definition.color, 12);
            effectRing(target.x, target.y, battle.ballSize * 1.7, caller.definition.color);
            floatText("ㄱㅈㅇ!", target.x, target.y - battle.ballSize / 2, caller.definition.color);

        function startGjeResponseSequence(fighter, now, options = {}) {
            const baseEffects = fighter.definition.skill.effects || {};
            const effects = { ...baseEffects, ...(options.effects || {}) };
            const sequenceId = (fighter.gjeSequenceId || 0) + 1;
            const durationMs = Math.max(400, (effects.revealDuration || 2) * 1000);
            const responseChance = options.responseChance ?? effects.responseChance ?? 0.25;
            const didAnswer = Math.random() < responseChance;
            const message = didAnswer ? "ㄱㅈㅇ 응답" : "ㄱㅈㅇ 미응답";
            const letters = [...message];
            fighter.gjeSequenceId = sequenceId;

            const overlay = document.createElement("div");
            overlay.className = "gje-screen-call";

            const text = document.createElement("div");
            text.className = didAnswer ? "gje-screen-text is-success" : "gje-screen-text";
            const messageNode = document.createElement("span");
            const caret = document.createElement("span");
            caret.className = "gje-screen-caret";
            caret.textContent = "_";
            text.appendChild(messageNode);
            text.appendChild(caret);
            overlay.appendChild(text);
            arena.appendChild(overlay);

            let revealed = 0;
            const interval = window.setInterval(() => {
                revealed = Math.min(letters.length, revealed + 1);
                messageNode.textContent = letters.slice(0, revealed).join("");
                if (revealed >= letters.length) {
                    window.clearInterval(interval);
                }
            }, durationMs / Math.max(1, letters.length));

            window.setTimeout(() => {
                window.clearInterval(interval);
                messageNode.textContent = message;

                const stillValid = battle.isRunning
                    && battle.fighters.includes(fighter)
                    && fighter.gjeSequenceId === sequenceId
                    && !fighter.dead;

                if (!stillValid) {
                    closeGjeScreen(overlay);
                    return;
                }

                if (!didAnswer) {
                    closeGjeScreen(overlay);
                    floatText("미응답", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
                    return;
                }

                window.setTimeout(() => {
                    closeGjeScreen(overlay);
                    window.setTimeout(() => {
                        const canStrike = battle.isRunning
                            && battle.fighters.includes(fighter)
                            && fighter.gjeSequenceId === sequenceId
                            && !fighter.dead;
                        if (!canStrike) {
                            return;
                        }

                        const target = nearestEnemy(fighter);
                        if (!target) {
                            floatText("응답 실패", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
                            return;
                        }

                        screenFlash(fighter.definition.color);
                        gjeThrowToWall(fighter, target, effects, performance.now());
                    }, 220);
                }, 260);
            }, durationMs);
        }

        function randomPointInJaeyoonDomain(domain, radius = 0, index = Math.random() * 10, total = 10) {
            const safeRadius = Math.max(0, domain.radius - radius - 6);
            const angle = -Math.PI / 2 + (Math.PI * 2 * index) / Math.max(1, total) + (Math.random() - 0.5) * 0.34;
            const distance = safeRadius * (0.28 + Math.random() * 0.58);
            return {
                x: domain.centerX + Math.cos(angle) * distance,
                y: domain.centerY + Math.sin(angle) * distance
            };
        }

        function validJaeyoonDomainTargetIds(domain, owner) {
            if (!domain || !owner) {
                return [];
            }

            return (domain.enemyTargetIds || []).filter((id) => {
                const target = getFighterById(id);
                return target
                    && !target.dead
                    && target.offMapUntil <= performance.now()
                    && target.jaeyoonDomainInside
                    && !areAllies(owner, target)
                    && isInsideJaeyoonDomain(target, domain);
            });

        function nextJaeyoonDomainTargetId(domain, owner) {
            const ids = validJaeyoonDomainTargetIds(domain, owner);
            if (ids.length <= 0) {
                return null;

            const index = domain.nextTargetIndex || 0;
            const id = ids[index % ids.length];
            domain.nextTargetIndex = index + 1;
            return id;

        function spawnJaeyoonWraith(owner, now, options = {}) {
            if (!isKimJaeyoon(owner) || owner.dead) {
                return null;
            }

            const effects = jaeyoonPassiveEffects(owner);
            const domain = options.domain || (battle.jaeyoonDomain?.ownerId === owner.id ? battle.jaeyoonDomain : null);
            const ignoresLimit = Boolean(options.ignoreLimit || domain);
            const maxWraiths = effects.maxWraiths || 5;
            if (!ignoresLimit && jaeyoonOwnedSummons(owner, { summonType: "jaeyoon-wraith" }).length >= maxWraiths) {
                return null;
            }

            const wraith = createFighter(createJaeyoonWraithDefinition(owner), battle.fighters.length, battle.fighters.length + 1, {
                id: `${owner.id}-wraith-${Math.round(now)}-${Math.floor(Math.random() * 10000)}`,
                isSummon: true,

                jaeyoonDomainInside: Boolean(domain),
                jaeyoonDomainSummon: Boolean(domain),
                jaeyoonAssignedTargetId: options.assignedTargetId || (domain ? nextJaeyoonDomainTargetId(domain, owner) : null)
            });

            if (domain) {
                const point = randomPointInJaeyoonDomain(domain, fighterRadius(wraith), options.index || 0, options.total || 5);
                wraith.x = point.x;
                wraith.y = point.y;
            } else {
                const angle = Math.random() * Math.PI * 2;
                const distance = battle.ballSize * (0.8 + Math.random() * 0.6);
                wraith.x = clampToArena(owner.x + Math.cos(angle) * distance);
                wraith.y = clampToArena(owner.y + Math.sin(angle) * distance);
            }

            setVelocityDirection(wraith, Math.random() - 0.5, Math.random() - 0.5, wraith.speed);
            battle.fighters.push(wraith);
            floatText("악령", wraith.x, wraith.y - fighterRadius(wraith), owner.definition.color);

        function updateKimJaeyoonPassive(fighter, now) {
            if (!isKimJaeyoon(fighter) || fighter.dead) {
                return;
            }

            const effects = jaeyoonPassiveEffects(fighter);
            const intervalMs = (effects.interval || 5) * 1000;
            if (!fighter.jaeyoonNextWraithAt) {
                fighter.jaeyoonNextWraithAt = now + intervalMs;
                return;
            }
            if (now < fighter.jaeyoonNextWraithAt) {
                return;
            }

            let spawned = 0;
            while (now >= fighter.jaeyoonNextWraithAt && spawned < 3) {
                fighter.jaeyoonNextWraithAt += intervalMs;
                spawnJaeyoonWraith(fighter, now);
                spawned += 1;
            }
        }

        function explodeJaeyoonWraith(wraith, now, source) {
            const owner = getFighterById(wraith.ownerId);
            const effects = owner && isKimJaeyoon(owner)
                ? jaeyoonPassiveEffects(owner)
                : wraith.definition.passive?.effects || {};
            const radius = (effects.explosionRadius || 100) * arenaScale();
            const damage = effects.explosionDamage || 20;

            effectRing(wraith.x, wraith.y, radius * 2, "#ffffff");
            burst(wraith.x, wraith.y, "#ffffff", 8);
            battle.fighters.forEach((target) => {
                if (target === wraith || target.dead || target.offMapUntil > now || areAllies(wraith, target)) {
                    return;
                }
                if (Math.hypot(target.x - wraith.x, target.y - wraith.y) > radius + fighterRadius(target)) {
                    return;
                }
                applyDamage(target, damage, owner || source || wraith, "skill", { unavoidable: true });
            });

            target.jaeyoonDomainSummon = false;
            target.jaeyoonAssignedTargetId = null;
            target.jaeyoonRevivedOriginal = false;
            target.jaeyoonOriginalOwnerId = null;
            target.jaeyoonOriginalIsSummon = false;
            target.jaeyoonOriginalSummonType = "";
            target.jaeyoonOriginalSizeMultiplier = 1;

        function registerJaeyoonDomainWraithDeath(wraith, now, options = {}) {
            const domain = battle.jaeyoonDomain;
            if (
                options.skipJaeyoonReplacement
                || !domain
                || wraith.jaeyoonDomainId !== domain.id
                || wraith.ownerId !== domain.ownerId
            ) {
                return;
            }

            const owner = getFighterById(domain.ownerId);
            if (!owner || owner.dead) {
                return;
            }

            const effects = jaeyoonSkillEffects(owner);
            const threshold = Math.max(1, effects.wraithDeathsPerReplacement || 2);
            domain.wraithDeathsSinceReplacement = (domain.wraithDeathsSinceReplacement || 0) + 1;
            if (domain.wraithDeathsSinceReplacement < threshold) {
                return;
            }

            domain.wraithDeathsSinceReplacement -= threshold;
            domain.replacementSerial = (domain.replacementSerial || 0) + 1;
            spawnJaeyoonWraith(owner, now, {
                domain,
                ignoreLimit: true,
                index: domain.replacementSerial,
                total: Math.max(1, (domain.enemyTargetIds || []).length * (effects.domainWraithsPerEnemy || 3)),
                assignedTargetId: nextJaeyoonDomainTargetId(domain, owner)
            });

        function clearFighterActionState(fighter) {
            fighter.pendingSpike = null;
            fighter.windmillMomentum = null;
            fighter.forceMoveUntil = 0;
            clearYuAnimalDash(fighter);
            if (isYuYejun(fighter)) {

                clearYuRushClones(fighter);
                fighter.yuChaseTargetId = null;
                fighter.yuChaseIgnoreUntil = 0;
                fighter.yuIgnoredSourceId = null;

                fighter.yuRushReleaseAt = 0;
                fighter.yuRushTargetId = null;

            if (isLeeTaehwan(fighter)) {

                fighter.leeDribbleUntil = 0;

                fighter.kangComboNextAt = 0;
