        function startGjeResponseSequence(fighter, now, options = {}) {
            const baseEffects = fighter.definition.skill.effects || {};
            const effects = { ...baseEffects, ...(options.effects || {}) };
            const sequenceId = (fighter.gjeSequenceId || 0) + 1;
            const durationMs = Math.max(400, (effects.revealDuration || 2) * 1000);
            const responseChance = options.responseChance ?? effects.responseChance ?? 0.25;
            const didAnswer = Math.random() < responseChance;
            const message = didAnswer ? "ㄱㅈㅇ 응답" : "ㄱㅈㅇ 미응답";
            const letters = [...message];
            fighter.gjeSequenceId = sequenceId;

            const overlay = document.createElement("div");
            overlay.className = "gje-screen-call";

            const text = document.createElement("div");
            text.className = didAnswer ? "gje-screen-text is-success" : "gje-screen-text";
            const messageNode = document.createElement("span");
            const caret = document.createElement("span");
            caret.className = "gje-screen-caret";
            caret.textContent = "_";
            text.appendChild(messageNode);
            text.appendChild(caret);
            overlay.appendChild(text);
            arena.appendChild(overlay);

            let revealed = 0;
            const interval = window.setInterval(() => {
                revealed = Math.min(letters.length, revealed + 1);
                messageNode.textContent = letters.slice(0, revealed).join("");
                if (revealed >= letters.length) {
                    window.clearInterval(interval);
                }
            }, durationMs / Math.max(1, letters.length));

            window.setTimeout(() => {
                window.clearInterval(interval);
                messageNode.textContent = message;

                const stillValid = battle.isRunning
                    && battle.fighters.includes(fighter)
                    && fighter.gjeSequenceId === sequenceId
                    && !fighter.dead;

                if (!stillValid) {
                    closeGjeScreen(overlay);
                    return;
                }

                if (!didAnswer) {
                    closeGjeScreen(overlay);
                    floatText("미응답", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
                    return;
                }

                window.setTimeout(() => {
                    closeGjeScreen(overlay);
                    window.setTimeout(() => {
                        const canStrike = battle.isRunning
                            && battle.fighters.includes(fighter)
                            && fighter.gjeSequenceId === sequenceId
                            && !fighter.dead;
                        if (!canStrike) {
                            return;
                        }

                        const target = nearestEnemy(fighter);
                        if (!target) {
                            floatText("응답 실패", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
                            return;
                        }

                        screenFlash(fighter.definition.color);
                        gjeThrowToWall(fighter, target, effects, performance.now());
                    }, 220);
                }, 260);
            }, durationMs);
        }

        function triggerGwonDeathSave(fighter, now) {
            if (!fighter || fighter.definition.id !== "gwon-yeojun" || fighter.dead) {
                return false;
            }

            const effects = fighter.definition.skill.effects || {};
            const durationMs = Math.max(400, (effects.revealDuration || 2) * 1000);
            if (fighter.gjeDeathSaveUntil > now) {
                fighter.hp = 1;
                return true;
            }
            if ((fighter.gjeDeathSaveCount || 0) >= (effects.deathSaveLimit || 2)) {
                return false;
            }

            fighter.hp = 1;
            fighter.gjeDeathSaveCount = (fighter.gjeDeathSaveCount || 0) + 1;
            fighter.gjeDeathSaveUntil = now + durationMs + 900;
            fighter.skillCooldown = skillCooldownDuration(fighter);
            fighter.stunnedUntil = 0;
            fighter.savedVelocity = null;
            floatText("체력 1", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.45, fighter.definition.color);
            startGjeResponseSequence(fighter, now, {
                responseChance: effects.fatalResponseChance ?? 0.5
            });
            return true;
        }

        function isKimJaeyoon(fighter) {
            return Boolean(fighter && fighter.definition.id === "kim-jaeyoon");
        }

        function jaeyoonPassiveEffects(fighter) {
            return fighter.definition.passive?.effects || {};
        }

        function jaeyoonSkillEffects(fighter) {
            return fighter.definition.skill?.effects || {};
        }

        function activeJaeyoonDomains() {
            const domains = Array.isArray(battle.jaeyoonDomains)
                ? battle.jaeyoonDomains.filter(Boolean)
                : [];
            if (battle.jaeyoonDomain && !domains.some((domain) => domain.id === battle.jaeyoonDomain.id)) {
                domains.push(battle.jaeyoonDomain);
            }
            return domains;
        }

        function refreshLatestJaeyoonDomain() {
            if (!Array.isArray(battle.jaeyoonDomains)) {
                battle.jaeyoonDomains = [];
            }
            battle.jaeyoonDomains = battle.jaeyoonDomains.filter(Boolean);
            battle.jaeyoonDomain = battle.jaeyoonDomains[battle.jaeyoonDomains.length - 1] || null;
        }

        function jaeyoonDomainById(id) {
            if (!id) {
                return null;
            }
            return activeJaeyoonDomains().find((domain) => domain.id === id) || null;
        }

        function jaeyoonDomainForOwner(owner) {
            if (!owner) {
                return null;
            }
            return activeJaeyoonDomains().find((domain) => domain.ownerId === owner.id) || null;
        }

        function jaeyoonDomainsOverlap(a, b) {
            if (!a || !b || a.id === b.id) {
                return false;
            }
            return Math.hypot(a.centerX - b.centerX, a.centerY - b.centerY) <= a.radius + b.radius;
        }

        function jaeyoonDomainCluster(domain) {
            if (!domain) {
                return [];
            }

            const domains = activeJaeyoonDomains();
            const start = domains.find((item) => item.id === domain.id) || domain;
            const cluster = [];
            const seen = new Set();
            const queue = [start];
            while (queue.length > 0) {
                const current = queue.shift();
                if (!current || seen.has(current.id)) {
                    continue;
                }
                seen.add(current.id);
                cluster.push(current);
                domains.forEach((other) => {
                    if (!seen.has(other.id) && jaeyoonDomainsOverlap(current, other)) {
                        queue.push(other);
                    }
                });
            }
            return cluster;
        }

        function isInsideJaeyoonDomainCluster(fighter, domain) {
            return jaeyoonDomainCluster(domain).some((clusterDomain) => isInsideJaeyoonDomain(fighter, clusterDomain));
        }

        function jaeyoonDomainsForFighter(fighter) {
            if (!fighter) {
                return [];
            }
            return activeJaeyoonDomains().filter((domain) => (
                domain.ownerId === fighter.id
                || fighter.jaeyoonDomainId === domain.id
                || (domain.enemyTargetIds || []).includes(fighter.id)
            ));
        }

        function jaeyoonAllowedDomainClusterForFighter(fighter) {
            const allowed = [];
            const seen = new Set();
            jaeyoonDomainsForFighter(fighter).forEach((domain) => {
                jaeyoonDomainCluster(domain).forEach((clusterDomain) => {
                    if (!seen.has(clusterDomain.id)) {
                        seen.add(clusterDomain.id);
                        allowed.push(clusterDomain);
                    }
                });
            });
            return allowed;
        }

        function refreshJaeyoonDomainInsideFlags() {
            battle.fighters.forEach((fighter) => {
                const allowedDomains = jaeyoonAllowedDomainClusterForFighter(fighter);
                fighter.jaeyoonDomainInside = allowedDomains.some((domain) => isInsideJaeyoonDomain(fighter, domain));
            });
        }

        function updateJaeyoonDomainMergeVisuals() {
            const domains = activeJaeyoonDomains();
            domains.forEach((domain) => {
                const merged = domains.some((other) => jaeyoonDomainsOverlap(domain, other));
                domain.element?.classList.toggle("is-merged", merged);
            });
            redrawJaeyoonDomainBoundaries();
        }

        function jaeyoonDomainBoundaryPoint(domain, index, samples) {
            const angle = (Math.PI * 2 * index) / samples;
            return {
                x: domain.centerX + Math.cos(angle) * domain.radius,
                y: domain.centerY + Math.sin(angle) * domain.radius
            };
        }

        function jaeyoonDomainBoundaryPath(domain, cluster) {
            const samples = 144;
            const visible = [];
            for (let index = 0; index < samples; index += 1) {
                const point = jaeyoonDomainBoundaryPoint(domain, index, samples);
                visible[index] = !cluster.some((other) => (
                    other.id !== domain.id
                    && Math.hypot(point.x - other.centerX, point.y - other.centerY) < other.radius - 2
                ));
            }

            if (!visible.some(Boolean)) {
                return "";
            }

            const pointCommand = (index, command) => {
                const point = jaeyoonDomainBoundaryPoint(domain, index % samples, samples);
                return `${command}${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
            };

            if (visible.every(Boolean)) {
                let path = pointCommand(0, "M");
                for (let index = 1; index < samples; index += 1) {
                    path += ` ${pointCommand(index, "L")}`;
                }
                return `${path} Z`;
            }

            const start = visible.findIndex((isVisible, index) => isVisible && !visible[(index - 1 + samples) % samples]);
            let path = "";
            let drawing = false;
            for (let step = 0; step <= samples; step += 1) {
                const index = (start + step) % samples;
                if (visible[index]) {
                    path += ` ${pointCommand(index, drawing ? "L" : "M")}`;
                    drawing = true;
                } else {
                    drawing = false;
                }
            }
            return path.trim();
        }

        function redrawJaeyoonDomainBoundaries() {
            arena.querySelectorAll(".jaeyoon-domain-boundary").forEach((node) => node.remove());
            const domains = activeJaeyoonDomains();
            const seen = new Set();
            const mergedClusters = [];

            domains.forEach((domain) => {
                if (seen.has(domain.id)) {
                    return;
                }
                const cluster = jaeyoonDomainCluster(domain);
                cluster.forEach((item) => seen.add(item.id));
                if (cluster.length > 1) {
                    mergedClusters.push(cluster);
                }
            });

            if (mergedClusters.length <= 0) {
                return;
            }

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.classList.add("jaeyoon-domain-boundary");
            svg.setAttribute("viewBox", `0 0 ${battle.arenaSize} ${battle.arenaSize}`);
            svg.setAttribute("preserveAspectRatio", "none");
            mergedClusters.forEach((cluster) => {
                cluster.forEach((domain) => {
                    const pathText = jaeyoonDomainBoundaryPath(domain, cluster);
                    if (!pathText) {
                        return;
                    }
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", pathText);
                    svg.appendChild(path);
                });
            });
            arena.appendChild(svg);
        }

        function isJaeyoonDomainActiveFor(fighter) {
            return Boolean(
                isKimJaeyoon(fighter)
                && jaeyoonDomainForOwner(fighter)
            );
        }

        function jaeyoonOwnedSummons(owner, options = {}) {
            if (!owner) {
                return [];
            }
            return battle.fighters.filter((fighter) => {
                if (fighter.dead || fighter.ownerId !== owner.id) {
                    return false;
                }
                return !options.summonType || fighter.summonType === options.summonType;
            });
        }

        function createJaeyoonWraithDefinition(owner) {
            const effects = jaeyoonPassiveEffects(owner);
            const useTeamColor = Boolean(battle.isTeamMode && owner.teamId);
            const wraithColor = useTeamColor ? owner.definition.color : "#f8fafc";
            const wraithTextColor = useTeamColor ? owner.definition.textColor : "#1c1b1b";
            return {
                id: "kim-jaeyoon-wraith",
                name: "악령",
                shortName: "악령",
                maxHp: effects.wraithHp || 100,
                baseAttack: effects.wraithAttack || 10,
                speedLabel: String(effects.wraithSpeed || 250),
                speed: effects.wraithSpeed || 250,
                colorName: useTeamColor ? `${owner.definition.colorName} 악령` : "하얀 악령",
                color: wraithColor,
                textColor: wraithTextColor,
                avatarText: "惡",
                traits: ["악령", "폭발"],
                passive: {
                    name: "사망 폭발",
                    description: "죽을 때 주변 적에게 피해를 줍니다.",
                    effects: {
                        explosionRadius: effects.explosionRadius || 100,
                        explosionDamage: effects.explosionDamage || 20
                    }
                },
                skill: {
                    name: "폭발",
                    cooldown: 1,
                    passiveOnly: true,
                    description: "죽을 때 폭발합니다."
                },
                cooldownOnBasicHit: 0,
                cooldownOnDamageTaken: 0,
                immuneToBasic: false
            };
        }

        function randomPointInJaeyoonDomain(domain, radius = 0, index = Math.random() * 10, total = 10) {
            const safeRadius = Math.max(0, domain.radius - radius - 6);
            const angle = -Math.PI / 2 + (Math.PI * 2 * index) / Math.max(1, total) + (Math.random() - 0.5) * 0.34;
            const distance = safeRadius * (0.28 + Math.random() * 0.58);
            return {
                x: domain.centerX + Math.cos(angle) * distance,
                y: domain.centerY + Math.sin(angle) * distance
            };
        }

        function validJaeyoonDomainTargetIds(domain, owner) {
            if (!domain || !owner) {
                return [];
            }

            return (domain.enemyTargetIds || []).filter((id) => {
                const target = getFighterById(id);
                return target
                    && !target.dead
                    && target.offMapUntil <= performance.now()
                    && !areAllies(owner, target)
                    && isInsideJaeyoonDomainCluster(target, domain);
            });
        }

        function nextJaeyoonDomainTargetId(domain, owner) {
            const ids = validJaeyoonDomainTargetIds(domain, owner);
            if (ids.length <= 0) {
                return null;
            }

            const index = domain.nextTargetIndex || 0;
            const id = ids[index % ids.length];
            domain.nextTargetIndex = index + 1;
            return id;
        }

        function spawnJaeyoonWraith(owner, now, options = {}) {
            if (!isKimJaeyoon(owner) || owner.dead) {
                return null;
            }

            const effects = jaeyoonPassiveEffects(owner);
            const domain = options.domain || jaeyoonDomainForOwner(owner);
            const ignoresLimit = Boolean(options.ignoreLimit || domain);
            const maxWraiths = effects.maxWraiths || 5;
            if (!ignoresLimit && jaeyoonOwnedSummons(owner, { summonType: "jaeyoon-wraith" }).length >= maxWraiths) {
                return null;
            }

            const wraith = createFighter(createJaeyoonWraithDefinition(owner), battle.fighters.length, battle.fighters.length + 1, {
                id: `${owner.id}-wraith-${Math.round(now)}-${Math.floor(Math.random() * 10000)}`,
                isSummon: true,
                ownerId: owner.id,
                summonType: "jaeyoon-wraith",
                sizeMultiplier: effects.wraithSizeMultiplier || 0.5,
                jaeyoonDomainId: domain?.id || null,
                jaeyoonDomainInside: Boolean(domain),
                jaeyoonDomainSummon: Boolean(domain),
                jaeyoonAssignedTargetId: options.assignedTargetId || (domain ? nextJaeyoonDomainTargetId(domain, owner) : null)
            });

            if (domain) {
                const point = randomPointInJaeyoonDomain(domain, fighterRadius(wraith), options.index || 0, options.total || 5);
                wraith.x = point.x;
                wraith.y = point.y;
            } else {
                const angle = Math.random() * Math.PI * 2;
                const distance = battle.ballSize * (0.8 + Math.random() * 0.6);
                wraith.x = clampToArena(owner.x + Math.cos(angle) * distance);
                wraith.y = clampToArena(owner.y + Math.sin(angle) * distance);
            }

            setVelocityDirection(wraith, Math.random() - 0.5, Math.random() - 0.5, wraith.speed);
            battle.fighters.push(wraith);
            floatText("악령", wraith.x, wraith.y - fighterRadius(wraith), owner.definition.color);
            return wraith;
        }

        function updateKimJaeyoonPassive(fighter, now) {
            if (!isKimJaeyoon(fighter) || fighter.dead) {
                return;
            }

            const effects = jaeyoonPassiveEffects(fighter);
            const intervalMs = (effects.interval || 5) * 1000;
            if (!fighter.jaeyoonNextWraithAt) {
                fighter.jaeyoonNextWraithAt = now + intervalMs;
                return;
            }
            if (now < fighter.jaeyoonNextWraithAt) {
                return;
            }

            let spawned = 0;
            while (now >= fighter.jaeyoonNextWraithAt && spawned < 3) {
                fighter.jaeyoonNextWraithAt += intervalMs;
                spawnJaeyoonWraith(fighter, now);
                spawned += 1;
            }
        }

        function explodeJaeyoonWraith(wraith, now, source) {
            const owner = getFighterById(wraith.ownerId);
            const effects = owner && isKimJaeyoon(owner)
                ? jaeyoonPassiveEffects(owner)
                : wraith.definition.passive?.effects || {};
            const radius = bossAttackRange(owner || source || wraith, (effects.explosionRadius || 100) * arenaScale());
            const damage = effects.explosionDamage || 20;

            effectRing(wraith.x, wraith.y, radius * 2, "#ffffff");
            burst(wraith.x, wraith.y, "#ffffff", 8);
            if (isPassiveEffectForbidden(wraith, now) || isPassiveEffectForbidden(owner || source || wraith, now)) {
                return;
            }
            battle.fighters.forEach((target) => {
                if (target === wraith || target.dead || target.offMapUntil > now || areAllies(wraith, target)) {
                    return;
                }
                if (Math.hypot(target.x - wraith.x, target.y - wraith.y) > radius + fighterRadius(target)) {
                    return;
                }
                applyDamage(target, damage, owner || source || wraith, "skill", { unavoidable: true });
            });
        }

        function restoreJaeyoonRevivedOriginal(target) {
            if (!target.jaeyoonRevivedOriginal) {
                return;
            }

            target.isSummon = target.jaeyoonOriginalIsSummon;
            target.ownerId = target.jaeyoonOriginalOwnerId;
            target.summonType = target.jaeyoonOriginalSummonType;
            target.sizeMultiplier = target.jaeyoonOriginalSizeMultiplier || 1;
            target.jaeyoonDomainId = null;
            target.jaeyoonDomainInside = false;
            target.jaeyoonDomainSummon = false;
            target.jaeyoonAssignedTargetId = null;
            target.jaeyoonRevivedOriginal = false;
            target.statsOwnerId = target.jaeyoonOriginalStatsOwnerId;
            target.jaeyoonOriginalOwnerId = null;
            target.jaeyoonOriginalIsSummon = false;
            target.jaeyoonOriginalSummonType = "";
            target.jaeyoonOriginalSizeMultiplier = 1;
            target.teamId = target.jaeyoonOriginalTeamId || null;
            target.teamLabel = target.teamId ? TEAM_CONFIG[target.teamId]?.label || "" : "";
            target.jaeyoonOriginalTeamId = null;
            if (Number.isFinite(target.jaeyoonOriginalMaxHp)) {
                target.maxHp = target.jaeyoonOriginalMaxHp;
                target.hp = Math.min(target.hp, target.maxHp);
            }
            target.jaeyoonOriginalMaxHp = null;
            if (target.jaeyoonOriginalAttack !== null && target.jaeyoonOriginalAttack !== undefined) {
                target.attack = target.jaeyoonOriginalAttack;
            }
            target.jaeyoonOriginalAttack = null;
            target.element.classList.remove("is-jaeyoon-revived");
            target.element.style.removeProperty("--jaeyoon-revive-color");
            target.jaeyoonOriginalStatsOwnerId = null;
            target.jaeyoonNextRevivedSkillAt = 0;
            target.jaeyoonRevivedSkillUsed = false;
        }

        function jaeyoonRevivedSkillIntervalSeconds(fighter) {
            if (!fighter?.definition?.skill || fighter.definition.skill.passiveOnly) {
                return 0;
            }

            const cooldown = Number(fighter.definition.skill.cooldown);
            if (!Number.isFinite(cooldown) || cooldown <= 0) {
                return 0;
            }
            if (cooldown <= 7) {
                return 8;
            }
            if (cooldown <= 10) {
                return 10;
            }
            return 12;
        }

        function jaeyoonRevivedFirstSkillDelaySeconds(fighter) {
            const interval = jaeyoonRevivedSkillIntervalSeconds(fighter);
            if (interval <= 0) {
                return 0;
            }

            const owner = getFighterById(fighter.ownerId);
            const effects = owner?.definition?.skill?.effects || {};
            const reduction = effects.revivedFirstSkillCooldownReduction ?? 6;
            return Math.max(0, interval - reduction);
        }

        function scheduleJaeyoonRevivedSkill(fighter, now, options = {}) {
            const interval = jaeyoonRevivedSkillIntervalSeconds(fighter);
            if (interval <= 0) {
                fighter.jaeyoonNextRevivedSkillAt = 0;
                return 0;
            }

            const delay = options.first
                ? jaeyoonRevivedFirstSkillDelaySeconds(fighter)
                : interval;
            fighter.jaeyoonNextRevivedSkillAt = now + Math.max(0, delay) * 1000;
            return delay;
        }

        function isJaeyoonRevivedSkillBusy(fighter, now) {
            return Boolean(
                isControlLocked(fighter, now)
                || isLeeCharging(fighter)
                || isJiTaehyeokBusy(fighter)
                || isParkSungbinRushBusy(fighter)
                || isLeeDohyunOffsideBusy(fighter)
                || isLeeDohyunLineDashing(fighter)
                || isYuAnimalDashing(fighter)
                || isKangComboing(fighter)
                || isKangFinishing(fighter)
                || isKimDonggyuAiming(fighter)
                || fighter.kimDonggyuArShotsRemaining > 0
                || fighter.yuRushPhase
                || (isYuYejun(fighter) && hasYuAnimalPets(fighter))
            );
        }

        function updateJaeyoonRevivedSkill(fighter, now) {
            if (!fighter?.jaeyoonRevivedOriginal || fighter.dead || !fighter.jaeyoonDomainId) {
                return false;
            }

            const domain = jaeyoonDomainById(fighter.jaeyoonDomainId);
            if (!domain || !isInsideJaeyoonDomainCluster(fighter, domain)) {
                return false;
            }

            const interval = jaeyoonRevivedSkillIntervalSeconds(fighter);
            if (interval <= 0) {
                return false;
            }

            if (!fighter.jaeyoonNextRevivedSkillAt) {
                scheduleJaeyoonRevivedSkill(fighter, now, { first: !fighter.jaeyoonRevivedSkillUsed });
                return false;
            }
            if (now < fighter.jaeyoonNextRevivedSkillAt || isJaeyoonRevivedSkillBusy(fighter, now)) {
                return false;
            }

            fighter.jaeyoonRevivedSkillUsed = true;
            scheduleJaeyoonRevivedSkill(fighter, now);
            useSkill(fighter, now, { cooldownOverride: interval });
            return true;
        }

        function jaeyoonDomainDamageTakenMultiplier(target) {
            if (!target || target.dead) {
                return 1;
            }

            const domain = activeJaeyoonDomains().find((item) => {
                const isOwner = item.ownerId === target.id;
                const isOwnedDomainUnit = target.ownerId === item.ownerId && target.jaeyoonDomainId === item.id;
                return (isOwner || isOwnedDomainUnit) && isInsideJaeyoonDomainCluster(target, item);
            });
            if (!domain) {
                return 1;
            }

            const owner = getFighterById(domain.ownerId);
            const effects = owner && isKimJaeyoon(owner) ? jaeyoonSkillEffects(owner) : {};
            return Math.max(0, Math.min(1, effects.domainDamageTakenMultiplier ?? 0.8));
        }

        function ejectFighterFromJaeyoonDomain(fighter, domain, now = performance.now()) {
            if (!fighter || fighter.dead || !domain) {
                return;
            }

            const radius = fighterRadius(fighter);
            let dx = fighter.x - domain.centerX;
            let dy = fighter.y - domain.centerY;
            if (Math.hypot(dx, dy) < 0.001) {
                const angle = Math.random() * Math.PI * 2;
                dx = Math.cos(angle);
                dy = Math.sin(angle);
            }
            const direction = normalize(dx, dy);
            const outsideDistance = domain.radius + radius + 10;
            fighter.x = clampToArena(domain.centerX + direction.x * outsideDistance);
            fighter.y = clampToArena(domain.centerY + direction.y * outsideDistance);
            fighter.windmillMomentum = null;
            setVelocityDirection(fighter, direction.x, direction.y, moveSpeedOf(fighter, now));
        }

        function removeSummonFromBattle(fighter) {
            fighter.element?.remove();
            fighter.kimSihyeonDarknessBarElement?.remove();
            fighter.leeSungwonMarkerElement?.remove();
            fighter.leeSungwonAuraElement?.remove();
            fighter.hudElement?.remove();
            battle.fighters = battle.fighters.filter((item) => item !== fighter);
        }

        function registerJaeyoonDomainWraithDeath(wraith, now, options = {}) {
            const domain = jaeyoonDomainById(wraith.jaeyoonDomainId);
            if (
                options.skipJaeyoonReplacement
                || !domain
                || wraith.jaeyoonDomainId !== domain.id
                || wraith.ownerId !== domain.ownerId
            ) {
                return;
            }

            const owner = getFighterById(domain.ownerId);
            if (!owner || owner.dead) {
                return;
            }

            const effects = jaeyoonSkillEffects(owner);
            const threshold = Math.max(1, effects.wraithDeathsPerReplacement || 2);
            domain.wraithDeathsSinceReplacement = (domain.wraithDeathsSinceReplacement || 0) + 1;
            if (domain.wraithDeathsSinceReplacement < threshold) {
                return;
            }

            domain.wraithDeathsSinceReplacement -= threshold;
            domain.replacementSerial = (domain.replacementSerial || 0) + 1;
            spawnJaeyoonWraith(owner, now, {
                domain,
                ignoreLimit: true,
                index: domain.replacementSerial,
                total: Math.max(1, (domain.enemyTargetIds || []).length * (effects.domainWraithsPerEnemy || 3)),
                assignedTargetId: nextJaeyoonDomainTargetId(domain, owner)
            });
            floatText("악령 보충", owner.x, owner.y - battle.ballSize, owner.definition.color);
        }

        function clearFighterActionState(fighter) {
            fighter.pendingSpike = null;
            fighter.windmillMomentum = null;
            fighter.forceMoveUntil = 0;
            clearYuAnimalDash(fighter);
            if (isYuYejun(fighter)) {
                clearYuAfterimages(fighter);
                clearYuRushClones(fighter);
                fighter.yuChaseTargetId = null;
                fighter.yuChaseIgnoreUntil = 0;
                fighter.yuIgnoredSourceId = null;
                fighter.yuRushPhase = "";
                fighter.yuRushReleaseAt = 0;
                fighter.yuRushTargetId = null;
            }
            if (isLeeTaehwan(fighter)) {
                clearLeeTrajectory(fighter);
                clearLeeDribbleGhosts(fighter);
                fighter.leeShieldHitsRemaining = 0;
                fighter.leeChargeStartedAt = 0;
                fighter.leeChargeTimeMultiplier = 1;
                fighter.leeChargeDirection = null;
                fighter.leeDribbleUntil = 0;
            }
            if (isKimDonggyu(fighter)) {
                clearKimDonggyuAim(fighter, { silent: true });
                clearKimDonggyuBleed(fighter);
                fighter.kimDonggyuDefibUntil = 0;
                fighter.kimDonggyuDefibTempHp = 0;
                fighter.kimDonggyuArShotsRemaining = 0;
                fighter.kimDonggyuNextArShotAt = 0;
            }
            if (isAdminKimDonggyu(fighter)) {
                battle.activeAdminDonggyuTurrets
                    .filter((turret) => turret.ownerId === fighter.id)
                    .forEach((turret) => turret.element?.remove());
                battle.activeAdminDonggyuTurrets = battle.activeAdminDonggyuTurrets.filter((turret) => turret.ownerId !== fighter.id);
                if (battle.adminDonggyuBarrier?.ownerId === fighter.id) {
                    battle.adminDonggyuBarrier.element?.remove();
                    battle.adminDonggyuBarrier = null;
                }
                fighter.adminDonggyuAirSupportUntil = 0;
                fighter.adminDonggyuTurretDisabledUntil = 0;
            }
            if (isKwonSoonbeom(fighter)) {
                clearKwonSoonbeomChargeVisuals(fighter);
                clearKwonSoonbeomBlackHole(fighter);
                fighter.kwonSoonbeomCharging = false;
                fighter.kwonSoonbeomChargeStartedAt = 0;
                fighter.kwonSoonbeomChargeReleaseAt = 0;
                fighter.kwonSoonbeomChargeDurationMs = 0;
                fighter.kwonSoonbeomShieldHits = 0;
                fighter.kwonSoonbeomPullUntil = 0;
                fighter.kwonSoonbeomSlamDone = false;
            }
            if (isParkSungbin(fighter)) {
                collapseParkMemoryForOwner(fighter, performance.now(), "붕괴", { silent: true });
                fighter.parkRush?.rangeElement?.remove();
                fighter.parkRush = null;
                fighter.parkRushHitIds = new Set();
                fighter.element?.classList.remove("is-park-rushing");
                parkOwnedBlossoms(fighter).forEach((blossom) => removeParkBlossom(blossom));
                battle.activeParkRisingSlashes
                    .filter((slash) => slash.ownerId === fighter.id)
                    .forEach((slash) => slash.element?.remove());
                battle.activeParkRisingSlashes = battle.activeParkRisingSlashes.filter((slash) => slash.ownerId !== fighter.id);
            }
            if (isLeeSungwon(fighter)) {
                fighter.leeSungwonComboCount = 0;
                fighter.leeSungwonLastTargetId = null;
                fighter.leeSungwonRepeatHits = 0;
                fighter.leeSungwonAuraTargets = new Set();
                fighter.leeSungwonAuraElement?.remove();
                battle.fighters.forEach((target) => {
                    if (target.leeSungwonMarkedById === fighter.id) {
                        target.leeSungwonMarkedById = null;
                    }
                    if (target.leeSungwonBrandById === fighter.id) {
                        target.leeSungwonBrandById = null;
                    }
                });
            }
            if (isJiTaehyeok(fighter) || isDeveloperJiTaehyeok(fighter)) {
                clearJiTaehyeokState(fighter);
            }
            if (isKangInchan(fighter)) {
                fighter.kangComboTargetId = null;
                fighter.kangComboCount = 0;
                fighter.kangComboNextAt = 0;
                fighter.kangComboSpeedMultiplier = 0;
                clearKangFinisher(fighter);
            }
        }

        function defeatFighter(target, now = performance.now(), source = null, options = {}) {
            if (!target || (target.dead && !options.force)) {
                return;
            }

            const wasRemovableSummon = target.isSummon && !target.jaeyoonRevivedOriginal;
            const wasWraith = target.summonType === "jaeyoon-wraith";
            recordKillStats(target, source);
            recordFreeForAllElimination(target, now);
            target.hp = 0;
            target.dead = true;
            target.vx = 0;
            target.vy = 0;
            target.element.style.zIndex = "1";
            clearFighterActionState(target);
            if (isLeeDohyun(target)) {
                clearAllLeeDohyunFouls({ silent: true });
            }
            clearKimSihyeonDarkness(target);
            target.leeSungwonMarkedById = null;
            target.leeSungwonBrandById = null;
            clearYuBleed(target);
            clearKimDonggyuBleed(target);
            if (isYuYejun(target)) {
                yuAnimalPets(target).forEach((pet) => returnYuAnimalPet(pet, now, { noHeal: true, silent: true, removeDelay: 120 }));
            }
            clearLeeDohyunFoul(target, { silent: true });
            finishLeeDohyunOffside(target);
            if (target.yawnHealingActive) {
                stopKimSihyeonYawnHealing(target);
            }
            if (wasWraith && !options.skipJaeyoonExplosion) {
                explodeJaeyoonWraith(target, now, source);
            }
            if (wasWraith) {
                registerJaeyoonDomainWraithDeath(target, now, options);
            }
            if (isJiDrone(target)) {
                registerJiDroneDestruction(target, now);
            }

            target.element.classList.toggle("is-dead", true);
            if (!options.silentDeathText) {
                burst(target.x, target.y, "#ba1a1a", 12);
                floatText("OUT", target.x, target.y, "#ba1a1a");
            }

            if (target.jaeyoonRevivedOriginal) {
                restoreJaeyoonRevivedOriginal(target);
            } else if (target.summonType === "lee-dohyun-clone") {
                absorbLeeDohyunClone(target, now, { silent: true, removeDelay: options.removeDelay ?? 300 });
            } else if (wasRemovableSummon) {
                setTimeout(() => removeSummonFromBattle(target), options.removeDelay ?? 700);
            }
        }

        function showJaeyoonScreenText(text, durationMs = 1000) {
            const overlay = document.createElement("div");
            overlay.className = "jaeyoon-domain-call";
            const label = document.createElement("div");
            label.className = "jaeyoon-domain-text";
            label.textContent = text;
            overlay.appendChild(label);
            arena.appendChild(overlay);
            setTimeout(() => {
                overlay.classList.add("is-closing");
                setTimeout(() => overlay.remove(), 260);
            }, durationMs);
            return overlay;
        }

        function isNamDongyun(fighter) {
            return Boolean(fighter && fighter.definition.id === "nam-dongyun");
        }

        function namDongyunPassiveEffects(fighter) {
            return fighter?.definition.passive?.effects || {};
        }

        function removeNamDongyunFromBattle(fighter) {
            if (!isNamDongyun(fighter) || !battle.fighters.includes(fighter)) {
                return;
            }

            fighter.hp = 0;
            recordFreeForAllElimination(fighter, performance.now());
            fighter.dead = true;
            fighter.vx = 0;
            fighter.vy = 0;
            clearFighterActionState(fighter);
            clearKimSihyeonDarkness(fighter);
            removeSummonFromBattle(fighter);
        }

        function triggerNamDongyunDropout(now) {
            if (battle.namDongyunDropoutTriggered) {
                return false;
            }

            const dropouts = battle.fighters.filter((fighter) => !fighter.dead && !fighter.isSummon && isNamDongyun(fighter));
            if (!dropouts.length) {
                return false;
            }

            battle.namDongyunDropoutTriggered = true;
            const effects = namDongyunPassiveEffects(dropouts[0]);
            const delayMs = Math.max(0, (effects.startDelay || 2) * 1000);
            const overlayMs = Math.max(300, (effects.overlayDuration || 1.2) * 1000);
            const removeDelayMs = Math.max(0, (effects.removeDelay ?? 0.65) * 1000);
            battle.startedAt += delayMs;
            showJaeyoonScreenText(effects.line || "저 자퇴할래요...", overlayMs);

            dropouts.forEach((fighter, index) => {
                fighter.vx = 0;
                fighter.vy = 0;
                floatText("자퇴", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
                setTimeout(() => removeNamDongyunFromBattle(fighter), removeDelayMs + index * 80);
            });
            return true;
        }

        function developerJiUpgradeDefinition(baseFighter) {
            if (battle.isBossMode && baseFighter?.bossRole) {
                return characterForBossBattle("developer-ji-taehyeok", baseFighter.bossRole === "boss" ? "boss" : "normal");
            }
            if (battle.isTeamMode && baseFighter?.teamId && TEAM_CONFIG[baseFighter.teamId]) {
                return characterForBattle("developer-ji-taehyeok", baseFighter.teamId);
            }
            return characterForBattle("developer-ji-taehyeok");
        }

        function removeFighterForDeveloperUpgrade(fighter) {
            if (!fighter || !battle.fighters.includes(fighter)) {
                return;
            }
            fighter.dead = true;
            fighter.hp = 0;
            fighter.vx = 0;
            fighter.vy = 0;
            clearFighterActionState(fighter);
            clearKimSihyeonDarkness(fighter);
            removeSummonFromBattle(fighter);
        }

        function triggerDeveloperJiUpgrade(now) {
            if (battle.developerJiUpgradeChecked || battle.developerJiUpgradeBlocked) {
                return false;
            }
            battle.developerJiUpgradeChecked = true;

            if (hasTeacherPassiveUnit()) {
                return false;
            }

            const kimDonggyu = battle.fighters.find((fighter) => !fighter.dead && !fighter.isSummon && fighter.definition.id === "kim-donggyu");
            const jiTaehyeoks = battle.fighters.filter((fighter) => !fighter.dead && !fighter.isSummon && fighter.definition.id === "ji-taehyeok");
            const jiTaehyeok = jiTaehyeoks[0];
            const developerExists = battle.fighters.some((fighter) => !fighter.dead && fighter.definition.id === "developer-ji-taehyeok");
            if (!kimDonggyu || jiTaehyeoks.length < 2 || !jiTaehyeok || developerExists) {
                return false;
            }

            const definition = developerJiUpgradeDefinition(jiTaehyeok);
            if (!definition) {
                return false;
            }

            const averageX = jiTaehyeoks.reduce((sum, fighter) => sum + fighter.x, kimDonggyu.x) / (jiTaehyeoks.length + 1);
            const averageY = jiTaehyeoks.reduce((sum, fighter) => sum + fighter.y, kimDonggyu.y) / (jiTaehyeoks.length + 1);
            const x = averageX;
            const y = averageY;
            const vx = jiTaehyeoks.find((fighter) => fighter.vx)?.vx || kimDonggyu.vx || 0;
            const vy = jiTaehyeoks.find((fighter) => fighter.vy)?.vy || kimDonggyu.vy || 0;
            jiTaehyeoks.forEach(removeFighterForDeveloperUpgrade);

            const developer = createFighter(definition, battle.fighters.length, battle.fighters.length + 1);
            developer.x = Math.max(fighterRadius(developer), Math.min(battle.arenaSize - fighterRadius(developer), x));
            developer.y = Math.max(fighterRadius(developer), Math.min(battle.arenaSize - fighterRadius(developer), y));
            developer.vx = vx;
            developer.vy = vy;
            battle.fighters.push(developer);
            battle.fighters.forEach((fighter, index) => {
                fighter.index = index;
                fighter.total = battle.fighters.length;
            });
            initializeBattleStats();
            layoutFighters();
            renderHud();
            renderFighters(now);
            showJaeyoonScreenText("관리자의 명령 - 강화\n: 지태혁", 1000);
            screenFlash(definition.color);
            floatText("강화", developer.x, developer.y - fighterRadius(developer), definition.color);
            return true;
        }

        function createJaeyoonDomainElement(domain, extraClass = "") {
            const element = document.createElement("div");
            element.className = `jaeyoon-domain ${extraClass}`.trim();
            element.style.left = `${domain.centerX}px`;
            element.style.top = `${domain.centerY}px`;
            element.style.width = `${domain.radius * 2}px`;
            element.style.height = `${domain.radius * 2}px`;
            arena.appendChild(element);
            return element;
        }

        function isInsideJaeyoonDomain(fighter, domain) {
            return Math.hypot(fighter.x - domain.centerX, fighter.y - domain.centerY) <= domain.radius + fighterRadius(fighter);
        }

        function jaeyoonDomainEnemiesFor(owner, domain, options = {}) {
            const now = performance.now();
            const useMergedArea = options.merged !== false;
            return battle.fighters.filter((target) => {
                if (target === owner || target.dead || target.offMapUntil > now || areAllies(owner, target)) {
                    return false;
                }
                return useMergedArea
                    ? isInsideJaeyoonDomainCluster(target, domain)
                    : isInsideJaeyoonDomain(target, domain);
            });
        }

        function placeFighterInJaeyoonDomain(fighter, domain, index, total) {
            const point = randomPointInJaeyoonDomain(domain, fighterRadius(fighter), index, total);
            fighter.x = point.x;
            fighter.y = point.y;
            setVelocityDirection(fighter, Math.random() - 0.5, Math.random() - 0.5, fighter.speed || 180);
        }

        function reviveForJaeyoonDomain(owner, target, domain, index, total) {
            if (!target.dead || target.isSummon) {
                return;
            }

            target.jaeyoonRevivedOriginal = true;
            target.jaeyoonOriginalOwnerId = target.ownerId;
            target.jaeyoonOriginalIsSummon = target.isSummon;
            target.jaeyoonOriginalSummonType = target.summonType;
            target.jaeyoonOriginalSizeMultiplier = target.sizeMultiplier || 1;
            target.jaeyoonOriginalAttack = target.attack;
            target.jaeyoonOriginalMaxHp = target.maxHp;
            target.jaeyoonOriginalTeamId = target.teamId || null;
            target.jaeyoonOriginalStatsOwnerId = target.statsOwnerId || null;
            target.isSummon = true;
            target.ownerId = owner.id;
            target.statsOwnerId = owner.statsOwnerId || owner.id;
            target.teamId = owner.teamId || null;
            target.teamLabel = owner.teamLabel || (target.teamId ? TEAM_CONFIG[target.teamId]?.label || "" : "");
            target.summonType = "jaeyoon-revived";
            target.sizeMultiplier = owner.isBoss ? owner.definition.bossSummonSizeMultiplier || 1.5 : 1;
            target.jaeyoonDomainId = domain.id;
            target.jaeyoonDomainInside = true;
            target.jaeyoonDomainSummon = true;
            target.jaeyoonRevivedSkillUsed = false;
            scheduleJaeyoonRevivedSkill(target, performance.now(), { first: true });
            target.dead = false;
            const revivedHp = effects.revivedHp || 150;
            target.maxHp = revivedHp;
            target.hp = revivedHp;
            if ((target.definition.baseAttack || 0) <= 0) {
                target.attack = 15;
            }
            target.offMapUntil = 0;
            target.invulnerableUntil = 0;
            target.stunnedUntil = 0;
            target.savedVelocity = null;
            target.windmillMomentum = null;
            target.element.style.zIndex = "13";
            target.element.classList.remove("is-dead");
            target.element.classList.add("is-jaeyoon-revived");
            target.element.style.setProperty("--jaeyoon-revive-color", colorWithAlpha(owner.definition.color, 0.8));
            clearFighterActionState(target);
            placeFighterInJaeyoonDomain(target, domain, index, total);
            floatText("부활", target.x, target.y - fighterRadius(target), owner.definition.color);
        }

        function activateKimJaeyoonDomain(fighter, now) {
            if (!isKimJaeyoon(fighter) || fighter.dead || !battle.isRunning) {
                return;
            }

            const existingDomain = jaeyoonDomainForOwner(fighter);
            if (existingDomain) {
                collapseKimJaeyoonDomain(now, { domain: existingDomain, silent: true });
            }

            const effects = jaeyoonSkillEffects(fighter);
            const domain = {
                id: `jaeyoon-domain-${Math.round(now)}-${Math.floor(Math.random() * 10000)}`,
                ownerId: fighter.id,
                centerX: fighter.x,
                centerY: fighter.y,
                radius: bossAttackRange(fighter, (effects.radius || 150) * arenaScale()),
                endsAt: now + (effects.duration || 20) * 1000,
                enemyTargetIds: [],
                nextTargetIndex: 0,
                wraithDeathsSinceReplacement: 0,
                replacementSerial: 0,
                element: null
            };

            const trappedEnemies = jaeyoonDomainEnemiesFor(fighter, domain, { merged: false });
            const deadBalls = battle.fighters.filter((target) => target !== fighter && target.dead && !target.isSummon);
            if (trappedEnemies.length <= 0 && deadBalls.length <= 0) {
                domain.element = createJaeyoonDomainElement(domain, "is-failing");
                showJaeyoonScreenText("실패...", 900);
                battle.scenePauseUntil = Math.max(battle.scenePauseUntil, now + 900);
                setTimeout(() => domain.element?.remove(), 820);
                return;
            }
            domain.enemyTargetIds = trappedEnemies.map((target) => target.id);

            domain.element = createJaeyoonDomainElement(domain);
            if (!Array.isArray(battle.jaeyoonDomains)) {
                battle.jaeyoonDomains = [];
            }
            battle.jaeyoonDomains.push(domain);
            refreshLatestJaeyoonDomain();
            updateJaeyoonDomainMergeVisuals();
            refreshJaeyoonDomainInsideFlags();
            fighter.jaeyoonDomainInside = true;
            fighter.vx = 0;
            fighter.vy = 0;
            screenFlash("#000000");
            floatText("영역전개", fighter.x, fighter.y - battle.ballSize, fighter.definition.color);

            if (deadBalls.length > 0) {
                deadBalls.forEach((target, index) => {
                    reviveForJaeyoonDomain(fighter, target, domain, index, deadBalls.length);
                    target.jaeyoonAssignedTargetId = nextJaeyoonDomainTargetId(domain, fighter);
                });
            }

            const count = trappedEnemies.length * (effects.domainWraithsPerEnemy || 3);
            for (let index = 0; index < count; index += 1) {
                spawnJaeyoonWraith(fighter, now, {
                    domain,
                    ignoreLimit: true,
                    index,
                    total: count,
                    assignedTargetId: nextJaeyoonDomainTargetId(domain, fighter)
                });
            }
        }

        function startKimJaeyoonDomain(fighter, now) {
            if (!isKimJaeyoon(fighter) || fighter.dead) {
                return;
            }

            const effects = jaeyoonSkillEffects(fighter);
            const lineMs = Math.max(400, (effects.cinematicLineDuration || 1) * 1000);
            const sequenceId = (fighter.jaeyoonDomainSequence || 0) + 1;
            fighter.jaeyoonDomainSequence = sequenceId;
            battle.scenePauseUntil = Math.max(battle.scenePauseUntil, now + lineMs * 2);
            fighter.vx = 0;
            fighter.vy = 0;

            const overlay = document.createElement("div");
            overlay.className = "jaeyoon-domain-call";
            const label = document.createElement("div");
            label.className = "jaeyoon-domain-text";
            label.textContent = "영역 전개";
            overlay.appendChild(label);
            arena.appendChild(overlay);

            setTimeout(() => {
                if (fighter.jaeyoonDomainSequence === sequenceId && overlay.isConnected) {
                    label.textContent = "夜寮百鬼譚";
                }
            }, lineMs);

            setTimeout(() => {
                overlay.classList.add("is-closing");
                setTimeout(() => overlay.remove(), 260);
                const stillValid = battle.isRunning
                    && battle.fighters.includes(fighter)
                    && fighter.jaeyoonDomainSequence === sequenceId
                    && !fighter.dead;
                if (stillValid) {
                    activateKimJaeyoonDomain(fighter, performance.now());
                }
            }, lineMs * 2);
        }

        function collapseKimJaeyoonDomain(now = performance.now(), options = {}) {
            const domain = options.domain || jaeyoonDomainById(options.domainId) || battle.jaeyoonDomain;
            if (!domain) {
                return;
            }

            if (Array.isArray(battle.jaeyoonDomains)) {
                battle.jaeyoonDomains = battle.jaeyoonDomains.filter((item) => item && item.id !== domain.id);
            } else {
                battle.jaeyoonDomains = [];
            }
            refreshLatestJaeyoonDomain();
            if (domain.element?.isConnected) {
                domain.element.classList.add("is-collapsing");
                setTimeout(() => domain.element?.remove(), 760);
            }

            const owner = getFighterById(domain.ownerId);
            const exitingFighters = [...battle.fighters].filter((fighter) => (
                !fighter.dead
                && (
                    fighter.jaeyoonDomainId === domain.id
                    || fighter.id === domain.ownerId
                    || isInsideJaeyoonDomain(fighter, domain)
                )
            ));
            exitingFighters.forEach((fighter) => ejectFighterFromJaeyoonDomain(fighter, domain, now));
            battle.fighters.forEach((fighter) => {
                if (fighter.jaeyoonDomainId === domain.id) {
                    fighter.jaeyoonDomainId = null;
                    fighter.jaeyoonDomainSummon = false;
                    fighter.jaeyoonAssignedTargetId = null;
                    fighter.jaeyoonNextRevivedSkillAt = 0;
                }
            });
            refreshJaeyoonDomainInsideFlags();
            updateJaeyoonDomainMergeVisuals();

            if (!options.silent && owner && !owner.dead) {
                showJaeyoonScreenText("영역 붕괴", 900);
            }
        }

        function updateKimJaeyoonDomain(now) {
            const domains = [...activeJaeyoonDomains()];
            if (domains.length <= 0) {
                return;
            }

            domains.forEach((domain) => {
                const owner = getFighterById(domain.ownerId);
                if (!owner || owner.dead || now >= domain.endsAt) {
                    collapseKimJaeyoonDomain(now, { domain });
                }
            });
        }

        function enforceJaeyoonDomainWall(fighter) {
            const domains = activeJaeyoonDomains();
            if (domains.length <= 0 || !fighter || fighter.dead) {
                return;
            }

            const ownedDomain = isKimJaeyoon(fighter) ? jaeyoonDomainForOwner(fighter) : null;
            if (ownedDomain) {
                fighter.x = ownedDomain.centerX;
                fighter.y = ownedDomain.centerY;
                fighter.vx = 0;
                fighter.vy = 0;
                fighter.windmillMomentum = null;
                fighter.jaeyoonDomainInside = true;
                return;
            }

            const radius = fighterRadius(fighter);
            const allowedDomains = jaeyoonAllowedDomainClusterForFighter(fighter);
            const centerInsideDomain = (domain) => {
                const maxDistance = Math.max(0, domain.radius - radius);
                return Math.hypot(fighter.x - domain.centerX, fighter.y - domain.centerY) <= maxDistance;
            };

            if (allowedDomains.length > 0) {
                if (allowedDomains.some(centerInsideDomain)) {
                    fighter.jaeyoonDomainInside = true;
                    return;
                }

                const domain = allowedDomains
                    .slice()
                    .sort((a, b) => {
                        const da = Math.abs(Math.hypot(fighter.x - a.centerX, fighter.y - a.centerY) - Math.max(0, a.radius - radius));
                        const db = Math.abs(Math.hypot(fighter.x - b.centerX, fighter.y - b.centerY) - Math.max(0, b.radius - radius));
                        return da - db;
                    })[0];
                const dx = fighter.x - domain.centerX;
                const dy = fighter.y - domain.centerY;
                const distance = Math.hypot(dx, dy) || 1;
                const nx = dx / distance;
                const ny = dy / distance;
                const maxDistance = Math.max(0, domain.radius - radius);
                if (distance > maxDistance) {
                    fighter.x = domain.centerX + nx * maxDistance;
                    fighter.y = domain.centerY + ny * maxDistance;
                    const outward = fighter.vx * nx + fighter.vy * ny;
                    if (outward > 0) {
                        fighter.vx -= outward * 1.8 * nx;
                        fighter.vy -= outward * 1.8 * ny;
                    }
                }
                fighter.jaeyoonDomainInside = true;
                return;
            }

            let pushed = false;
            for (let attempt = 0; attempt < 6; attempt += 1) {
                const containing = domains.filter((domain) => isInsideJaeyoonDomain(fighter, domain));
                if (containing.length <= 0) {
                    break;
                }

                let pushX = 0;
                let pushY = 0;
                let strongest = containing[0];
                let strongestOverlap = -Infinity;
                containing.forEach((domain) => {
                    const dx = fighter.x - domain.centerX;
                    const dy = fighter.y - domain.centerY;
                    const distance = Math.hypot(dx, dy) || 1;
                    const overlap = domain.radius + radius - distance + 1;
                    if (overlap > strongestOverlap) {
                        strongestOverlap = overlap;
                        strongest = domain;
                    }
                    pushX += (dx / distance) * overlap;
                    pushY += (dy / distance) * overlap;
                });

                let direction = normalize(pushX, pushY);
                if (Math.hypot(direction.x, direction.y) <= 0.001) {
                    direction = normalize(fighter.x - strongest.centerX, fighter.y - strongest.centerY);
                }
                if (Math.hypot(direction.x, direction.y) <= 0.001) {
                    direction = { x: 1, y: 0 };
                }
                const distance = Math.max(1, strongestOverlap);
                fighter.x += direction.x * distance;
                fighter.y += direction.y * distance;
                const inward = fighter.vx * direction.x + fighter.vy * direction.y;
                if (inward < 0) {
                    fighter.vx -= inward * 1.8 * direction.x;
                    fighter.vy -= inward * 1.8 * direction.y;
                }
                pushed = true;
            }

            if (pushed) {
                fighter.jaeyoonDomainInside = false;
            }
        }

        function nearestJaeyoonDomainEnemy(owner, domain) {
            return jaeyoonDomainEnemiesFor(owner, domain)
                .sort((a, b) => Math.hypot(a.x - owner.x, a.y - owner.y) - Math.hypot(b.x - owner.x, b.y - owner.y))[0] || null;
        }

        function steerJaeyoonSummonToward(fighter, target, owner, now) {
            const effects = jaeyoonSkillEffects(owner);
            const correction = Math.max(0.04, Math.min(0.75, effects.summonSteerCorrection ?? 0.24));
            const jitter = Math.max(0, Math.min(0.5, effects.summonSteerJitter ?? 0.16));
            const desired = normalize(target.x - fighter.x, target.y - fighter.y);
            const currentSpeed = Math.hypot(fighter.vx, fighter.vy);
            const current = currentSpeed > 1
                ? normalize(fighter.vx, fighter.vy)
                : normalize(Math.random() - 0.5, Math.random() - 0.5);
            const side = Math.random() < 0.5 ? -1 : 1;
            const wobble = (Math.random() - 0.5) * jitter;
            const blended = normalize(
                current.x * (1 - correction) + desired.x * correction + (-desired.y * side) * wobble,
                current.y * (1 - correction) + desired.y * correction + (desired.x * side) * wobble
            );
            setVelocityDirection(fighter, blended.x, blended.y, moveSpeedOf(fighter, now));
        }

        function updateJaeyoonSummonAI(fighter, now) {
            if (!fighter.isSummon || !fighter.ownerId || fighter.dead) {
                return false;
            }
            if (fighter.summonType !== "jaeyoon-wraith" && !fighter.jaeyoonDomainId) {
                return false;
            }

            const owner = getFighterById(fighter.ownerId);
            if (!owner || owner.dead) {
                return false;
            }
            if (fighter.summonType === "jaeyoon-wraith" && isPassiveEffectForbidden(fighter, now)) {
                fighter.vx = 0;
                fighter.vy = 0;
                fighter.windmillMomentum = null;
                return true;
            }

            let targets = livingEnemiesOf(fighter);
            const domain = jaeyoonDomainById(fighter.jaeyoonDomainId) || jaeyoonDomainForOwner(owner);
            if (fighter.summonType === "jaeyoon-wraith") {
                const isDomainWraith = Boolean(
                    domain
                    && domain.ownerId === fighter.ownerId
                    && fighter.jaeyoonDomainInside
                    && isInsideJaeyoonDomainCluster(fighter, domain)
                );
                if (!isDomainWraith) {
                    return false;
                }
                targets = targets.filter((target) => isInsideJaeyoonDomainCluster(target, domain));
            } else if (domain && fighter.jaeyoonDomainId === domain.id) {
                targets = targets.filter((target) => isInsideJaeyoonDomainCluster(target, domain));
            }
            let target = null;
            if (domain && fighter.jaeyoonDomainId === domain.id) {
                const assigned = getFighterById(fighter.jaeyoonAssignedTargetId);
                target = assigned && targets.includes(assigned) ? assigned : null;
                if (!target) {
                    fighter.jaeyoonAssignedTargetId = nextJaeyoonDomainTargetId(domain, owner);
                    const nextAssigned = getFighterById(fighter.jaeyoonAssignedTargetId);
                    target = nextAssigned && targets.includes(nextAssigned) ? nextAssigned : null;
                }
            } else {
                target = targets
                    .sort((a, b) => Math.hypot(a.x - fighter.x, a.y - fighter.y) - Math.hypot(b.x - fighter.x, b.y - fighter.y))[0] || null;
            }
            if (!target) {
                return false;
            }

            steerJaeyoonSummonToward(fighter, target, owner, now);
            return true;
        }

        function updateKimJaeyoonOwnerFlee(fighter, now) {
            const domain = jaeyoonDomainForOwner(fighter);
            if (!isKimJaeyoon(fighter) || !domain || fighter.dead) {
                return false;
            }

            fighter.x = domain.centerX;
            fighter.y = domain.centerY;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            return true;
        }

        function isLeeDohyun(fighter) {
            return Boolean(fighter && fighter.definition.id === "lee-dohyun");
        }

        function leeDohyunPassiveEffects(fighter) {
            return fighter.definition.passive?.effects || {};
        }

        function leeDohyunSkillEffects(fighter) {
            return fighter.definition.skill?.effects || {};
        }

        function leeDohyunRootId(fighter) {
            if (!isLeeDohyun(fighter)) {
                return null;
            }
            return fighter.summonType === "lee-dohyun-clone" ? fighter.ownerId : fighter.id;
        }

        function leeDohyunGroupMembers(fighter, options = {}) {
            const rootId = leeDohyunRootId(fighter);
            if (!rootId) {
                return [];
            }
            return battle.fighters.filter((member) => (
                isLeeDohyun(member)
                && !member.dead
                && member.offMapUntil <= performance.now()
                && leeDohyunRootId(member) === rootId
                && (!options.clonesOnly || member.summonType === "lee-dohyun-clone")
            ));
        }

        function isLeeDohyunLineDashing(fighter) {
            return Boolean(fighter?.leeDohyunLineDash);
        }

        function isLeeDohyunFouled(fighter) {
            return Boolean(fighter?.leeDohyunFoulActive && !fighter.dead);
        }

        function isLeeDohyunOffsideBusy(fighter) {
            return Boolean(fighter?.leeDohyunOffsideSkill && !fighter.dead);
        }

        function isLeeDohyunOffsideRushing(fighter) {
            return Boolean(fighter?.leeDohyunOffsideSkill?.phase === "rush" && !fighter.dead);
        }

        function clearLeeDohyunFoul(target, options = {}) {
            if (!target?.leeDohyunFoulActive) {
                return;
            }

            target.leeDohyunFoulActive = false;
            target.leeDohyunFouledById = null;
            target.element.classList.remove("is-lee-dohyun-fouled");
            const saved = target.leeDohyunFoulSavedVelocity;
            target.leeDohyunFoulSavedVelocity = null;
            if (!target.dead && saved && Math.hypot(saved.vx || 0, saved.vy || 0) > 4) {
                target.vx = saved.vx;
                target.vy = saved.vy;
                setVelocitySpeed(target, moveSpeedOf(target, performance.now()));
            }
            if (!options.silent && !target.dead) {
                floatText("해제", target.x, target.y - fighterRadius(target), target.definition.color);
            }
        }

        function clearAllLeeDohyunFouls(options = {}) {
            battle.fighters.forEach((fighter) => clearLeeDohyunFoul(fighter, options));
        }

        function applyLeeDohyunFoul(source, target, now, lineY) {
            if (!isLeeDohyun(source) || !target || target.dead || target.offMapUntil > now || source === target || areAllies(source, target)) {
                return false;
            }
            if (tryKwonSoonbeomShieldBlock(target, 0, source, "status", {}, now)) {
                return false;
            }

            target.leeDohyunFoulActive = true;
            target.leeDohyunFouledById = source.id;
            target.leeDohyunFoulLineY = lineY;
            target.leeDohyunFoulSavedVelocity = { vx: target.vx, vy: target.vy };
            target.vx = 0;
            target.vy = 0;
            target.windmillMomentum = null;
            target.element.classList.add("is-lee-dohyun-fouled");
            floatText("반칙", target.x, target.y - fighterRadius(target), source.definition.color);
            effectRing(target.x, target.y, battle.ballSize * 1.08, source.definition.color);
            return true;
        }

        function createLeeDohyunOffsideLine(fighter, effects, lineY) {
            const line = document.createElement("div");
            const drawMs = Math.max(120, (effects.lineDrawDuration || 1) * 1000);
            const span = Math.max(fighter.x, battle.arenaSize - fighter.x) * 2 + battle.ballSize;
            line.className = "lee-dohyun-offside-line";
            line.style.left = `${fighter.x}px`;
            line.style.top = `${lineY}px`;
            line.style.width = "0px";
            line.style.transitionDuration = `${drawMs}ms, 260ms`;
            arena.appendChild(line);
            line.offsetWidth;
            line.style.width = `${span}px`;
            return line;
        }

        function startLeeDohyunOffside(fighter, now) {
            if (!isLeeDohyun(fighter) || fighter.dead || (fighter.isSummon && !fighter.jaeyoonRevivedOriginal) || fighter.leeDohyunOffsideSkill) {
                return false;
            }

            const effects = leeDohyunSkillEffects(fighter);
            const drawMs = Math.max(120, (effects.lineDrawDuration || 1) * 1000);
            const lineY = fighter.y;
            const line = createLeeDohyunOffsideLine(fighter, effects, lineY);
            fighter.leeDohyunOffsideSkill = {
                phase: "draw",
                lineY,
                startedAt: now,
                releaseAt: now + drawMs,
                targetIds: [],
                targetIndex: 0,
                lineElement: line,
                damage: effects.dashDamage || 120,
                speed: effects.dashSpeed || 1000,
                healPerTarget: effects.healPerTarget || 20,
                afterimageInterval: scaledAfterimageInterval((effects.afterimageInterval || 0.045) * 1000) / 1000,
                afterimageLifetime: effects.afterimageLifetime || 420
            };
            fighter.leeDohyunOffsideNextAfterimageAt = 0;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            floatText("오프사이드", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function finishLeeDohyunOffside(fighter) {
            const skill = fighter?.leeDohyunOffsideSkill;
            if (!skill) {
                return;
            }

            const line = skill.lineElement;
            if (line?.isConnected) {
                line.classList.add("is-fading");
                setTimeout(() => line.remove(), 260);
            }
            fighter.leeDohyunOffsideSkill = null;
            fighter.leeDohyunOffsideNextAfterimageAt = 0;
            fighter.element.classList.remove("is-lee-dohyun-offside-rushing");
        }

        function collectLeeDohyunOffsideTargets(fighter, skill, now) {
            return livingEnemiesOf(fighter)
                .filter((target) => target.offMapUntil <= now && target.y < skill.lineY)
                .sort((a, b) => a.x - b.x);
        }

        function nextLeeDohyunOffsideTarget(fighter, skill, now) {
            while (skill.targetIndex < skill.targetIds.length) {
                const target = getFighterById(skill.targetIds[skill.targetIndex]);
                if (target && !target.dead && target.offMapUntil <= now && !areAllies(fighter, target)) {
                    return target;
                }
                skill.targetIndex += 1;
            }
            return null;
        }

        function updateLeeDohyunOffsideSkill(fighter, dt, now) {
            const skill = fighter.leeDohyunOffsideSkill;
            if (!skill || fighter.dead) {
                return false;
            }

            fighter.windmillMomentum = null;
            if (skill.phase === "draw") {
                fighter.vx = 0;
                fighter.vy = 0;
                if (now < skill.releaseAt) {
                    return true;
                }

                const targets = collectLeeDohyunOffsideTargets(fighter, skill, now);
                targets.forEach((target) => applyLeeDohyunFoul(fighter, target, now, skill.lineY));
                skill.targetIds = targets.map((target) => target.id);
                skill.targetIndex = 0;
                if (!skill.targetIds.length) {
                    floatText("노 파울", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
                    finishLeeDohyunOffside(fighter);
                    return false;
                }
                skill.phase = "rush";
                fighter.element.classList.add("is-lee-dohyun-offside-rushing");
            }

            const target = nextLeeDohyunOffsideTarget(fighter, skill, now);
            if (!target) {
                finishLeeDohyunOffside(fighter);
                return false;
            }

            if (!fighter.leeDohyunOffsideNextAfterimageAt || now >= fighter.leeDohyunOffsideNextAfterimageAt) {
                createAfterimage(fighter, {
                    opacity: 0.5,
                    scale: 0.95,
                    lifetime: skill.afterimageLifetime
                });
                fighter.leeDohyunOffsideNextAfterimageAt = now + skill.afterimageInterval * 1000;
            }

            const direction = normalize(target.x - fighter.x, target.y - fighter.y);
            const speed = scaledSpeed(skill.speed);
            fighter.vx = direction.x * speed;
            fighter.vy = direction.y * speed;
            fighter.x += fighter.vx * dt;
            fighter.y += fighter.vy * dt;
            handleWallBounce(fighter);
            enforceJaeyoonDomainWall(fighter);

            if (Math.hypot(target.x - fighter.x, target.y - fighter.y) <= fighterRadius(fighter) + fighterRadius(target) * 0.9) {
                const dealt = applyDamage(target, skill.damage, fighter, "skill", {
                    unavoidable: true,
                    ignoreLeeDribble: true,
                    skipLeeDohyunLineTrigger: true
                });
                if (dealt > 0 && skill.healPerTarget > 0 && fighter.hp < fighter.maxHp) {
                    healFighter(fighter, skill.healPerTarget, fighter, {
                        offsetY: fighterRadius(fighter),
                        color: "#006d36"
                    });
                }
                impactStar(target.x, target.y, fighter.definition.color);
                burst(target.x, target.y, fighter.definition.color, 7);
                effectRing(target.x, target.y, battle.ballSize * 1.25, fighter.definition.color);
                skill.targetIndex += 1;
                fighter.vx = 0;
                fighter.vy = 0;
            }
            return true;
        }

        function reduceLeeDohyunCooldownOnCollision(fighter, now) {
            if (!isLeeDohyun(fighter) || fighter.dead || fighter.isSummon) {
                return;
            }

            const reduction = leeDohyunPassiveEffects(fighter).collisionCooldownReduction || 0;
            if (reduction <= 0 || !Number.isFinite(fighter.skillCooldown) || fighter.skillCooldown <= 0) {
                return;
            }

            const before = fighter.skillCooldown;
            fighter.skillCooldown = Math.max(0, fighter.skillCooldown - reduction);
            if (fighter.skillCooldown < before) {
                floatText(`CD -${reduction}`, fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
                effectRing(fighter.x, fighter.y, battle.ballSize * 0.95, fighter.definition.color);
            }
        }

        function handleLeeDohyunCollisionCooldown(a, b, now) {
            if (areAllies(a, b)) {
                return;
            }

            if (!isProtestTargeted(a, now)) {
                reduceLeeDohyunCooldownOnCollision(a, now);
            }
            if (!isProtestTargeted(b, now)) {
                reduceLeeDohyunCooldownOnCollision(b, now);
            }
        }

        function absorbLeeDohyunClone(clone, now = performance.now(), options = {}) {
            if (!clone || clone.summonType !== "lee-dohyun-clone") {
                return;
            }

            const owner = getFighterById(clone.ownerId);
            if (owner && !owner.dead && isLeeDohyun(owner) && owner.hp < clone.hp) {
                const healed = healFighter(owner, Math.min(owner.maxHp, clone.hp) - owner.hp, owner, {
                    offsetY: battle.ballSize / 2,
                    color: owner.definition.color
                });
                if (healed > 0) {
                    floatText("흡수", owner.x, owner.y - battle.ballSize, owner.definition.color);
                    effectRing(owner.x, owner.y, battle.ballSize * 1.25, owner.definition.color);
                }
            }

            clone.dead = true;
            clone.leeDohyunLineDash = null;
            clone.element.classList.add("is-dead");
            clone.element.classList.remove("is-lee-dohyun-line-dashing");
            if (!options.silent) {
                createAfterimage(clone, { opacity: 0.42, scale: 0.98, lifetime: 520 });
                floatText("흡수", clone.x, clone.y - fighterRadius(clone), clone.definition.color);
            }

        function spawnLeeDohyunClone(owner, now) {

        function startLeeDohyunLineDash(runner, target, now) {

        function triggerLeeDohyunLinePassive(source, target, actual, now, kind, options = {}) {

                .filter((runner) => runner !== source)

        function updateLeeDohyunCloneLifetime(fighter, now) {
            if (!isLeeDohyun(fighter) || fighter.summonType !== "lee-dohyun-clone" || fighter.dead) {
                return false;

            const owner = getFighterById(fighter.ownerId);

        function updateLeeDohyunLineDash(fighter, dt, now) {
            const dash = fighter.leeDohyunLineDash;
            if (!dash || fighter.dead) {
                return false;
            }
            if (isPassiveEffectForbidden(fighter, now)) {
                fighter.leeDohyunLineDash = null;
                fighter.element.classList.remove("is-lee-dohyun-line-dashing");
                return false;
            }

            const target = getFighterById(dash.targetId);
            if (!target || target.dead || target.offMapUntil > now || now >= dash.expiresAt) {
                fighter.leeDohyunLineDash = null;
                fighter.element.classList.remove("is-lee-dohyun-line-dashing");
                return false;
            }

            if (!fighter.leeDohyunLineNextAfterimageAt || now >= fighter.leeDohyunLineNextAfterimageAt) {
                const effects = leeDohyunPassiveEffects(fighter);
                createAfterimage(fighter, {
                    opacity: 0.48,
                    scale: 0.95,
                    lifetime: effects.afterimageLifetime || 420
                });
                fighter.leeDohyunLineNextAfterimageAt = now + scaledAfterimageInterval((effects.afterimageInterval || 0.045) * 1000);
            }

            const direction = normalize(target.x - fighter.x, target.y - fighter.y);
            fighter.vx = direction.x * scaledSpeed(dash.speed);
            fighter.vy = direction.y * scaledSpeed(dash.speed);
            fighter.x += fighter.vx * dt;
            fighter.y += fighter.vy * dt;
            handleWallBounce(fighter);
            enforceJaeyoonDomainWall(fighter);

            if (Math.hypot(target.x - fighter.x, target.y - fighter.y) <= fighterRadius(fighter) + fighterRadius(target) * 0.85) {
                applyDamage(target, dash.damage, fighter, "passive", {
                    unavoidable: true,
                    skipLeeDohyunLineTrigger: true
                });
                impactStar(target.x, target.y, fighter.definition.color);
                burst(target.x, target.y, fighter.definition.color, 7);
                effectRing(target.x, target.y, battle.ballSize * 1.25, fighter.definition.color);
                const effects = leeDohyunPassiveEffects(fighter);
                fighter.invulnerableUntil = now + (effects.invulnerableAfterHit || 0.2) * 1000;
                fighter.leeDohyunLineDash = null;

        function reduceCooldown(fighter, seconds, options = {}) {
            if (!Number.isFinite(seconds) || seconds <= 0 || fighter.dead) {

            if (!options.ignoreControlLock && isControlLocked(fighter, performance.now())) {
                return;
            }
            if (
                isProtestLeaderGuMinchan(fighter)
                && isProtestSkillActiveFor(fighter, performance.now())
                && !options.protestPassive
            ) {
                return;
            }

            if (!Number.isFinite(fighter.skillCooldown)) {
                fighter.skillCooldown = skillCooldownDuration(fighter);

            fighter.skillCooldown = Math.max(0, fighter.skillCooldown - seconds);
