            target.kimDonggyuBleedNextTickAt = now + 500;
            target.kimDonggyuBleedNextEffectAt = 0;
            target.kimDonggyuBleedTickDamage = (projectile.bleedDamage || 100) / ticks;
            target.kimDonggyuBleedSourceId = source.id;
            target.element.classList.add("is-kim-donggyu-bleeding");
            floatText("출혈", target.x, target.y - fighterRadius(target), source.definition.color);
        }

        function clearKimDonggyuBleed(target) {
            if (!target) {
                return;
            }
            target.kimDonggyuBleedUntil = 0;
            target.kimDonggyuBleedNextTickAt = 0;
            target.kimDonggyuBleedNextEffectAt = 0;
            target.kimDonggyuBleedTickDamage = 0;
            target.kimDonggyuBleedSourceId = null;
            target.element?.classList.remove("is-kim-donggyu-bleeding");
        }

        function updateKimDonggyuBleed(target, now) {
            if (!target.kimDonggyuBleedUntil) {
                return;
            }
            if (target.dead || now >= target.kimDonggyuBleedUntil) {
                clearKimDonggyuBleed(target);
                return;
            }
            if (!target.kimDonggyuBleedNextEffectAt || now >= target.kimDonggyuBleedNextEffectAt) {
                effectRing(target.x, target.y, battle.ballSize * 0.82, "#dc2626");
                target.kimDonggyuBleedNextEffectAt = now + 360;
            }
            if (target.kimDonggyuBleedNextTickAt && now >= target.kimDonggyuBleedNextTickAt) {
                const source = getFighterById(target.kimDonggyuBleedSourceId) || null;
                applyDamage(target, target.kimDonggyuBleedTickDamage || 1, source, "passive");
                target.kimDonggyuBleedNextTickAt += 500;
            }
        }

        function updateKimDonggyuProjectiles(dt, now) {
            [...battle.activeKimDonggyuProjectiles].forEach((projectile) => {
                const source = getFighterById(projectile.sourceId);
                if (!source || source.dead || !projectile.element?.isConnected) {
                    removeKimDonggyuProjectile(projectile);
                    return;
                }

                projectile.x += projectile.vx * dt;
                projectile.y += projectile.vy * dt;
                const travelled = Math.hypot(projectile.x - projectile.startX, projectile.y - projectile.startY);
                projectile.element.style.left = `${projectile.x}px`;
                projectile.element.style.top = `${projectile.y}px`;
                projectile.element.style.transform = `translate(-50%, -50%) rotate(${projectile.rotation}rad)`;

                const hitWall = projectile.x < 0 || projectile.x > battle.arenaSize || projectile.y < 0 || projectile.y > battle.arenaSize;
                if (hitWall || travelled >= projectile.maxDistance) {
                    if (projectile.type === "grenade") {
                        explodeKimDonggyuGrenade(projectile, now);
                    } else {
                        removeKimDonggyuProjectile(projectile);
                    }
                    return;
                }

                for (const target of livingEnemiesOf(source)) {
                    if (Math.hypot(target.x - projectile.x, target.y - projectile.y) > fighterRadius(target) + projectile.size * 0.45) {
                        continue;
                    }

                    if (projectile.type === "grenade") {
                        explodeKimDonggyuGrenade(projectile, now);
                    } else if (projectile.type === "knife") {
                        applyKimDonggyuKnifeBleed(source, target, now, projectile);
                        impactStar(target.x, target.y, source.definition.color);
                        removeKimDonggyuProjectile(projectile);
                    } else {
                        applyDamage(target, projectile.damage, source, "skill");
                        impactStar(target.x, target.y, source.definition.color);
                        removeKimDonggyuProjectile(projectile);
                    }
                    return;
                }
            });
        }

        function throwKimDonggyuGrenade(fighter, now) {
            const effects = kimDonggyuSkillEffects(fighter);
            const direction = aimDirectionFor(fighter);
            createKimDonggyuProjectile(fighter, "grenade", {
                direction,
                speed: effects.grenadeSpeed || 300,
                damage: effects.grenadeDamage || 80,
                explosionRadius: (effects.grenadeExplosionDiameter || 150) / 2,
                size: fighterSize(fighter) * (effects.grenadeSizeMultiplier || 0.5),
                imageSrc: effects.grenadeImageSrc,
                imageFallbackSrcs: effects.grenadeImageFallbackSrcs
            });
            floatText("수류탄", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
        }

        function fireKimDonggyuBullet(fighter, options = {}) {
            const target = options.target || nearestEnemy(fighter);
            const direction = aimDirectionFor(fighter, target);
            createKimDonggyuProjectile(fighter, options.type || "bullet", {
                direction,
                speed: options.speed || 400,
                damage: options.damage || 10,
                size: options.size || battle.ballSize * 0.18,
                maxDistance: options.maxDistance || Infinity,
                rotation: Math.atan2(direction.y, direction.x)
            });
        }

        function startKimDonggyuAr(fighter, now) {
            const effects = kimDonggyuSkillEffects(fighter);
            fighter.kimDonggyuArShotsRemaining = effects.arShots || 20;
            fighter.kimDonggyuArShotInterval = ((effects.arDuration || 2) * 1000) / Math.max(1, fighter.kimDonggyuArShotsRemaining);
            fighter.kimDonggyuNextArShotAt = now;
            floatText("AR", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
        }

        function updateKimDonggyuAr(fighter, now) {
            if (!isKimDonggyu(fighter) || fighter.dead || fighter.kimDonggyuArShotsRemaining <= 0 || fighter.kimDonggyuNextArShotAt > now) {
                return;
            }
            const effects = kimDonggyuSkillEffects(fighter);
            let fired = 0;
            while (fighter.kimDonggyuArShotsRemaining > 0 && fighter.kimDonggyuNextArShotAt <= now && fired < 3) {
                fireKimDonggyuBullet(fighter, {
                    type: "bullet",
                    speed: effects.arBulletSpeed || 2000,
                    damage: effects.arBulletDamage || 5,
                    size: battle.ballSize * 0.18
                });
                fighter.kimDonggyuArShotsRemaining -= 1;
                fighter.kimDonggyuNextArShotAt += fighter.kimDonggyuArShotInterval || 500;
                fired += 1;
            }
        }

        function fireKimDonggyuShotgun(fighter, now) {
            const effects = kimDonggyuSkillEffects(fighter);
            const target = nearestEnemy(fighter);
            const baseDirection = aimDirectionFor(fighter, target);
            const pelletCount = effects.shotgunPellets || 5;
            const spread = effects.shotgunSpreadRadians || 0.72;
            for (let index = 0; index < pelletCount; index += 1) {
                const ratio = pelletCount === 1 ? 0.5 : index / (pelletCount - 1);
                const angle = (ratio - 0.5) * spread;
                const direction = rotateVector(baseDirection.x, baseDirection.y, angle);
                createKimDonggyuProjectile(fighter, "bullet", {
                    direction,
                    speed: effects.shotgunSpeed || 2000,
                    damage: effects.shotgunDamage || 20,
                    size: battle.ballSize * 0.18,
                    maxDistance: effects.shotgunRange || 200,
                    rotation: Math.atan2(direction.y, direction.x)
                });
            }
            floatText("12 gauge", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
        }

        function startKimDonggyuSrAim(fighter, now) {
            const target = farthestKimDonggyuSrEnemy(fighter, now);
            if (!target) {
                floatText("대상 없음", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
                return false;
            }

            const effects = kimDonggyuSkillEffects(fighter);
            fighter.kimDonggyuAim = {
                targetId: target.id,
                releaseAt: now + (effects.srAimDuration || 1.5) * 1000,
                nextAuraAt: 0
            };
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            floatText("SR 조준", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function updateKimDonggyuTargeting(fighter, target) {
            if (!fighter.kimDonggyuTargetingElement || !fighter.kimDonggyuTargetingElement.isConnected) {
                const marker = document.createElement("div");
                marker.className = "kim-donggyu-targeting";
                marker.innerHTML = `<span class="target-dot"></span>`;
                arena.appendChild(marker);
                fighter.kimDonggyuTargetingElement = marker;
            }
            const size = fighterSize(target) * 1.18;
            fighter.kimDonggyuTargetingElement.style.left = `${target.x}px`;
            fighter.kimDonggyuTargetingElement.style.top = `${target.y + fighterRadius(target) * 0.34}px`;
            fighter.kimDonggyuTargetingElement.style.width = `${size}px`;
            fighter.kimDonggyuTargetingElement.style.height = `${size}px`;
        }

        function updateKimDonggyuAimLine(fighter, target) {
            if (!fighter.kimDonggyuAimLineElement || !fighter.kimDonggyuAimLineElement.isConnected) {
                const line = document.createElement("div");
                line.className = "kim-donggyu-aim-line";
                arena.appendChild(line);
                fighter.kimDonggyuAimLineElement = line;
            }

            const startX = fighter.x;
            const startY = fighter.y;
            const dx = target.x - startX;
            const dy = target.y - startY;
            const length = Math.max(1, Math.hypot(dx, dy));
            fighter.kimDonggyuAimLineElement.style.left = `${startX}px`;
            fighter.kimDonggyuAimLineElement.style.top = `${startY}px`;
            fighter.kimDonggyuAimLineElement.style.width = `${length}px`;
            fighter.kimDonggyuAimLineElement.style.transform = `translate(0, -50%) rotate(${Math.atan2(dy, dx)}rad)`;
        }

        function interruptKimDonggyuAim(fighter, interrupter, now) {
            if (!isKimDonggyuAiming(fighter)) {
                return false;
            }
            clearKimDonggyuAim(fighter);
            if (!interrupter || interrupter.dead || areAllies(fighter, interrupter)) {
                return true;
            }

            const effects = kimDonggyuSkillEffects(fighter);
            const direction = aimDirectionFor(fighter, interrupter);
            createKimDonggyuProjectile(fighter, "knife", {
                direction,
                speed: effects.knifeSpeed || 300,
                size: battle.ballSize * 0.48,
                imageSrc: effects.knifeImageSrc,
                imageFallbackSrcs: effects.knifeImageFallbackSrcs,
                bleedDamage: effects.knifeBleedDamage || 100,
                bleedDuration: effects.knifeBleedDuration || 3,
                rotation: Math.atan2(direction.y, direction.x)
            });
            floatText("칼 투척", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function updateKimDonggyuAim(fighter, now) {
            if (!isKimDonggyuAiming(fighter)) {
                return false;
            }
            const aim = fighter.kimDonggyuAim;
            const target = getFighterById(aim.targetId);
            if (!isKimDonggyuSrTargetable(target, now)) {
                clearKimDonggyuAim(fighter);
                return false;
            }

            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            updateKimDonggyuTargeting(fighter, target);
            updateKimDonggyuAimLine(fighter, target);
            if (!aim.nextAuraAt || now >= aim.nextAuraAt) {
                effectRing(fighter.x, fighter.y, battle.ballSize * 1.16, fighter.definition.color);
                aim.nextAuraAt = now + 300;
            }
            if (now < aim.releaseAt) {
                return true;
            }

            const effects = kimDonggyuSkillEffects(fighter);
            clearKimDonggyuAim(fighter);
            applyDamage(target, effects.srDamage || 400, fighter, "skill", { unavoidable: true });
            impactStar(target.x, target.y, fighter.definition.color);
            burst(target.x, target.y, fighter.definition.color, 12);
            effectRing(target.x, target.y, battle.ballSize * 1.5, fighter.definition.color);
            floatText("SR", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function startKimDonggyuSelfRevive(fighter, now) {
            if (!isKimDonggyu(fighter) || fighter.kimDonggyuSelfReviveUsed) {
                return false;
            }

            const effects = kimDonggyuPassiveEffects(fighter);
            fighter.kimDonggyuSelfReviveUsed = true;
            fighter.kimDonggyuDefibUntil = now + (effects.selfReviveDuration || 3) * 1000;
            fighter.kimDonggyuDefibTempHp = effects.selfReviveTempHp || 100;
            fighter.hp = 1;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            clearKimDonggyuAim(fighter, { silent: true });
            floatText("자가제세동", fighter.x, fighter.y - fighterRadius(fighter), "#6b7280");
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.32, "#6b7280");
            return true;
        }

        function finishKimDonggyuSelfRevive(fighter, now) {
            const effects = kimDonggyuPassiveEffects(fighter);
            fighter.kimDonggyuDefibUntil = 0;
            fighter.kimDonggyuDefibTempHp = 0;
            fighter.hp = Math.min(fighter.maxHp, effects.selfReviveHp || 200);
            fighter.vx = 0;
            fighter.vy = 0;
            floatText("부활", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.45, "#22c55e");
        }

        function failKimDonggyuSelfRevive(fighter, now, source = null) {
            fighter.kimDonggyuDefibUntil = 0;
            fighter.kimDonggyuDefibTempHp = 0;
            fighter.hp = 0;
            floatText("제세동 실패", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            defeatFighter(fighter, now, source);
        }

        function damageKimDonggyuDefib(target, amount, source, now, options = {}) {
            const damage = applyKimDonggyuCritical(source, amount, target, now, options);
            const actual = Math.min(target.kimDonggyuDefibTempHp || 0, damage);
            target.kimDonggyuDefibTempHp -= actual;
            if (!options.silent) {
                floatText(`임시HP -${Math.round(actual)}`, target.x, target.y - fighterRadius(target), "#6b7280");
                impactStar(target.x, target.y, source ? source.definition.color : "#ba1a1a");
            }
            if (target.kimDonggyuDefibTempHp <= 0) {
                failKimDonggyuSelfRevive(target, now, source);
            }
            return actual;
        }

        function updateKimDonggyuState(fighter, now) {
            if (!isKimDonggyu(fighter) || fighter.dead) {
                return false;
            }
            updateKimDonggyuAr(fighter, now);
            if (isKimDonggyuDefibing(fighter, now)) {
                fighter.vx = 0;
                fighter.vy = 0;
                fighter.windmillMomentum = null;
                if (now >= fighter.kimDonggyuDefibUntil) {
                    finishKimDonggyuSelfRevive(fighter, now);
                    return false;
                }
                return true;
            }
            if (fighter.kimDonggyuDefibUntil && now >= fighter.kimDonggyuDefibUntil) {
                finishKimDonggyuSelfRevive(fighter, now);
                return false;
            }
            return updateKimDonggyuAim(fighter, now);
        }

        function useKimDonggyuSkill(fighter, now) {
            if (!isKimDonggyu(fighter) || fighter.dead || isKimDonggyuDefibing(fighter, now)) {
                return false;
            }

            const modes = kimDonggyuModes(fighter);
            const modeIndex = (fighter.kimDonggyuModeIndex || 0) % modes.length;
            const mode = modes[modeIndex];
            fighter.kimDonggyuModeIndex = (modeIndex + 1) % modes.length;

            if (mode === "수류탄") {
                throwKimDonggyuGrenade(fighter, now);
                return true;
            }
            if (mode === "AR") {
                startKimDonggyuAr(fighter, now);
                return true;
            }
            if (mode === "12 gauge") {
                fireKimDonggyuShotgun(fighter, now);
                return true;
            }
            if (mode === "SR") {
                return startKimDonggyuSrAim(fighter, now);
            }
            return false;
        }

        function isKimJunsu(fighter) {
            return Boolean(fighter && fighter.definition.id === "kim-junsu");
        }

        function kimJunsuPassiveEffects(fighter) {
            return fighter?.definition.passive?.effects || {};
        }

        function kimJunsuSkillEffects(fighter) {
            return fighter?.definition.skill?.effects || {};
        }

        function farthestEnemyOf(fighter) {
            return livingEnemiesOf(fighter)
                .sort((a, b) => Math.hypot(b.x - fighter.x, b.y - fighter.y) - Math.hypot(a.x - fighter.x, a.y - fighter.y))[0] || null;
        }

        function drawKimJunsuLink(source, target, color, duration = 0.38) {
            if (!source || !target) {
                return;
            }

            const dx = target.x - source.x;
            const dy = target.y - source.y;
            const length = Math.hypot(dx, dy);
            if (length <= 1) {
                return;
            }

            const line = document.createElement("div");
            line.className = "kim-junsu-link";
            line.style.left = `${source.x}px`;
            line.style.top = `${source.y}px`;
            line.style.width = `${length}px`;
            line.style.color = color;
            line.style.background = color;
            line.style.transform = `translate(0, -50%) rotate(${Math.atan2(dy, dx)}rad)`;
            line.style.animationDuration = `${duration * 1000}ms`;
            arena.appendChild(line);
            setTimeout(() => line.remove(), duration * 1000 + 80);
        }

        function useKimJunsuSkill(fighter, now) {
            if (!isKimJunsu(fighter) || fighter.dead) {
                return false;
            }

            const enemies = livingEnemiesOf(fighter);
            if (enemies.length === 0) {
                return false;
            }

            const effects = kimJunsuSkillEffects(fighter);
            const nearest = nearestEnemy(fighter);
            const farthest = farthestEnemyOf(fighter);
            if (farthest && !farthest.dead) {
                const heal = effects.heal || 10;
                const healed = Math.min(heal, farthest.maxHp - farthest.hp);
                farthest.hp += healed;
                drawKimJunsuLink(fighter, farthest, "#22c55e", effects.lineDuration || 0.38);
                floatText(`+${Math.round(heal)}`, farthest.x, farthest.y - fighterRadius(farthest), "#22c55e");
                effectRing(farthest.x, farthest.y, battle.ballSize * 1.08, "#22c55e");
            }
            if (nearest && !nearest.dead) {
                drawKimJunsuLink(fighter, nearest, "#ec4899", effects.lineDuration || 0.38);
                applyDamage(nearest, effects.damage || 30, fighter, "skill");
            }
            return true;
        }

        function isParkSungbin(fighter) {
            return Boolean(fighter && fighter.definition.id === "park-sungbin");
        }

        function parkSungbinPassiveEffects(fighter) {
            return fighter?.definition.passive?.effects || {};
        }

        function parkSungbinSkillEffects(fighter) {
            return fighter?.definition.skill?.effects || {};
        }

        function isParkSungbinMemoryBusy(fighter) {
            return Boolean(fighter?.parkMemoryId && battle.activeParkMemoryZones.some((zone) => zone.id === fighter.parkMemoryId && !zone.collapsed));
        }

        function parkSungbinBasicDamage(fighter) {
            const effects = parkSungbinPassiveEffects(fighter);
            const minBonus = effects.bonusMin ?? -15;
            const maxBonus = effects.bonusMax ?? 15;
            const bonus = Math.round(minBonus + Math.random() * (maxBonus - minBonus));
            const base = fighter.attack || fighter.definition.baseAttack || 0;
            return Math.max(effects.minDamage || 5, Math.min(effects.maxDamage || 35, base + bonus));
        }

        function basicAttackDamageFor(attacker) {
            if (isParkSungbin(attacker)) {
                return parkSungbinBasicDamage(attacker);
            }
            return attacker.attack;
        }

        function parkMemoryBounds(zone) {
            const half = zone.size / 2;
            return {
                left: zone.centerX - half,
                right: zone.centerX + half,
                top: zone.centerY - half,
                bottom: zone.centerY + half
            };
        }

        function clampPointToParkMemory(zone, x, y, radius = 0) {
            const bounds = parkMemoryBounds(zone);
            return {
                x: Math.max(bounds.left + radius, Math.min(bounds.right - radius, x)),
                y: Math.max(bounds.top + radius, Math.min(bounds.bottom - radius, y))
            };
        }

        function parkSomeoneHtml(effects) {
            return `<img alt="누군가" ${imageAttrs(effects.someoneImageSrc || "images/박성빈/누군가.png", effects.someoneImageFallbackSrcs)}>`;
        }

        function positionParkSomeone(zone, x, y) {
            zone.someoneX = x;
            zone.someoneY = y;
            if (zone.someoneElement) {
                zone.someoneElement.style.left = `${x}px`;
                zone.someoneElement.style.top = `${y}px`;
            }
        }

        function createParkSomeoneGhost(zone, x, y) {
            if (!zone.someoneElement) {
                return;
            }
            const ghost = document.createElement("div");
            ghost.className = "park-someone-ghost";
            ghost.style.left = `${x}px`;
            ghost.style.top = `${y}px`;
            ghost.style.width = zone.someoneElement.style.width;
            ghost.style.height = zone.someoneElement.style.height;
            ghost.innerHTML = zone.someoneElement.innerHTML;
            arena.appendChild(ghost);
            setTimeout(() => ghost.remove(), 460);
        }

        function createParkMemoryZone(fighter, target, now, effects) {
            const size = effects.squareSize || 200;
            const half = size / 2;
            const front = normalize(fighter.vx || target.x - fighter.x || 1, fighter.vy || target.y - fighter.y || 0);
            const centerX = Math.max(half, Math.min(battle.arenaSize - half, fighter.x + front.x * size * 0.22));
            const centerY = Math.max(half, Math.min(battle.arenaSize - half, fighter.y + front.y * size * 0.22));
            const zone = {
                id: `park-memory-${Math.round(now)}-${Math.floor(Math.random() * 10000)}`,
                ownerId: fighter.id,
                targetId: target.id,
                centerX,
                centerY,
                size,
                hp: effects.wallHp || 100,
                maxHp: effects.wallHp || 100,
                expiresAt: now + (effects.duration || 5) * 1000,
                nextHitAt: now + 120,
                hitIndex: 0,
                wallHitAt: new Map(),
                collapsed: false,
                element: null,
                someoneElement: null,
                someoneX: centerX,
                someoneY: centerY
            };

            const element = document.createElement("div");
            element.className = "park-memory-zone";
            element.style.left = `${centerX}px`;
            element.style.top = `${centerY}px`;
            element.style.width = `${size}px`;
            element.style.height = `${size}px`;
            arena.appendChild(element);
            zone.element = element;

            const someone = document.createElement("div");
            someone.className = "park-someone";
            const someoneSize = battle.ballSize * 0.82;
            someone.style.width = `${someoneSize}px`;
            someone.style.height = `${someoneSize}px`;
            someone.innerHTML = parkSomeoneHtml(effects);
            arena.appendChild(someone);
            zone.someoneElement = someone;

            const lane = Math.min(size * 0.28, Math.max(24, battle.ballSize * 0.46));
            const perpendicular = { x: -front.y, y: front.x };
            const ownerPoint = clampPointToParkMemory(zone, centerX - front.x * lane, centerY - front.y * lane, fighterRadius(fighter));
            const targetPoint = clampPointToParkMemory(zone, centerX + front.x * lane, centerY + front.y * lane, fighterRadius(target));
            const someonePoint = clampPointToParkMemory(zone, centerX - perpendicular.x * lane, centerY - perpendicular.y * lane, someoneSize / 2);
            fighter.x = ownerPoint.x;
            fighter.y = ownerPoint.y;
            target.x = targetPoint.x;
            target.y = targetPoint.y;
            fighter.vx = 0;
            fighter.vy = 0;
            target.vx = 0;
            target.vy = 0;
            positionParkSomeone(zone, someonePoint.x, someonePoint.y);
            return zone;
        }

        function damageParkMemoryWall(zone, fighter, now) {
            if (!fighter || fighter.dead || fighter.id === zone.ownerId) {
                return;
            }
            const last = zone.wallHitAt.get(fighter.id) || 0;
            if (now - last < 420) {
                return;
            }
            zone.wallHitAt.set(fighter.id, now);
            const damage = Math.max(1, Math.round(fighter.attack || fighter.definition.baseAttack || 10));
            zone.hp -= damage;
            floatText(`벽 -${damage}`, zone.centerX, zone.centerY - zone.size * 0.58, "#6b7280");
            effectRing(zone.centerX, zone.centerY, zone.size, "#6b7280");
            if (zone.hp <= 0) {
                collapseParkMemoryZone(zone, now, "붕괴");
            }
        }

        function enforceParkMemoryWallForFighter(zone, fighter, now) {
            if (zone.collapsed || !fighter || fighter.dead || fighter.offMapUntil > now || isJiTaehyeokBusy(fighter)) {
                return;
            }
            const bounds = parkMemoryBounds(zone);
            const radius = fighterRadius(fighter);
            const participant = fighter.id === zone.ownerId || fighter.id === zone.targetId;
            if (participant) {
                const clamped = clampPointToParkMemory(zone, fighter.x, fighter.y, radius);
                if (Math.abs(clamped.x - fighter.x) > 0.1 || Math.abs(clamped.y - fighter.y) > 0.1) {
                    fighter.x = clamped.x;
                    fighter.y = clamped.y;
                    fighter.vx *= -0.35;
                    fighter.vy *= -0.35;
                    damageParkMemoryWall(zone, fighter, now);
                }
                return;
            }

            const intersects = fighter.x + radius > bounds.left
                && fighter.x - radius < bounds.right
                && fighter.y + radius > bounds.top
                && fighter.y - radius < bounds.bottom;
            if (!intersects) {
                return;
            }

            const candidates = [
                { x: bounds.left - radius, y: fighter.y, d: Math.abs(fighter.x - (bounds.left - radius)), dx: -1, dy: 0 },
                { x: bounds.right + radius, y: fighter.y, d: Math.abs(fighter.x - (bounds.right + radius)), dx: 1, dy: 0 },
                { x: fighter.x, y: bounds.top - radius, d: Math.abs(fighter.y - (bounds.top - radius)), dx: 0, dy: -1 },
                { x: fighter.x, y: bounds.bottom + radius, d: Math.abs(fighter.y - (bounds.bottom + radius)), dx: 0, dy: 1 }
            ].sort((a, b) => a.d - b.d)[0];
            fighter.x = Math.max(radius, Math.min(battle.arenaSize - radius, candidates.x));
            fighter.y = Math.max(radius, Math.min(battle.arenaSize - radius, candidates.y));
            setVelocityDirection(fighter, candidates.dx, candidates.dy, Math.max(120, moveSpeedOf(fighter, now)));
            fighter.forceMoveUntil = now + 180;
            damageParkMemoryWall(zone, fighter, now);
        }

        function performParkMemoryHit(zone, now) {
            const owner = getFighterById(zone.ownerId);
            const target = getFighterById(zone.targetId);
            if (!owner || owner.dead || !target || target.dead || target.offMapUntil > now) {
                collapseParkMemoryZone(zone, now, "붕괴");
                return;
            }

            const effects = parkSungbinSkillEffects(owner);
            const actorIsOwner = zone.hitIndex % 2 === 0;
            const fromX = actorIsOwner ? owner.x : zone.someoneX;
            const fromY = actorIsOwner ? owner.y : zone.someoneY;
            const direction = normalize(target.x - fromX, target.y - fromY);
            const start = clampPointToParkMemory(zone, target.x - direction.x * zone.size * 0.42, target.y - direction.y * zone.size * 0.42, actorIsOwner ? fighterRadius(owner) : battle.ballSize * 0.41);
            const end = clampPointToParkMemory(zone, target.x - direction.x * (fighterRadius(target) * 0.55), target.y - direction.y * (fighterRadius(target) * 0.55), actorIsOwner ? fighterRadius(owner) : battle.ballSize * 0.41);

            if (actorIsOwner) {
                owner.x = start.x;
                owner.y = start.y;
                createAfterimage(owner, { opacity: 0.45, scale: 0.96, lifetime: 420 });
                owner.x = end.x;
                owner.y = end.y;
                owner.vx = direction.x * scaledSpeed(effects.rushSpeed || 2000);
                owner.vy = direction.y * scaledSpeed(effects.rushSpeed || 2000);
                owner.forceMoveUntil = now + 180;
            } else {
                createParkSomeoneGhost(zone, start.x, start.y);
                positionParkSomeone(zone, end.x, end.y);
            }

            applyDamage(target, effects.hitDamage || owner.attack || 20, owner, "skill", { unavoidable: true });
            target.vx = direction.x * scaledSpeed(effects.hitKnockbackSpeed || 700);
            target.vy = direction.y * scaledSpeed(effects.hitKnockbackSpeed || 700);
            target.forceMoveUntil = now + 260;
            impactStar(target.x, target.y, owner.definition.color);
            burst(target.x, target.y, owner.definition.color, 5);
            floatText(actorIsOwner ? "왼발" : "누군가", target.x, target.y - fighterRadius(target), owner.definition.color);

            zone.hitIndex += 1;
            zone.nextHitAt = now + (effects.hitInterval || 0.5) * 1000;
        }

        function collapseParkMemoryZone(zone, now, text = "붕괴", options = {}) {
            if (!zone || zone.collapsed) {
                return;
            }
            zone.collapsed = true;
            battle.activeParkMemoryZones = battle.activeParkMemoryZones.filter((item) => item !== zone);
            const owner = getFighterById(zone.ownerId);
            if (owner && owner.parkMemoryId === zone.id) {
                owner.parkMemoryId = null;
                owner.vx = 0;
                owner.vy = 0;
            }
            zone.element?.classList.add("is-collapsing");
            if (zone.someoneElement) {
                zone.someoneElement.style.opacity = "0";
                setTimeout(() => zone.someoneElement?.remove(), 180);
            }
            setTimeout(() => zone.element?.remove(), 560);
            if (!options.silent) {
                floatText(text, zone.centerX, zone.centerY, "#6b7280");
                burst(zone.centerX, zone.centerY, "#6b7280", 8);
            }
        }

        function collapseParkMemoryForOwner(owner, now, text = "붕괴", options = {}) {
            battle.activeParkMemoryZones
                .filter((zone) => zone.ownerId === owner.id)
                .forEach((zone) => collapseParkMemoryZone(zone, now, text, options));
        }

        function updateParkSungbinMemoryZones(now) {
            [...battle.activeParkMemoryZones].forEach((zone) => {
                if (zone.collapsed) {
                    return;
                }
                const owner = getFighterById(zone.ownerId);
                if (!owner || owner.dead || now >= zone.expiresAt) {
                    collapseParkMemoryZone(zone, now, "붕괴");
                    return;
                }
                battle.fighters.forEach((fighter) => enforceParkMemoryWallForFighter(zone, fighter, now));
                if (!zone.collapsed && now >= zone.nextHitAt) {
                    performParkMemoryHit(zone, now);
                }
            });
        }

        function startParkSungbinMemory(fighter, now) {
            if (!isParkSungbin(fighter) || fighter.dead || isParkSungbinMemoryBusy(fighter)) {
                return false;
            }
            const target = nearestEnemy(fighter);
            if (!target) {
                return false;
            }
            const effects = parkSungbinSkillEffects(fighter);
            const zone = createParkMemoryZone(fighter, target, now, effects);
            battle.activeParkMemoryZones.push(zone);
            fighter.parkMemoryId = zone.id;
            livingEnemiesOf(fighter).forEach((enemy) => {
                if (enemy === target) {
                    return;
                }
                const direction = normalize(enemy.x - zone.centerX, enemy.y - zone.centerY);
                setVelocityDirection(enemy, direction.x, direction.y, effects.outerKnockbackSpeed || 300);
                enemy.forceMoveUntil = now + 260;
            });
            floatText("회상", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            effectRing(zone.centerX, zone.centerY, zone.size, fighter.definition.color);
            return true;
        }

        function isHazardMovingTowardFighter(hazard, fighter, range) {
            if (!hazard || !Number.isFinite(hazard.x) || !Number.isFinite(hazard.y)) {
                return false;
            }

            const vx = hazard.vx || 0;
            const vy = hazard.vy || 0;
            const speed = Math.hypot(vx, vy);
            if (speed <= 1) {
                return false;
            }

            const toFighterX = fighter.x - hazard.x;
            const toFighterY = fighter.y - hazard.y;
            const distance = Math.hypot(toFighterX, toFighterY);
            if (distance > range || distance <= 1) {
                return false;
            }

            return (vx * toFighterX + vy * toFighterY) / (speed * distance) > 0.62;
        }

        function kimJunsuHazards(fighter) {
            const hazards = [];
            battle.activeVolleyballs.forEach((ball) => {
                if (!ball.source || ball.source.dead || areAllies(ball.source, fighter)) {
                    return;
                }
                hazards.push(ball);
            });
            battle.activeKimDonggyuProjectiles.forEach((projectile) => {
                const source = getFighterById(projectile.sourceId);
                if (!source || source.dead || areAllies(source, fighter)) {
                    return;
                }
                hazards.push(projectile);
            });
            battle.activeKimGibeomApples.forEach((apple) => {
                const owner = getFighterById(apple.ownerId);
                if (!owner || owner.dead || areAllies(owner, fighter)) {
                    return;
                }
                hazards.push({
                    x: apple.x,
                    y: apple.y,
                    vx: 0,
                    vy: scaledSpeed(apple.speed || 0)
                });
            });
            return hazards;
        }

        function updateKimJunsuDodge(fighter, now) {
            if (!isKimJunsu(fighter) || fighter.dead || isControlLocked(fighter, now)) {
                return;
            }

            const effects = kimJunsuPassiveEffects(fighter);
            const correction = effects.dangerCorrection ?? 0.023;
            const range = effects.dangerDetectionRange || 280;
            let avoidX = 0;
            let avoidY = 0;

            kimJunsuHazards(fighter).forEach((hazard) => {
                if (!isHazardMovingTowardFighter(hazard, fighter, range)) {
                    return;
                }
                const away = normalize(fighter.x - hazard.x, fighter.y - hazard.y);
                avoidX += away.x;
                avoidY += away.y;
            });

            if (Math.hypot(avoidX, avoidY) <= 0.01) {
                return;
            }

            const current = normalize(fighter.vx || avoidX, fighter.vy || avoidY);
            const avoid = normalize(avoidX, avoidY);
            const mixed = normalize(
                current.x * (1 - correction) + avoid.x * correction,
                current.y * (1 - correction) + avoid.y * correction
            );
            fighter.vx = mixed.x * scaledSpeed(moveSpeedOf(fighter, now));
            fighter.vy = mixed.y * scaledSpeed(moveSpeedOf(fighter, now));
        }

        function isJiTaehyeok(fighter) {
            return Boolean(fighter && fighter.definition.id === "ji-taehyeok");
        }

        function jiPassiveEffects(fighter) {
            return fighter?.definition.passive?.effects || {};
        }

        function jiSkillEffects(fighter) {
            return fighter?.definition.skill?.effects || {};
        }

        function isJiTaehyeokBusy(fighter) {
            return Boolean(isJiTaehyeok(fighter) && fighter.jiSkill);
        }

        function removeJiCaffeine(fighter) {
            fighter?.jiCaffeineElement?.remove();
            if (fighter) {
                fighter.jiCaffeineElement = null;
                fighter.jiCaffeineAutoConsumeAt = 0;
            }
        }

        function jiBasketballHtml(fighter) {
            const effects = jiSkillEffects(fighter);
            return `<img alt="농구공" ${imageAttrs(effects.basketballImageSrc || "images/지태혁/농구공.png", effects.basketballImageFallbackSrcs)}>`;
        }

        function clearJiSkillVisuals(fighter) {
            const skill = fighter?.jiSkill;
            if (!skill) {
                return;
            }
            [skill.warningElement, skill.shockElement, skill.shadowElement, skill.ballElement, skill.heldBallElement].forEach((element) => element?.remove());
            fighter.jiSkill = null;
            fighter.jiNextBasketballGhostAt = 0;
            fighter.element?.classList.remove("is-ji-dunking");
            fighter.element?.classList.remove("is-ji-skill-transparent");
        }

        function clearJiTaehyeokState(fighter) {
            removeJiCaffeine(fighter);
            clearJiSkillVisuals(fighter);
            if (isJiTaehyeok(fighter)) {
                fighter.offMapUntil = 0;
                fighter.invulnerableUntil = 0;
            }
        }

        function spawnJiCaffeine(fighter, now) {
            if (!isJiTaehyeok(fighter) || fighter.dead || isJiTaehyeokBusy(fighter)) {
                return;
            }
            if (fighter.jiCaffeineElement?.isConnected || (fighter.jiNextCaffeineAt || 0) > now) {
                return;
            }

            const effects = jiPassiveEffects(fighter);
            const size = fighterSize(fighter) * (effects.caffeineSizeMultiplier || 0.8);
            const spawnRadius = effects.caffeineSpawnRadius || 400;
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.sqrt(Math.random()) * spawnRadius;
            fighter.jiCaffeineX = Math.max(size / 2, Math.min(battle.arenaSize - size / 2, fighter.x + Math.cos(angle) * distance));
            fighter.jiCaffeineY = Math.max(size / 2, Math.min(battle.arenaSize - size / 2, fighter.y + Math.sin(angle) * distance));
            const caffeine = document.createElement("div");
            caffeine.className = "ji-caffeine";
            caffeine.style.left = `${fighter.jiCaffeineX}px`;
            caffeine.style.top = `${fighter.jiCaffeineY}px`;
            caffeine.style.width = `${size}px`;
            caffeine.style.height = `${size}px`;
            caffeine.innerHTML = `<img alt="카페인" ${imageAttrs(effects.caffeineImageSrc || "images/지태혁/카페인.png", effects.caffeineImageFallbackSrcs)}>`;
            arena.appendChild(caffeine);
            fighter.jiCaffeineElement = caffeine;
            fighter.jiNextCaffeineAt = now + (effects.caffeineSpawnInterval || 1) * 1000;
            fighter.jiCaffeineAutoConsumeAt = now + (effects.caffeineAutoConsumeDelay || 3) * 1000;
        }

        function steerJiTaehyeokToCaffeine(fighter, now) {
            if (!fighter.jiCaffeineElement?.isConnected) {
                return;
            }
            const effects = jiPassiveEffects(fighter);
            const desired = normalize(fighter.jiCaffeineX - fighter.x, fighter.jiCaffeineY - fighter.y);
            const current = normalize(fighter.vx || desired.x, fighter.vy || desired.y);
            const steer = Math.max(0, Math.min(0.35, effects.caffeineSteerStrength || 0.045));
            const mixed = normalize(
                current.x * (1 - steer) + desired.x * steer,
                current.y * (1 - steer) + desired.y * steer
            );
            fighter.vx = mixed.x * scaledSpeed(moveSpeedOf(fighter, now));
            fighter.vy = mixed.y * scaledSpeed(moveSpeedOf(fighter, now));
        }

        function consumeJiCaffeine(fighter, now) {
            const effects = jiPassiveEffects(fighter);
            removeJiCaffeine(fighter);
            fighter.jiCaffeineCharges = (fighter.jiCaffeineCharges || 0) + 1;
            fighter.jiCaffeineConsumed = (fighter.jiCaffeineConsumed || 0) + 1;
            fighter.jiRegenPerSecond = Math.min(
                effects.maxRegenPerSecond || 100,
                (fighter.jiRegenPerSecond || 0) + (effects.regenPerCaffeine || 10)
            );
            fighter.maxHp = Math.max(effects.minMaxHp || 250, fighter.maxHp - (effects.maxHpLoss || 50));
            fighter.hp = Math.min(fighter.hp, fighter.maxHp);
            fighter.speed += effects.speedPerCaffeine || 10;
            setVelocitySpeed(fighter, moveSpeedOf(fighter, now));
            floatText(`카페인 ${fighter.jiCaffeineCharges}/${effects.requiredCaffeine || 4}`, fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.18, fighter.definition.color);
        }

        function updateJiRegeneration(fighter, dt, now) {
            const regen = fighter.jiRegenPerSecond || 0;
            if (!regen || fighter.hp >= fighter.maxHp) {
                return;
            }
            const healed = Math.min(fighter.maxHp - fighter.hp, regen * dt);
            fighter.hp += healed;
            if (healed > 0 && (!fighter.jiNextRegenFloatAt || now >= fighter.jiNextRegenFloatAt)) {
                floatText(`+${Math.round(regen)}/s`, fighter.x, fighter.y - fighterRadius(fighter), "#16a34a");
                fighter.jiNextRegenFloatAt = now + 1000;
            }
        }

        function jiCaffeineShotBonusStacks(fighter) {
            const effects = jiPassiveEffects(fighter);
            const interval = Math.max(1, effects.caffeineShotBonusInterval || 5);
            return Math.floor((fighter.jiCaffeineConsumed || 0) / interval);
        }

        function jiThreePointShotCount(fighter) {
            const effects = jiSkillEffects(fighter);
            const uncapped = (effects.threePointShots || 2) + jiCaffeineShotBonusStacks(fighter);
            return Math.min(effects.maxThreePointShots || 4, uncapped);
        }

        function jiThreePointAimDurationMs(fighter) {
            const skillEffects = jiSkillEffects(fighter);
            const passiveEffects = jiPassiveEffects(fighter);
            const reduction = Math.max(0, Math.min(0.9, passiveEffects.caffeineAimReductionPerBonus || 0.3));
            const multiplier = Math.pow(1 - reduction, jiCaffeineShotBonusStacks(fighter));
            return Math.max((skillEffects.ballFlightDuration || 0.5) * 1000, (skillEffects.aimDuration || 2) * multiplier * 1000);
        }

        function updateJiCaffeinePassive(fighter, dt, now) {
            if (!isJiTaehyeok(fighter) || fighter.dead) {
                return;
            }
            updateJiRegeneration(fighter, dt, now);
            if (isJiTaehyeokBusy(fighter) || fighter.offMapUntil > now) {
                return;
            }
            spawnJiCaffeine(fighter, now);
            if (fighter.jiCaffeineElement?.isConnected) {
                if ((fighter.jiCaffeineAutoConsumeAt || 0) > 0 && now >= fighter.jiCaffeineAutoConsumeAt) {
                    consumeJiCaffeine(fighter, now);
                } else {
                    steerJiTaehyeokToCaffeine(fighter, now);
                    const size = fighterSize(fighter) * (jiPassiveEffects(fighter).caffeineSizeMultiplier || 0.8);
                    if (Math.hypot(fighter.x - fighter.jiCaffeineX, fighter.y - fighter.jiCaffeineY) <= fighterRadius(fighter) + size * 0.5) {
                        consumeJiCaffeine(fighter, now);
                    }
                }
            }
            if ((fighter.jiCaffeineCharges || 0) >= (jiPassiveEffects(fighter).requiredCaffeine || 4)) {
                startJiTaehyeokSkill(fighter, now);
            }
        }

        function createJiCircle(className, x, y, diameter) {
            const element = document.createElement("div");
            element.className = className;
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;
            element.style.width = `${diameter}px`;
            element.style.height = `${diameter}px`;
            arena.appendChild(element);
            return element;
        }

        function startJiThreePointShot(fighter, now, shotIndex) {
            const effects = jiSkillEffects(fighter);
            const target = nearestEnemy(fighter);
            const targetX = clampToArena(target?.x ?? battle.arenaSize / 2);
            const targetY = clampToArena(target?.y ?? battle.arenaSize / 2);
            const aimMs = jiThreePointAimDurationMs(fighter);
            const flightMs = Math.max(1, (effects.ballFlightDuration || 0.5) * 1000);
            const launchMs = Math.max(0, aimMs - flightMs);
            const shockDiameter = effects.shockwaveDiameter || 500;
            const warningDiameter = effects.warningDiameter || 125;
            const shadow = createJiCircle("ji-three-shadow", targetX, targetY, shockDiameter);
            shadow.style.animationDuration = `${aimMs}ms`;
            shadow.style.setProperty("--shadow-start-size", `${shockDiameter}px`);
            shadow.style.setProperty("--shadow-end-size", `${warningDiameter}px`);

            fighter.jiSkill = {
                phase: "three",
                shotIndex,
                targetX,
                targetY,
                startX: fighter.x,
                startY: fighter.y,
                launchAt: now + launchMs,
                impactAt: now + aimMs,
                warningElement: createJiCircle("ji-three-zone is-warning", targetX, targetY, warningDiameter),
                shockElement: createJiCircle("ji-three-zone is-shock", targetX, targetY, shockDiameter),
                shadowElement: shadow,
                ballElement: null
            };
            floatText(`3점 슛 ${shotIndex + 1}`, targetX, targetY - warningDiameter * 0.5, fighter.definition.color);
        }

        function createJiBasketballElement(fighter, size, ghost = false) {
            const element = document.createElement("div");
            element.className = ghost ? "ji-basketball-ghost" : "ji-basketball";
            element.style.width = `${size}px`;
            element.style.height = `${size}px`;
            element.innerHTML = jiBasketballHtml(fighter);
            arena.appendChild(element);
            return element;
        }

        function positionJiBall(element, x, y, rotation = 0) {
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;
            element.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
        }

        function impactJiThreePointShot(fighter, now) {
            const skill = fighter.jiSkill;
            if (!skill) {
                return;
            }
            const effects = jiSkillEffects(fighter);
            const warningRadius = (effects.warningDiameter || 125) / 2;
            const shockRadius = (effects.shockwaveDiameter || 500) / 2;
            livingEnemiesOf(fighter).forEach((target) => {
                const distance = Math.hypot(target.x - skill.targetX, target.y - skill.targetY);
                if (distance <= shockRadius + fighterRadius(target)) {
                    applyDamage(target, effects.shockwaveDamage || 50, fighter, "skill", { unavoidable: true });
                }
                if (!target.dead && distance <= warningRadius + fighterRadius(target)) {
                    applyDamage(target, effects.warningDamage || 150, fighter, "skill", { unavoidable: true });
                }
            });
            effectRing(skill.targetX, skill.targetY, effects.shockwaveDiameter || 500, fighter.definition.color);
            burst(skill.targetX, skill.targetY, fighter.definition.color, 8);
            [skill.warningElement, skill.shockElement, skill.shadowElement, skill.ballElement].forEach((element) => element?.remove());

            const nextShot = skill.shotIndex + 1;
            if (nextShot < jiThreePointShotCount(fighter)) {
                fighter.jiSkill = {
                    phase: "between",
                    nextAt: now + (effects.delayBetweenShots || 1) * 1000,
                    shotIndex: nextShot
                };
            } else {
                startJiDunk(fighter, now);
            }
        }

        function updateJiThreePointShot(fighter, now) {
            const skill = fighter.jiSkill;
            if (!skill || skill.phase !== "three") {
                return false;
            }
            const effects = jiSkillEffects(fighter);
            if (now >= skill.launchAt && !skill.ballElement) {
                skill.ballElement = createJiBasketballElement(fighter, effects.ballDiameter || effects.warningDiameter || 125);
            }
            if (skill.ballElement) {
                const flightMs = Math.max(1, (effects.ballFlightDuration || 0.5) * 1000);
                const progress = Math.max(0, Math.min(1, (now - skill.launchAt) / flightMs));
                const x = skill.startX + (skill.targetX - skill.startX) * progress;
                const y = skill.startY + (skill.targetY - skill.startY) * progress;
                positionJiBall(skill.ballElement, x, y, progress * 540);
                if (!fighter.jiNextBasketballGhostAt || now >= fighter.jiNextBasketballGhostAt) {
                    const ghost = createJiBasketballElement(fighter, (effects.ballDiameter || effects.warningDiameter || 125) * 0.72, true);
                    positionJiBall(ghost, x, y, progress * 540);
                    setTimeout(() => ghost.remove(), 440);
                    fighter.jiNextBasketballGhostAt = now + 90;
                }
            }
            if (now >= skill.impactAt) {
                impactJiThreePointShot(fighter, now);
            }
            return true;
        }

        function startJiDunk(fighter, now) {
            const effects = jiSkillEffects(fighter);
            const target = nearestEnemy(fighter);
            const center = battle.arenaSize / 2;
            const aimX = target?.x ?? center;
            const aimY = target?.y ?? center;
            const outward = normalize(aimX - center || 1, aimY - center || 0);
            const startDistance = battle.arenaSize * 0.66 + battle.ballSize * 2;
            fighter.x = center + outward.x * startDistance;
            fighter.y = center + outward.y * startDistance;
            fighter.offMapUntil = 0;
            fighter.invulnerableUntil = now + (effects.dunkMaxDuration || 2) * 1000 + 500;
            fighter.element.classList.remove("is-offmap");
            fighter.element.classList.add("is-ji-dunking");
            const heldBallSize = fighterSize(fighter) * (effects.dunkBallSizeMultiplier || 0.72);
            const heldBall = createJiBasketballElement(fighter, heldBallSize);
            heldBall.classList.add("is-held");
            fighter.jiSkill = {
                phase: "dunk",
                targetId: target?.id || null,

                expiresAt: now + (effects.dunkMaxDuration || 2) * 1000,

            };

        }

        function finishJiDunk(fighter, target, now) {
            const effects = jiSkillEffects(fighter);
            fighter.jiSkill?.heldBallElement?.remove();
            if (target && !target.dead) {
                applyDamage(target, effects.dunkDamage || 150, fighter, "skill", { unavoidable: true });
                impactStar(target.x, target.y, fighter.definition.color);
            }
            livingEnemiesOf(fighter).forEach((enemy) => {
                if (!enemy.dead) {
                    applyDamage(enemy, effects.dunkShockwaveDamage || 10, fighter, "skill", { unavoidable: true });
                }
            });
            effectRing(clampToArena(fighter.x), clampToArena(fighter.y), battle.arenaSize * 1.4, fighter.definition.color);
            burst(clampToArena(fighter.x), clampToArena(fighter.y), fighter.definition.color, 8);
            fighter.x = clampToArena(fighter.x);
            fighter.y = clampToArena(fighter.y);
            fighter.offMapUntil = 0;
            fighter.invulnerableUntil = now + 500;
            fighter.element.classList.remove("is-ji-dunking");
            fighter.element.classList.remove("is-ji-skill-transparent");
            fighter.jiSkill = null;
            setVelocityDirection(fighter, Math.random() - 0.5, Math.random() - 0.5, fighter.speed);

        function updateJiDunk(fighter, dt, now) {
            const skill = fighter.jiSkill;
            if (!skill || skill.phase !== "dunk") {
                return false;
            }
            const lockedTarget = getFighterById(skill.targetId);
            const target = lockedTarget && !lockedTarget.dead && lockedTarget.offMapUntil <= now
                ? lockedTarget
                : nearestEnemy(fighter);
            const aimX = target?.x ?? battle.arenaSize / 2;
            const aimY = target?.y ?? battle.arenaSize / 2;
            const direction = normalize(aimX - fighter.x, aimY - fighter.y);
            const speed = scaledSpeed(jiSkillEffects(fighter).dunkSpeed || 1000);
            fighter.vx = direction.x * speed;
            fighter.vy = direction.y * speed;
            fighter.x += fighter.vx * dt;
            fighter.y += fighter.vy * dt;
            if (skill.heldBallElement?.isConnected) {
                const ballOffset = fighterRadius(fighter) * 0.78;
                positionJiBall(skill.heldBallElement, fighter.x + ballOffset, fighter.y + ballOffset, now * 0.48);
            }
            if (!skill.nextAfterimageAt || now >= skill.nextAfterimageAt) {
                createAfterimage(fighter, { opacity: 0.42, scale: 0.96, lifetime: 440 });
                skill.nextAfterimageAt = now + 65;
            }
            if ((target && Math.hypot(target.x - fighter.x, target.y - fighter.y) <= fighterRadius(fighter) + fighterRadius(target)) || now >= skill.expiresAt) {
                finishJiDunk(fighter, target, now);

            return true;

        function startJiTaehyeokSkill(fighter, now) {
            if (!isJiTaehyeok(fighter) || fighter.dead || isJiTaehyeokBusy(fighter)) {

        function updateJiTaehyeokState(fighter, dt, now) {

            const skill = fighter.jiSkill;
            if (!skill) {

            if (skill.phase === "three") {
                return updateJiThreePointShot(fighter, now);

            if (skill.phase === "between") {
                fighter.vx = 0;
                fighter.vy = 0;
                if (now >= skill.nextAt) {
                    startJiThreePointShot(fighter, now, skill.shotIndex);
                }
                return true;

            if (skill.phase === "dunk") {
                return updateJiDunk(fighter, dt, now);

            return false;

        function isLeeTaehwan(fighter) {
            return Boolean(fighter && fighter.definition.id === "lee-taehwan");
        }

        function leePassiveEffects(fighter) {

        }

        function leeSkillEffects(fighter) {
            return fighter.definition.skill?.effects || {};
        }

        function isLeeCharging(fighter) {
            return isLeeTaehwan(fighter) && (fighter.leeShieldHitsRemaining || 0) > 0;
        }

        function isLeeDribbling(fighter, now = performance.now()) {

        function clearLeeTrajectory(fighter, options = {}) {
            const trajectory = fighter.leeTrajectoryElement;
            fighter.leeTrajectoryElement = null;
            if (!trajectory) {
                return;
            }
            if (options.fade && trajectory.isConnected) {
                trajectory.classList.add("is-firing");

            } else {
                trajectory.remove();

        }

        function clearLeeDribbleGhosts(fighter) {
            (fighter.leeDribbleGhosts || []).forEach((ghost) => ghost.remove());
            fighter.leeDribbleGhosts = [];
        }

        function leeAimDirection(fighter, options = {}) {
            const currentSpeed = Math.hypot(fighter.vx, fighter.vy);
            let desiredDirection = null;
            if (currentSpeed > 1) {
                desiredDirection = normalize(fighter.vx, fighter.vy);
            }

            const target = desiredDirection ? null : nearestEnemy(fighter);
            if (!desiredDirection && target) {
                const dx = target.x - fighter.x;
                const dy = target.y - fighter.y;
                if (Math.hypot(dx, dy) > 1) {
                    desiredDirection = normalize(dx, dy);
                }
            }

            desiredDirection = desiredDirection || fighter.leeChargeDirection || { x: 1, y: 0 };
            if (fighter.leeChargeDirection && !options.instant) {
                const effects = leeSkillEffects(fighter);
                const turnLerp = Math.max(0.01, Math.min(1, effects.chargeTurnLerp ?? 0.035));
                fighter.leeChargeDirection = normalize(
                    fighter.leeChargeDirection.x + (desiredDirection.x - fighter.leeChargeDirection.x) * turnLerp,
                    fighter.leeChargeDirection.y + (desiredDirection.y - fighter.leeChargeDirection.y) * turnLerp
                );
                return fighter.leeChargeDirection;
            }

            fighter.leeChargeDirection = desiredDirection;
            return fighter.leeChargeDirection;
        }

        function rayToArenaWall(x, y, direction) {
            const radius = battle.ballSize / 2;
            const min = radius;
            const max = battle.arenaSize - radius;
            const candidates = [];
            if (Math.abs(direction.x) > 0.0001) {
                candidates.push(((direction.x > 0 ? max : min) - x) / direction.x);
            }
            if (Math.abs(direction.y) > 0.0001) {
                candidates.push(((direction.y > 0 ? max : min) - y) / direction.y);
            }
            const positiveCandidates = candidates.filter((value) => Number.isFinite(value) && value >= 0);
            const distance = positiveCandidates.length ? Math.max(0, Math.min(...positiveCandidates)) : 0;
            return {
                x: clampToArena(x + direction.x * distance),
                y: clampToArena(y + direction.y * distance)
            };
        }

        function updateLeeTrajectory(fighter) {
            if (!isLeeCharging(fighter)) {
                clearLeeTrajectory(fighter);
                return;
            }

            const effects = leeSkillEffects(fighter);
            const direction = leeAimDirection(fighter);
            const end = rayToArenaWall(fighter.x, fighter.y, direction);
            const length = Math.max(1, Math.hypot(end.x - fighter.x, end.y - fighter.y));

            if (!fighter.leeTrajectoryElement || !fighter.leeTrajectoryElement.isConnected) {
                fighter.leeTrajectoryElement = document.createElement("div");
                fighter.leeTrajectoryElement.className = "lee-trajectory";
                arena.appendChild(fighter.leeTrajectoryElement);
            }

            const trajectory = fighter.leeTrajectoryElement;
            trajectory.style.left = `${fighter.x}px`;
            trajectory.style.top = `${fighter.y}px`;
            trajectory.style.width = `${length}px`;
            trajectory.style.setProperty("--trajectory-height", `${battle.ballSize * (effects.trajectoryWidthMultiplier || 0.78)}px`);
            trajectory.style.transform = `translate(0, -50%) rotate(${Math.atan2(direction.y, direction.x)}rad)`;
        }

        function startLeeCharge(fighter, now) {

                endLeeDribble(fighter, now);
                fighter.invulnerableUntil = 0;
            }
            fighter.leeShieldHitsRemaining = effects.shieldHits || 5;
            fighter.leeChargeStartedAt = now;
            fighter.leeChargeDirection = null;
            fighter.leeChargeDirection = leeAimDirection(fighter, { instant: true });
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            updateLeeTrajectory(fighter);
            floatText("차징", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.35, fighter.definition.color);
        }

        function animateLeeSoccerBall(startX, startY, endX, endY, effects) {
            const ball = document.createElement("div");
            const distance = Math.max(1, Math.hypot(endX - startX, endY - startY));
            const duration = Math.max(180, Math.min(620, (distance / (effects.kickProjectileSpeed || 2600)) * 1000));
            const size = battle.ballSize * 0.58;
            ball.className = "lee-soccer-ball";
            ball.style.left = `${startX}px`;
            ball.style.top = `${startY}px`;
            ball.style.width = `${size}px`;
            ball.style.height = `${size}px`;
            ball.style.transitionDuration = `${duration}ms`;
            ball.innerHTML = `<img alt="이태환 축구공" ${imageAttrs(effects.ballImageSrc || "images/이태환축구공.png", effects.ballImageFallbackSrcs)}>`;
            arena.appendChild(ball);
            requestAnimationFrame(() => {
                ball.style.left = `${endX}px`;
                ball.style.top = `${endY}px`;
                ball.style.transform = `translate(-50%, -50%) rotate(${distance * 1.6}deg)`;
                ball.style.opacity = "0.86";
            });
            setTimeout(() => ball.remove(), duration + 140);
        }

        function createLeeKickTargetTrail(target, startX, startY, endX, endY, count = 8) {
            const ghosts = Math.max(4, Math.min(12, count));
            for (let index = 1; index <= ghosts; index += 1) {
                const ratio = index / (ghosts + 1);
                createAfterimage(target, {
                    x: startX + (endX - startX) * ratio,
                    y: startY + (endY - startY) * ratio,
                    opacity: Math.max(0.18, 0.5 - ratio * 0.22),
                    scale: Math.max(0.78, 1 - ratio * 0.1),
                    lifetime: 720
                });
            }
        }

        function releaseLeeChargeKick(fighter, now) {
            if (!isLeeTaehwan(fighter) || fighter.dead) {
                return;
            }

            const effects = leeSkillEffects(fighter);
            const startX = fighter.x;
            const startY = fighter.y;
            const direction = fighter.leeChargeDirection || leeAimDirection(fighter, { instant: true });
            const destination = rayToArenaWall(startX, startY, direction);
            const chargeSeconds = Math.max(0, (now - (fighter.leeChargeStartedAt || now)) / 1000);
            const ankleBreaks = fighter.leeAnkleBreakCount || 0;
            const damage = chargeSeconds * ((effects.chargeDamageBase ?? 30) + ankleBreaks);
            const hitWidth = battle.ballSize * (effects.hitWidthMultiplier || 1.1);

            fighter.leeShieldHitsRemaining = 0;
            fighter.leeChargeStartedAt = 0;
            clearLeeTrajectory(fighter, { fade: true });
            animateLeeSoccerBall(startX, startY, destination.x, destination.y, effects);
            screenFlash(fighter.definition.color);
            floatText("슈팅", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.5, fighter.definition.color);

            livingEnemiesOf(fighter).forEach((target) => {
                if (distanceToSegment(target.x, target.y, startX, startY, destination.x, destination.y) > hitWidth) {
                    return;
                }

                const targetStartX = target.x;
                const targetStartY = target.y;
                if (damage > 0) {
                    applyDamage(target, damage, fighter, "skill", { unavoidable: true });
                }
                if (target.dead) {
                    return;
                }

                if (keepKangComboDuringKnockback(target, fighter.definition.color, now)) {
                    return;
                }

                target.windmillMomentum = null;
                createLeeKickTargetTrail(target, targetStartX, targetStartY, destination.x, destination.y, 9);
                target.x = destination.x;
                target.y = destination.y;
                target.vx = 0;
                target.vy = 0;
                target.afterimageUntil = now + (effects.targetAfterimageDuration || 0.75) * 1000;
                target.nextAfterimageAt = 0;
                impactStar(target.x, target.y, fighter.definition.color);
                burst(target.x, target.y, fighter.definition.color, 10);
                effectRing(target.x, target.y, battle.ballSize * 1.45, fighter.definition.color);
            });
        }

        function tryLeeShieldBlock(target, amount, source, kind, options, now) {
            if (!isLeeCharging(target) || options.ignoreLeeShield) {
                return false;
            }

            target.leeShieldHitsRemaining = Math.max(0, (target.leeShieldHitsRemaining || 0) - 1);
            floatText(`방어 ${target.leeShieldHitsRemaining}`, target.x, target.y - battle.ballSize / 2, target.definition.color);
            effectRing(target.x, target.y, battle.ballSize * 1.25, target.definition.color);

        function createLeeDribbleGhost(fighter, now) {
            const ghost = document.createElement("div");

            ghost.style.top = `${fighter.y}px`;
            ghost.style.width = `${battle.ballSize}px`;
            ghost.style.height = `${battle.ballSize}px`;
            ghost.innerHTML = fighter.element.innerHTML;
            arena.appendChild(ghost);
            fighter.leeDribbleGhosts.push(ghost);
            if (fighter.leeDribbleGhosts.length > 80) {

        function startLeeDribble(fighter, now) {
            if (!isLeeTaehwan(fighter) || fighter.dead || isLeeDribbling(fighter, now)) {
                return;
            }

            const effects = leePassiveEffects(fighter);
            fighter.leeDribbleUntil = now + (effects.duration || 5) * 1000;
            fighter.leeNextDribbleCheckAt = fighter.leeDribbleUntil + (effects.checkInterval || 1) * 1000;
            fighter.leeNextDribbleAfterimageAt = 0;
            fighter.leeDribbleHitIds = new Set();
            fighter.invulnerableUntil = Math.max(fighter.invulnerableUntil || 0, fighter.leeDribbleUntil);
            floatText("드리블", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.25, fighter.definition.color);
        }

        function endLeeDribble(fighter, now) {
            const effects = leePassiveEffects(fighter);
            fighter.leeDribbleUntil = 0;
            fighter.leeNextDribbleAfterimageAt = 0;
            fighter.leeDribbleHitIds = new Set();
            fighter.leeNextDribbleCheckAt = Math.max(fighter.leeNextDribbleCheckAt || 0, now + (effects.checkInterval || 1) * 1000);
            if (fighter.invulnerableUntil <= now + 50) {
                fighter.invulnerableUntil = 0;
            }
            clearLeeDribbleGhosts(fighter);
        }

        function applyLeeAnkleBreak(fighter, target, now) {
            if (!target || target.dead || fighter.leeDribbleHitIds.has(target.id)) {
                return;
            }

            const effects = leePassiveEffects(fighter);
            fighter.leeDribbleHitIds.add(target.id);
            fighter.leeAnkleBreakCount = (fighter.leeAnkleBreakCount || 0) + 1;
            if (target.slowUntil > now) {
                target.slowMultiplier = Math.min(target.slowMultiplier || 1, effects.ankleSlowMultiplier || 0.7);
            } else {
                target.slowMultiplier = effects.ankleSlowMultiplier || 0.7;
            }
            target.slowUntil = Math.max(target.slowUntil || 0, now + (effects.ankleSlowDuration || 3) * 1000);
            floatText("앵클브레이크", target.x, target.y - battle.ballSize / 2, fighter.definition.color);
            burst(target.x, target.y, fighter.definition.color, 8);
            effectRing(target.x, target.y, battle.ballSize * 1.25, fighter.definition.color);
        }

        function handleLeeDribbleCollision(a, b, now) {
            if (areAllies(a, b)) {

            if (isLeeDribbling(a, now)) {

            if (isLeeDribbling(b, now)) {

            }

        function updateLeeDribble(fighter, now) {
            if (!isLeeTaehwan(fighter) || fighter.dead) {
                return;
            }

            const effects = leePassiveEffects(fighter);
            if (isLeeCharging(fighter)) {
                if (fighter.leeDribbleUntil) {
                    endLeeDribble(fighter, now);
                    fighter.invulnerableUntil = 0;
                }
                fighter.leeNextDribbleCheckAt = Math.max(
                    fighter.leeNextDribbleCheckAt || 0,
                    now + (effects.checkInterval || 1) * 1000
                );
                return;
            }

            if (isLeeDribbling(fighter, now)) {
                fighter.invulnerableUntil = Math.max(fighter.invulnerableUntil || 0, fighter.leeDribbleUntil);
                livingEnemiesOf(fighter).forEach((target) => {
                    if (Math.hypot(target.x - fighter.x, target.y - fighter.y) <= battle.ballSize * 0.95) {
                        applyLeeAnkleBreak(fighter, target, now);
                    }
                });
                return;
            }

            if (fighter.leeDribbleUntil) {
                endLeeDribble(fighter, now);
            }

            const intervalMs = (effects.checkInterval || 1) * 1000;
            if (!fighter.leeNextDribbleCheckAt) {
                fighter.leeNextDribbleCheckAt = now + intervalMs;
                return;
            }
            if (now < fighter.leeNextDribbleCheckAt) {
                return;
            }

            let checks = 0;
            while (now >= fighter.leeNextDribbleCheckAt && checks < 4) {
                fighter.leeNextDribbleCheckAt += intervalMs;
                checks += 1;
                if (Math.random() < (effects.chance ?? 0.1)) {
                    startLeeDribble(fighter, now);
                    break;
                }
            }
        }

        function updateLeeCharge(fighter, now = performance.now()) {
            if (!isLeeTaehwan(fighter) || fighter.dead) {
                return;
            }
            if (isLeeCharging(fighter)) {
                const effects = leeSkillEffects(fighter);
                const maxChargeDuration = effects.maxChargeDuration || 20;
                if (fighter.leeChargeStartedAt && now - fighter.leeChargeStartedAt >= maxChargeDuration * 1000) {
                    floatText("최대 차징", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
                    releaseLeeChargeKick(fighter, now);
                    return;
                }
                fighter.vx = 0;
                fighter.vy = 0;
                fighter.windmillMomentum = null;
            }
            updateLeeTrajectory(fighter);

        function isKimSihyeon(fighter) {

        function kimSihyeonSkillEffects(fighter) {
            return fighter.definition.skill?.effects || {};
        }

        function isKimSihyeonBuffed(fighter, now = performance.now()) {

            return Boolean(fighter && fighter.sleepUntil > now);

        function applySleep(target, seconds, damageMultiplier, now, source) {
            if (!target || target.dead || !Number.isFinite(seconds) || seconds <= 0) {
                return;
            }

            stun(target, seconds, now);
            target.sleepUntil = Math.max(target.sleepUntil || 0, now + seconds * 1000);
            target.sleepDamageMultiplier = Math.max(target.sleepDamageMultiplier || 1, damageMultiplier || 1.5);
            floatText("수면", target.x, target.y - battle.ballSize / 2, source ? source.definition.color : "#2563eb");
            effectRing(target.x, target.y, battle.ballSize * 1.25, "#2563eb");
        }

        function startKimSihyeonYawnHealing(fighter, now) {
            fighter.yawnHealingActive = true;
            fighter.nextYawnHealAt = now + 1000;
            floatText("힐 시작", fighter.x, fighter.y - battle.ballSize / 2, "#006d36");
        }

        function stopKimSihyeonYawnHealing(fighter, options = {}) {
            if (!isKimSihyeon(fighter) || !fighter.yawnHealingActive) {
                return;
            }

            fighter.yawnHealingActive = false;
            fighter.nextYawnHealAt = 0;
            if (!options.silent && !fighter.dead) {
                floatText("힐 종료", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            }
        }

        function updateKimSihyeonYawnHealing(fighter, now) {
            if (!isKimSihyeon(fighter) || !fighter.yawnHealingActive || fighter.dead) {
                return;
            }

            const effects = kimSihyeonSkillEffects(fighter);
            const healAmount = effects.healPerSecond || 69;
            let ticks = 0;
            while (fighter.yawnHealingActive && now >= fighter.nextYawnHealAt && ticks < 4) {
                healFighter(fighter, healAmount);
                fighter.nextYawnHealAt += 1000;
                ticks += 1;
            }
        }

        function triggerKimSihyeonYawn(fighter, now) {
            const effects = kimSihyeonSkillEffects(fighter);
            const radius = effects.radius || battle.ballSize * (effects.radiusMultiplier || 3.2);
            let sleptTargets = 0;

            livingEnemiesOf(fighter).forEach((target) => {
                if (Math.hypot(target.x - fighter.x, target.y - fighter.y) > radius) {
                    return;
                }

                applySleep(target, effects.sleepDuration || 4, effects.sleepDamageMultiplier || 1.5, now, fighter);
                sleptTargets += 1;
            });

            startKimSihyeonYawnHealing(fighter, now);
            effectRing(fighter.x, fighter.y, radius * 2, "#2563eb");
            floatText(sleptTargets > 0 ? `수면 ${sleptTargets}` : "하품...", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
        }

        function activateKimSihyeonPassive(fighter, now) {
            const effects = kimSihyeonEffects(fighter);
            const durationMs = (effects.duration || 3) * 1000;
            const intervalMs = (effects.interval || 10) * 1000;

            fighter.kimSihyeonBuffUntil = now + durationMs;
            fighter.nextKimSihyeonPassiveAt = fighter.kimSihyeonBuffUntil + intervalMs;
            fighter.afterimageUntil = Math.max(fighter.afterimageUntil || 0, fighter.kimSihyeonBuffUntil);
            fighter.nextAfterimageAt = 0;
            setVelocitySpeed(fighter, moveSpeedOf(fighter, now));
            screenFlash(fighter.definition.color);
            megaBurst(fighter.x, fighter.y, fighter.definition.color, 10);
            floatText("검은 영광", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
        }

        function updateKimSihyeonPassive(fighter, now) {
            if (!isKimSihyeon(fighter) || fighter.dead) {
                return;
            }

            const effects = kimSihyeonEffects(fighter);
            const intervalMs = (effects.interval || 10) * 1000;
            if (isKimSihyeonBuffed(fighter, now)) {
                return;
            }
            if (!fighter.nextKimSihyeonPassiveAt) {
                fighter.nextKimSihyeonPassiveAt = now + intervalMs;
                return;
            }
            if (now < fighter.nextKimSihyeonPassiveAt) {
                return;
            }

            if (Math.random() < (effects.chance ?? 0.69)) {
                activateKimSihyeonPassive(fighter, now);
            } else {
                fighter.nextKimSihyeonPassiveAt = now + intervalMs;
                floatText("패시브 실패", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            }
        }

        function tryKimSihyeonKnockbackDodge(target, source, now) {
            if (!isKimSihyeonBuffed(target, now)) {
                return false;
            }

            const effects = kimSihyeonEffects(target);
            if (Math.random() >= (effects.knockbackDodgeChance ?? 0.69)) {
                return false;
            }

            target.windmillMomentum = null;
            if (isKangComboing(target)) {
                finishKangCombo(target);
            }
            target.afterimageUntil = Math.max(target.afterimageUntil || 0, now + 420);
            target.nextAfterimageAt = 0;
            floatText("넉백 회피", target.x, target.y - battle.ballSize / 2, target.definition.color);
            effectRing(target.x, target.y, battle.ballSize * 1.2, target.definition.color);
            return true;
        }

        function isKangInchan(fighter) {
            return Boolean(fighter && fighter.definition.id === "kang-inchan");
        }

        function kangEffects(fighter) {
