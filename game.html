            } else {
                applyDamage(copiedTarget, 75, fighter, "skill");
                stun(copiedTarget, 0.8, now);
                effectRing(copiedTarget.x, copiedTarget.y, battle.ballSize * 1.5, copiedColor);
                burst(copiedTarget.x, copiedTarget.y, copiedColor, 5);
            }

            floatText("복사 완료", fighter.x, fighter.y - battle.ballSize, fighter.definition.color);
            return true;
        }

        function removeBombLabel(bomb) {
            if (bomb.label) {
                bomb.label.remove();
                bomb.label = null;
            }
        }

        function updateBombLabel(bomb, now) {
            if (!bomb.label) {
                return;
            }

            const remaining = Math.max(0, (bomb.explodeAt - now) / 1000);
            bomb.label.textContent = `💣 ${remaining.toFixed(1)}초`;
            bomb.label.classList.toggle("bomb-urgent", remaining < 1.5);
            if (remaining < 1.5 && (!bomb.nextPulseAt || now >= bomb.nextPulseAt)) {
                bombPulseEffect(bomb.target.x, bomb.target.y, bomb.source.definition.color);
                bomb.nextPulseAt = now + 400;
            }
            bomb.label.style.left = `${bomb.target.x}px`;
            bomb.label.style.top = `${bomb.target.y - battle.ballSize * 0.72}px`;
        }

        function plantBomb(source, target, now, copiedEffects = null) {
            const effects = copiedEffects || source.definition.skill.effects;
            const label = document.createElement("div");
            label.className = "bomb-timer";
            label.style.color = source.definition.color;
            arena.appendChild(label);
            battle.activeBombs.push({
                source,
                target,
                explodeAt: now + effects.delay * 1000,
                effects,
                label
            });
            updateBombLabel(battle.activeBombs[battle.activeBombs.length - 1], now);
            floatText("폭탄임신", target.x, target.y - battle.ballSize / 2, source.definition.color);
            effectRing(target.x, target.y, battle.ballSize * 1.75, source.definition.color);
            burst(target.x, target.y, source.definition.color, 6);
        }

        function updateBombs(now) {
            battle.activeBombs = battle.activeBombs.filter((bomb) => {
                if (bomb.source.dead || bomb.target.dead) {
                    removeBombLabel(bomb);
                    return false;
                }
                if (now < bomb.explodeAt) {
                    updateBombLabel(bomb, now);
                    return true;
                }

                const { source, target, effects } = bomb;
                removeBombLabel(bomb);
                explosionFire(target.x, target.y, effects.radius, source.definition.color);
                megaBurst(target.x, target.y, source.definition.color, 8);
                effectRing(target.x, target.y, effects.radius * 2, source.definition.color);
                floatText("💥펑!", target.x, target.y - battle.ballSize / 2, source.definition.color);
                applyDamage(target, effects.targetDamage, source, "skill");
                stun(target, effects.stunSeconds, now);
                battle.fighters.forEach((enemy) => {
                    if (enemy === target || enemy === source || enemy.dead || areAllies(source, enemy)) {
                        return;
                    }
                    const dx = enemy.x - target.x;
                    const dy = enemy.y - target.y;
                    if (Math.sqrt(dx * dx + dy * dy) <= effects.radius) {
                        applyDamage(enemy, effects.splashDamage, source, "skill");
                        stun(enemy, effects.stunSeconds, now);
                        impactStar(enemy.x, enemy.y, source.definition.color);
                    }
                });
                return false;
            });
        }

        function updateRangedAttacks(fighter, now) {
            const effects = fighter.definition.passive?.effects;
            if (!effects?.rangedAttack || fighter.dead) {
                return;
            }

            if (!fighter.nextRangedGrowthAt) {
                fighter.nextRangedGrowthAt = (battle.fightStartedAt || now) + effects.growthInterval * 1000;
            }
            while (now >= fighter.nextRangedGrowthAt) {
                fighter.rangedDamageBonus += effects.growthDamage;
                fighter.nextRangedGrowthAt += effects.growthInterval * 1000;
                floatText(`딱콩+${effects.growthDamage}`, fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            }

            if (now < fighter.nextRangedAt) {
                return;
            }

            const target = nearestEnemy(fighter);
            if (!target) {
                return;
            }

            const damage = effects.damage + fighter.rangedDamageBonus;
            const dealt = applyDamage(target, damage, fighter, "ranged");
            impactStar(target.x, target.y, fighter.definition.color);
            if (Math.random() < 0.35) {
                effectRing(target.x, target.y, battle.ballSize * 1.05, fighter.definition.color);
            }
            if (dealt > 0) {
                healFighter(fighter, dealt * effects.healRatio);
            }
            fighter.nextRangedAt = now + effects.interval * 1000;
        }

        function resolveBackstab(fighter, now) {
            if (!fighter.backstab || now < fighter.backstab.returnAt) {
                return false;
            }

            const target = getFighterById(fighter.backstab.targetId) || randomEnemy(fighter);
            fighter.offMapUntil = 0;
            fighter.invulnerableUntil = 0;
            if (target && !target.dead) {
                const direction = normalize(target.vx || 1, target.vy || 1);
                const distance = fighter.backstab.behindDistance;
                fighter.x = Math.max(battle.ballSize / 2, Math.min(battle.arenaSize - battle.ballSize / 2, target.x - direction.x * distance));
                fighter.y = Math.max(battle.ballSize / 2, Math.min(battle.arenaSize - battle.ballSize / 2, target.y - direction.y * distance));
                fighter.vx = direction.x * scaledSpeed(fighter.speed);
                fighter.vy = direction.y * scaledSpeed(fighter.speed);
                const dealt = applyDamage(target, fighter.backstab.damage, fighter, "skill");
                if (dealt > 0 && fighter.backstab.healRatio) {
                    healFighter(fighter, dealt * fighter.backstab.healRatio);
                }
                stealthReveal(fighter.x, fighter.y, fighter.definition.color);
                megaBurst(fighter.x, fighter.y, fighter.definition.color, 5);
                effectRing(target.x, target.y, battle.ballSize * 1.65, fighter.definition.color);
                impactStar(target.x, target.y, fighter.definition.color);
                floatText("🗡️뒷치기!", target.x, target.y - battle.ballSize / 2, fighter.definition.color);
            } else {
                const direction = normalize(Math.random() - 0.5, Math.random() - 0.5);
                fighter.vx = direction.x * scaledSpeed(fighter.speed);
                fighter.vy = direction.y * scaledSpeed(fighter.speed);
            }
            fighter.backstab = null;
            return true;
        }

        function summonFighter(owner, summonDefinition, now) {
            const definition = JSON.parse(JSON.stringify(summonDefinition));
            const summon = createFighter(definition, battle.fighters.length, battle.fighters.length + 1, {
                id: `${owner.id}-mom-${Math.round(now)}`,
                ownerId: owner.id,
                isSummon: true
            });
            const angle = Math.atan2(owner.vy || 1, owner.vx || 1) + Math.PI / 2;
            const distance = battle.ballSize * 1.25;
            summon.x = Math.max(battle.ballSize / 2, Math.min(battle.arenaSize - battle.ballSize / 2, owner.x + Math.cos(angle) * distance));
            summon.y = Math.max(battle.ballSize / 2, Math.min(battle.arenaSize - battle.ballSize / 2, owner.y + Math.sin(angle) * distance));
            const center = battle.arenaSize / 2;
            const direction = normalize(center - summon.x, center - summon.y);
            summon.vx = direction.x * scaledSpeed(summon.speed);
            summon.vy = direction.y * scaledSpeed(summon.speed);
            summon.element.style.width = `${battle.ballSize}px`;
            summon.element.style.height = `${battle.ballSize}px`;
            battle.fighters.push(summon);
            renderHud();
            megaBurst(summon.x, summon.y, owner.definition.color, 6);
            floatText("엄마 등장", summon.x, summon.y - battle.ballSize / 2, owner.definition.color);
            return summon;
        }

        function updateSummons(dt) {
            battle.fighters.forEach((fighter) => {
                if (!fighter.isSummon || fighter.dead) {
                    return;
                }

                const owner = getFighterById(fighter.ownerId);
                if (!owner || owner.dead) {
                    fighter.hp = 0;
                } else {
                    fighter.hp -= (fighter.definition.hpDecayPerSecond || 0) * dt;
                }

                if (fighter.hp <= 0) {
                    fighter.dead = true;
                    fighter.vx = 0;
                    fighter.vy = 0;
                    floatText("퇴근", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
                }
            });
        }

        function updateFollowSkill(fighter, now) {
            if (!fighter.followUntil || fighter.followUntil <= now) {
                fighter.followTargetId = null;
                fighter.followEffects = null;
                return false;
            }

            const target = getFighterById(fighter.followTargetId);
            if (!target || target.dead || target.offMapUntil > now || areAllies(fighter, target)) {
                fighter.followTargetId = null;
                fighter.followUntil = 0;
                fighter.followEffects = null;
                return false;
            }

            const effects = fighter.followEffects || fighter.definition.skill.effects || {};
            const direction = normalize(target.x - fighter.x, target.y - fighter.y);
            fighter.vx = direction.x * scaledSpeed(fighter.speed * (effects.followSpeedMultiplier || 1));
            fighter.vy = direction.y * scaledSpeed(fighter.speed * (effects.followSpeedMultiplier || 1));

            if (now >= fighter.nextFollowDamageAt) {
                applyDamage(target, (effects.damagePerSecond || 0) * (effects.tickInterval || 1), fighter, "skill");
                fighter.nextFollowDamageAt = now + (effects.tickInterval || 1) * 1000;
            }

            return true;
        }

        function useSkill(fighter, now) {
            const id = fighter.definition.id;
            skillLabel(fighter.definition.skill.name, fighter);
            screenFlash(fighter.definition.color);
            megaBurst(fighter.x, fighter.y, fighter.definition.color, id === "lee-seunghyun" ? 4 : 8);

            if (id === "test") {
                activateSpeedGrowthAbility(fighter, now);
            }

            if (id === "kim-suyeong") {
                createWindmill(fighter, now);
                floatText("풍차!", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            }

            if (id === "gu-minchan") {
                const effects = fighter.definition.skill.effects || {};
                fighter.volleyballThrows += 1;
                if (fighter.volleyballThrows % (effects.spikeEvery || 4) === 0) {
                    scheduleSpike(fighter, now, effects);
                } else {
                    createVolleyball(fighter, now);

        function handleWallBounce(fighter) {
            const radius = battle.ballSize / 2;
            let bounced = false;
            const now = performance.now();

            if (fighter.x < radius) {
                fighter.x = radius;
                fighter.vx = Math.abs(fighter.vx);
                bounced = true;
            } else if (fighter.x > battle.arenaSize - radius) {
                fighter.x = battle.arenaSize - radius;
                fighter.vx = -Math.abs(fighter.vx);
                bounced = true;
            }

            if (fighter.y < radius) {
                fighter.y = radius;
                fighter.vy = Math.abs(fighter.vy);
                bounced = true;
            } else if (fighter.y > battle.arenaSize - radius) {
                fighter.y = battle.arenaSize - radius;
                fighter.vy = -Math.abs(fighter.vy);
                bounced = true;
            }

            if (bounced) {
                if (fighter.windmillMomentum) {
                    const momentum = fighter.windmillMomentum;
                    if (momentum.phase === "toWall") {
                        momentum.phase = "rebound";
                        momentum.speed = momentum.reboundSpeed;
                        momentum.nextDecayAt = now + momentum.decayInterval;
                    }
                    momentum.nextAfterimageAt = 0;
                    applyDamage(fighter, momentum.wallDamage, momentum.source, "skill");
                    floatText(`벽충돌 +${momentum.wallDamage}`, fighter.x, fighter.y - battle.ballSize / 2, momentum.source.definition.color);
                    burst(fighter.x, fighter.y, momentum.source.definition.color, 8);
                    effectRing(fighter.x, fighter.y, battle.ballSize * 1.15, momentum.source.definition.color);
                    jitterVelocity(fighter, (Math.random() - 0.5) * 0.45, momentum.speed);
                    return;
                }

                const chargeEffects = fighter.definition.id === "lee-woochan" && fighter.chargeUntil > now
                    ? fighter.definition.skill.effects
                    : null;
                const bounceSpeed = chargeEffects
                    ? Math.max(chargeEffects.minSpeed, moveSpeedOf(fighter, now) * chargeEffects.speedMultiplier)
                    : moveSpeedOf(fighter, now);
                jitterVelocity(fighter, (Math.random() - 0.5) * 0.75, bounceSpeed);
                effectRing(fighter.x, fighter.y, battle.ballSize * 0.8, fighter.definition.color);
            }
        }

        function handleBasicAttack(attacker, defender, now) {
            if (attacker.dead || defender.dead || areAllies(attacker, defender) || isStunned(attacker, now) || attacker.definition.contactAttackDisabled) {
                return;
            }

            const piercesBasicIgnore = attacker.definition.id === "song-geonuk"
                && attacker.dietUses >= (attacker.definition.skill.effects.pierceBasicAfterUses || Infinity)
                && (defender.definition.evadesBasic || defender.definition.immuneToBasic);
            const attackAmount = piercesBasicIgnore ? attacker.definition.baseAttack : attacker.attack;
            const passiveEffects = attacker.definition.passive?.effects || {};
            const basicBonusDamage = Math.max(0, defender.hp * (passiveEffects.basicCurrentHpBonusRatio || 0));
            const dealt = applyDamage(defender, attackAmount, attacker, "basic");
            if (dealt > 0) {
                if (basicBonusDamage > 0 && !defender.dead) {
                    applyDamage(defender, basicBonusDamage, attacker, "passive");
                }
                reduceCooldown(attacker, attacker.definition.cooldownOnBasicHit);
            }
        }

        function handleChargeHit(charger, target, normalX, normalY) {
            const now = performance.now();
            if (charger.chargeUntil <= now || charger.chargeHits.has(target.id) || charger.dead || target.dead || areAllies(charger, target)) {
                return;
            }

            charger.chargeHits.add(target.id);
            const effects = charger.definition.skill.effects;
            applyDamage(target, effects.damage, charger, "skill");
            if (target.definition.immuneToKnockback) {
                floatText("NO PUSH", target.x, target.y, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.15, target.definition.color);
            } else if (!isStunned(target, now)) {
                target.vx = normalX * scaledSpeed(effects.knockback);
                target.vy = normalY * scaledSpeed(effects.knockback);
            }
            burst(target.x, target.y, charger.definition.color, 16);
            effectRing(target.x, target.y, battle.ballSize * 1.3, charger.definition.color);
        }

        function handleCollisions(now) {
            const radius = battle.ballSize / 2;

            for (let first = 0; first < battle.fighters.length; first += 1) {
                for (let second = first + 1; second < battle.fighters.length; second += 1) {
                    const a = battle.fighters[first];
                    const b = battle.fighters[second];
                    if (a.dead || b.dead || a.offMapUntil > now || b.offMapUntil > now) {
                        continue;
                    }

                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const distance = Math.sqrt(dx * dx + dy * dy) || 1;
                    const minDistance = radius * 2;

                    if (distance > minDistance) {
                        continue;
                    }

                    const nx = dx / distance;
                    const ny = dy / distance;
                    const overlap = minDistance - distance;
                    const noPushPair = a.definition.noPushCollision || b.definition.noPushCollision;
                    const tangentX = -ny;
                    const tangentY = nx;
                    const randomSide = Math.random() < 0.5 ? -1 : 1;

                    if (noPushPair) {
                        if (a.definition.noPushCollision && !isStunned(a, now)) {
                            a.x -= nx * overlap;
                            a.y -= ny * overlap;
                        } else if (b.definition.noPushCollision && !isStunned(b, now)) {
                            b.x += nx * overlap;
                            b.y += ny * overlap;
                        }
                    } else {
                        const separation = overlap * 0.58 + 0.8;
                        if (!isStunned(a, now)) {
                            a.x -= nx * separation;
                            a.y -= ny * separation;
                        }
                        if (!isStunned(b, now)) {
                            b.x += nx * separation;
                            b.y += ny * separation;
                        }
                    }

                    const aVelocity = a.vx * nx + a.vy * ny;
                    const bVelocity = b.vx * nx + b.vy * ny;
                    const impulse = bVelocity - aVelocity;

                    if (!noPushPair && !isStunned(a, now)) {
                        a.vx += impulse * nx + tangentX * randomSide * scaledSpeed(18);
                        a.vy += impulse * ny + tangentY * randomSide * scaledSpeed(18);
                    }
                    if (!noPushPair && !isStunned(b, now)) {
                        b.vx -= impulse * nx + tangentX * randomSide * scaledSpeed(18);
                        b.vy -= impulse * ny + tangentY * randomSide * scaledSpeed(18);
                    }

                    if (!noPushPair) {
                        const aCharge = a.definition.skill.effects || {};
                        const bCharge = b.definition.skill.effects || {};
                        if (!a.windmillMomentum) {
                            setVelocitySpeed(a, a.chargeUntil > now ? Math.max(aCharge.minSpeed, moveSpeedOf(a, now) * aCharge.speedMultiplier) : moveSpeedOf(a, now));
                            jitterVelocity(a, (Math.random() - 0.5) * 0.28, moveSpeedOf(a, now));
                        }
                        if (!b.windmillMomentum) {
                            setVelocitySpeed(b, b.chargeUntil > now ? Math.max(bCharge.minSpeed, moveSpeedOf(b, now) * bCharge.speedMultiplier) : moveSpeedOf(b, now));
                            jitterVelocity(b, (Math.random() - 0.5) * 0.28, moveSpeedOf(b, now));
                        }
                        effectRing((a.x + b.x) / 2, (a.y + b.y) / 2, battle.ballSize * 1.15, "#1c1b1b");
                        if (now - (battle.lastImpactAt || 0) > 90) {
                            battle.lastImpactAt = now;
                            impactStar((a.x + b.x) / 2, (a.y + b.y) / 2, "#facc15");
                        }
                    }

                    handleChargeHit(a, b, nx, ny);
                    handleChargeHit(b, a, -nx, -ny);

                    const key = `${a.id}:${b.id}`;
                    const lastHit = battle.pairHits.get(key) || 0;
                    if (now - lastHit > 620) {
                        battle.pairHits.set(key, now);
                        handleBasicAttack(a, b, now);
                        handleBasicAttack(b, a, now);
                        burst((a.x + b.x) / 2, (a.y + b.y) / 2, "#1c1b1b", 5);
                    }
                }
            }
        }

        function updatePhysics(dt, now) {
            updateSummons(dt);
            updateBombs(now);
            updateVolleyballs(dt, now);

            battle.fighters.forEach((fighter) => {
                sanitizeFighterState(fighter);
                if (fighter.dead) {
                    return;
                }

                resolveBackstab(fighter, now);
                restoreFromOffMap(fighter, now);

                if (fighter.offMapUntil > now) {
                    return;
                }

                restoreFromStun(fighter, now);
                updateAfterimageWindow(fighter, now);
                updateRagePassive(fighter, now);
                updatePendingSpike(fighter, now);

                if (isStunned(fighter, now)) {
                    return;
                }

                updateRangedAttacks(fighter, now);

                fighter.skillCooldown -= dt;
                if (fighter.skillCooldown <= 0) {
                    useSkill(fighter, now);
                }
                if (isStunned(fighter, now)) {
                    return;
                }

                if (updateWindmillMomentum(fighter, now)) {
                    // Windmill impact controls movement while the extra speed remains.
                } else if (fighter.chargeUntil > now) {
                    if (Math.random() < 0.18) {
                        chargeGhost(fighter);
                    }
                    if (Math.random() < 0.08) {
                        burst(fighter.x, fighter.y, fighter.definition.color, 2);
                    }
                } else if (updateFollowSkill(fighter, now)) {
                    // Follow skill controls movement while active.
                } else if (fighter.definition.movementPattern === "corners") {
                    steerToCorner(fighter, dt, now);
                } else {
                    maintainMotion(fighter, now);
                }

                fighter.x += fighter.vx * dt;
                fighter.y += fighter.vy * dt;
                handleWallBounce(fighter);
            });

            handleCollisions(now);
            battle.fighters.forEach((fighter) => {
                if (!fighter.dead && fighter.offMapUntil <= now) {
                    handleWallBounce(fighter);
                }
            });
            updatePuddles(now);
            updatePoisons(now);
            updateIceZones(now);
            updateWindmills(now);
        }

        function checkWinner(now) {
            const alive = battle.fighters.filter((fighter) => !fighter.dead && !fighter.isSummon);
            if (!battle.isFinished && battle.isRunning && alive.length <= 1) {
                battle.isFinished = true;
                battle.isRunning = false;
                battle.finishedAt = now;
                countdown.classList.remove("hidden");
                countdown.innerHTML = `
                    <div>
                        <div>${alive[0] ? `${escapeHtml(alive[0].definition.name)} 승리` : "무승부"}</div>
                        <div class="font-label-numeric text-label-numeric mt-3">TIME ${formatElapsed(currentFightElapsed(now))}</div>
                    </div>
                `;
                matchTitle.textContent = "전투 종료";
                updateElapsed(now);
            }
        }

        function tick(now) {
            if (!battle.lastTime) {
                battle.lastTime = now;
            }

            const elapsed = now - battle.startedAt;
            const remaining = Math.ceil((battle.countdownSeconds * 1000 - elapsed) / 1000);

            if (!battle.isRunning && !battle.isFinished) {
                const countdownText = remaining > 0 ? String(remaining) : "FIGHT";
                if (countdown.textContent !== countdownText) {
                    countdown.textContent = countdownText;
                }
                if (elapsed >= battle.countdownSeconds * 1000) {
                    battle.isRunning = true;
                    battle.fightStartedAt = now;
                    countdown.classList.add("hidden");
                    matchTitle.textContent = "전투 중";
                }
            }

            const dt = Math.min(0.033, (now - battle.lastTime) / 1000);
            battle.lastTime = now;

            if (battle.isRunning) {
                updatePhysics(dt, now);
                checkWinner(now);
            }

            renderFighters(now);
            updateHud(now);
            updateElapsed(now);

            if (battle.isRunning || !battle.isFinished) {
                animationFrameId = requestAnimationFrame(tick);
            } else {
                animationFrameId = null;
            }
        }

        function showInfo(definition) {
            document.getElementById("modal-name").textContent = definition.name;
            document.getElementById("modal-name").style.color = definition.color;
            document.getElementById("modal-skill").textContent = `${definition.skill.name} / ${definition.skill.cooldown}초`;
            document.getElementById("modal-body").innerHTML = `
                <div class="grid grid-cols-2 gap-2 font-label-numeric text-label-numeric">
                    <div class="bg-surface-container-low brutal-border-thin p-2">HP ${definition.maxHp}</div>
                    <div class="bg-surface-container-low brutal-border-thin p-2">ATK ${definition.baseAttack}</div>
                    <div class="bg-surface-container-low brutal-border-thin p-2">SPD ${escapeHtml(definition.speedLabel)}</div>
                    <div class="bg-surface-container-low brutal-border-thin p-2">${escapeHtml(definition.colorName)}</div>
                </div>
                ${passiveHtml(definition)}
                <p class="text-on-surface-variant">${escapeHtml(definition.skill.description)}</p>
                <p class="font-label-numeric text-label-numeric">특성: ${escapeHtml(definition.traits.join(" / "))}</p>
                ${definition.immuneToBasic ? '<p class="font-label-numeric text-label-numeric text-secondary">기본 공격 피해 면역</p>' : ''}
                ${definition.immuneToKnockback ? '<p class="font-label-numeric text-label-numeric text-secondary">밀치기 면역</p>' : ''}
            `;
            document.getElementById("info-modal").classList.remove("hidden");
            document.getElementById("info-modal").classList.add("flex");
        }

        function hideInfo() {
            document.getElementById("info-modal").classList.add("hidden");
            document.getElementById("info-modal").classList.remove("flex");
        }

        function startBattle() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            arena.querySelectorAll(".fighter-ball, .effect-ring, .effect-burst, .damage-float, .skill-label, .bomb-timer, .impact-star, .puddle-zone, .poison-field, .ice-field, .arena-flash, .diet-aura, .ground-shockwave, .ground-crack, .ice-crystal, .frost-ring, .charge-ghost, .speed-line, .poison-drop, .poison-mist-cloud, .summon-portal, .summon-sparkle, .heart-particle, .glitch-line, .glitch-block, .cloud-particle, .slow-spiral, .siren-light, .arrest-net, .stealth-ghost, .blade-flash, .dust-puff, .bomb-pulse-ring, .explosion-ember, .explosion-flash-ring, .windmill-bar, .volleyball-projectile").forEach((node) => node.remove());
            battle.fighters = selectedCharacters.map((definition, index) => createFighter(definition, index, selectedCharacters.length));
            battle.pairHits = new Map();
            battle.activePuddles = [];
            battle.activePoisons = [];
            battle.activeBombs = [];
            battle.activeIceZones = [];
            battle.activeWindmills = [];
            battle.activeVolleyballs = [];

            activeEffects.rings = 0;
            activeEffects.stars = 0;
            activeEffects.bursts = 0;
            activeEffects.floatTexts = 0;
            activeEffects.flashes = 0;

            battle.startedAt = performance.now();
            battle.fightStartedAt = 0;
            battle.finishedAt = 0;
            battle.lastTime = 0;
            battle.isRunning = false;
            battle.isFinished = false;
            countdown.classList.remove("hidden");
            countdown.textContent = "3";
            matchTitle.textContent = "전투 준비";

            lastElapsedText = "";
            elapsedTime.textContent = "TIME 00:00.0";

            layoutFighters();
            renderHud();
            renderFighters(performance.now());

            animationFrameId = requestAnimationFrame(tick);
        }

        document.getElementById("restart-button").addEventListener("click", startBattle);
        document.getElementById("modal-close").addEventListener("click", hideInfo);
        document.getElementById("info-modal").addEventListener("click", (event) => {
            if (event.target.id === "info-modal") {
                hideInfo();
            }
        });
        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                hideInfo();
            }
        });

        window.addEventListener("resize", () => {
            if (!battle.fighters.length) {
                return;
            }
            const oldSize = battle.arenaSize || 1;
            const rect = arena.getBoundingClientRect();
            const ratio = rect.width / oldSize;
            battle.arenaSize = rect.width;
            battle.ballSize = Math.max(54, Math.min(82, battle.arenaSize * 0.14));
            updateCachedCorners();
            battle.fighters.forEach((fighter) => {
                fighter.x *= ratio;
                fighter.y *= ratio;
                fighter.element.style.width = `${battle.ballSize}px`;
                fighter.element.style.height = `${battle.ballSize}px`;
            });
        });

        startBattle();
    </script>
</body>

</html>
