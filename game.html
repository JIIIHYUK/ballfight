                mode: "active",
                phase: "prepare",
                prepareUntil: now + (effects.prepareDuration || 2) * 1000,
                range,
                rangeElement
            });
        }

        function startParkRisingSlash(fighter, now) {
            const effects = parkSungbinSkillEffects(fighter);
            const lifeDuration = Math.max(0.1, effects.risingSlashLifeDuration || 0.32);
            const laneWidth = battle.arenaSize * (effects.risingSlashWidthRatio || 0.2);
            const count = Math.max(1, effects.risingSlashCount || 7);
            const length = bossAttackRange(fighter, battle.arenaSize * (effects.risingSlashLengthRatio || 0.24));
            const thickness = bossAttackRange(fighter, effects.risingSlashThickness || 24);
            const centerX = battle.arenaSize / 2;
            const totalDuration = Math.max(0, effects.risingSlashDuration || 0.8);
            const fallbackSpawnInterval = count > 1 ? totalDuration / (count - 1) : 0;
            const spawnIntervalMs = Math.max(0, (effects.risingSlashSpawnInterval ?? fallbackSpawnInterval) * 1000);
            const angleSpread = effects.risingSlashAngleSpread || 0.95;
            const topMargin = battle.ballSize * 0.9;
            const bottomMargin = battle.ballSize * 0.9;
            const verticalSpan = Math.max(1, battle.arenaSize - topMargin - bottomMargin);
            for (let index = 0; index < count; index += 1) {
                const x = centerX - laneWidth / 2 + Math.random() * laneWidth;
                const y = battle.arenaSize - bottomMargin - (count === 1 ? 0 : (verticalSpan * index) / (count - 1));
                const angle = (Math.random() - 0.5) * Math.PI * angleSpread;
                battle.activeParkRisingSlashes.push({
                    ownerId: fighter.id,
                    element: null,
                    x,
                    y,
                    length,
                    thickness,
                    angle,
                    damage: effects.risingSlashDamage || 30,
                    spawnAt: now + index * spawnIntervalMs,
                    startedAt: 0,
                    duration: lifeDuration * 1000,
                    hitIds: new Set()
                });
            }
            floatText(`참격 상승 x${count}`, centerX, battle.arenaSize - battle.ballSize, fighter.definition.color);
        }

        function updateParkRisingSlashes(now) {
            battle.activeParkRisingSlashes = battle.activeParkRisingSlashes.filter((slash) => {
                const owner = getFighterById(slash.ownerId);
                if (!owner || owner.dead) {
                    slash.element?.remove();
                    return false;
                }
                if (!slash.element) {
                    if (now < slash.spawnAt) {
                        return true;
                    }
                    slash.startedAt = now;
                    slash.element = document.createElement("div");
                    slash.element.className = "park-rising-slash";
                    slash.element.style.left = `${slash.x}px`;
                    slash.element.style.top = `${slash.y}px`;
                    slash.element.style.width = `${slash.length}px`;
                    slash.element.style.height = `${slash.thickness}px`;
                    slash.element.style.color = owner.definition.color;
                    slash.element.style.setProperty("--angle", `${slash.angle}rad`);
                    slash.element.style.setProperty("--duration", `${slash.duration}ms`);
                    arena.appendChild(slash.element);
                }
                const elapsed = now - slash.startedAt;
                if (elapsed >= slash.duration) {
                    slash.element?.remove();
                    return false;
                }
                const y = slash.y;
                const halfLength = slash.length / 2;
                const dx = Math.cos(slash.angle) * halfLength;
                const dy = Math.sin(slash.angle) * halfLength;
                const ax = slash.x - dx;
                const ay = y - dy;
                const bx = slash.x + dx;
                const by = y + dy;
                livingEnemiesOf(owner).forEach((target) => {
                    if (slash.hitIds.has(target.id)) {
                        return;
                    }
                    if (distanceToSegment(target.x, target.y, ax, ay, bx, by) > slash.thickness / 2 + fighterRadius(target)) {
                        return;
                    }
                    slash.hitIds.add(target.id);
                    applyDamage(target, slash.damage, owner, "skill");
                    impactStar(target.x, target.y, owner.definition.color);
                });
                return true;
            });
        }

        function isHazardMovingTowardFighter(hazard, fighter, range) {
            if (!hazard || !Number.isFinite(hazard.x) || !Number.isFinite(hazard.y)) {
                return false;
            }

            const vx = hazard.vx || 0;
            const vy = hazard.vy || 0;
            const speed = Math.hypot(vx, vy);
            if (speed <= 1) {
                return false;
            }

            const toFighterX = fighter.x - hazard.x;
            const toFighterY = fighter.y - hazard.y;
            const distance = Math.hypot(toFighterX, toFighterY);
            if (distance > range || distance <= 1) {
                return false;
            }

            return (vx * toFighterX + vy * toFighterY) / (speed * distance) > 0.62;
        }

        function kimJunsuHazards(fighter) {
            const hazards = [];
            battle.activeVolleyballs.forEach((ball) => {
                if (!ball.source || ball.source.dead || areAllies(ball.source, fighter)) {
                    return;
                }
                hazards.push(ball);
            });
            battle.activeKimDonggyuProjectiles.forEach((projectile) => {
                const source = getFighterById(projectile.sourceId);
                if (!source || source.dead || areAllies(source, fighter)) {
                    return;
                }
                hazards.push(projectile);
            });
            battle.activeKimGibeomApples.forEach((apple) => {
                const owner = getFighterById(apple.ownerId);
                if (!owner || owner.dead || areAllies(owner, fighter)) {
                    return;
                }
                hazards.push({
                    x: apple.x,
                    y: apple.y,
                    vx: 0,
                    vy: scaledSpeed(apple.speed || 0)
                });
            });
            return hazards;
        }

        function updateKimJunsuDodge(fighter, now) {
            if (!isKimJunsu(fighter) || fighter.dead || isPassiveForbidden(fighter, now) || isControlLocked(fighter, now)) {
                return;
            }

            const effects = kimJunsuPassiveEffects(fighter);
            const correction = effects.dangerCorrection ?? 0.023;
            const range = effects.dangerDetectionRange || 280;
            let avoidX = 0;
            let avoidY = 0;

            kimJunsuHazards(fighter).forEach((hazard) => {
                if (!isHazardMovingTowardFighter(hazard, fighter, range)) {
                    return;
                }
                const away = normalize(fighter.x - hazard.x, fighter.y - hazard.y);
                avoidX += away.x;
                avoidY += away.y;
            });

            if (Math.hypot(avoidX, avoidY) <= 0.01) {
                return;
            }

            const current = normalize(fighter.vx || avoidX, fighter.vy || avoidY);
            const avoid = normalize(avoidX, avoidY);
            const mixed = normalize(
                current.x * (1 - correction) + avoid.x * correction,
                current.y * (1 - correction) + avoid.y * correction
            );
            fighter.vx = mixed.x * scaledSpeed(moveSpeedOf(fighter, now));
            fighter.vy = mixed.y * scaledSpeed(moveSpeedOf(fighter, now));
        }

        function isJiTaehyeok(fighter) {
            return Boolean(fighter && fighter.definition.id === "ji-taehyeok");
        }

        function isDeveloperJiTaehyeok(fighter) {
            return Boolean(fighter && fighter.definition.id === "developer-ji-taehyeok");
        }

        function isJiDeveloperReviving(fighter) {
            return Boolean(isDeveloperJiTaehyeok(fighter) && fighter.jiDeveloperRevivePending);
        }

        function jiPassiveEffects(fighter) {
            return fighter?.definition.passive?.effects || {};
        }

        function jiSkillEffects(fighter) {
            return fighter?.definition.skill?.effects || {};
        }

        function jiSkillIntervalMs(fighter) {
            const passiveEffects = jiPassiveEffects(fighter);
            const skillEffects = jiSkillEffects(fighter);
            const seconds = skillEffects.skillInterval || passiveEffects.skillInterval || fighter?.definition.skill?.cooldown || 10;
            return Math.max(1, seconds) * 1000;
        }

        function resetJiTaehyeokSkillCooldown(fighter, now) {
            fighter.jiNextSkillAt = now + jiSkillIntervalMs(fighter);
            fighter.skillCooldown = skillCooldownDuration(fighter);
        }

        function isJiTaehyeokBusy(fighter) {
            return Boolean(isJiTaehyeok(fighter) && fighter.jiSkill);
        }

        function removeJiCaffeine(fighter) {
            fighter?.jiCaffeineElement?.remove();
            if (fighter) {
                fighter.jiCaffeineElement = null;
                fighter.jiCaffeineAutoConsumeAt = 0;
            }
        }

        function jiBasketballHtml(fighter) {
            const effects = jiSkillEffects(fighter);
            return `<img alt="농구공" ${imageAttrs(effects.basketballImageSrc || "images/지태혁/농구공.png", effects.basketballImageFallbackSrcs)}>`;
        }

        function clearJiSkillVisuals(fighter) {
            const skill = fighter?.jiSkill;
            if (!skill) {
                return;
            }
            [skill.warningElement, skill.shockElement, skill.shadowElement, skill.ballElement, skill.heldBallElement].forEach((element) => element?.remove());
            fighter.jiSkill = null;
            fighter.jiNextBasketballGhostAt = 0;
            fighter.element?.classList.remove("is-ji-dunking");
            fighter.element?.classList.remove("is-ji-skill-transparent");
        }

        function clearJiTaehyeokState(fighter) {
            removeJiCaffeine(fighter);
            clearJiSkillVisuals(fighter);
            if (isJiTaehyeok(fighter)) {
                fighter.offMapUntil = 0;
                fighter.invulnerableUntil = 0;
            }
        }

        function spawnJiCaffeine(fighter, now) {
            if (!isJiTaehyeok(fighter) || fighter.dead || isJiTaehyeokBusy(fighter)) {
                return;
            }
            if (fighter.jiCaffeineElement?.isConnected || (fighter.jiNextCaffeineAt || 0) > now) {
                return;
            }

            const effects = jiPassiveEffects(fighter);
            const size = fighterSize(fighter) * (effects.caffeineSizeMultiplier || 0.8);
            const spawnRadius = effects.caffeineSpawnRadius || 400;
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.sqrt(Math.random()) * spawnRadius;
            fighter.jiCaffeineX = Math.max(size / 2, Math.min(battle.arenaSize - size / 2, fighter.x + Math.cos(angle) * distance));
            fighter.jiCaffeineY = Math.max(size / 2, Math.min(battle.arenaSize - size / 2, fighter.y + Math.sin(angle) * distance));
            const caffeine = document.createElement("div");
            caffeine.className = "ji-caffeine";
            caffeine.style.left = `${fighter.jiCaffeineX}px`;
            caffeine.style.top = `${fighter.jiCaffeineY}px`;
            caffeine.style.width = `${size}px`;
            caffeine.style.height = `${size}px`;
            caffeine.innerHTML = `<img alt="카페인" ${imageAttrs(effects.caffeineImageSrc || "images/지태혁/카페인.png", effects.caffeineImageFallbackSrcs)}>`;
            arena.appendChild(caffeine);
            fighter.jiCaffeineElement = caffeine;
            fighter.jiNextCaffeineAt = now + (effects.caffeineSpawnInterval || 1) * 1000;
            fighter.jiCaffeineAutoConsumeAt = now + (effects.caffeineAutoConsumeDelay || 3) * 1000;
        }

        function consumeJiCaffeine(fighter, now) {
            const effects = jiPassiveEffects(fighter);
            removeJiCaffeine(fighter);
            fighter.jiCaffeineCharges = (fighter.jiCaffeineCharges || 0) + 1;
            fighter.jiCaffeineConsumed = (fighter.jiCaffeineConsumed || 0) + 1;
            fighter.jiRegenPerSecond = Math.min(
                effects.maxRegenPerSecond || 100,
                (fighter.jiRegenPerSecond || 0) + (effects.regenPerCaffeine || 10)
            );
            const previousMaxHp = fighter.maxHp;
            const minMaxHp = effects.minMaxHp || 250;
            fighter.maxHp = Math.max(minMaxHp, fighter.maxHp - (effects.maxHpLoss || 50));
            const maxHpReduced = fighter.maxHp < previousMaxHp;
            fighter.hp = Math.min(fighter.hp, fighter.maxHp);
            fighter.speed += effects.speedPerCaffeine || 10;
            setVelocitySpeed(fighter, moveSpeedOf(fighter, now));
            floatText(`카페인 ${fighter.jiCaffeineConsumed}`, fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.18, fighter.definition.color);
            if (!maxHpReduced && previousMaxHp <= minMaxHp && Math.random() < (effects.minHpBackfireChance ?? 0.1)) {
                const damage = effects.minHpBackfireDamage || 140;
                applyDamage(fighter, damage, fighter, "passive", {
                    unavoidable: true,
                    ignoreYuDamageShare: true
                });
                floatText(`과다복용 ${damage}`, fighter.x, fighter.y - fighterRadius(fighter) * 1.45, "#ef4444");
            }
        }

        function updateJiRegeneration(fighter, dt, now) {
            const regen = fighter.jiRegenPerSecond || 0;
            if (!regen || fighter.hp >= fighter.maxHp) {
                return;
            }
            const healed = healFighter(fighter, regen * dt, fighter, { silent: true });
            if (healed > 0 && (!fighter.jiNextRegenFloatAt || now >= fighter.jiNextRegenFloatAt)) {
                floatText(`+${Math.round(regen)}/s`, fighter.x, fighter.y - fighterRadius(fighter), "#16a34a");
                fighter.jiNextRegenFloatAt = now + 1000;
            }
        }

        function jiCaffeineShotBonusStacks(fighter) {
            const effects = jiPassiveEffects(fighter);
            const interval = Math.max(1, effects.caffeineShotBonusInterval || 5);
            return Math.floor((fighter.jiCaffeineConsumed || 0) / interval);
        }

        function jiThreePointShotCount(fighter) {
            const effects = jiSkillEffects(fighter);
            const uncapped = (effects.threePointShots || 2) + jiCaffeineShotBonusStacks(fighter);
            return Math.min(effects.maxThreePointShots || 4, uncapped);
        }

        function jiThreePointAimDurationMs(fighter) {
            const skillEffects = jiSkillEffects(fighter);
            const passiveEffects = jiPassiveEffects(fighter);
            const reduction = Math.max(0, Math.min(0.9, passiveEffects.caffeineAimReductionPerBonus || 0.3));
            const multiplier = Math.pow(1 - reduction, jiCaffeineShotBonusStacks(fighter));
            const protestMultiplier = protestAllyTimeMultiplier(fighter);
            return Math.max(
                (skillEffects.ballFlightDuration || 0.5) * 1000 * protestMultiplier,
                (skillEffects.aimDuration || 2) * multiplier * 1000 * protestMultiplier
            );
        }

        function updateJiCaffeinePassive(fighter, dt, now) {
            if (!isJiTaehyeok(fighter) || fighter.dead) {
                return;
            }
            updateJiRegeneration(fighter, dt, now);
            if (!fighter.jiNextSkillAt) {
                fighter.jiNextSkillAt = now + jiSkillIntervalMs(fighter);
            }
            if (isJiTaehyeokBusy(fighter) || fighter.offMapUntil > now) {
                return;
            }
            spawnJiCaffeine(fighter, now);
            if (fighter.jiCaffeineElement?.isConnected) {
                if ((fighter.jiCaffeineAutoConsumeAt || 0) > 0 && now >= fighter.jiCaffeineAutoConsumeAt) {
                    consumeJiCaffeine(fighter, now);
                } else {
                    const size = fighterSize(fighter) * (jiPassiveEffects(fighter).caffeineSizeMultiplier || 0.8);
                    if (Math.hypot(fighter.x - fighter.jiCaffeineX, fighter.y - fighter.jiCaffeineY) <= fighterRadius(fighter) + size * 0.5) {
                        consumeJiCaffeine(fighter, now);
                    }
                }
            }
            if (now >= fighter.jiNextSkillAt) {
                startJiBasketballSkill(fighter, now);
            }
        }

        function createJiCircle(className, x, y, diameter) {
            const element = document.createElement("div");
            element.className = className;
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;
            element.style.width = `${diameter}px`;
            element.style.height = `${diameter}px`;
            arena.appendChild(element);
            return element;
        }

        function startJiThreePointShot(fighter, now, shotIndex) {
            const effects = jiSkillEffects(fighter);
            const target = nearestEnemy(fighter);
            const targetX = clampToArena(target?.x ?? battle.arenaSize / 2);
            const targetY = clampToArena(target?.y ?? battle.arenaSize / 2);
            const aimMs = jiThreePointAimDurationMs(fighter);
            const flightMs = protestScaledMs(fighter, (effects.ballFlightDuration || 0.5) * 1000, now);
            const launchMs = Math.max(0, aimMs - flightMs);
            const shockDiameter = bossAttackRange(fighter, effects.shockwaveDiameter || 500);
            const warningDiameter = bossAttackRange(fighter, effects.warningDiameter || 125);
            const shadow = createJiCircle("ji-three-shadow", targetX, targetY, shockDiameter);
            shadow.style.animationDuration = `${aimMs}ms`;
            shadow.style.setProperty("--shadow-start-size", `${shockDiameter}px`);
            shadow.style.setProperty("--shadow-end-size", `${warningDiameter}px`);

            fighter.jiSkill = {
                phase: "three",
                shotIndex,
                targetX,
                targetY,
                startX: fighter.x,
                startY: fighter.y,
                launchAt: now + launchMs,
                impactAt: now + aimMs,
                warningDiameter,
                shockDiameter,
                warningElement: createJiCircle("ji-three-zone is-warning", targetX, targetY, warningDiameter),
                shockElement: createJiCircle("ji-three-zone is-shock", targetX, targetY, shockDiameter),
                shadowElement: shadow,
                ballElement: null,
                flightMs
            };
            floatText(`3점 슛 ${shotIndex + 1}`, targetX, targetY - warningDiameter * 0.5, fighter.definition.color);
        }

        function createJiBasketballElement(fighter, size, ghost = false) {
            const adjustedSize = bossProjectileSize(fighter, size);
            const element = document.createElement("div");
            element.className = ghost ? "ji-basketball-ghost" : "ji-basketball";
            element.style.width = `${adjustedSize}px`;
            element.style.height = `${adjustedSize}px`;
            element.innerHTML = jiBasketballHtml(fighter);
            if (ghost) {
                element.style.animationDuration = `${scaledAfterimageLifetime(420)}ms`;
            }
            arena.appendChild(element);
            return element;
        }

        function positionJiBall(element, x, y, rotation = 0) {
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;
            element.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
        }

        function impactJiThreePointShot(fighter, now) {
            const skill = fighter.jiSkill;
            if (!skill) {
                return;
            }
            const effects = jiSkillEffects(fighter);
            const warningDiameter = skill.warningDiameter || bossAttackRange(fighter, effects.warningDiameter || 125);
            const shockDiameter = skill.shockDiameter || bossAttackRange(fighter, effects.shockwaveDiameter || 500);
            const warningRadius = warningDiameter / 2;
            const shockRadius = shockDiameter / 2;
            livingEnemiesOf(fighter).forEach((target) => {
                const distance = Math.hypot(target.x - skill.targetX, target.y - skill.targetY);
                if (distance <= shockRadius + fighterRadius(target)) {
                    applyDamage(target, effects.shockwaveDamage || 50, fighter, "skill", { unavoidable: true });
                }
                if (!target.dead && distance <= warningRadius + fighterRadius(target)) {
                    applyDamage(target, effects.warningDamage || 150, fighter, "skill", { unavoidable: true });
                }
            });
            effectRing(skill.targetX, skill.targetY, shockDiameter, fighter.definition.color);
            burst(skill.targetX, skill.targetY, fighter.definition.color, 8);
            [skill.warningElement, skill.shockElement, skill.shadowElement, skill.ballElement].forEach((element) => element?.remove());

            const nextShot = skill.shotIndex + 1;
            if (nextShot < jiThreePointShotCount(fighter)) {
                fighter.jiSkill = {
                    phase: "between",
                    nextAt: now + protestScaledMs(fighter, (effects.delayBetweenShots || 1) * 1000, now),
                    shotIndex: nextShot
                };
            } else {
                startJiDunk(fighter, now);
            }
        }

        function updateJiThreePointShot(fighter, now) {
            const skill = fighter.jiSkill;
            if (!skill || skill.phase !== "three") {
                return false;
            }
            const effects = jiSkillEffects(fighter);
            if (now >= skill.launchAt && !skill.ballElement) {
                skill.ballElement = createJiBasketballElement(fighter, effects.ballDiameter || effects.warningDiameter || 125);
            }
            if (skill.ballElement) {
                const flightMs = Math.max(1, skill.flightMs || protestScaledMs(fighter, (effects.ballFlightDuration || 0.5) * 1000, now));
                const progress = Math.max(0, Math.min(1, (now - skill.launchAt) / flightMs));
                const x = skill.startX + (skill.targetX - skill.startX) * progress;
                const y = skill.startY + (skill.targetY - skill.startY) * progress;
                positionJiBall(skill.ballElement, x, y, progress * 540);
                if (!fighter.jiNextBasketballGhostAt || now >= fighter.jiNextBasketballGhostAt) {
                    const ghost = createJiBasketballElement(fighter, (effects.ballDiameter || effects.warningDiameter || 125) * 0.72, true);
                    positionJiBall(ghost, x, y, progress * 540);
                    setTimeout(() => ghost.remove(), scaledAfterimageLifetime(440));
                    fighter.jiNextBasketballGhostAt = now + scaledAfterimageInterval(90);
                }
            }
            if (now >= skill.impactAt) {
                impactJiThreePointShot(fighter, now);
            }
            return true;
        }

        function startJiDunk(fighter, now) {
            const effects = jiSkillEffects(fighter);
            const target = nearestEnemy(fighter);
            const center = battle.arenaSize / 2;
            const aimX = target?.x ?? center;
            const aimY = target?.y ?? center;
            const outward = normalize(aimX - center || 1, aimY - center || 0);
            const startDistance = battle.arenaSize * 0.66 + battle.ballSize * 2;
            fighter.x = center + outward.x * startDistance;
            fighter.y = center + outward.y * startDistance;
            fighter.offMapUntil = 0;
            fighter.invulnerableUntil = now + (effects.dunkMaxDuration || 2) * 1000 + 500;
            fighter.element.classList.remove("is-offmap");
            fighter.element.classList.add("is-ji-dunking");
            const heldBallSize = baseFighterSize(fighter) * (effects.dunkBallSizeMultiplier || 0.72);
            const heldBall = createJiBasketballElement(fighter, heldBallSize);
            heldBall.classList.add("is-held");
            fighter.jiSkill = {
                phase: "dunk",
                targetId: target?.id || null,
                startedAt: now,
                expiresAt: now + (effects.dunkMaxDuration || 2) * 1000,
                nextAfterimageAt: 0,
                heldBallElement: heldBall
            };
            floatText("덩크", clampToArena(aimX), clampToArena(aimY), fighter.definition.color);
        }

        function finishJiDunk(fighter, target, now) {
            const effects = jiSkillEffects(fighter);
            fighter.jiSkill?.heldBallElement?.remove();
            if (target && !target.dead) {
                applyDamage(target, effects.dunkDamage || 150, fighter, "skill", { unavoidable: true });
                impactStar(target.x, target.y, fighter.definition.color);
            }
            livingEnemiesOf(fighter).forEach((enemy) => {
                if (!enemy.dead) {
                    applyDamage(enemy, effects.dunkShockwaveDamage || 10, fighter, "skill", { unavoidable: true });
                }
            });
            effectRing(clampToArena(fighter.x), clampToArena(fighter.y), battle.arenaSize * 1.4, fighter.definition.color);
            burst(clampToArena(fighter.x), clampToArena(fighter.y), fighter.definition.color, 8);
            fighter.x = clampToArena(fighter.x);
            fighter.y = clampToArena(fighter.y);
            fighter.offMapUntil = 0;
            fighter.invulnerableUntil = now + 500;
            fighter.element.classList.remove("is-ji-dunking");
            fighter.element.classList.remove("is-ji-skill-transparent");
            fighter.jiSkill = null;
            resetJiTaehyeokSkillCooldown(fighter, now);
            setVelocityDirection(fighter, Math.random() - 0.5, Math.random() - 0.5, fighter.speed);
        }

        function updateJiDunk(fighter, dt, now) {
            const skill = fighter.jiSkill;
            if (!skill || skill.phase !== "dunk") {
                return false;
            }
            const lockedTarget = getFighterById(skill.targetId);
            const target = lockedTarget && !lockedTarget.dead && lockedTarget.offMapUntil <= now
                ? lockedTarget
                : nearestEnemy(fighter);
            const aimX = target?.x ?? battle.arenaSize / 2;
            const aimY = target?.y ?? battle.arenaSize / 2;
            const direction = normalize(aimX - fighter.x, aimY - fighter.y);
            const speed = scaledSpeed(jiSkillEffects(fighter).dunkSpeed || 1000);
            fighter.vx = direction.x * speed;
            fighter.vy = direction.y * speed;
            fighter.x += fighter.vx * dt;
            fighter.y += fighter.vy * dt;
            if (skill.heldBallElement?.isConnected) {
                const ballOffset = fighterRadius(fighter) * 0.78;
                positionJiBall(skill.heldBallElement, fighter.x + ballOffset, fighter.y + ballOffset, now * 0.48);
            }
            if (!skill.nextAfterimageAt || now >= skill.nextAfterimageAt) {
                createAfterimage(fighter, { opacity: 0.42, scale: 0.96, lifetime: 440 });
                skill.nextAfterimageAt = now + scaledAfterimageInterval(65);
            }
            if ((target && Math.hypot(target.x - fighter.x, target.y - fighter.y) <= fighterRadius(fighter) + fighterRadius(target)) || now >= skill.expiresAt) {
                finishJiDunk(fighter, target, now);
            }
            return true;
        }

        function startJiBasketballSkill(fighter, now) {
            if (!isJiTaehyeok(fighter) || fighter.dead || isJiTaehyeokBusy(fighter)) {
                return false;
            }
            fighter.jiNextSkillAt = now + jiSkillIntervalMs(fighter);
            fighter.skillCooldown = skillCooldownDuration(fighter);
            removeJiCaffeine(fighter);
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            fighter.offMapUntil = now + 20000;
            fighter.invulnerableUntil = fighter.offMapUntil;
            fighter.x = -fighterRadius(fighter) * 0.25;
            fighter.y = battle.arenaSize * 0.5;
            startJiThreePointShot(fighter, now, 0);
            screenFlash(fighter.definition.color);
            return true;
        }

        function updateJiBasketballState(fighter, dt, now) {
            if (!isJiTaehyeok(fighter) || fighter.dead) {
                return false;
            }
            updateJiCaffeinePassive(fighter, dt, now);
            const skill = fighter.jiSkill;
            if (!skill) {
                return false;
            }
            if (skill.phase === "three") {
                return updateJiThreePointShot(fighter, now);
            }
            if (skill.phase === "between") {
                fighter.vx = 0;
                fighter.vy = 0;
                if (now >= skill.nextAt) {
                    startJiThreePointShot(fighter, now, skill.shotIndex);
                }
                return true;
            }
            if (skill.phase === "dunk") {
                return updateJiDunk(fighter, dt, now);
            }
            return false;
        }

        function isJiDrone(fighter) {
            return Boolean(fighter && fighter.summonType === "ji-drone");
        }

        function isJiCodeRaining(fighter, now = performance.now()) {
            return Boolean(isDeveloperJiTaehyeok(fighter) && fighter.jiCodeRainUntil > now);
        }

        function isJiTaehyeokBusy(fighter) {
            return Boolean(isJiTaehyeok(fighter) && fighter.jiSkill);
        }

        function jiOwnedDrones(owner) {
            return battle.fighters.filter((fighter) => !fighter.dead && isJiDrone(fighter) && fighter.ownerId === owner.id);
        }

        function jiDroneEffects(drone) {
            const owner = getFighterById(drone.ownerId);
            return jiPassiveEffects(owner || drone);
        }

        function isJiDroneOverclocked(owner, now = performance.now()) {
            return Boolean(isDeveloperJiTaehyeok(owner) && owner.jiDroneOverclockUntil > now);
        }

        function jiDroneSkillCooldownSeconds(owner, now = performance.now()) {
            const effects = jiPassiveEffects(owner);
            if (isJiDroneOverclocked(owner, now)) {
                return effects.droneOverclockSkillCooldown || 0.2;
            }
            return effects.droneSkillCooldown || 1;
        }

        function jiDroneOrbitSlotCount(owner, now = performance.now()) {
            const effects = jiPassiveEffects(owner);
            if (isJiDroneOverclocked(owner, now)) {
                return Math.max(1, effects.droneOverclockOrbitSlots || effects.droneOverclockDroneCount || 6);
            }
            return Math.max(1, effects.droneOrbitSlots || 4);
        }

        function createJiDroneDefinition(owner) {
            const effects = jiPassiveEffects(owner);
            return {
                id: "ji-taehyeok-drone",
                name: "드론",
                shortName: "드론",
                maxHp: effects.droneHp || 150,
                baseAttack: 0,
                speedLabel: "드론",
                speed: owner.speed,
                colorName: owner.definition.colorName,
                color: owner.definition.color,
                textColor: owner.definition.textColor,
                avatarSrc: effects.droneImageSrc || "images/지태혁/드론.png",
                avatarFallbackSrcs: effects.droneImageFallbackSrcs,
                avatarText: "D",
                traits: ["드론", "랜덤 스킬"],
                skill: {
                    name: "드론 스킬",
                    cooldown: effects.droneSkillCooldown || 1,
                    passiveOnly: true,
                    description: "1초마다 랜덤 드론 스킬을 사용합니다."
                },
                cooldownOnBasicHit: 0,
                cooldownOnDamageTaken: 0,
                immuneToBasic: false,
                contactAttackDisabled: true,
                noPushCollision: true
            };
        }

        function spawnJiDrone(owner, now, options = {}) {
            if (!isDeveloperJiTaehyeok(owner) || owner.dead || isPassiveForbidden(owner, now)) {
                return null;
            }
            const effects = jiPassiveEffects(owner);
            owner.jiDroneSequence = (owner.jiDroneSequence || 0) + 1;
            const existingDrones = jiOwnedDrones(owner);
            const slotCount = Math.max(1, options.slotCount || jiDroneOrbitSlotCount(owner, now));
            const usedSlots = new Set(existingDrones.map((drone) => drone.jiDroneOrbitSlot).filter((slot) => Number.isFinite(slot)));
            let slot = Number.isFinite(options.slot) ? options.slot : 0;
            while (slot < slotCount && usedSlots.has(slot)) {
                slot += 1;
            }
            if (slot >= slotCount) {
                slot = existingDrones.length % slotCount;
            }
            const drone = createFighter(createJiDroneDefinition(owner), battle.fighters.length, battle.fighters.length + 1, {
                id: `${owner.id}-drone-${owner.jiDroneSequence}`,
                isSummon: true,
                ownerId: owner.id,
                summonType: "ji-drone",
                sizeMultiplier: effects.droneSizeMultiplier || 0.7,
                statsOwnerId: owner.statsOwnerId || owner.id,
                jiDroneOrbitAngle: 0
            });
            drone.jiDroneOrbitSlot = slot;
            drone.hp = drone.maxHp;
            drone.x = owner.x;
            drone.y = owner.y;
            drone.jiNextDroneSkillAt = now + jiDroneSkillCooldownSeconds(owner, now) * 1000;
            battle.fighters.push(drone);
            if (!options.silent) {
                effectRing(owner.x, owner.y, battle.ballSize * 1.05, owner.definition.color);
                floatText("드론", owner.x, owner.y - fighterRadius(owner), owner.definition.color);
            }
            return drone;
        }

        function drawJiDroneLaser(from, to) {
            if (!from || !to) {
                return;
            }
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            const length = Math.max(1, Math.hypot(dx, dy));
            const laser = document.createElement("div");
            laser.className = "ji-drone-laser";
            laser.style.left = `${from.x}px`;
            laser.style.top = `${from.y}px`;
            laser.style.width = `${length}px`;
            laser.style.transform = `translate(0, -50%) rotate(${Math.atan2(dy, dx)}rad)`;
            laser.style.setProperty("--angle", `${Math.atan2(dy, dx)}rad`);
            arena.appendChild(laser);
            setTimeout(() => laser.remove(), 420);
        }

        function applyJiMaxHpLoss(target, amount, source = null, now = performance.now()) {
            if (!target || target.dead || !Number.isFinite(amount) || amount <= 0) {
                return false;
            }
            if (tryKwonSoonbeomEffectBlock(target, source, "maxHpLoss", now)) {
                return false;
            }
            target.maxHp = Math.max(1, target.maxHp - amount);
            target.hp = Math.min(target.hp, target.maxHp);
            return true;
        }

        function disableAdminDonggyuTurrets(target, now, seconds = 5) {
            if (!isAdminKimDonggyu(target) || !Number.isFinite(seconds) || seconds <= 0) {
                return;
            }
            target.adminDonggyuTurretDisabledUntil = Math.max(target.adminDonggyuTurretDisabledUntil || 0, now + seconds * 1000);
            floatText("터렛 정지", target.x, target.y - fighterRadius(target) * 1.25, target.definition.color);
        }

        function applyJiCooldownSlow(target, now, durationSeconds, multiplier, source = null) {
            if (!target || target.dead) {
                return false;
            }
            if (tryKwonSoonbeomEffectBlock(target, source, "cooldownSlow", now)) {
                return false;
            }
            const durationMs = Math.max(0, durationSeconds || 0) * 1000;
            target.slowUntil = Math.max(target.slowUntil || 0, now + durationMs);
            target.slowMultiplier = Math.min(target.slowMultiplier || 1, multiplier || 0.5);
            target.cooldownSlowUntil = Math.max(target.cooldownSlowUntil || 0, now + durationMs);
            target.cooldownSlowMultiplier = Math.min(target.cooldownSlowMultiplier || 1, multiplier || 0.5);
            if (isDeveloperJiTaehyeok(source)) {
                disableAdminDonggyuTurrets(target, now, 2.5);
                if (isAdminDonggyuHelicopter(target)) {
                    target.adminHeliDisabledUntil = Math.max(target.adminHeliDisabledUntil || 0, now + 2500);
                    target.vx = 0;
                    target.vy = 0;
                    floatText("헬기 정지", target.x, target.y - fighterRadius(target), source.definition.color);
                }
            }
            return true;
        }

        function resetTargetSkillCooldown(target, now, source = null) {
            if (!target?.definition?.skill || target.definition.skill.passiveOnly) {
                return false;
            }
            if (tryKwonSoonbeomEffectBlock(target, source, "cooldownReset", now)) {
                return false;
            }
            target.skillCooldown = skillCooldownDuration(target);
            if (isJiTaehyeok(target)) {
                target.jiNextSkillAt = now + target.skillCooldown * 1000;
            }
            return true;
        }

        function jiDroneEnemyTarget(drone) {
            const owner = getFighterById(drone.ownerId) || drone;
            return livingEnemiesOf(owner)
                .filter((target) => target !== drone)
                .sort((a, b) => Math.hypot(a.x - drone.x, a.y - drone.y) - Math.hypot(b.x - drone.x, b.y - drone.y))[0] || null;
        }

        function jiDroneAllyTarget(drone) {
            const owner = getFighterById(drone.ownerId);
            const allies = battle.fighters.filter((target) => (
                !target.dead
                && target.offMapUntil <= performance.now()
                && (target === drone || target === owner || areAllies(drone, target))
            ));
            return allies[Math.floor(Math.random() * allies.length)] || drone;
        }

        function applyJiDroneSkill(drone, now) {
            if (!isJiDrone(drone) || drone.dead || drone.jiDroneLaunchTargetId || isPassiveEffectForbidden(drone, now)) {
                return false;
            }
            const owner = getFighterById(drone.ownerId);
            if (!owner || owner.dead) {
                return false;
            }
            const effects = jiPassiveEffects(owner);
            const multiplier = drone.jiDroneEmpowered ? 2 : 1;
            drone.jiDroneEmpowered = false;
            drone.element?.classList.remove("is-empowered");

            const skills = ["nerf", "buff", "damage"];
            const skill = skills[Math.floor(Math.random() * skills.length)];
            if (skill === "buff") {
                const target = jiDroneAllyTarget(drone);
                drawJiDroneLaser(drone, target);
                const heal = (effects.droneBuffHeal || 50) * multiplier;
                if (target.hp >= target.maxHp) {
                    const maxHpGain = (effects.droneBuffMaxHpGain || 50) * multiplier;
                    target.maxHp += maxHpGain;
                    target.hp += maxHpGain;
                    floatText(`MAX +${Math.round(maxHpGain)}`, target.x, target.y - fighterRadius(target), owner.definition.color);
                } else {
                    healFighter(target, heal, owner, { color: owner.definition.color });
                }
                if (target.definition?.skill && !target.definition.skill.passiveOnly) {
                    target.skillCooldown = 0;
                }
                if (isJiDrone(target)) {
                    target.jiNextDroneSkillAt = now;
                }
                if (isJiTaehyeok(target)) {
                    target.jiNextSkillAt = now;
                }
                floatText("통합 버프", target.x, target.y - fighterRadius(target) * 1.4, owner.definition.color);
                return true;
            }

            const target = jiDroneEnemyTarget(drone);
            if (!target) {
                return false;
            }
            drawJiDroneLaser(drone, target);
            if (skill === "nerf") {
                if (tryKwonSoonbeomEffectBlock(target, owner, "nerf", now)) {
                    return true;
                }
                applyJiMaxHpLoss(target, (effects.droneNerfMaxHpLoss || 50) * multiplier, owner, now);
                resetTargetSkillCooldown(target, now, owner);
                applyJiCooldownSlow(target, now, (effects.droneNerf2Duration || 2) * multiplier, effects.droneNerf2SlowMultiplier || 0.5, owner);
                applyDamage(target, ((effects.droneNerfDamage || 10) + (effects.droneNerf2Damage || 10)) * multiplier, owner, "passive");
                floatText("통합 너프", target.x, target.y - fighterRadius(target), owner.definition.color);
            } else {
                applyDamage(target, (effects.droneDamage || 30) * multiplier, owner, "passive");
                floatText("대미지", target.x, target.y - fighterRadius(target), owner.definition.color);
            }
            return true;
        }

        function lockManagerJiToCenter(owner, now) {
            if (!isDeveloperJiTaehyeok(owner) || owner.dead) {
                return false;
            }
            owner.x = battle.arenaSize / 2;
            owner.y = battle.arenaSize / 2;
            owner.vx = 0;
            owner.vy = 0;
            owner.windmillMomentum = null;
            owner.noCollisionUntil = Math.max(owner.noCollisionUntil || 0, now + 120);
            return true;
        }

        function prepareJiOverclockDrones(owner, now) {
            const effects = jiPassiveEffects(owner);
            const targetCount = Math.max(1, effects.droneOverclockDroneCount || 6);
            const slotCount = Math.max(1, effects.droneOverclockOrbitSlots || targetCount);
            let drones = jiOwnedDrones(owner);
            drones.forEach((drone) => {
                drone.jiDroneLaunchTargetId = null;
                drone.jiDroneLaunchSourceId = null;
                drone.vx = 0;
                drone.vy = 0;
            });
            while (drones.length < targetCount) {
                const drone = spawnJiDrone(owner, now, {
                    slot: drones.length % slotCount,
                    slotCount,
                    silent: true
                });
                if (!drone) {
                    break;
                }
                drones = jiOwnedDrones(owner);
            }
            drones.forEach((drone, index) => {
                drone.jiDroneOrbitSlot = index % slotCount;
                drone.jiNextDroneSkillAt = Math.min(
                    drone.jiNextDroneSkillAt || now,
                    now + (effects.droneOverclockSkillCooldown || 0.2) * 1000
                );
            });
        }

        function triggerJiDroneOverclock(owner, now) {
            if (!isDeveloperJiTaehyeok(owner) || owner.dead || isPassiveForbidden(owner, now)) {
                return;
            }
            const effects = jiPassiveEffects(owner);
            const threshold = effects.droneOverclockExplosionThreshold || 12;
            owner.jiDroneExplosionCount = (owner.jiDroneExplosionCount || 0) + 1;
            if (owner.jiDroneExplosionCount < threshold) {
                return;
            }
            owner.jiDroneExplosionCount -= threshold;
            owner.jiDroneOverclockUntil = Math.max(
                owner.jiDroneOverclockUntil || 0,
                now + (effects.droneOverclockDuration || 5) * 1000
            );
            owner.jiNextDroneAt = owner.jiDroneOverclockUntil + (effects.droneInterval || 2) * 1000;
            lockManagerJiToCenter(owner, now);
            prepareJiOverclockDrones(owner, now);
            effectRing(owner.x, owner.y, battle.ballSize * 2.1, owner.definition.color);
            floatText("드론 오버클럭", owner.x, owner.y - fighterRadius(owner), owner.definition.color);
        }

        function registerJiDroneDestruction(drone, now) {
            if (!isJiDrone(drone) || drone.jiDroneDestroyCounted) {
                return;
            }
            const owner = getFighterById(drone.ownerId);
            if (!isDeveloperJiTaehyeok(owner) || owner.dead) {
                return;
            }
            drone.jiDroneDestroyCounted = true;
            triggerJiDroneOverclock(owner, now);
        }

        function explodeJiDrone(drone, now) {
            if (!isJiDrone(drone) || drone.dead) {
                return;
            }
            const owner = getFighterById(drone.ownerId) || drone;
            const effects = jiPassiveEffects(owner);
            const radius = (effects.droneExplosionDiameter || 200) / 2;
            effectRing(drone.x, drone.y, radius * 2, owner.definition.color);
            burst(drone.x, drone.y, owner.definition.color, 10);
            if (!isPassiveEffectForbidden(drone, now) && !isPassiveForbidden(owner, now)) {
                livingEnemiesOf(owner).forEach((target) => {
                    if (Math.hypot(target.x - drone.x, target.y - drone.y) <= radius + fighterRadius(target)) {
                        applyDamage(target, effects.droneExplosionDamage || 50, owner, "passive");
                    }
                });
            }
            drone.dead = true;
            drone.element?.remove();
            drone.kimSihyeonDarknessBarElement?.remove();
            drone.hudElement?.remove();
            battle.fighters = battle.fighters.filter((fighter) => fighter !== drone);
            registerJiDroneDestruction(drone, now);
        }

        function launchJiDrones(owner, now) {
            if (isJiDroneOverclocked(owner, now) || isPassiveForbidden(owner, now)) {
                return false;
            }
            const target = nearestEnemy(owner);
            const drones = jiOwnedDrones(owner);
            if (!target || drones.length <= 0) {
                return false;
            }
            drones.forEach((drone) => {
                drone.jiDroneLaunchTargetId = target.id;
                drone.jiDroneLaunchSourceId = owner.id;
            });
            floatText(`드론 폭격 x${drones.length}`, owner.x, owner.y - fighterRadius(owner), owner.definition.color);
            return true;
        }

        function pushJiOwnerFromDroneWall(owner, desiredX, desiredY, droneRadius) {
            const min = droneRadius;
            const max = battle.arenaSize - droneRadius;
            let shiftX = 0;
            let shiftY = 0;
            if (desiredX < min) {
                shiftX = min - desiredX;
            } else if (desiredX > max) {
                shiftX = max - desiredX;
            }
            if (desiredY < min) {
                shiftY = min - desiredY;
            } else if (desiredY > max) {
                shiftY = max - desiredY;
            }
            if (shiftX === 0 && shiftY === 0) {
                return false;
            }

            const ownerRadius = fighterRadius(owner);
            owner.x = Math.max(ownerRadius, Math.min(battle.arenaSize - ownerRadius, owner.x + shiftX));
            owner.y = Math.max(ownerRadius, Math.min(battle.arenaSize - ownerRadius, owner.y + shiftY));
            owner.vx = Math.max(-owner.speed, Math.min(owner.speed, (owner.vx || 0) + shiftX * 4));
            owner.vy = Math.max(-owner.speed, Math.min(owner.speed, (owner.vy || 0) + shiftY * 4));
            return true;
        }

        function clampJiDroneToArena(value, radius) {
            return Math.max(radius, Math.min(battle.arenaSize - radius, value));
        }

        function updateJiDroneState(drone, dt, now) {
            if (!isJiDrone(drone) || drone.dead) {
                return false;
            }
            const owner = getFighterById(drone.ownerId);
            if (!owner || owner.dead) {
                explodeJiDrone(drone, now);
                return true;
            }
            if (isPassiveEffectForbidden(drone, now)) {
                drone.jiDroneLaunchTargetId = null;
                drone.jiDroneLaunchSourceId = null;
                drone.vx = 0;
                drone.vy = 0;
                drone.jiNextDroneSkillAt = now + jiDroneSkillCooldownSeconds(owner, now) * 1000;
                return true;
            }
            const effects = jiPassiveEffects(owner);
            if (drone.jiDroneLaunchTargetId) {
                const target = getFighterById(drone.jiDroneLaunchTargetId) || nearestEnemy(owner);
                const aimX = target?.x ?? drone.x;
                const aimY = target?.y ?? drone.y;
                const direction = normalize(aimX - drone.x, aimY - drone.y);
                const speed = scaledSpeed(effects.droneLaunchSpeed || 760);
                drone.vx = direction.x * speed;
                drone.vy = direction.y * speed;
                drone.x += drone.vx * dt;
                drone.y += drone.vy * dt;
                if (!target || Math.hypot(target.x - drone.x, target.y - drone.y) <= fighterRadius(target) + fighterRadius(drone)) {
                    explodeJiDrone(drone, now);
                }
                return true;
            }

            const drones = jiOwnedDrones(owner);
            const index = Math.max(0, drones.indexOf(drone));
            const orbitRadius = fighterRadius(owner) + (effects.droneOrbitRadius || 41);
            if (index === 0) {
                owner.jiDroneOrbitAngle = (owner.jiDroneOrbitAngle || 0) + (effects.droneOrbitSpeed || 1.8) * dt;
            }
            const slotCount = jiDroneOrbitSlotCount(owner, now);
            const rawSlot = Number.isFinite(drone.jiDroneOrbitSlot) ? drone.jiDroneOrbitSlot : index;
            const slot = ((rawSlot % slotCount) + slotCount) % slotCount;
            const angle = (owner.jiDroneOrbitAngle || 0) + ((Math.PI * 2) / slotCount) * slot;
            const droneRadius = fighterRadius(drone);
            let desiredX = owner.x + Math.cos(angle) * orbitRadius;
            let desiredY = owner.y + Math.sin(angle) * orbitRadius;
            if (pushJiOwnerFromDroneWall(owner, desiredX, desiredY, droneRadius)) {
                desiredX = owner.x + Math.cos(angle) * orbitRadius;
                desiredY = owner.y + Math.sin(angle) * orbitRadius;
            }
            drone.x = clampJiDroneToArena(desiredX, droneRadius);
            drone.y = clampJiDroneToArena(desiredY, droneRadius);
            drone.vx = 0;
            drone.vy = 0;
            if (!drone.jiNextDroneSkillAt) {
                drone.jiNextDroneSkillAt = now + jiDroneSkillCooldownSeconds(owner, now) * 1000;
            }
            if (now >= drone.jiNextDroneSkillAt) {
                applyJiDroneSkill(drone, now);
                drone.jiNextDroneSkillAt = now + jiDroneSkillCooldownSeconds(owner, now) * 1000;
            }
            return true;
        }

        function updateJiDronePassive(owner, now) {
            if (!isDeveloperJiTaehyeok(owner) || owner.dead) {
                return;
            }
            const effects = jiPassiveEffects(owner);
            if (isJiDroneOverclocked(owner, now)) {
                owner.jiNextDroneAt = Math.max(
                    owner.jiNextDroneAt || 0,
                    owner.jiDroneOverclockUntil + (effects.droneInterval || 2) * 1000
                );
                return;
            }
            if (!owner.jiNextDroneAt) {
                owner.jiNextDroneAt = now + (effects.droneInterval || 5) * 1000;
                return;
            }
            if (now < owner.jiNextDroneAt) {
                return;
            }
            owner.jiNextDroneAt = now + (effects.droneInterval || 5) * 1000;
            const drones = jiOwnedDrones(owner);
            if (drones.length >= (effects.droneLaunchThreshold || 4)) {
                launchJiDrones(owner, now);
            } else {
                spawnJiDrone(owner, now);
            }
        }

        function distanceToSegment(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const lengthSq = dx * dx + dy * dy || 1;
            const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / lengthSq));
            const cx = x1 + t * dx;
            const cy = y1 + t * dy;
            return Math.hypot(px - cx, py - cy);
        }

        function createJiProgrammingLineElement(className, laser) {
            const element = document.createElement("div");
            const dx = laser.x2 - laser.x1;
            const dy = laser.y2 - laser.y1;
            const length = Math.hypot(dx, dy) + laser.width;
            element.className = className;
            element.style.width = `${length}px`;
            element.style.setProperty("--angle", `${Math.atan2(dy, dx)}rad`);
            element.style.setProperty("--laser-width", `${laser.width}px`);
            arena.appendChild(element);
            return element;
        }

        function spawnJiProgrammingLaser(owner, now, pattern = "diagonal-down") {
            const effects = jiSkillEffects(owner);
            const width = bossAttackRange(owner, effects.laserWidth || 120);
            const warningMs = Math.max(0.1, effects.warningDuration || 0.75) * 1000;
            const laserMs = Math.max(0.1, effects.laserDuration || 0.35) * 1000;
            const center = battle.arenaSize / 2;
            const endpoints = {
                "diagonal-down": { x1: 0, y1: 0, x2: battle.arenaSize, y2: battle.arenaSize },
                "diagonal-up": { x1: battle.arenaSize, y1: 0, x2: 0, y2: battle.arenaSize },
                horizontal: { x1: 0, y1: center, x2: battle.arenaSize, y2: center },
                vertical: { x1: center, y1: 0, x2: center, y2: battle.arenaSize }
            }[pattern] || { x1: 0, y1: 0, x2: battle.arenaSize, y2: battle.arenaSize };
            const laser = {
                ownerId: owner.id,
                ...endpoints,
                width,
                phase: "warning",
                warningUntil: now + warningMs,
                laserUntil: now + warningMs + laserMs,
                hitIds: new Set(),
                droneHitIds: new Set(),
                warningElement: null,
                laserElement: null
            };
            laser.warningElement = createJiProgrammingLineElement("ji-code-warning", laser);
            battle.activeJiCodeDrops.push(laser);
        }

        function removeJiCodeDrop(drop) {
            drop.element?.remove();
            drop.warningElement?.remove();
            drop.laserElement?.remove();
            battle.activeJiCodeDrops = battle.activeJiCodeDrops.filter((item) => item !== drop);
        }

        function applyJiCodeHit(owner, target, now) {
            const effects = jiSkillEffects(owner);
            if (tryKwonSoonbeomEffectBlock(target, owner, "programming", now)) {
                return;
            }
            applyJiMaxHpLoss(target, effects.codeMaxHpLoss || 50, owner, now);
            resetTargetSkillCooldown(target, now, owner);
            applyJiCooldownSlow(target, now, effects.codeSlowDuration || 2, effects.codeSlowMultiplier || 0.5, owner);
            applyDamage(target, effects.codeDamage || 15, owner, "skill");
            floatText("LASER", target.x, target.y - fighterRadius(target), owner.definition.color);
        }

        function updateJiCodeDrops(dt, now) {
            [...battle.activeJiCodeDrops].forEach((laser) => {
                const owner = getFighterById(laser.ownerId);
                if (!owner || owner.dead) {
                    removeJiCodeDrop(laser);
                    return;
                }
                if (laser.phase === "warning" && now >= laser.warningUntil) {
                    laser.phase = "laser";
                    laser.warningElement?.remove();
                    laser.warningElement = null;
                    laser.laserElement = createJiProgrammingLineElement("ji-code-laser", laser);
                    effectRing(battle.arenaSize / 2, battle.arenaSize / 2, battle.arenaSize * 1.28, owner.definition.color);
                }
                if (laser.phase !== "laser") {
                    return;
                }
                const drones = jiOwnedDrones(owner);
                for (const drone of drones) {
                    if (laser.droneHitIds.has(drone.id)) {
                        continue;
                    }
                    if (distanceToSegment(drone.x, drone.y, laser.x1, laser.y1, laser.x2, laser.y2) <= laser.width / 2 + fighterRadius(drone)) {
                        laser.droneHitIds.add(drone.id);
                        drone.jiDroneEmpowered = true;
                        drone.element?.classList.add("is-empowered");
                        floatText("버프 x2", drone.x, drone.y - fighterRadius(drone), owner.definition.color);
                    }
                }
                for (const target of livingEnemiesOf(owner)) {
                    if (laser.hitIds.has(target.id)) {
                        continue;
                    }
                    if (distanceToSegment(target.x, target.y, laser.x1, laser.y1, laser.x2, laser.y2) > laser.width / 2 + fighterRadius(target)) {
                        continue;
                    }
                    laser.hitIds.add(target.id);
                    applyJiCodeHit(owner, target, now);
                }
                if (now >= laser.laserUntil) {
                    removeJiCodeDrop(laser);
                }
            });
        }

        function clearJiTaehyeokState(fighter) {
            removeJiCaffeine(fighter);
            clearJiSkillVisuals(fighter);
            battle.activeJiCodeDrops
                .filter((drop) => drop.ownerId === fighter.id)
                .forEach(removeJiCodeDrop);
            jiOwnedDrones(fighter).forEach((drone) => {
                drone.dead = true;
                removeSummonFromBattle(drone);
            });
            if (isJiTaehyeok(fighter) || isDeveloperJiTaehyeok(fighter)) {
                fighter.offMapUntil = 0;
                fighter.invulnerableUntil = 0;
                fighter.jiCodeRainUntil = 0;
            }
        }

        function startDeveloperJiSkill(fighter, now) {
            if (!isDeveloperJiTaehyeok(fighter) || fighter.dead || isJiCodeRaining(fighter, now)) {
                return false;
            }
            const effects = jiSkillEffects(fighter);
            const durationMs = (Math.max(0.1, effects.warningDuration || 0.75) + Math.max(0.1, effects.laserDuration || 0.35)) * 1000;
            fighter.jiCodeRainUntil = now + durationMs;
            battle.activeJiCodeDrops
                .filter((laser) => laser.ownerId === fighter.id)
                .forEach(removeJiCodeDrop);
            const pattern = fighter.jiProgrammingNextPattern || "diagonal";
            if (pattern === "cross") {
                spawnJiProgrammingLaser(fighter, now, "horizontal");
                spawnJiProgrammingLaser(fighter, now, "vertical");
                fighter.jiProgrammingNextPattern = "diagonal";
                floatText("프로그래밍: 십자가", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            } else {
                spawnJiProgrammingLaser(fighter, now, "diagonal-down");
                spawnJiProgrammingLaser(fighter, now, "diagonal-up");
                fighter.jiProgrammingNextPattern = "cross";
                floatText("프로그래밍: 대각선", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            }
            fighter.skillCooldown = skillCooldownDuration(fighter);
            fighter.jiNextSkillAt = now + fighter.skillCooldown * 1000;
            screenFlash(fighter.definition.color);
            return true;
        }

        function updateJiCodeRain(owner, now) {
            if (!isDeveloperJiTaehyeok(owner) || owner.dead || !isJiCodeRaining(owner, now)) {
                return;
            }
            if (now >= owner.jiCodeRainUntil) {
                owner.jiCodeRainUntil = 0;
            }
        }

        function updateJiTaehyeokState(fighter, dt, now) {
            if (isJiDrone(fighter)) {
                return updateJiDroneState(fighter, dt, now);
            }
            if (isJiTaehyeok(fighter)) {
                return updateJiBasketballState(fighter, dt, now);
            }
            if (!isDeveloperJiTaehyeok(fighter) || fighter.dead) {
                return false;
            }
            if (isJiDeveloperReviving(fighter)) {
                fighter.vx = 0;
                fighter.vy = 0;
                return true;
            }
            if (isJiDroneOverclocked(fighter, now)) {
                lockManagerJiToCenter(fighter, now);
                updateJiCodeRain(fighter, now);
                return true;
            }
            if (!isPassiveForbidden(fighter, now)) {
                updateJiDronePassive(fighter, now);
            }
            updateJiCodeRain(fighter, now);
            if (!fighter.isSummon && fighter.skillCooldown <= 0 && !isJiCodeRaining(fighter, now)) {
                startDeveloperJiSkill(fighter, now);
            }
            return false;
        }

        function showJiDeveloperReviveText(text, onComplete = null) {
            const element = document.createElement("div");
            element.className = "ji-admin-revive-text";
            arena.appendChild(element);
            let index = 0;
            let completed = false;
            const interval = setInterval(() => {
                element.textContent = text.slice(0, index);
                index += 1;
                if (index > text.length) {
                    clearInterval(interval);
                    if (!completed) {
                        completed = true;
                        onComplete?.();
                    }
                    setTimeout(() => element.remove(), 900);
                }
            }, 42);
        }

        function finishJiDeveloperRevive(fighter) {
            if (!isDeveloperJiTaehyeok(fighter) || fighter.isSummon || !fighter.jiDeveloperRevivePending || !battle.fighters.includes(fighter)) {
                return false;
            }
            const now = performance.now();
            const effects = jiPassiveEffects(fighter);
            fighter.jiDeveloperRevivePending = false;
            fighter.dead = false;
            fighter.hp = Math.min(fighter.maxHp, effects.reviveHp || 500);
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.stunnedUntil = 0;
            fighter.invulnerableUntil = Math.max(fighter.invulnerableUntil || 0, now + 1200);
            fighter.noCollisionUntil = Math.max(fighter.noCollisionUntil || 0, now + 1200);
            fighter.element?.classList.remove("is-dead");
            floatText("부활", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            const count = Math.max(0, effects.reviveDroneCount || 2);
            for (let index = 0; index < count; index += 1) {
                spawnJiDrone(fighter, now, { angle: (Math.PI * 2 * index) / Math.max(1, count) });
            }
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.5, fighter.definition.color);
            return true;
        }

        function startJiDeveloperRevive(fighter, now) {
            if (!isDeveloperJiTaehyeok(fighter) || fighter.isSummon || fighter.jiDeveloperReviveUsed) {
                return false;
            }
            fighter.jiDeveloperReviveUsed = true;
            fighter.jiDeveloperRevivePending = true;
            fighter.hp = 1;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.stunnedUntil = 0;
            fighter.windmillMomentum = null;
            fighter.invulnerableUntil = Math.max(fighter.invulnerableUntil || 0, now + 10000);
            fighter.noCollisionUntil = Math.max(fighter.noCollisionUntil || 0, now + 10000);
            fighter.element?.classList.remove("is-dead");
            showJiDeveloperReviveText("관리자의 이름으로 부활", () => finishJiDeveloperRevive(fighter));
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.25, fighter.definition.color);
            return true;
        }

        function isLeeTaehwan(fighter) {
            return Boolean(fighter && fighter.definition.id === "lee-taehwan");
        }

        function leePassiveEffects(fighter) {
            return fighter.definition.passive?.effects || {};
        }

        function leeSkillEffects(fighter) {
            return fighter.definition.skill?.effects || {};
        }

        function isLeeCharging(fighter) {
            return isLeeTaehwan(fighter) && (fighter.leeShieldHitsRemaining || 0) > 0;
        }

        function isLeeDribbling(fighter, now = performance.now()) {
            return isLeeTaehwan(fighter) && fighter.leeDribbleUntil > now;
        }

        function clearLeeTrajectory(fighter, options = {}) {
            const trajectory = fighter.leeTrajectoryElement;
            fighter.leeTrajectoryElement = null;
            if (!trajectory) {
                return;
            }
            if (options.fade && trajectory.isConnected) {
                trajectory.classList.add("is-firing");
                setTimeout(() => trajectory.remove(), 680);
            } else {
                trajectory.remove();
            }
        }

        function clearLeeDribbleGhosts(fighter) {
            (fighter.leeDribbleGhosts || []).forEach((ghost) => ghost.remove());
            fighter.leeDribbleGhosts = [];
        }

        function leeAimDirection(fighter, options = {}) {
            const currentSpeed = Math.hypot(fighter.vx, fighter.vy);
            let desiredDirection = null;
            if (currentSpeed > 1) {
                desiredDirection = normalize(fighter.vx, fighter.vy);
            }

            const target = desiredDirection ? null : nearestEnemy(fighter);
            if (!desiredDirection && target) {
                const dx = target.x - fighter.x;
                const dy = target.y - fighter.y;
                if (Math.hypot(dx, dy) > 1) {
                    desiredDirection = normalize(dx, dy);
                }
            }

            desiredDirection = desiredDirection || fighter.leeChargeDirection || { x: 1, y: 0 };
            if (fighter.leeChargeDirection && !options.instant) {
                const effects = leeSkillEffects(fighter);
                const turnLerp = Math.max(0.01, Math.min(1, effects.chargeTurnLerp ?? 0.035));
                fighter.leeChargeDirection = normalize(
                    fighter.leeChargeDirection.x + (desiredDirection.x - fighter.leeChargeDirection.x) * turnLerp,
                    fighter.leeChargeDirection.y + (desiredDirection.y - fighter.leeChargeDirection.y) * turnLerp
                );
                return fighter.leeChargeDirection;
            }

            fighter.leeChargeDirection = desiredDirection;
            return fighter.leeChargeDirection;
        }

        function rayToArenaWall(x, y, direction) {
            const radius = battle.ballSize / 2;
            const min = radius;
            const max = battle.arenaSize - radius;
            const candidates = [];
            if (Math.abs(direction.x) > 0.0001) {
                candidates.push(((direction.x > 0 ? max : min) - x) / direction.x);
            }
            if (Math.abs(direction.y) > 0.0001) {
                candidates.push(((direction.y > 0 ? max : min) - y) / direction.y);
            }
            const positiveCandidates = candidates.filter((value) => Number.isFinite(value) && value >= 0);
            const distance = positiveCandidates.length ? Math.max(0, Math.min(...positiveCandidates)) : 0;
            return {
                x: clampToArena(x + direction.x * distance),

        function updateLeeTrajectory(fighter) {

            const effects = leeSkillEffects(fighter);
            const direction = leeAimDirection(fighter);

            const trajectoryHeight = bossAttackRange(fighter, battle.ballSize * (effects.trajectoryWidthMultiplier || 0.78));

            trajectory.style.top = `${fighter.y}px`;
            trajectory.style.width = `${length}px`;
            trajectory.style.setProperty("--trajectory-height", `${trajectoryHeight}px`);

        function startLeeCharge(fighter, now) {

        function animateLeeSoccerBall(startX, startY, endX, endY, effects, source = null) {

                ball.style.left = `${endX}px`;
                ball.style.top = `${endY}px`;
                ball.style.transform = `translate(-50%, -50%) rotate(${distance * 1.6}deg)`;

        function releaseLeeChargeKick(fighter, now) {
            if (!isLeeTaehwan(fighter) || fighter.dead) {
                return;
            }

            const effects = leeSkillEffects(fighter);
            const startX = fighter.x;
            const startY = fighter.y;
            const direction = fighter.leeChargeDirection || leeAimDirection(fighter, { instant: true });
            const destination = rayToArenaWall(startX, startY, direction);
            const chargeTimeMultiplier = Math.max(0.05, fighter.leeChargeTimeMultiplier || 1);
            const chargeSeconds = Math.max(0, ((now - (fighter.leeChargeStartedAt || now)) / 1000) / chargeTimeMultiplier);
            const ankleBreaks = fighter.leeAnkleBreakCount || 0;
            const damage = chargeSeconds * ((effects.chargeDamageBase ?? 30) + ankleBreaks);
            const hitWidth = bossAttackRange(fighter, battle.ballSize * (effects.hitWidthMultiplier || 1.1));

            fighter.leeShieldHitsRemaining = 0;
            fighter.leeChargeStartedAt = 0;
            fighter.leeChargeTimeMultiplier = 1;
            clearLeeTrajectory(fighter, { fade: true });
            animateLeeSoccerBall(startX, startY, destination.x, destination.y, effects, fighter);
            screenFlash(fighter.definition.color);
            floatText("슈팅", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.5, fighter.definition.color);

            livingEnemiesOf(fighter).forEach((target) => {
                if (distanceToSegment(target.x, target.y, startX, startY, destination.x, destination.y) > hitWidth) {
                    return;
                }

                const targetStartX = target.x;
                const targetStartY = target.y;

                    applyDamage(target, damage, fighter, "skill", { unavoidable: true });

                if (target.dead) {

                target.y = destination.y;

                target.vy = 0;

                effectRing(target.x, target.y, battle.ballSize * 1.45, fighter.definition.color);
            });

        function tryLeeShieldBlock(target, amount, source, kind, options, now) {

        function startLeeDribble(fighter, now) {

        function endLeeDribble(fighter, now) {

            fighter.leeNextDribbleAfterimageAt = 0;
            fighter.leeDribbleHitIds = new Set();
            fighter.leeNextDribbleCheckAt = Math.max(fighter.leeNextDribbleCheckAt || 0, now + (effects.checkInterval || 1) * 1000);
            if (fighter.invulnerableUntil <= now + 50) {

            clearLeeDribbleGhosts(fighter);

        function applyLeeAnkleBreak(fighter, target, now) {

            fighter.leeDribbleHitIds.add(target.id);
            fighter.leeAnkleBreakCount = (fighter.leeAnkleBreakCount || 0) + 1;
            if (target.slowUntil > now) {

                target.slowMultiplier = effects.ankleSlowMultiplier || 0.7;

            target.slowUntil = Math.max(target.slowUntil || 0, now + (effects.ankleSlowDuration || 3) * 1000);
            floatText("앵클브레이크", target.x, target.y - battle.ballSize / 2, fighter.definition.color);

            effectRing(target.x, target.y, battle.ballSize * 1.25, fighter.definition.color);

        function handleLeeDribbleCollision(a, b, now) {

            if (isLeeDribbling(b, now)) {

        function updateLeeDribble(fighter, now) {
            if (!isLeeTaehwan(fighter) || fighter.dead) {

            const effects = leePassiveEffects(fighter);
            if (isLeeCharging(fighter)) {
                if (fighter.leeDribbleUntil) {

                    fighter.invulnerableUntil = 0;
                }
                fighter.leeNextDribbleCheckAt = Math.max(
                    fighter.leeNextDribbleCheckAt || 0,
                    now + (effects.checkInterval || 1) * 1000
                );
                return;
            }

            if (isLeeDribbling(fighter, now)) {
                fighter.invulnerableUntil = Math.max(fighter.invulnerableUntil || 0, fighter.leeDribbleUntil);
                livingEnemiesOf(fighter).forEach((target) => {
                    if (Math.hypot(target.x - fighter.x, target.y - fighter.y) <= battle.ballSize * 0.95) {
                        applyLeeAnkleBreak(fighter, target, now);
                    }
                });
                return;
            }

            if (fighter.leeDribbleUntil) {
                endLeeDribble(fighter, now);
            }

            const intervalMs = (effects.checkInterval || 1) * 1000;
            if (!fighter.leeNextDribbleCheckAt) {
                fighter.leeNextDribbleCheckAt = now + intervalMs;
                return;
            }
            if (now < fighter.leeNextDribbleCheckAt) {
                return;
            }

            let checks = 0;
            while (now >= fighter.leeNextDribbleCheckAt && checks < 4) {
                fighter.leeNextDribbleCheckAt += intervalMs;
                checks += 1;
                if (Math.random() < (effects.chance ?? 0.1)) {
                    startLeeDribble(fighter, now);
                    break;
                }
            }
        }

        function updateLeeCharge(fighter, now = performance.now()) {

            }
            if (isLeeCharging(fighter)) {
                const effects = leeSkillEffects(fighter);
                const maxChargeDuration = effects.maxChargeDuration || 20;
                const chargeTimeMultiplier = Math.max(0.05, fighter.leeChargeTimeMultiplier || 1);
                if (fighter.leeChargeStartedAt && now - fighter.leeChargeStartedAt >= maxChargeDuration * 1000 * chargeTimeMultiplier) {

        function isKimSihyeon(fighter) {

        function isKimSihyeonBuffed(fighter, now = performance.now()) {

        function updateKimSihyeonDarknessBar(fighter, size = fighterSize(fighter), now = performance.now()) {

            if (!bar || !fill) {

            }

            const effects = fighter?.kimSihyeonDarknessSourceId
                ? kimSihyeonEffects(getFighterById(fighter.kimSihyeonDarknessSourceId))
                : {};
            const threshold = Math.max(1, effects.darknessStacksRequired || 3);
            const stacks = Math.max(0, Math.min(threshold, fighter.kimSihyeonDarknessStacks || 0));
            if (fighter.dead || fighter.offMapUntil > now || stacks <= 0) {

                fill.style.width = "0%";
                return;
            }

            const width = Math.max(36, size * 0.82);
            bar.style.display = "block";
            bar.style.left = `${fighter.x}px`;
            bar.style.top = `${fighter.y + size / 2 + 7}px`;
            bar.style.width = `${width}px`;
            fill.style.width = `${(stacks / threshold) * 100}%`;
        }

        function clearKimSihyeonDarkness(target) {

            if (target.kimSihyeonDarknessFillElement) {

            if (target.kimSihyeonDarknessBarElement) {
                target.kimSihyeonDarknessBarElement.style.display = "none";
            }

        function createKimSihyeonDarknessCross(target, source, thickness) {
            [

                    axis: "horizontal",

                    height: thickness,
                    left: battle.arenaSize / 2,
                    top: target.y
                },
                {
                    axis: "vertical",
                    width: thickness,

                    left: target.x,
                    top: battle.arenaSize / 2
                }

                element.className = `kim-sihyeon-darkness-cross is-${line.axis}`;

                setTimeout(() => element.remove(), 620);

        function isInsideKimSihyeonDarknessCross(target, center, halfThickness) {

        }

        function triggerKimSihyeonDarknessBurst(target, source, now) {

            const effects = kimSihyeonEffects(source);
            const burstDamage = effects.darknessBurstDamage || 150;
            const crossDamage = effects.darknessCrossDamage || 50;
            const thickness = bossAttackRange(source, battle.ballSize * (effects.darknessCrossWidthMultiplier || 1.2));
            const halfThickness = thickness / 2;

            effectRing(target.x, target.y, thickness * 1.7, "#050505");

            });

        function addKimSihyeonDarknessStack(target, source, now, amount = 1) {

        }

        function isKangInchan(fighter) {

        function createKimGibeomApple(fighter, now, index) {
