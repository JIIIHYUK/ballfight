    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .hard-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
        }

        .hard-shadow-sm {
            box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 1);
        }

        .brutal-border-thick {
            border: 4px solid #1c1b1b;
        }

        .brutal-border-thin {
            border: 2px solid #1c1b1b;
        }

        .btn-brutal {
            transition: all 0.1s ease;
        }

        .btn-brutal:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 1);
        }

        .fighter-ball {
            position: absolute;
            border-radius: 9999px;
            border: 4px solid #1c1b1b;
            box-shadow: 4px 4px 0px 0px #1c1b1b;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
            user-select: none;
        }

        .fighter-ball.is-stunned::after {
            content: "!";
            position: absolute;
            inset: -4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.72);
            color: #ba1a1a;
            font: 800 42px "Plus Jakarta Sans", sans-serif;
        }

        .fighter-ball.is-dead {
            filter: grayscale(1);
            opacity: 0.35;
        }

        .fighter-ball.is-offmap {
            opacity: 0;
            transform: translate(-140px, -140px) !important;
        }

        .fighter-ball.has-shield {
            box-shadow: 0 0 0 6px #38bdf8, 4px 4px 0px 0px #1c1b1b;
        }

        .fighter-ball.is-raging::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: rgba(220, 38, 38, var(--rage-alpha, 0));
            mix-blend-mode: multiply;
        }

        .volleyball-projectile {
            position: absolute;
            pointer-events: none;
            z-index: 24;
            border-radius: 9999px;
            border: 2px solid #1c1b1b;
            box-shadow: 3px 3px 0 #1c1b1b;
            overflow: hidden;
            background: #ffffff;
        }

        .volleyball-projectile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .volleyball-projectile.is-spike {
            border-width: 4px;
            box-shadow: 5px 5px 0 #1c1b1b, 0 0 18px rgba(220, 38, 38, 0.75);
        }

        .effect-ring,
        .effect-burst,
        .damage-float,
        .skill-label,
        .bomb-timer,
        .impact-star,
        .puddle-zone,
        .poison-field,
        .ice-field,
        .arena-flash {
            position: absolute;
            pointer-events: none;
            z-index: 20;
        }

        .effect-ring {
            border: 4px solid currentColor;
            border-radius: 9999px;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.65);
            animation: ring-pop 520ms ease-out forwards;
        }

        .effect-burst {
            width: 14px;
            height: 14px;
            background: currentColor;
            border: 2px solid #1c1b1b;
            box-shadow: 2px 2px 0px 0px #1c1b1b;
            animation: burst-pop 460ms ease-out forwards;
        }

        .damage-float {
            padding: 3px 6px;
            background: #ffffff;
            border: 2px solid #1c1b1b;
            box-shadow: 2px 2px 0px 0px #1c1b1b;
            font: 700 14px "JetBrains Mono", monospace;
            animation: damage-float 780ms ease-out forwards;
            white-space: nowrap;
        }

        .skill-label {
            padding: 4px 8px;
            background: #1c1b1b;
            color: #ffffff;
            border: 2px solid #ffffff;
            font: 700 13px "JetBrains Mono", monospace;
            animation: skill-label 720ms ease-out forwards;
            white-space: nowrap;
        }

        .skill-label.is-spike-label {
            z-index: 36;
            padding: 8px 14px;
            color: #ffffff;
            background: #dc2626;
            border: 4px solid #ffffff;
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 22px rgba(220, 38, 38, 0.85);
            font: 900 28px "Plus Jakarta Sans", sans-serif;
            letter-spacing: 0;
            text-shadow: 2px 2px 0 #1c1b1b;
            animation: spike-label 900ms ease-out forwards;
        }

        .bomb-timer {
            padding: 3px 7px;
            background: #1c1b1b;
            color: #ffffff;
            border: 2px solid #ffffff;
            box-shadow: 2px 2px 0px 0px #ba1a1a;
            font: 800 13px "JetBrains Mono", monospace;
            transform: translate(-50%, -115%);
            white-space: nowrap;
            z-index: 35;
        }

        .impact-star {
            width: 24px;
            height: 24px;
            background: currentColor;
            border: 3px solid #1c1b1b;
            clip-path: polygon(50% 0%, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 69%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
            animation: impact-star 520ms ease-out forwards;
        }

        .puddle-zone {
            border-radius: 9999px;
            border: 2px solid rgba(28, 27, 27, 0.75);
            background: rgba(139, 47, 35, 0.38);
            z-index: 3;
        }

        .poison-field {
            inset: 0;
            background: rgba(139, 47, 35, 0.24);
            border: 6px solid rgba(139, 47, 35, 0.75);
            z-index: 4;
        }

        .ice-field {
            background: rgba(56, 189, 248, 0.28);
            border: 5px solid rgba(2, 132, 199, 0.72);
            box-shadow: inset 0 0 28px rgba(255, 255, 255, 0.72);
            z-index: 4;
        }

        .arena-flash {
            inset: 0;
            background: currentColor;
            opacity: 0.16;
            z-index: 25;
            animation: arena-flash 220ms ease-out forwards;
        }

        @keyframes ring-pop {
            from {
                opacity: 0.95;
                transform: translate(-50%, -50%) scale(0.25);
            }

            to {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @keyframes burst-pop {
            from {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(0deg) scale(0.8);
            }

            to {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) rotate(90deg) scale(1.2);
            }
        }

        @keyframes damage-float {
            from {
                opacity: 1;
                transform: translate(-50%, -50%);
            }

            to {
                opacity: 0;
                transform: translate(-50%, -84px);
            }
        }

        @keyframes skill-label {
            from {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.9);
            }

            to {
                opacity: 0;
                transform: translate(-50%, -86px) scale(1.06);
            }
        }

        @keyframes spike-label {
            from {
                opacity: 1;
                transform: translate(-50%, -100%) scale(0.85);
            }

            45% {
                opacity: 1;
                transform: translate(-50%, -120%) scale(1.15);
            }

            to {
                opacity: 0;
                transform: translate(-50%, -152%) scale(1.24);
            }
        }

        @keyframes impact-star {
            from {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(0deg) scale(0.4);
            }

            to {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(160deg) scale(2);
            }
        }

        @keyframes puddle-pulse {
            from {
                transform: translate(-50%, -50%) scale(0.94);
                opacity: 0.78;
            }

            to {
                transform: translate(-50%, -50%) scale(1.04);
                opacity: 0.48;
            }
        }

        @keyframes poison-throb {
            0% {
                opacity: 0.72;
            }

            100% {
                opacity: 0.36;
            }
        }

        @keyframes arena-flash {
            from {
                opacity: 0.28;
            }

            to {
                opacity: 0;
            }
        }

        .modal-backdrop {
            background: rgba(28, 27, 27, 0.54);
        }

        .hud-card {
            min-width: 0;
        }

        .hud-name,
        .status-text,
        .hp-text {
            overflow-wrap: anywhere;
        }

        @media (max-width: 767px) {
            .hud-card {
                padding: 8px;
                background: #ffffff;
                border: 2px solid #1c1b1b;
                box-shadow: 2px 2px 0px 0px #1c1b1b;
            }

            .hud-name {
                font-size: 15px;
                line-height: 1.15;
            }

            .hp-text,
            .status-text {
                font-size: 11px;
                line-height: 1.15;
            }
        }
    </style>
</head>

    <script src="./effects.js"></script>
    <script>
        const arena = document.getElementById("arena");
        const hud = document.getElementById("hud");
        const countdown = document.getElementById("countdown");
        const matchTitle = document.getElementById("match-title");
        const elapsedTime = document.getElementById("elapsed-time");
        const allCharacters = window.HannamBalls.getCharacters();
        const storedSelection = JSON.parse(localStorage.getItem("hannamBallsSelection") || "[]");
        let selectedCharacters = storedSelection
            .map((id) => window.HannamBalls.getCharacter(id))
            .filter(Boolean);

        if (selectedCharacters.length < 2) {
            selectedCharacters = allCharacters.length === 1
                ? [allCharacters[0], allCharacters[0]]
                : allCharacters;
        }

        const battle = {
            fighters: [],
            arenaSize: 600,
            ballSize: 76,
            startedAt: 0,
            fightStartedAt: 0,
            finishedAt: 0,
            countdownSeconds: 3,
            isRunning: false,
            isFinished: false,
            lastTime: 0,
            pairHits: new Map(),
            activePuddles: [],
            activePoisons: [],
            activeBombs: [],
            activeIceZones: [],
            activeWindmills: [],
            activeVolleyballs: []
        };
        const EFFECT_LIMITS = {
            bursts: 70,
            rings: 14,
            floatTexts: 18,
            stars: 12,
            flashes: 1
        };

        const activeEffects = {
            rings: 0,
            stars: 0,
            bursts: 0,
            floatTexts: 0,
            flashes: 0
        };

        let animationFrameId = null;
        let lastElapsedText = "";
        let cachedCorners = [];

        initEffects(arena, battle);

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function imageSources(primary, fallbacks = []) {
            return [...new Set([primary, ...fallbacks].filter(Boolean))];
        }

        function imageAttrs(primary, fallbacks = []) {
            const sources = imageSources(primary, fallbacks);
            return `src="${escapeHtml(sources[0])}" data-fallback-srcs="${escapeHtml(JSON.stringify(sources.slice(1)))}"`;
        }

        document.addEventListener("error", (event) => {
            const image = event.target;
            if (!(image instanceof HTMLImageElement) || !image.dataset.fallbackSrcs) {
                return;
            }

            let sources = [];
            try {
                sources = JSON.parse(image.dataset.fallbackSrcs);
            } catch (error) {
                sources = [];
            }

            const nextSource = sources.shift();
            if (nextSource) {
                image.dataset.fallbackSrcs = JSON.stringify(sources);
                image.src = nextSource;
            } else {
                image.remove();
            }
        }, true);

        function normalize(x, y) {
            const length = Math.sqrt(x * x + y * y) || 1;
            return { x: x / length, y: y / length };
        }

        function arenaScale() {
            return Math.max(0.55, Math.min(1.05, battle.arenaSize / 600));
        }

        function scaledSpeed(speed) {
            return speed * arenaScale();
        }

        function temporarySpeedRatioOf(fighter, now) {
            if (!fighter.tempSpeedBoostUntil || fighter.tempSpeedBoostUntil <= now || fighter.tempSpeedBoostDuration <= 0) {
                return 0;
            }

            const remainingRatio = Math.max(0, Math.min(1, (fighter.tempSpeedBoostUntil - now) / fighter.tempSpeedBoostDuration));
            return (fighter.tempSpeedBoostBonus || 0) * remainingRatio;
        }

        function moveSpeedOf(fighter, now = performance.now()) {
            if (fighter.definition.immobile && fighter.forceMoveUntil <= now) {
                return 0;
            }

            let speed = fighter.speed;
            if (fighter.slowUntil > now) {
                speed *= fighter.slowMultiplier;
            }
            if (fighter.hasteUntil > now) {
                speed *= fighter.hasteMultiplier;
            }
            const temporarySpeedRatio = temporarySpeedRatioOf(fighter, now);
            if (temporarySpeedRatio > 0) {
                speed *= 1 + temporarySpeedRatio;
            }
            return speed;
        }

        function skillCooldownDuration(fighter) {
            if (fighter.definition.id === "lee-seunghyun") {
                const effects = fighter.definition.skill.effects;
                return fighter.definition.skill.cooldown + (fighter.seunghyunSkillUses || 0) * (effects.cooldownIncrease || 0);
            }

            if (fighter.definition.id === "gu-minchan") {
                const effects = fighter.definition.passive?.effects || {};
                const baseCooldown = fighter.definition.skill.cooldown;
                const reduction = (fighter.rageStacks || 0) * (effects.cooldownReduction || 0);
                return Math.max(effects.minCooldown || 1, baseCooldown - reduction);
            }

            return fighter.definition.skill.cooldown;
        }

        function rotateVector(x, y, radians) {
            const cos = Math.cos(radians);
            const sin = Math.sin(radians);
            return {
                x: x * cos - y * sin,
                y: x * sin + y * cos
            };
        }

        function setVelocityDirection(fighter, x, y, speed) {
            const direction = normalize(x, y);
            const scaled = scaledSpeed(speed);
            fighter.vx = direction.x * scaled;
            fighter.vy = direction.y * scaled;
        }

        function jitterVelocity(fighter, radians, speed = moveSpeedOf(fighter)) {
            if (speed <= 0) {
                fighter.vx = 0;
                fighter.vy = 0;
                return;
            }

            const rotated = rotateVector(fighter.vx || Math.random() - 0.5, fighter.vy || Math.random() - 0.5, radians);
            setVelocityDirection(fighter, rotated.x, rotated.y, speed);
        }

        function maintainMotion(fighter, now, jitterStrength = 0.18) {
            const speed = moveSpeedOf(fighter, now);
            if (speed <= 0) {
                if (fighter.forceMoveUntil <= now) {
                    fighter.vx = 0;
                    fighter.vy = 0;
                }
                return;
            }
            if (isStunned(fighter, now)) {
                return;
            }

            const desired = scaledSpeed(speed);
            const current = Math.hypot(fighter.vx, fighter.vy);
            if (!Number.isFinite(current) || current < desired * 0.18) {
                setVelocityDirection(fighter, Math.random() - 0.5, Math.random() - 0.5, speed);
                return;
            }

            if (!fighter.nextWobbleAt || now >= fighter.nextWobbleAt) {
                fighter.nextWobbleAt = now + 420 + Math.random() * 760;
                jitterVelocity(fighter, (Math.random() - 0.5) * jitterStrength, speed);
            } else {
                setVelocityDirection(fighter, fighter.vx, fighter.vy, speed);
            }
        }

        function clampToArena(value) {
            const radius = battle.ballSize / 2;
            return Math.max(radius, Math.min(battle.arenaSize - radius, value));
        }

        function distanceToSegment(px, py, ax, ay, bx, by) {
            const dx = bx - ax;
            const dy = by - ay;
            const lengthSquared = dx * dx + dy * dy;
            if (lengthSquared <= 0.0001) {
                return Math.hypot(px - ax, py - ay);
            }

            const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lengthSquared));
            const nearestX = ax + dx * t;
            const nearestY = ay + dy * t;
            return Math.hypot(px - nearestX, py - nearestY);
        }

        function directionToNearestWall(fighter) {
            const radius = battle.ballSize / 2;
            const walls = [
                { distance: Math.max(0, fighter.x - radius), x: -1, y: 0 },
                { distance: Math.max(0, battle.arenaSize - radius - fighter.x), x: 1, y: 0 },
                { distance: Math.max(0, fighter.y - radius), x: 0, y: -1 },
                { distance: Math.max(0, battle.arenaSize - radius - fighter.y), x: 0, y: 1 }
            ];
            walls.sort((a, b) => a.distance - b.distance);
            return walls[0];
        }

        function startWindmillFlight(target, direction, source, windmill) {
            target.windmillMomentum = {
                source,
                phase: "toWall",
                speed: windmill.wallSlamSpeed,
                reboundSpeed: windmill.reboundSpeed,
                decayAmount: windmill.reboundDecayAmount,
                decayInterval: windmill.reboundDecayInterval,
                nextDecayAt: 0,
                wallDamage: windmill.wallDamage,
                nextAfterimageAt: 0,
                afterimageInterval: windmill.flightAfterimageInterval,
                afterimageLifetime: 360
            };
            target.vx = direction.x * scaledSpeed(windmill.wallSlamSpeed);
            target.vy = direction.y * scaledSpeed(windmill.wallSlamSpeed);
            createAfterimage(target, { opacity: 0.4, scale: 0.95, lifetime: 360 });
        }

        function dashWithFallback(fighter, preferredDirection, distance) {
            const startX = fighter.x;
            const startY = fighter.y;
            const base = normalize(preferredDirection.x, preferredDirection.y);
            const candidates = [
                base,
                rotateVector(base.x, base.y, Math.PI / 2),
                rotateVector(base.x, base.y, -Math.PI / 2),
                rotateVector(base.x, base.y, Math.PI / 4),
                rotateVector(base.x, base.y, -Math.PI / 4),
                normalize(battle.arenaSize / 2 - fighter.x, battle.arenaSize / 2 - fighter.y),
                normalize(Math.random() - 0.5, Math.random() - 0.5)
            ];
            let best = { x: startX, y: startY, moved: -1, direction: base };

            candidates.forEach((direction) => {
                const x = clampToArena(startX + direction.x * distance);
                const y = clampToArena(startY + direction.y * distance);
                const moved = Math.hypot(x - startX, y - startY);
                if (moved > best.moved) {
                    best = { x, y, moved, direction };
                }
            });

            fighter.x = best.x;
            fighter.y = best.y;
            if (best.moved > 1) {
                fighter.forceMoveUntil = performance.now() + 180;
                setVelocityDirection(fighter, best.direction.x, best.direction.y, Math.max(140, fighter.speed || 140));
            }
            return best.moved;
        }

        function formatElapsed(ms) {
            const totalSeconds = Math.max(0, ms) / 1000;
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds - minutes * 60;
            return `${String(minutes).padStart(2, "0")}:${seconds.toFixed(1).padStart(4, "0")}`;
        }

        function currentFightElapsed(now) {
            if (!battle.fightStartedAt) {
                return 0;
            }

            return (battle.finishedAt || now) - battle.fightStartedAt;
        }

        function updateElapsed(now) {
            elapsedTime.textContent = `TIME ${formatElapsed(currentFightElapsed(now))}`;
        }

        function setVelocitySpeed(fighter, speed) {
            const direction = normalize(fighter.vx, fighter.vy);
            const scaled = scaledSpeed(speed);
            fighter.vx = direction.x * scaled;
            fighter.vy = direction.y * scaled;
        }

        function createAfterimage(fighter, options = {}) {
            if (!fighter || !fighter.element) {
                return;
            }

            const ghost = document.createElement("div");
            const lifetime = options.lifetime || 900;
            ghost.className = "charge-ghost test-afterimage";
            ghost.style.left = `${options.x ?? fighter.x}px`;
            ghost.style.top = `${options.y ?? fighter.y}px`;
            ghost.style.width = `${battle.ballSize * (options.scale || 1)}px`;
            ghost.style.height = `${battle.ballSize * (options.scale || 1)}px`;
            ghost.style.color = fighter.definition.color;
            ghost.style.background = fighter.definition.color;
            ghost.style.opacity = String(options.opacity ?? 0.45);
            ghost.style.animationDuration = `${lifetime}ms`;
            ghost.innerHTML = fighter.element.innerHTML;
            arena.appendChild(ghost);
            setTimeout(() => ghost.remove(), lifetime);
        }

        function updateAfterimageWindow(fighter, now) {
            if (!fighter.afterimageUntil || fighter.afterimageUntil <= now) {
                return;
            }
            if (fighter.nextAfterimageAt && fighter.nextAfterimageAt > now) {
                return;
            }

            const effects = fighter.definition.passive?.effects || {};
            const direction = normalize(fighter.vx, fighter.vy);
            const remaining = Math.max(0, fighter.afterimageUntil - now);
            createAfterimage(fighter, {
                x: fighter.x - direction.x * battle.ballSize * 0.22,
                y: fighter.y - direction.y * battle.ballSize * 0.22,
                opacity: 0.42,
                scale: 0.94,
                lifetime: Math.max(160, remaining + 80)
            });
            fighter.nextAfterimageAt = now + (effects.afterimageInterval || 0.08) * 1000;
        }

        function activateSpeedGrowthAbility(fighter, now) {
            const effects = fighter.definition.passive?.effects || {};
            fighter.speed = (fighter.speed * (effects.speedGrowthMultiplier || 1)) + (effects.speedGrowthGain || 0);
            if (Number.isFinite(effects.maxSpeed)) {
                fighter.speed = Math.min(effects.maxSpeed, fighter.speed);
            }

            fighter.speedGrowthStacks += 1;
            fighter.statBonusSpeedRatio = fighter.baseSpeed > 0 ? fighter.speed / fighter.baseSpeed - 1 : 0;
            const attackGainFromSpeed = Math.max(0, fighter.statBonusSpeedRatio * 100 * (effects.attackGainFromSpeedRatio || 0));
            fighter.statBonusAttack = attackGainFromSpeed;
            fighter.attack = fighter.definition.baseAttack + attackGainFromSpeed;
            const temporaryDuration = Math.max(0, (effects.temporarySpeedDuration || 0) * 1000);
            if (temporaryDuration > 0 && (effects.temporarySpeedBonus || 0) > 0) {
                fighter.tempSpeedBoostBonus = effects.temporarySpeedBonus;
                fighter.tempSpeedBoostDuration = temporaryDuration;
                fighter.tempSpeedBoostUntil = now + temporaryDuration;
            }
            const afterimageDuration = Math.max(0, (effects.afterimageDuration || effects.temporarySpeedDuration || 0) * 1000);
            if (afterimageDuration > 0) {
                fighter.afterimageUntil = now + afterimageDuration;
                fighter.nextAfterimageAt = 0;
            }
            setVelocitySpeed(fighter, moveSpeedOf(fighter, now));
            updateAfterimageWindow(fighter, now);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.45, fighter.definition.color);
            burst(fighter.x, fighter.y, fighter.definition.color, 6);
            floatText(`SPD +${Math.round(fighter.statBonusSpeedRatio * 100)}%`, fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
        }

        function isStunned(fighter, now) {
            return fighter.stunnedUntil > now;
        }

        function isUnstoppable(fighter, now) {
            return Boolean(fighter?.definition?.unstoppableWhileCharging && fighter.chargeUntil > now);
        }

        function avatarContent(definition) {
            if (definition.avatarSrc) {
                return `<img alt="${escapeHtml(definition.name)} 얼굴" class="w-full h-full object-cover" ${imageAttrs(definition.avatarSrc, definition.avatarFallbackSrcs)}>`;
            }

            return `<span class="font-headline-md text-headline-md">${escapeHtml(definition.avatarText)}</span>`;
        }

        function passiveHtml(definition) {
            if (!definition.passive) {
                return "";
            }

            return `
                <div class="bg-secondary-fixed brutal-border-thin p-2">
                    <p class="font-label-numeric text-label-numeric text-on-secondary-fixed">패시브: ${escapeHtml(definition.passive.name)}</p>
                    <p class="text-on-surface-variant mt-1">${escapeHtml(definition.passive.description)}</p>
                </div>
            `;
        }

        function createFighter(definition, index, total, options = {}) {
            const element = document.createElement("div");
            element.className = "fighter-ball";
            element.style.background = definition.color;
            element.style.color = definition.textColor;
            element.style.borderColor = definition.color;
            element.innerHTML = avatarContent(definition);
            arena.appendChild(element);

            return {
                id: options.id || `${definition.id}-${index}`,
                definition,
                element,
                index,
                total,
                ownerId: options.ownerId || null,
                isSummon: Boolean(options.isSummon || definition.isSummonDefinition),
                x: 0,
                y: 0,
                vx: 0,
                vy: 0,
                hp: definition.maxHp,
                maxHp: definition.maxHp,
                shield: 0,
                shieldTriggered: false,
                attack: definition.baseAttack,
                speed: definition.speed,
                baseSpeed: definition.speed,
                statBonusAttack: 0,
                statBonusSpeedRatio: 0,
                statDamageReduction: 0,
                statDamageReductionCap: 0,
                skillCooldown: definition.skill.cooldown,
                stunnedUntil: 0,
                savedVelocity: null,
                chargeUntil: 0,
                chargeHits: new Set(),
                invulnerableUntil: 0,
                offMapUntil: 0,
                nextPuddleAt: 0,
                nextDotFloatAt: 0,
                followTargetId: null,
                followUntil: 0,
                nextFollowDamageAt: 0,
                followEffects: null,
                tempDamageReductionUntil: 0,
                tempDamageReduction: 0,
                slowUntil: 0,
                slowMultiplier: 1,
                hasteUntil: 0,
                hasteMultiplier: 1,
                forceMoveUntil: 0,
                skillUseCount: 0,
                dietUses: 0,
                seunghyunSkillUses: 0,
                speedGrowthStacks: 0,
                nextSpeedGrowthAt: 0,
                tempSpeedBoostUntil: 0,
                tempSpeedBoostDuration: 0,
                tempSpeedBoostBonus: 0,
                afterimageUntil: 0,
                nextAfterimageAt: 0,
                windmillMomentum: null,
                rageStacks: 0,
                nextRageAt: 0,
                volleyballThrows: 0,
                pendingSpike: null,
                nextRangedAt: 0,
                rangedDamageBonus: 0,
                nextRangedGrowthAt: 0,
                nextWobbleAt: 0,
                backstab: null,
                cornerIndex: index % 4,
                dead: false,
                hudElement: null
            };
        }

        function getFighterById(id) {
            return battle.fighters.find((fighter) => fighter.id === id);
        }

        function areAllies(a, b) {
            if (!a || !b) {
                return false;
            }

            return Boolean(a.ownerId && b.ownerId && a.ownerId === b.ownerId);
        }

        function livingEnemiesOf(fighter) {
            return battle.fighters.filter((target) => target !== fighter && !target.dead && target.offMapUntil <= performance.now() && !areAllies(fighter, target));
        }

        function layoutFighters() {
            const rect = arena.getBoundingClientRect();
            battle.arenaSize = rect.width;
            battle.ballSize = Math.max(54, Math.min(82, battle.arenaSize * 0.14));
            updateCachedCorners();
            const center = battle.arenaSize / 2;
            const radius = Math.max(battle.ballSize, battle.arenaSize * 0.34);

            battle.fighters.forEach((fighter, index) => {
                const angle = -Math.PI / 2 + (Math.PI * 2 * index) / battle.fighters.length;
                fighter.x = center + Math.cos(angle) * radius;
                fighter.y = center + Math.sin(angle) * radius;
                const direction = normalize(center - fighter.x, center - fighter.y);
                fighter.vx = direction.x * scaledSpeed(moveSpeedOf(fighter)) * 1.45;
                fighter.vy = direction.y * scaledSpeed(moveSpeedOf(fighter)) * 1.45;
                fighter.element.style.width = `${battle.ballSize}px`;
                fighter.element.style.height = `${battle.ballSize}px`;
            });
        }

        function renderHud() {
            hud.innerHTML = battle.fighters.map((fighter) => `
                <div class="hud-card flex flex-col gap-1" data-hud-id="${fighter.id}">
                    <div class="flex items-center justify-between gap-2">
                        <span class="hud-name font-headline-md-mobile text-headline-md-mobile md:font-headline-md md:text-headline-md tracking-tight"
                            style="color:${fighter.definition.color};">${escapeHtml(fighter.definition.name)}</span>
                        <button class="info-button w-6 h-6 flex items-center justify-center brutal-border-thin text-[10px] font-bold hover:bg-surface-container-high transition-colors"
                            data-info-id="${fighter.definition.id}" title="캐릭터 정보">i</button>
                    </div>
                    <div class="w-full h-6 md:h-8 border-2 border-on-background bg-surface-container-highest relative">
                        <div class="hp-fill absolute top-0 left-0 h-full bg-primary" style="width:100%;"></div>
                        <div class="hp-text absolute inset-0 flex items-center justify-center font-label-numeric text-label-numeric text-on-primary drop-shadow-[1px_1px_0px_rgba(0,0,0,0.8)]">
                            HP ${fighter.maxHp} / ${fighter.maxHp}
                        </div>
                    </div>
                    <div class="w-full h-3 bg-surface-container-highest border-2 border-on-background relative">
                        <div class="skill-fill h-full" style="width:0%; background:${fighter.definition.color};"></div>
                    </div>
                    <div class="status-text font-label-numeric text-label-numeric text-on-surface-variant">
                        CD ${escapeHtml(fighter.definition.skill.name)} ${skillCooldownDuration(fighter).toFixed(1)} / ${skillCooldownDuration(fighter).toFixed(1)}초
                    </div>
                    <div class="stat-bonus-text hidden font-label-numeric text-label-numeric text-primary">
                        ATK +0 / SPD +0%
                    </div>
                </div>
            `).join("");

            battle.fighters.forEach((fighter) => {
                const card = hud.querySelector(`[data-hud-id="${fighter.id}"]`);
                fighter.hudElement = card;
                fighter.hudHpFill = card.querySelector(".hp-fill");
                fighter.hudHpText = card.querySelector(".hp-text");
                fighter.hudSkillFill = card.querySelector(".skill-fill");
                fighter.hudStatus = card.querySelector(".status-text");
                fighter.hudStatBonus = card.querySelector(".stat-bonus-text");

                fighter.lastHpRatio = -1;
                fighter.lastHpText = "";
                fighter.lastSkillReady = -1;
                fighter.lastStatusText = "";
                fighter.lastStatBonusText = "";
                fighter.lastDead = false;
                fighter.lastIsStunned = false;
                fighter.lastIsOffmap = false;
            });

            hud.querySelectorAll(".info-button").forEach((button) => {
                button.addEventListener("click", () => {
                    const definition = allCharacters.find((character) => character.id === button.dataset.infoId)
                        || battle.fighters.find((fighter) => fighter.definition.id === button.dataset.infoId)?.definition;
                    showInfo(definition);
                });
            });
        }

        function updateHud(now) {
            battle.fighters.forEach((fighter) => {
                sanitizeFighterState(fighter);
                if (!fighter.hudElement) {
                    return;
                }

                const hpRatio = Math.max(0, fighter.hp / fighter.maxHp);
                const cooldownDuration = skillCooldownDuration(fighter);
                const skillReady = Math.max(0, 1 - fighter.skillCooldown / cooldownDuration);

                if (fighter.lastHpRatio !== hpRatio) {
                    fighter.hudHpFill.style.width = `${hpRatio * 100}%`;
                    fighter.lastHpRatio = hpRatio;
                }

                let hpTextVal = `HP ${Math.ceil(Math.max(0, fighter.hp))} / ${fighter.maxHp}`;
                if (fighter.shield > 0) {
                    hpTextVal += ` (+${Math.round(fighter.shield)})`;
                }
                if (fighter.lastHpText !== hpTextVal) {
                    fighter.hudHpText.textContent = hpTextVal;
                    fighter.lastHpText = hpTextVal;
                }

                if (fighter.lastSkillReady !== skillReady) {
                    fighter.hudSkillFill.style.width = `${skillReady * 100}%`;
                    fighter.lastSkillReady = skillReady;
                }

                let statusTextVal = "";
                let statusColor = "";
                if (fighter.dead) {
                    statusTextVal = "탈락";
                    statusColor = "#ba1a1a";
                } else if (fighter.offMapUntil > now) {
                    statusTextVal = `맵 밖 ${(Math.max(0, fighter.offMapUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (isStunned(fighter, now)) {
                    statusTextVal = `행동 불가 ${(Math.max(0, fighter.stunnedUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = "#ba1a1a";
                } else {
                    const remaining = Math.max(0, fighter.skillCooldown);
                    statusTextVal = remaining <= 0
                        ? `CD ${fighter.definition.skill.name} READY`
                        : `CD ${fighter.definition.skill.name} ${remaining.toFixed(1)} / ${cooldownDuration.toFixed(1)}초`;
                }

                if (fighter.lastStatusText !== statusTextVal) {
                    fighter.hudStatus.textContent = statusTextVal;
                    fighter.hudStatus.style.color = statusColor;
                    fighter.lastStatusText = statusTextVal;
                }

                const bonusParts = [];
                if (fighter.statBonusAttack !== 0) {
                    bonusParts.push(`ATK ${fighter.statBonusAttack > 0 ? "+" : ""}${Math.round(fighter.statBonusAttack)}`);
                }
                if (Math.abs(fighter.statBonusSpeedRatio) > 0.005) {
                    bonusParts.push(`SPD ${fighter.statBonusSpeedRatio > 0 ? "+" : ""}${Math.round(fighter.statBonusSpeedRatio * 100)}%`);
                }
                if (fighter.statDamageReduction > 0) {
                    bonusParts.push(`DMG -${Math.round(fighter.statDamageReduction * 100)}%`);
                }
                if (fighter.tempDamageReductionUntil > now) {
                    bonusParts.push(`방어 +${Math.round(fighter.tempDamageReduction * 100)}% ${((fighter.tempDamageReductionUntil - now) / 1000).toFixed(1)}초`);
                }
                if (fighter.slowUntil > now) {
                    bonusParts.push(`둔화 ${Math.round(fighter.slowMultiplier * 100)}% ${((fighter.slowUntil - now) / 1000).toFixed(1)}초`);
                }
                if (fighter.hasteUntil > now) {
                    bonusParts.push(`가속 +${Math.round((fighter.hasteMultiplier - 1) * 100)}% ${((fighter.hasteUntil - now) / 1000).toFixed(1)}초`);
                }
                const temporarySpeedRatio = temporarySpeedRatioOf(fighter, now);
                if (temporarySpeedRatio > 0) {
                    bonusParts.push(`순간가속 +${Math.round(temporarySpeedRatio * 100)}% ${((fighter.tempSpeedBoostUntil - now) / 1000).toFixed(1)}초`);
                }
                if (fighter.definition.id === "kim-junmo") {
                    const maxUses = fighter.definition.passive?.effects?.selfOutOnSkillUse || 4;
                    bonusParts.push(`스킬 ${fighter.skillUseCount}/${maxUses}`);
                }
                if (fighter.definition.id === "song-geonuk" && fighter.dietUses > 0) {
                    bonusParts.push(`다이어트 ${fighter.dietUses}회`);
                    const cap = fighter.statDamageReductionCap || fighter.definition.skill.effects.maxDamageReduction || 0;
                    if (cap > 0) {
                        bonusParts.push(`감소 ${Math.round(fighter.statDamageReduction * 100)}% / ${Math.round(cap * 100)}%`);
                    }
                }
                if (fighter.definition.id === "lee-seunghyun") {
                    bonusParts.push(`사용 ${fighter.seunghyunSkillUses}회`);
                }
                if (fighter.speedGrowthStacks > 0) {
                    bonusParts.push(`가속 ${fighter.speedGrowthStacks}회`);
                }
                if (fighter.definition.id === "gu-minchan" && fighter.rageStacks > 0) {
                    bonusParts.push(`분노 ${fighter.rageStacks}회`);
                }

                if (bonusParts.length > 0) {
                    const bonusTextVal = bonusParts.join(" / ");
                    if (fighter.lastStatBonusText !== bonusTextVal) {
                        fighter.hudStatBonus.classList.remove("hidden");
                        fighter.hudStatBonus.textContent = bonusTextVal;
                        fighter.lastStatBonusText = bonusTextVal;
                    }
                } else {
                    if (fighter.lastStatBonusText !== "hidden") {
                        fighter.hudStatBonus.classList.add("hidden");
                        fighter.lastStatBonusText = "hidden";
                    }
                }
            });
        }

        function renderFighters(now) {
            battle.fighters.forEach((fighter) => {
                const stunState = !fighter.dead && isStunned(fighter, now);
                if (fighter.lastIsStunned !== stunState) {
                    fighter.element.classList.toggle("is-stunned", stunState);
                    fighter.lastIsStunned = stunState;
                }

                if (fighter.lastDead !== fighter.dead) {
                    fighter.element.classList.toggle("is-dead", fighter.dead);
                    fighter.lastDead = fighter.dead;
                }

                const offmapState = !fighter.dead && fighter.offMapUntil > now;
                if (fighter.lastIsOffmap !== offmapState) {
                    fighter.element.classList.toggle("is-offmap", offmapState);
                    fighter.lastIsOffmap = offmapState;
                }

                const shieldState = !fighter.dead && fighter.shield > 0;
                if (fighter.lastHasShield !== shieldState) {
                    fighter.element.classList.toggle("has-shield", shieldState);
                    fighter.lastHasShield = shieldState;
                }

                const rageState = !fighter.dead && fighter.definition.id === "gu-minchan" && fighter.rageStacks > 0;
                if (fighter.lastIsRaging !== rageState) {
                    fighter.element.classList.toggle("is-raging", rageState);
                    fighter.lastIsRaging = rageState;
                }
                if (fighter.definition.id === "gu-minchan") {
                    fighter.element.style.setProperty("--rage-alpha", Math.min(0.62, (fighter.rageStacks || 0) * 0.075).toFixed(3));
                }

                fighter.element.style.transform = `translate(${fighter.x - battle.ballSize / 2}px, ${fighter.y - battle.ballSize / 2}px)`;
            });
        }

        function effectRing(x, y, size, color) {
            if (activeEffects.rings >= EFFECT_LIMITS.rings) {
                return;
            }

            activeEffects.rings++;
            const ring = document.createElement("div");
            ring.className = "effect-ring";
            ring.style.left = `${x}px`;
            ring.style.top = `${y}px`;
            ring.style.width = `${size}px`;
            ring.style.height = `${size}px`;
            ring.style.color = color;
            arena.appendChild(ring);
            setTimeout(() => {
                ring.remove();
                activeEffects.rings--;
            }, 560);
        }

        function screenFlash(color) {
            if (activeEffects.flashes >= EFFECT_LIMITS.flashes) {
                return;
            }

            activeEffects.flashes++;
            const flash = document.createElement("div");
            flash.className = "arena-flash";
            flash.style.color = color;
            arena.appendChild(flash);
            setTimeout(() => {
                flash.remove();
                activeEffects.flashes--;
            }, 240);
        }

        function impactStar(x, y, color) {
            if (activeEffects.stars >= EFFECT_LIMITS.stars) {
                return;
            }

            activeEffects.stars++;
            const star = document.createElement("div");
            star.className = "impact-star";
            star.style.left = `${x}px`;
            star.style.top = `${y}px`;
            star.style.color = color;
            arena.appendChild(star);
            setTimeout(() => {
                star.remove();
                activeEffects.stars--;
            }, 560);
        }

        function burst(x, y, color, count = 8) {
            const allowed = Math.max(0, Math.min(count, EFFECT_LIMITS.bursts - activeEffects.bursts, 8));

            for (let index = 0; index < allowed; index += 1) {
                activeEffects.bursts++;
                const shard = document.createElement("div");
                const angle = (Math.PI * 2 * index) / allowed;
                const distance = 28 + Math.random() * 28;
                shard.className = "effect-burst";
                shard.style.left = `${x}px`;
                shard.style.top = `${y}px`;
                shard.style.color = color;
                shard.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
                shard.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
                arena.appendChild(shard);
                setTimeout(() => {
                    shard.remove();
                    activeEffects.bursts--;
                }, 500);
            }
        }

        function megaBurst(x, y, color, count = 8) {
            burst(x, y, color, count);
            effectRing(x, y, battle.ballSize * 1.8, color);
            impactStar(x, y, color);
        }

        function floatText(text, x, y, color = "#ba1a1a") {
            if (activeEffects.floatTexts >= EFFECT_LIMITS.floatTexts) {
                return;
            }

            activeEffects.floatTexts++;
            const label = document.createElement("div");
            label.className = "damage-float";
            label.textContent = text;
            label.style.left = `${x}px`;
            label.style.top = `${y}px`;
            label.style.color = color;
            arena.appendChild(label);
            setTimeout(() => {
                label.remove();
                activeEffects.floatTexts--;
            }, 820);

        function reduceCooldown(fighter, seconds) {
            if (!Number.isFinite(seconds) || seconds <= 0 || fighter.dead || isStunned(fighter, performance.now())) {

            if (!Number.isFinite(fighter.skillCooldown)) {

        function addDamageReduction(fighter, gain, cap) {
            if (!fighter || !Number.isFinite(gain) || gain <= 0) {

            fighter.statDamageReductionCap = Math.max(fighter.statDamageReductionCap || 0, maxCap);
            fighter.statDamageReduction = maxCap > 0

        function sanitizeFighterState(fighter) {

            if (!Number.isFinite(fighter.hp)) {

            fighter.hp = Math.max(0, Math.min(fighter.maxHp, fighter.hp));

            if (!Number.isFinite(fighter.skillCooldown)) {

            if (!Number.isFinite(fighter.vy)) {

        function healFighter(fighter, amount) {

            if (!Number.isFinite(fighter.hp)) {
                fighter.hp = Math.max(1, fighter.maxHp);
            }

            if (!Number.isFinite(fighter.maxHp) || fighter.maxHp <= 0 || fighter.hp >= fighter.maxHp) {
                return;
            }

            const healed = Math.min(amount, fighter.maxHp - fighter.hp);

        function applyDamage(target, amount, source, kind) {
            const now = performance.now();
            if (!target || target.dead || !Number.isFinite(amount) || amount <= 0) {
                return 0;
            }

            if (!Number.isFinite(target.hp)) {
                target.hp = Math.max(1, target.maxHp);
            }
            if (!Number.isFinite(target.shield)) {
                target.shield = 0;
            }

            if (target.invulnerableUntil > now || target.offMapUntil > now) {
                floatText("MISS", target.x, target.y - battle.ballSize / 2, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.1, target.definition.color);
                return 0;
            }

            const piercesBasicIgnore = kind === "basic"
                && source
                && source.definition.id === "song-geonuk"
                && source.dietUses >= (source.definition.skill.effects.pierceBasicAfterUses || Infinity);

            const isBasicLike = kind === "basic" || kind === "ranged";

            if (isBasicLike && target.definition.evadesBasic && !piercesBasicIgnore) {
                floatText("DODGE", target.x, target.y - battle.ballSize / 2, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.15, target.definition.color);
                const healRatio = target.definition.passive?.effects?.healOnBasicEvadeRatio || 0;
                healFighter(target, target.maxHp * healRatio);
                return 0;
            }

            if (isBasicLike && target.definition.immuneToBasic && !piercesBasicIgnore) {
                floatText("IMMUNE", target.x, target.y - battle.ballSize / 2, target.definition.color);
                effectRing(target.x, target.y, battle.ballSize * 1.2, target.definition.color);
                return 0;
            }

            if (piercesBasicIgnore && (target.definition.evadesBasic || target.definition.immuneToBasic)) {
                floatText("PIERCE", target.x, target.y - battle.ballSize / 2, source.definition.color);
            }

            const permanentReduction = Number.isFinite(target.statDamageReduction) ? target.statDamageReduction : 0;
            const temporaryReduction = target.tempDamageReductionUntil > now && Number.isFinite(target.tempDamageReduction) ? target.tempDamageReduction : 0;
            const reducedAmount = amount * Math.max(0.1, 1 - permanentReduction - temporaryReduction);

            let damageToHp = reducedAmount;
            if (target.shield > 0) {
                const absorbed = Math.min(target.shield, damageToHp);
                target.shield -= absorbed;
                damageToHp -= absorbed;
                floatText(`ABSORB ${Math.round(absorbed)}`, target.x, target.y - battle.ballSize / 2, "#38bdf8");
                effectRing(target.x, target.y, battle.ballSize * 1.1, "#38bdf8");
            }

            const postHp = target.hp - damageToHp;

            // 이승현 체력 50% 미만 첫 보호막 트리거
            if (target.definition.id === "lee-seunghyun" && !target.shieldTriggered && postHp < target.maxHp * 0.5 && target.hp >= target.maxHp * 0.5) {
                target.shieldTriggered = true;
                const shieldAmount = target.maxHp * 0.3;
                target.shield = (target.shield || 0) + shieldAmount;
                floatText("보호막!", target.x, target.y - battle.ballSize / 2, "#38bdf8");
                megaBurst(target.x, target.y, "#38bdf8", 6);

                if (damageToHp > 0) {
                    const damageToDropLimit = target.hp - target.maxHp * 0.5;
                    const leftoverDamage = damageToHp - damageToDropLimit;
                    const absorbed = Math.min(target.shield, leftoverDamage);
                    target.shield -= absorbed;
                    damageToHp = damageToDropLimit + (leftoverDamage - absorbed);
                    floatText(`ABSORB ${Math.round(absorbed)}`, target.x, target.y - battle.ballSize / 2, "#38bdf8");
                }
            }

            const actual = Math.min(target.hp, damageToHp);
            target.hp -= actual;
            const isDot = kind === "poison" || (kind === "basic" && source && source.definition.id === "lee-seunghyun");
            const canShowDot = !isDot || now >= target.nextDotFloatAt;

            if (canShowDot) {
                floatText(`-${Math.round(actual)}`, target.x, target.y - battle.ballSize / 2);
                if (isDot) {
                    target.nextDotFloatAt = now + 850;
                }
            }

            if (!isDot) {
                impactStar(target.x, target.y, source ? source.definition.color : "#ba1a1a");
            }

            if (kind === "skill") {
                effectRing(target.x, target.y, battle.ballSize * 1.35, source ? source.definition.color : "#ba1a1a");
            }

            if (actual > 0 && source && source.isSummon) {
                const owner = getFighterById(source.ownerId);
                healFighter(source, actual * (source.definition.selfHealRatioFromDamage || 0));
                if (owner && !owner.dead) {
                    healFighter(owner, actual * (source.definition.ownerHealRatioFromDamage || 0));
                }
            }

            if (!isStunned(target, now)) {
                reduceCooldown(target, target.definition.cooldownOnDamageTaken);
            }

            if (target.hp <= 0) {
                target.dead = true;
                target.vx = 0;
                target.vy = 0;
                target.element.style.zIndex = "1";
                burst(target.x, target.y, "#ba1a1a", 12);
                floatText("OUT", target.x, target.y, "#ba1a1a");

                if (source && source.definition.id === "choi-haejin") {
                    const effects = source.definition.passive?.effects || {};
                    healFighter(source, source.maxHp * (effects.healOnKillRatio || 0));
                    source.skillCooldown *= effects.cooldownOnKillRatio || 1;
                    floatText("막타냠", source.x, source.y - battle.ballSize / 2, source.definition.color);
                }
            }

            return actual;
        }

        function stun(target, seconds, now) {

        function updateCachedCorners() {

        function steerToCorner(fighter, dt, now) {
            const corners = arenaCorners();
            const target = corners[fighter.cornerIndex % corners.length];
            const dx = target.x - fighter.x;
            const dy = target.y - fighter.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < battle.ballSize * 0.35) {
                fighter.cornerIndex = (fighter.cornerIndex + 1) % corners.length;
            }

            const nextTarget = corners[fighter.cornerIndex % corners.length];
            const direction = normalize(nextTarget.x - fighter.x, nextTarget.y - fighter.y);
            fighter.vx = direction.x * scaledSpeed(moveSpeedOf(fighter, now));
            fighter.vy = direction.y * scaledSpeed(moveSpeedOf(fighter, now));

            if (fighter.passiveDropEnabled !== false && now >= fighter.nextPuddleAt) {
                createPuddle(fighter, now);
                fighter.nextPuddleAt = now + fighter.definition.passive.effects.dropInterval * 1000;
            }
        }

        function createPuddle(fighter, now) {
            if (!fighter.definition.passive) {
                return;
            }

            const effects = fighter.definition.passive.effects;
            const ownPuddles = battle.activePuddles.filter((puddle) => puddle.source === fighter);
            if (ownPuddles.length >= effects.maxActivePuddles) {
                const oldest = ownPuddles[0];
                oldest.expiresAt = now;
                oldest.element.remove();
                battle.activePuddles = battle.activePuddles.filter((puddle) => puddle !== oldest);
            }

            const puddle = document.createElement("div");
            const radius = Math.max(28, Math.min(effects.puddleRadius, battle.arenaSize * (effects.puddleRadiusRatio || 0.105)));
            const size = radius * 2;
            puddle.className = "puddle-zone";
            puddle.style.left = `${fighter.x}px`;
            puddle.style.top = `${fighter.y}px`;
            puddle.style.width = `${size}px`;
            puddle.style.height = `${size}px`;
            arena.appendChild(puddle);

            battle.activePuddles.push({
                source: fighter,
                x: fighter.x,
                y: fighter.y,
                radius,
                damage: effects.puddleDamage,
                healRatio: effects.healRatio,
                tickInterval: effects.puddleTickInterval,
                nextTickAt: now + effects.puddleTickInterval * 1000,
                expiresAt: now + effects.puddleDuration * 1000,
                element: puddle
            });
        }

        function updatePuddles(now) {
            battle.activePuddles = battle.activePuddles.filter((puddle) => {
                if (now >= puddle.expiresAt || puddle.source.dead) {
                    puddle.element.remove();
                    return false;
                }

                if (now < puddle.nextTickAt) {
                    return true;
                }

                puddle.nextTickAt = now + puddle.tickInterval * 1000;
                battle.fighters.forEach((target) => {
                    if (target === puddle.source || target.dead || target.offMapUntil > now || areAllies(puddle.source, target)) {
                        return;

                    const dx = target.x - puddle.x;
                    const dy = target.y - puddle.y;

                        const dealt = applyDamage(target, puddle.damage, puddle.source, "basic");
                        if (dealt > 0) {
                            reduceCooldown(puddle.source, puddle.source.definition.cooldownOnBasicHit);
                            healFighter(puddle.source, dealt * puddle.healRatio);
                        }
                    }
                });

                return true;
            });
        }

        function createPoisonField(source, now, copiedEffects = null) {

        function createWindmill(source, now) {

        function updateWindmills(now) {

                );
                const attachOffset = battle.ballSize * windmill.attachOffsetMultiplier;
                windmill.x = clampToArena(windmill.source.x + followDirection.x * attachOffset);
                windmill.y = clampToArena(windmill.source.y + followDirection.y * attachOffset);
                const elapsed = (now - windmill.createdAt) / 1000;

                const angle = frontAngle + Math.sin(elapsed * windmill.rotationSpeed) * (Math.PI / 2);
                const cos = Math.cos(angle);

                windmill.element.style.left = `${windmill.x}px`;

        function updateWindmillMomentum(fighter, now) {

                momentum.speed = Math.max(0, momentum.speed - decaySteps * momentum.decayAmount);

                : normalize(source.vx || Math.random() - 0.5, source.vy || Math.random() - 0.5);
            const size = battle.ballSize * (effects.sizeMultiplier || 0.5);
            const damage = options.damage || effects.damage || 20;
            const projectileSpeed = options.projectileSpeed || effects.projectileSpeed || 500;
            const isSpike = Boolean(options.isSpike);
            const element = document.createElement("div");
            element.className = isSpike ? "volleyball-projectile is-spike" : "volleyball-projectile";
            element.style.left = `${source.x}px`;
            element.style.top = `${source.y}px`;
            element.style.width = `${size}px`;
            element.style.height = `${size}px`;
            element.innerHTML = `<img alt="배구공" ${imageAttrs(effects.imageSrc || "images/volleyball.png", effects.imageFallbackSrcs)}>`;
            arena.appendChild(element);

            battle.activeVolleyballs.push({

                expiresAt: now + (effects.projectileDuration || 2.6) * 1000
            });

            effectRing(source.x, source.y, battle.ballSize * (isSpike ? 1.55 : 1.1), source.definition.color);
            floatText(isSpike ? "SPIKE !" : "배구공!", source.x, source.y - battle.ballSize / 2, source.definition.color);
        }

        function updateVolleyballs(dt, now) {
            battle.activeVolleyballs = battle.activeVolleyballs.filter((ball) => {
                if (ball.source.dead || now >= ball.expiresAt) {
                    ball.element.remove();
                    return false;
                }

                ball.x += ball.vx * dt;
                ball.y += ball.vy * dt;
                const radius = ball.size / 2;

                if (ball.x < radius || ball.x > battle.arenaSize - radius) {
                    ball.vx *= -1;
                    ball.x = Math.max(radius, Math.min(battle.arenaSize - radius, ball.x));
                }
                if (ball.y < radius || ball.y > battle.arenaSize - radius) {
                    ball.vy *= -1;
                    ball.y = Math.max(radius, Math.min(battle.arenaSize - radius, ball.y));
                }

                ball.element.style.left = `${ball.x}px`;
                ball.element.style.top = `${ball.y}px`;
                ball.element.style.transform = `translate(-50%, -50%) rotate(${(now - ball.createdAt) * 0.012}rad)`;

                for (const target of battle.fighters) {
                    if (target === ball.source || target.dead || target.offMapUntil > now || areAllies(ball.source, target)) {
                        continue;
                    }

                    if (Math.hypot(target.x - ball.x, target.y - ball.y) > battle.ballSize * 0.5 + radius) {
                        continue;
                    }

                    applyDamage(target, ball.damage, ball.source, "skill");
                    impactStar(target.x, target.y, ball.source.definition.color);
                    burst(target.x, target.y, ball.source.definition.color, ball.isSpike ? 10 : 6);
                    if (ball.isSpike) {
                        const knockback = ball.source.definition.skill.effects.spikeKnockback || 1200;
                        const push = normalize(ball.vx, ball.vy);
                        target.vx = push.x * scaledSpeed(knockback);
                        target.vy = push.y * scaledSpeed(knockback);
                        effectRing(target.x, target.y, battle.ballSize * 1.5, ball.source.definition.color);
                    }
                    ball.element.remove();
                    return false;
                }

                return true;
            });
        }

        function scheduleSpike(fighter, now, effects) {
            const delay = effects.spikeDelay || 0.2;
            fighter.pendingSpike = {
                releaseAt: now + delay * 1000,
                damage: effects.spikeDamage || 90,
                projectileSpeed: effects.spikeProjectileSpeed || 1800
            };
            spikeLabel(fighter);
            stun(fighter, delay, now);
        }

        function updatePendingSpike(fighter, now) {
            if (!fighter.pendingSpike || fighter.pendingSpike.releaseAt > now || fighter.dead) {
                return;
            }

            const spike = fighter.pendingSpike;
            fighter.pendingSpike = null;
            createVolleyball(fighter, now, {
                isSpike: true,
                damage: spike.damage,
                projectileSpeed: spike.projectileSpeed
            });
        }

        function restoreFromOffMap(fighter, now) {
            if (fighter.offMapUntil === 0 || fighter.offMapUntil > now) {
                return;
            }

            const corners = arenaCorners();
            const corner = corners[fighter.cornerIndex % corners.length];
            fighter.x = corner.x;
            fighter.y = corner.y;
            fighter.invulnerableUntil = 0;
            fighter.offMapUntil = 0;
            megaBurst(fighter.x, fighter.y, fighter.definition.color, 4);
        }

        function nearestEnemy(fighter) {
            let nearest = null;
            let nearestDistance = Infinity;
            battle.fighters.forEach((target) => {
                if (target === fighter || target.dead || target.offMapUntil > performance.now() || areAllies(fighter, target)) {
                    return;
                }

                const distance = Math.hypot(target.x - fighter.x, target.y - fighter.y);
                if (distance < nearestDistance) {
                    nearest = target;
                    nearestDistance = distance;
                }
            });
            return nearest;
        }

        function randomEnemy(fighter) {
            const enemies = livingEnemiesOf(fighter);
            if (enemies.length === 0) {
                return null;
            }
            return enemies[Math.floor(Math.random() * enemies.length)];
        }

        function highestCurrentHpEnemy(fighter) {
            return livingEnemiesOf(fighter).reduce((highest, enemy) => {
                if (!highest || enemy.hp > highest.hp) {
                    return enemy;
                }
                return highest;
            }, null);
        }

        function applyCurrentHpRatioDamage(target, ratio, source, kind = "skill") {
            if (!target || target.dead || !Number.isFinite(ratio) || ratio <= 0) {
                return 0;
            }

            return applyDamage(target, Math.max(0, target.hp * ratio), source, kind);
        }

        function applyMaxHpRatioDamage(target, ratio, source, kind = "skill") {
            if (!target || target.dead || !Number.isFinite(ratio) || ratio <= 0) {
                return 0;
            }

            return applyDamage(target, Math.max(0, target.maxHp * ratio), source, kind);
        }

        function applyCopiedSkill(fighter, copiedFrom, now) {
            const copiedTarget = copiedFrom && copiedFrom !== fighter && !copiedFrom.dead && copiedFrom.offMapUntil <= now && !areAllies(fighter, copiedFrom)
                ? copiedFrom
                : nearestEnemy(fighter);
            if (!copiedTarget) {
                healFighter(fighter, fighter.maxHp * 0.33);
                megaBurst(fighter.x, fighter.y, fighter.definition.color, 5);

            const copiedDefinition = copiedTarget.definition;

            impactStar(copiedTarget.x, copiedTarget.y, fighter.definition.color);

            if (copiedId === "song-geonuk") {

                fighter.hp = Math.max(1, fighter.hp - lost);

                fighter.statBonusAttack += effects.attackGain || 0;
                fighter.speed *= effects.speedMultiplier || 1;
                fighter.statBonusSpeedRatio = fighter.speed / fighter.baseSpeed - 1;
                addDamageReduction(fighter, effects.damageReductionGain || 0, effects.maxDamageReduction || 0);

                effectRing(fighter.x, fighter.y, battle.ballSize * 1.55, copiedColor);
            } else if (copiedId === "yoo-seungchan") {

                            stun(enemy, effects.stunSeconds || 1, now);

                });

                        stun(enemy, effects.stunSeconds || 1, now);

                            healFighter(fighter, bonus * (effects.iceZoneHealRatio || 0.15));
                            floatText("얼음추가", enemy.x, enemy.y - battle.ballSize, copiedColor);
                        }
                    }
                });
            } else if (copiedId === "jeong-yuseung") {
                const target = highestCurrentHpEnemy(fighter);
                if (target) {
                    const dealt = applyMaxHpRatioDamage(target, effects.maxHpDamageRatio || effects.currentHpDamageRatio || 0.15, fighter, "skill");
                    healFighter(fighter, dealt * (effects.healRatio || 0));
                    effectRing(target.x, target.y, battle.ballSize * 1.55, copiedColor);
                    burst(target.x, target.y, copiedColor, 6);
                    impactStar(target.x, target.y, copiedColor);

                fighter.chargeHits = new Set();
                setVelocitySpeed(fighter, Math.max(effects.minSpeed || 430, fighter.speed * (effects.speedMultiplier || 2.75)));
                effectRing(fighter.x, fighter.y, battle.ballSize * 1.55, copiedColor);
                burst(fighter.x, fighter.y, copiedColor, 7);
            } else if (copiedId === "lee-seunghyun") {

                const copiedPoison = {

                    offMapDuration: (effects.offMapDuration || 2) + uses * (effects.offMapDurationIncrease || 0)
                };
                fighter.offMapUntil = now + copiedPoison.offMapDuration * 1000;
                fighter.invulnerableUntil = fighter.offMapUntil;
                fighter.vx = 0;
                fighter.vy = 0;
                createPoisonField(fighter, now, copiedPoison);
                fighter.seunghyunSkillUses += 1;
                effectRing(battle.arenaSize / 2, battle.arenaSize / 2, battle.arenaSize * 1.35, copiedColor);
                burst(battle.arenaSize / 2, battle.arenaSize / 2, copiedColor, 6);
            } else if (copiedId === "lee-hyunwoo" && effects.summon) {
                summonFighter(fighter, effects.summon, now);
            } else if (copiedId === "lee-jihoon") {
                fighter.followTargetId = copiedTarget.id;
                fighter.followUntil = now + (effects.duration || 5) * 1000;
                fighter.nextFollowDamageAt = now + (effects.tickInterval || 1) * 1000;
                fighter.followEffects = effects;
                effectRing(copiedTarget.x, copiedTarget.y, battle.ballSize * 1.5, copiedColor);
                floatText("따라감", copiedTarget.x, copiedTarget.y - battle.ballSize / 2, copiedColor);
            } else if (copiedId === "heo-yul") {
                healFighter(fighter, fighter.maxHp * 0.33);
                effectRing(fighter.x, fighter.y, battle.ballSize * 1.7, copiedColor);
            } else if (copiedId === "heo-jaemin") {

                fighter.hasteMultiplier = effects.hasteMultiplier || 1.65;
                fighter.hasteUntil = now + (effects.hasteDuration || 5) * 1000;
                effectRing(fighter.x, fighter.y, radius * 2, copiedColor);
                burst(fighter.x, fighter.y, copiedColor, 8);
                battle.fighters.forEach((enemy) => {

                    }
                    const dx = enemy.x - fighter.x;
                    const dy = enemy.y - fighter.y;

                        enemy.slowUntil = now + (effects.slowDuration || 3) * 1000;
                        applyDamage(enemy, effects.damage || 45, fighter, "skill");

                stun(copiedTarget, effects.stunSeconds || 3.5, now);

                    behindDistance: effects.behindDistance || 92,

                };
                fighter.offMapUntil = fighter.backstab.returnAt;
                fighter.invulnerableUntil = fighter.offMapUntil;
                fighter.vx = 0;
                fighter.vy = 0;

                floatText("은신복사", fighter.x, fighter.y - battle.ballSize / 2, copiedColor);
            } else if (copiedId === "kang-hyunwoo") {
                const direction = normalize(fighter.x - copiedTarget.x, fighter.y - copiedTarget.y);
                dashWithFallback(fighter, direction, (effects.dashDistance || 115) * arenaScale());
                applyDamage(copiedTarget, 15, fighter, "skill");
                effectRing(copiedTarget.x, copiedTarget.y, battle.ballSize * 1.2, copiedColor);
                impactStar(copiedTarget.x, copiedTarget.y, copiedColor);
                megaBurst(fighter.x, fighter.y, copiedColor, 5);
                floatText("대시복사", fighter.x, fighter.y - battle.ballSize / 2, copiedColor);
            } else if (copiedId === "lim-shingyu") {
