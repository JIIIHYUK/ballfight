        function checkWinner(now) {
            const alive = battle.fighters.filter((fighter) => !fighter.dead && !fighter.isSummon);
            const aliveTeams = [...new Set(alive.map((fighter) => fighter.teamId).filter(Boolean))];
            const teamFinished = battle.isTeamMode && aliveTeams.length <= 1;
            const bossAlive = battle.isBossMode && alive.some((fighter) => fighter.bossRole === "boss");
            const normalAlive = battle.isBossMode && alive.some((fighter) => fighter.bossRole === "normal");
            const bossFinished = battle.isBossMode && (!bossAlive || !normalAlive);
            const freeFinished = !battle.isTeamMode && !battle.isBossMode && alive.length <= 1;
            if (!battle.isFinished && battle.isRunning && (teamFinished || bossFinished || freeFinished)) {
                const freeForAllResult = freeFinished
                    ? finalizeFreeForAllRankings(now, alive)
                    : { rankings: [], goalkeepers: [] };
                const goalkeeperText = freeForAllResult.goalkeepers.length > 0
                    ? `골키퍼 ${freeForAllResult.goalkeepers.map((record) => `#${record.rank} ${record.name}`).join(" / ")}`
                    : "";
                const winnerText = battle.isTeamMode
                    ? (aliveTeams[0] ? `${TEAM_CONFIG[aliveTeams[0]]?.label || "팀"} 승리` : "무승부")
                    : battle.isBossMode
                        ? (bossAlive ? "보스 승리" : "일반 승리")
                        : (alive[0] ? `${escapeHtml(alive[0].definition.name)} 승리` : "무승부");
                battle.isFinished = true;
                battle.isRunning = false;
                battle.finishedAt = now;
                statsButton.classList.remove("hidden");
                statsButton.classList.add("flex");
                countdown.classList.remove("hidden");
                countdown.innerHTML = `
                    <div>
                        <div>${escapeHtml(winnerText)}</div>
                        ${goalkeeperText ? `<div class="font-label-numeric text-label-numeric mt-2">${escapeHtml(goalkeeperText)}</div>` : ""}
                        <div class="font-label-numeric text-label-numeric mt-3">TIME ${formatElapsed(currentFightElapsed(now))}</div>
                    </div>
                `;
                matchTitle.textContent = "전투 종료";
                updateElapsed(now);
            }
        }

        function tick(now) {
            if (!battle.lastTime) {
                battle.lastTime = now;
            }

            let elapsed = now - battle.startedAt;
            let remaining = Math.ceil((battle.countdownSeconds * 1000 - elapsed) / 1000);

            if (!battle.isRunning && !battle.isFinished) {
                if (remaining <= 1) {
                    triggerDeveloperJiUpgrade(now);
                }

                const dropouts = battle.fighters.filter((fighter) => !fighter.dead && !fighter.isSummon && isNamDongyun(fighter));
                const triggerRemaining = Math.min(...dropouts.map((fighter) => namDongyunPassiveEffects(fighter).triggerRemainingSeconds || 1));
                if (dropouts.length && remaining <= triggerRemaining && triggerNamDongyunDropout(now)) {
                    elapsed = now - battle.startedAt;
                    remaining = Math.ceil((battle.countdownSeconds * 1000 - elapsed) / 1000);
                }

                const countdownText = remaining > 0 ? String(remaining) : "FIGHT";
                if (countdown.textContent !== countdownText) {
                    countdown.textContent = countdownText;
                }
                if (elapsed >= battle.countdownSeconds * 1000) {
                    battle.isRunning = true;
                    battle.fightStartedAt = now;
                    countdown.classList.add("hidden");
                    matchTitle.textContent = "전투 중";
                }
            }

            const dt = Math.min(0.033, (now - battle.lastTime) / 1000);
            battle.lastTime = now;

            if (battle.isRunning) {
                const isScenePaused = battle.scenePauseUntil > now;
                const physicsDt = battle.globalSlowUntil > now
                    ? dt * (battle.globalSlowMultiplier || 0.35)
                    : dt;
                if (battle.globalSlowUntil <= now) {
                    battle.globalSlowMultiplier = 1;
                }
                if (!isScenePaused) {
                    updatePhysics(physicsDt, now);
                    checkWinner(now);
                }
            }

            renderFighters(now);
            updateHud(now);
            updateElapsed(now);

            if (battle.isRunning || !battle.isFinished) {
                animationFrameId = requestAnimationFrame(tick);
            } else {
                animationFrameId = null;
            }
        }

        function showInfo(definition) {
            const skillSummary = definition.skill.passiveOnly
                ? `${definition.skill.name} / 상시`
                : `${definition.skill.name} / ${definition.skill.cooldown}초`;
            document.getElementById("modal-name").textContent = definition.name;
            document.getElementById("modal-name").style.color = definition.color;
            document.getElementById("modal-skill").textContent = skillSummary;
            document.getElementById("modal-body").innerHTML = `
                <div class="grid grid-cols-2 gap-2 font-label-numeric text-label-numeric">
                    <div class="bg-surface-container-low brutal-border-thin p-2">HP ${definition.maxHp}</div>
                    <div class="bg-surface-container-low brutal-border-thin p-2">ATK ${definition.baseAttack}</div>
                    <div class="bg-surface-container-low brutal-border-thin p-2">SPD ${escapeHtml(definition.speedLabel)}</div>
                    <div class="bg-surface-container-low brutal-border-thin p-2">${escapeHtml(definition.colorName)}</div>
                </div>
                ${passiveHtml(definition)}
                <p class="text-on-surface-variant">${escapeHtml(definition.skill.description)}</p>
                <p class="font-label-numeric text-label-numeric">특성: ${escapeHtml(definition.traits.join(" / "))}</p>
                ${definition.immuneToBasic ? '<p class="font-label-numeric text-label-numeric text-secondary">기본 공격 피해 면역</p>' : ''}
                ${definition.immuneToKnockback ? '<p class="font-label-numeric text-label-numeric text-secondary">밀치기 면역</p>' : ''}
            `;
            document.getElementById("info-modal").classList.remove("hidden");
            document.getElementById("info-modal").classList.add("flex");
        }

        function hideInfo() {
            document.getElementById("info-modal").classList.add("hidden");
            document.getElementById("info-modal").classList.remove("flex");
        }

        function renderBattleStats() {
            const rows = statsRows().slice();
            if (!battle.isTeamMode && !battle.isBossMode && battle.freeForAllRankings.length > 0) {
                rows.sort((a, b) => (a.rank || 999) - (b.rank || 999));
            } else {
                rows.sort((a, b) => (
                    b.damageDealt - a.damageDealt
                    || b.healingDone - a.healingDone
                    || b.damageTaken - a.damageTaken
                ));
            }
            const totals = rows.reduce((acc, row) => {
                acc.damage += row.damageDealt;
                acc.heal += row.healingDone;
                acc.taken += row.damageTaken;
                return acc;
            }, { damage: 0, heal: 0, taken: 0 });

            const goalkeeperSummary = battle.goalkeeperSelections.length > 0
                ? ` / 골키퍼 ${battle.goalkeeperSelections.map((record) => `#${record.rank} ${record.name}`).join(" / ")}`
                : "";
            statsSummary.textContent = `총 딜 ${Math.round(totals.damage)} / 총 힐 ${Math.round(totals.heal)} / 받은 피해 ${Math.round(totals.taken)}${goalkeeperSummary}`;
            if (rows.length <= 0) {
                statsBody.innerHTML = `
                    <div class="bg-surface-container-low brutal-border-thin p-4 text-on-surface-variant">
                        기록된 통계가 없습니다.
                    </div>
                `;
                return;
            }

            statsBody.innerHTML = rows.map((row, index) => `
                <div class="bg-surface-container-low brutal-border-thin p-3 grid grid-cols-1 md:grid-cols-[1.35fr_repeat(3,0.72fr)_1.35fr] gap-2 items-center">
                    <div class="flex items-center gap-2 min-w-0">
                        <span class="font-label-numeric text-label-numeric text-on-surface-variant">#${row.rank || index + 1}</span>
                        <span class="w-3 h-3 brutal-border-thin shrink-0" style="background:${row.color};"></span>
                        <div class="min-w-0">
                            <div class="font-headline-md-mobile text-headline-md-mobile truncate" style="color:${row.color};">${escapeHtml(row.name)}</div>
                            ${row.teamLabel ? `<div class="font-label-numeric text-label-numeric text-on-surface-variant">${escapeHtml(row.teamLabel)}</div>` : ""}
                            ${row.goalkeeper ? `<div class="font-label-numeric text-label-numeric text-secondary">골키퍼</div>` : ""}
                        </div>
                    </div>
                    <div class="font-label-numeric text-label-numeric bg-surface-container-lowest brutal-border-thin p-2">딜 ${Math.round(row.damageDealt)}</div>
                    <div class="font-label-numeric text-label-numeric bg-surface-container-lowest brutal-border-thin p-2">힐 ${Math.round(row.healingDone)}</div>
                    <div class="font-label-numeric text-label-numeric bg-surface-container-lowest brutal-border-thin p-2">받은 피해 ${Math.round(row.damageTaken)}</div>
                    <div class="font-label-numeric text-label-numeric bg-surface-container-lowest brutal-border-thin p-2 min-w-0">
                        <div class="truncate">처치 ${row.kills.length ? escapeHtml(row.kills.join(" / ")) : "-"}</div>
                        <div class="truncate text-on-surface-variant mt-1">피처치 ${escapeHtml(row.killedBy || "-")}</div>
                    </div>
                </div>
            `).join("");
        }

        function showStats() {
            renderBattleStats();
            statsModal.classList.remove("hidden");
            statsModal.classList.add("flex");
        }

        function hideStats() {
            statsModal.classList.add("hidden");
            statsModal.classList.remove("flex");
        }

        function startBattle() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            arena.querySelectorAll(".fighter-ball, .kang-combo-aura, .kim-sihyeon-darkness-bar, .kim-sihyeon-darkness-cross, .lee-sungwon-marker, .lee-sungwon-combo-aura, .lee-sungwon-breath-line, .lee-sungwon-breath-text, .effect-ring, .effect-burst, .damage-float, .skill-label, .impact-star, .arena-flash, .charge-ghost, .windmill-bar, .volleyball-projectile, .volleyball-afterimage, .gje-helper, .gje-afterimage, .gje-screen-call, .yu-afterimage, .yu-rush-clone, .yu-rush-line, .lee-trajectory, .lee-soccer-ball, .jaeyoon-domain-call, .jaeyoon-domain, .jaeyoon-domain-boundary, .lee-dohyun-offside-line, .kim-gibeom-apple, .kim-donggyu-projectile, .kim-donggyu-targeting, .kim-donggyu-aim-line, .admin-donggyu-turret, .admin-donggyu-barrier, .admin-donggyu-target, .admin-donggyu-plane, .admin-donggyu-explosion, .protest-flag-spin, .protest-zone, .protest-arrow-row, .protest-target-marker, .kwon-cue-warning, .kwon-cue, .kwon-soonbeom-charge-inner, .kwon-soonbeom-charge-outer, .kwon-soonbeom-ki, .kwon-soonbeom-blackhole, .kwon-soonbeom-crack, .kwon-soonbeom-shockwave, .kim-junsu-link, .ji-caffeine, .ji-three-zone, .ji-three-shadow, .ji-basketball, .ji-basketball-ghost, .ji-drone-laser, .ji-code-drop, .ji-code-warning, .ji-code-laser, .ji-admin-revive-text, .park-memory-zone, .park-someone, .park-someone-ghost, .park-blossom, .park-active-range, .park-slash, .park-enhanced-slash, .park-spin-slash, .park-rush-line, .park-rising-slash").forEach((node) => node.remove());
            battle.fighters = selectedCharacters.map((definition, index) => createFighter(definition, index, selectedCharacters.length));
            initializeBattleStats();
            battle.pairHits = new Map();
            battle.globalSlowUntil = 0;
            battle.globalSlowMultiplier = 1;
            battle.activeWindmills = [];
            battle.activeVolleyballs = [];
            battle.activeYuRushLines = [];
            battle.activeKimGibeomApples = [];
            battle.activeKimDonggyuProjectiles = [];
            battle.activeAdminDonggyuTurrets = [];
            battle.activeProtestSkills = [];
            battle.activeKwonGisangCues = [];
            battle.activeJiCodeDrops = [];
            battle.activeParkMemoryZones = [];
            battle.activeParkBlossoms = [];
            battle.activeParkRisingSlashes = [];
            battle.freeForAllEliminations = [];
            battle.freeForAllRankings = [];
            battle.goalkeeperSelections = [];
            battle.scenePauseUntil = 0;
            battle.namDongyunDropoutTriggered = false;
            battle.adminDonggyuUpgradeTriggered = false;
            battle.adminDonggyuBarrier = null;
            battle.developerJiUpgradeChecked = false;
            battle.developerJiUpgradeBlocked = battle.fighters.some((fighter) => (
                hasTeacherPassiveDefinition(fighter.definition)
                || fighter.definition.id === "nam-dongyun"
                || fighter.definition.id === "developer-ji-taehyeok"
            ));
            battle.jaeyoonDomain = null;
            battle.jaeyoonDomains = [];
            battle.jaeyoonDomainSequence = 0;
            statsButton.classList.add("hidden");
            statsButton.classList.remove("flex");
            hideStats();

            activeEffects.rings = 0;
            activeEffects.stars = 0;
            activeEffects.bursts = 0;
            activeEffects.floatTexts = 0;
            activeEffects.flashes = 0;

            battle.startedAt = performance.now();
            battle.fightStartedAt = 0;
            battle.finishedAt = 0;
            battle.lastTime = 0;
            battle.isRunning = false;
            battle.isFinished = false;
            countdown.classList.remove("hidden");
            countdown.textContent = "3";
            matchTitle.textContent = "전투 준비";

            lastElapsedText = "";
            elapsedTime.textContent = "TIME 00:00.0";

            layoutFighters();
            renderHud();
            renderFighters(performance.now());

            animationFrameId = requestAnimationFrame(tick);
        }

        document.getElementById("restart-button").addEventListener("click", startBattle);
        document.getElementById("modal-close").addEventListener("click", hideInfo);
        statsButton.addEventListener("click", showStats);
        document.getElementById("stats-close").addEventListener("click", hideStats);
        document.getElementById("info-modal").addEventListener("click", (event) => {
            if (event.target.id === "info-modal") {
                hideInfo();
            }
        });
        statsModal.addEventListener("click", (event) => {
            if (event.target.id === "stats-modal") {
                hideStats();
            }
        });
        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                hideInfo();
                hideStats();
            }
        });

        window.addEventListener("resize", () => {
            if (!battle.fighters.length) {
                return;
            }
            const oldSize = battle.arenaSize || 1;
            const rect = arena.getBoundingClientRect();
            const ratio = rect.width / oldSize;
            battle.arenaSize = rect.width;
            battle.ballSize = scaledBallSize(battle.arenaSize);
            updateCachedCorners();
            battle.fighters.forEach((fighter) => {
                fighter.x *= ratio;
                fighter.y *= ratio;
                fighter.element.style.width = `${fighterSize(fighter)}px`;
                fighter.element.style.height = `${fighterSize(fighter)}px`;
            });
        });

        startBattle();
    </script>
</body>
