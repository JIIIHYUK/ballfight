            livingAlliesOf(fighter, { nonSummonOnly: true }).forEach((ally) => {
                if (ally.definition.skill?.passiveOnly || isProtestTargeted(ally, now)) {
                    return;
                }
                ally.protestAllyBuffUntil = Math.max(ally.protestAllyBuffUntil || 0, until);
                ally.protestAllyCooldownMultiplier = effects.allyCooldownMultiplier || 0.34;
                ally.protestAllyDamageTakenMultiplier = effects.allyDamageTakenMultiplier || 0.8;
                ally.protestAllyDamageMultiplier = effects.allyDamageMultiplier || 1.5;
                ally.protestAllyRegenPerSecond = effects.allyRegenPerSecond || 0;
                ally.protestAllyLastRegenAt = now;
                ally.protestAllyBuffSourceId = fighter.id;
                accelerateProtestAllyActionTimers(ally, now);
                if (!isControlLocked(ally, now) && ally.skillCooldown > 0) {
                    ally.skillCooldown = 0;
                }
                if (!isControlLocked(ally, now)) {
                    useSkill(ally, now);
                }
                ally.skillCooldown = Math.min(ally.skillCooldown || 0, skillCooldownDuration(ally));
                floatText("시위 동참", ally.x, ally.y - fighterRadius(ally), fighter.definition.color);
            });

            floatText("시위 시작", fighter.x, fighter.y - fighterRadius(fighter) * 1.5, fighter.definition.color);
            return true;
        }

        function protestTargetDamageMultiplier(target, source, now) {
            if (!isProtestTargeted(target, now) || !source) {
                return 1;
            }
            const owner = protestTargetOwnerFor(target);
            if (!owner || owner.dead || !(source === owner || areAllies(source, owner))) {
                return 1;
            }
            return owner.definition.skill?.effects?.targetDamageMultiplier || 1.5;
        }

        function updateProtestSkills(now) {
            [...battle.activeProtestSkills].forEach((skill) => {
                const owner = getFighterById(skill.ownerId);
                if (!owner || owner.dead || now >= skill.until) {
                    removeProtestSkill(skill);
                    return;
                }
                positionProtestSkillArea(skill);
                livingEnemiesOf(owner).forEach((enemy) => {
                    applyProtestBuffBan(enemy, owner, skill.until, now, { silent: true });
                });
                let target = getFighterById(skill.targetId);
                if (!target || target.dead) {
                    target = livingEnemiesOf(owner)
                        .filter((enemy) => !enemy.isSummon)
                        .sort((a, b) => (
                            Math.hypot(a.x - owner.x, a.y - owner.y)
                            - Math.hypot(b.x - owner.x, b.y - owner.y)
                        ))[0] || nearestEnemy(owner);
                    skill.targetId = target?.id || null;
                }
                if (target && !target.dead) {
                    target.protestTargetUntil = Math.max(target.protestTargetUntil || 0, skill.until);
                    target.protestTargetSourceId = owner.id;
                    const markerSize = fighterSize(target) * 1.32;
                    skill.targetMarker.style.display = "block";
                    skill.targetMarker.style.left = `${target.x}px`;
                    skill.targetMarker.style.top = `${target.y}px`;
                    skill.targetMarker.style.width = `${markerSize}px`;
                    skill.targetMarker.style.height = `${markerSize}px`;
                } else {
                    skill.targetMarker.style.display = "none";
                }

                const regenPerSecond = skill.effects.allyRegenPerSecond || 0;
                if (regenPerSecond > 0) {
                    livingAlliesOf(owner, { nonSummonOnly: true }).forEach((ally) => {
                        if ((ally.protestAllyBuffUntil || 0) <= now || ally.protestAllyBuffSourceId !== owner.id) {
                            return;
                        }
                        const lastRegenAt = ally.protestAllyLastRegenAt || now;
                        const elapsed = Math.max(0, Math.min(0.25, (now - lastRegenAt) / 1000));
                        ally.protestAllyLastRegenAt = now;
                        if (elapsed > 0) {
                            healFighter(ally, regenPerSecond * elapsed, owner, {
                                silent: true,
                                color: owner.definition.color
                            });
                        }
                    });
                }

                livingEnemiesOf(owner).forEach((enemy) => {
                    if (!isInsideProtestZone(skill, enemy)) {
                        return;
                    }
                    enemy.protestFixedSpeedUntil = Math.max(enemy.protestFixedSpeedUntil || 0, now + 120);
                    enemy.protestFixedSpeedValue = skill.effects.enemyFixedSpeed || 50;
                    if ((enemy.cooldownSlowUntil || 0) <= now) {
                        enemy.cooldownSlowMultiplier = 1;
                    }
                    enemy.cooldownSlowUntil = Math.max(enemy.cooldownSlowUntil || 0, now + 120);
                    enemy.cooldownSlowMultiplier = Math.min(enemy.cooldownSlowMultiplier || 1, skill.effects.enemyCooldownMultiplier || 0.6);
                });
            });
        }

        function createAdminDonggyuTarget(x, y, size) {
            const element = document.createElement("div");
            element.className = "admin-donggyu-target";
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;
            element.style.width = `${size}px`;
            element.style.height = `${size}px`;
            arena.appendChild(element);
            return element;
        }

        function showAdminDonggyuPlane(owner, effects, durationMs) {
            if (!owner || owner.dead || !battle.fighters.includes(owner)) {
                return;
            }
            const element = document.createElement("div");
            element.className = "admin-donggyu-plane";
            element.style.left = `${battle.arenaSize / 2}px`;
            element.style.top = `${battle.arenaSize / 2}px`;
            element.style.setProperty("--duration", `${durationMs}ms`);
            element.innerHTML = `<img alt="전투기 그림자" ${imageAttrs(effects.planeImageSrc, effects.planeImageFallbackSrcs)}>`;
            arena.appendChild(element);
            setTimeout(() => element.remove(), durationMs + 80);
        }

        function explodeAdminDonggyuTarget(owner, target, effects) {
            if (!owner || owner.dead || !battle.fighters.includes(owner)) {
                target.element?.remove();
                return;
            }
            const now = performance.now();
            const outer = effects.outerDiameter || 150;
            const innerRadius = (effects.innerDiameter || 50) / 2;
            const outerRadius = outer / 2;
            target.element?.remove();
            const explosion = document.createElement("div");
            explosion.className = "admin-donggyu-explosion";
            explosion.style.left = `${target.x}px`;
            explosion.style.top = `${target.y}px`;
            explosion.style.width = `${outer}px`;
            explosion.style.height = `${outer}px`;
            arena.appendChild(explosion);
            setTimeout(() => explosion.remove(), 420);
            effectRing(target.x, target.y, effects.innerDiameter || 50, "#dc2626");
            effectRing(target.x, target.y, outer, "#facc15");
            burst(target.x, target.y, "#dc2626", 8);
            livingEnemiesOf(owner).forEach((enemy) => {
                const distance = Math.hypot(enemy.x - target.x, enemy.y - target.y);
                let dealt = 0;
                if (distance <= innerRadius + fighterRadius(enemy)) {
                    dealt = applyDamage(enemy, effects.innerDamage || 150, owner, "skill");
                } else if (distance <= outerRadius + fighterRadius(enemy)) {
                    dealt = applyDamage(enemy, effects.outerDamage || 50, owner, "skill");
                }
                if (dealt > 0 && !enemy.dead) {
                    const direction = normalize(enemy.x - target.x || enemy.vx || 1, enemy.y - target.y || enemy.vy || 0);
                    const pushSpeed = effects.explosionKnockbackSpeed || 950;
                    if (!ignoreOrReflectKnockback(enemy, owner, direction, pushSpeed, { origin: target })) {
                        enemy.windmillMomentum = null;
                        enemy.vx = direction.x * scaledSpeed(pushSpeed);
                        enemy.vy = direction.y * scaledSpeed(pushSpeed);
                        enemy.afterimageUntil = Math.max(enemy.afterimageUntil || 0, now + 260);
                        enemy.nextAfterimageAt = 0;
                    }
                }
            });
        }

        function startAdminKimDonggyuAirSupport(fighter, now, options = {}) {
            if (!isAdminKimDonggyu(fighter) || fighter.dead) {
                return false;
            }
            const effects = adminKimDonggyuSkillEffects(fighter);
            const radius = fighterRadius(fighter);
            fighter.x = battle.arenaSize / 2;
            fighter.y = battle.arenaSize / 2;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            fighter.noCollisionUntil = Math.max(fighter.noCollisionUntil || 0, now + 900);
            fighter.invulnerableUntil = Math.max(fighter.invulnerableUntil || 0, now + 900);
            fighter.adminDonggyuAirSupportUntil = now + 900;
            createOrReinforceAdminDonggyuBarrier(fighter, effects);

            const baseTargetMultiplier = Math.max(1, options.targetMultiplier || (options.empowered ? (effects.empoweredTargetMultiplier || 2) : 1));
            const previousUseCount = Math.max(0, fighter.adminDonggyuAirSupportUseCount || 0);
            const growthMultiplier = 1 + previousUseCount * (effects.explosionCountGrowthPerUse ?? 0.5);
            const targetMultiplier = baseTargetMultiplier * growthMultiplier;
            const targetCountPerSide = Math.max(1, Math.round((effects.targetsPerSide || 6) * targetMultiplier));
            const outer = effects.outerDiameter || 150;
            const margin = outer / 2 + 10;
            const targets = [];
            const makePoint = (side) => {
                const minX = side === "left" ? margin : battle.arenaSize / 2 + margin;
                const maxX = side === "left" ? battle.arenaSize / 2 - margin : battle.arenaSize - margin;
                return {
                    x: minX + Math.random() * Math.max(1, maxX - minX),
                    y: margin + Math.random() * Math.max(1, battle.arenaSize - margin * 2)
                };
            };
            ["left", "right"].forEach((side) => {
                for (let index = 0; index < targetCountPerSide; index += 1) {
                    const point = makePoint(side);
                    targets.push({
                        ...point,
                        element: createAdminDonggyuTarget(point.x, point.y, outer)
                    });
                }
            });
            targets.sort((a, b) => b.y - a.y);

            const warningMs = Math.max(100, (effects.warningDuration || 0.85) * 1000);
            const planeMs = Math.max(100, (effects.planeDuration || 0.55) * 1000);
            const configuredStepMs = Math.max(10, (effects.explosionStepDelay || 0.08) * 1000);
            const oneSecondStepMs = targets.length > 1 ? 1000 / Math.max(1, targets.length - 1) : 0;
            const stepMs = targets.length > 1 ? Math.min(configuredStepMs, oneSecondStepMs) : 0;
            const planeStartMs = Math.max(0, warningMs - planeMs);
            setTimeout(() => showAdminDonggyuPlane(fighter, effects, planeMs), planeStartMs);
            targets.forEach((target, index) => {
                setTimeout(() => explodeAdminDonggyuTarget(fighter, target, effects), warningMs + index * stepMs);
            });
            setTimeout(() => {
                targets.forEach((target) => target.element?.remove());
            }, warningMs + targets.length * stepMs + 800);

            fighter.adminDonggyuAirSupportUseCount = previousUseCount + 1;
            fighter.skillCooldown = skillCooldownDuration(fighter);
            const multiplierLabel = targetMultiplier.toFixed(1).replace(/\.0$/, "");
            floatText(options.label || (targetMultiplier > 1 ? `공중지원 x${multiplierLabel}` : "공중지원"), fighter.x, fighter.y - radius, fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.7, fighter.definition.color);
            return true;
        }

        function throwKimDonggyuGrenade(fighter, now) {
            const effects = kimDonggyuSkillEffects(fighter);
            const direction = aimDirectionFor(fighter);
            createKimDonggyuProjectile(fighter, "grenade", {
                direction,
                speed: effects.grenadeSpeed || 300,
                damage: effects.grenadeDamage || 80,
                explosionRadius: (effects.grenadeExplosionDiameter || 150) / 2,
                size: baseFighterSize(fighter) * (effects.grenadeSizeMultiplier || 0.5),
                imageSrc: effects.grenadeImageSrc,
                imageFallbackSrcs: effects.grenadeImageFallbackSrcs
            });
            floatText("수류탄", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
        }

        function fireKimDonggyuBullet(fighter, options = {}) {
            const target = options.target || nearestEnemy(fighter);
            const direction = aimDirectionFor(fighter, target);
            createKimDonggyuProjectile(fighter, options.type || "bullet", {
                direction,
                speed: options.speed || 400,
                damage: options.damage || 10,
                size: options.size || battle.ballSize * 0.18,
                maxDistance: options.maxDistance || Infinity,
                rotation: Math.atan2(direction.y, direction.x)
            });
        }

        function startKimDonggyuAr(fighter, now) {
            const effects = kimDonggyuSkillEffects(fighter);
            fighter.kimDonggyuArShotsRemaining = effects.arShots || 20;
            fighter.kimDonggyuArShotInterval = protestScaledMs(fighter, (effects.arDuration || 2) * 1000, now) / Math.max(1, fighter.kimDonggyuArShotsRemaining);
            fighter.kimDonggyuNextArShotAt = now;
            floatText("AR", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
        }

        function updateKimDonggyuAr(fighter, now) {
            if (!isKimDonggyu(fighter) || fighter.dead || fighter.kimDonggyuArShotsRemaining <= 0 || fighter.kimDonggyuNextArShotAt > now) {
                return;
            }
            const effects = kimDonggyuSkillEffects(fighter);
            let fired = 0;
            while (fighter.kimDonggyuArShotsRemaining > 0 && fighter.kimDonggyuNextArShotAt <= now && fired < 3) {
                fireKimDonggyuBullet(fighter, {
                    type: "bullet",
                    speed: effects.arBulletSpeed || 2000,
                    damage: effects.arBulletDamage || 5,
                    size: battle.ballSize * 0.18
                });
                fighter.kimDonggyuArShotsRemaining -= 1;
                fighter.kimDonggyuNextArShotAt += fighter.kimDonggyuArShotInterval || 500;
                fired += 1;
            }
        }

        function fireKimDonggyuShotgun(fighter, now) {
            const effects = kimDonggyuSkillEffects(fighter);
            const target = nearestEnemy(fighter);
            const baseDirection = aimDirectionFor(fighter, target);
            const pelletCount = effects.shotgunPellets || 5;
            const spread = effects.shotgunSpreadRadians || 0.72;
            for (let index = 0; index < pelletCount; index += 1) {
                const ratio = pelletCount === 1 ? 0.5 : index / (pelletCount - 1);
                const angle = (ratio - 0.5) * spread;
                const direction = rotateVector(baseDirection.x, baseDirection.y, angle);
                createKimDonggyuProjectile(fighter, "bullet", {
                    direction,
                    speed: effects.shotgunSpeed || 2000,
                    damage: effects.shotgunDamage || 20,
                    size: battle.ballSize * 0.18,
                    maxDistance: effects.shotgunRange || 200,
                    rotation: Math.atan2(direction.y, direction.x)
                });
            }
            floatText("12 gauge", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
        }

        function startKimDonggyuSrAim(fighter, now) {
            moveKimDonggyuToFarthestCorner(fighter, now, { includeAllies: true });
            const target = farthestKimDonggyuSrEnemy(fighter, now);
            if (!target) {
                floatText("대상 없음", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
                return false;
            }

            const effects = kimDonggyuSkillEffects(fighter);
            fighter.kimDonggyuAim = {
                targetId: target.id,
                releaseAt: now + protestScaledMs(fighter, (effects.srAimDuration || 1.5) * 1000, now),
                nextAuraAt: 0
            };
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            floatText("SR 조준", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function updateKimDonggyuTargeting(fighter, target) {
            if (!fighter.kimDonggyuTargetingElement || !fighter.kimDonggyuTargetingElement.isConnected) {
                const marker = document.createElement("div");
                marker.className = "kim-donggyu-targeting";
                marker.innerHTML = `<span class="target-dot"></span>`;
                arena.appendChild(marker);
                fighter.kimDonggyuTargetingElement = marker;
            }
            const size = fighterSize(target) * 1.18;
            fighter.kimDonggyuTargetingElement.style.left = `${target.x}px`;
            fighter.kimDonggyuTargetingElement.style.top = `${target.y + fighterRadius(target) * 0.34}px`;
            fighter.kimDonggyuTargetingElement.style.width = `${size}px`;
            fighter.kimDonggyuTargetingElement.style.height = `${size}px`;
        }

        function updateKimDonggyuAimLine(fighter, target) {
            if (!fighter.kimDonggyuAimLineElement || !fighter.kimDonggyuAimLineElement.isConnected) {
                const line = document.createElement("div");
                line.className = "kim-donggyu-aim-line";
                arena.appendChild(line);
                fighter.kimDonggyuAimLineElement = line;
            }

            const startX = fighter.x;
            const startY = fighter.y;
            const dx = target.x - startX;
            const dy = target.y - startY;
            const length = Math.max(1, Math.hypot(dx, dy));
            fighter.kimDonggyuAimLineElement.style.left = `${startX}px`;
            fighter.kimDonggyuAimLineElement.style.top = `${startY}px`;
            fighter.kimDonggyuAimLineElement.style.width = `${length}px`;
            fighter.kimDonggyuAimLineElement.style.transform = `translate(0, -50%) rotate(${Math.atan2(dy, dx)}rad)`;
        }

        function interruptKimDonggyuAim(fighter, interrupter, now) {
            if (!isKimDonggyuAiming(fighter)) {
                return false;
            }
            clearKimDonggyuAim(fighter);
            if (!interrupter || interrupter.dead || areAllies(fighter, interrupter)) {
                return true;
            }

            const effects = kimDonggyuSkillEffects(fighter);
            const direction = aimDirectionFor(fighter, interrupter);
            createKimDonggyuProjectile(fighter, "knife", {
                direction,
                speed: effects.knifeSpeed || 300,
                size: battle.ballSize * 0.48,
                imageSrc: effects.knifeImageSrc,
                imageFallbackSrcs: effects.knifeImageFallbackSrcs,
                bleedDamage: effects.knifeBleedDamage || 100,
                bleedDuration: effects.knifeBleedDuration || 3,
                rotation: Math.atan2(direction.y, direction.x)
            });
            floatText("칼 투척", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function updateKimDonggyuAim(fighter, now) {
            if (!isKimDonggyuAiming(fighter)) {
                return false;
            }
            const aim = fighter.kimDonggyuAim;
            const target = getFighterById(aim.targetId);
            if (!isKimDonggyuSrTargetable(target, now)) {
                clearKimDonggyuAim(fighter);
                return false;
            }

            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            updateKimDonggyuTargeting(fighter, target);
            updateKimDonggyuAimLine(fighter, target);
            if (!aim.nextAuraAt || now >= aim.nextAuraAt) {
                effectRing(fighter.x, fighter.y, battle.ballSize * 1.16, fighter.definition.color);
                aim.nextAuraAt = now + 300;
            }
            if (now < aim.releaseAt) {
                return true;
            }

            const effects = kimDonggyuSkillEffects(fighter);
            clearKimDonggyuAim(fighter);
            applyDamage(target, effects.srDamage || 400, fighter, "skill", { unavoidable: true });
            impactStar(target.x, target.y, fighter.definition.color);
            burst(target.x, target.y, fighter.definition.color, 12);
            effectRing(target.x, target.y, battle.ballSize * 1.5, fighter.definition.color);
            floatText("SR", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function startKimDonggyuSelfRevive(fighter, now) {
            if (!isKimDonggyu(fighter) || fighter.kimDonggyuSelfReviveUsed) {
                return false;
            }

            const effects = kimDonggyuPassiveEffects(fighter);
            fighter.kimDonggyuSelfReviveUsed = true;
            fighter.kimDonggyuDefibUntil = now + (effects.selfReviveDuration || 3) * 1000;
            fighter.kimDonggyuDefibTempHp = effects.selfReviveTempHp || 100;
            fighter.hp = 1;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            clearKimDonggyuAim(fighter, { silent: true });
            floatText("자가제세동", fighter.x, fighter.y - fighterRadius(fighter), "#6b7280");
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.32, "#6b7280");
            return true;
        }

        function finishKimDonggyuSelfRevive(fighter, now) {
            const effects = kimDonggyuPassiveEffects(fighter);
            fighter.kimDonggyuDefibUntil = 0;
            fighter.kimDonggyuDefibTempHp = 0;
            const revivedHp = Math.min(fighter.maxHp, effects.selfReviveHp || 200);
            healFighter(fighter, revivedHp - fighter.hp, fighter, { silent: true });
            fighter.hp = revivedHp;
            fighter.vx = 0;
            fighter.vy = 0;
            floatText("부활", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            effectRing(fighter.x, fighter.y, battle.ballSize * 1.45, "#22c55e");
        }

        function failKimDonggyuSelfRevive(fighter, now, source = null) {
            fighter.kimDonggyuDefibUntil = 0;
            fighter.kimDonggyuDefibTempHp = 0;
            fighter.hp = 0;
            floatText("제세동 실패", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            defeatFighter(fighter, now, source);
        }

        function damageKimDonggyuDefib(target, amount, source, now, options = {}) {
            const damage = applyKimDonggyuCritical(source, amount, target, now, options);
            const actual = Math.min(target.kimDonggyuDefibTempHp || 0, damage);
            target.kimDonggyuDefibTempHp -= actual;
            if (actual > 0) {
                recordDamageStats(source, target, actual);
            }
            if (!options.silent) {
                floatText(`임시HP -${Math.round(actual)}`, target.x, target.y - fighterRadius(target), "#6b7280");
                impactStar(target.x, target.y, source ? source.definition.color : "#ba1a1a");
            }
            if (target.kimDonggyuDefibTempHp <= 0) {
                failKimDonggyuSelfRevive(target, now, source);
            }
            return actual;
        }

        function updateKimDonggyuState(fighter, now) {
            if (!isKimDonggyu(fighter) || fighter.dead) {
                return false;
            }
            updateKimDonggyuAr(fighter, now);
            if (isKimDonggyuDefibing(fighter, now)) {
                fighter.vx = 0;
                fighter.vy = 0;
                fighter.windmillMomentum = null;
                if (now >= fighter.kimDonggyuDefibUntil) {
                    finishKimDonggyuSelfRevive(fighter, now);
                    return false;
                }
                return true;
            }
            if (fighter.kimDonggyuDefibUntil && now >= fighter.kimDonggyuDefibUntil) {
                finishKimDonggyuSelfRevive(fighter, now);
                return false;
            }
            return updateKimDonggyuAim(fighter, now);
        }

        function updateAdminKimDonggyuState(fighter, dt, now) {
            if (!isAdminKimDonggyu(fighter) || fighter.dead) {
                return false;
            }
            fighter.x = battle.arenaSize / 2;
            fighter.y = battle.arenaSize / 2;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            if (!fighter.adminDonggyuSpawnedAt) {
                fighter.adminDonggyuSpawnedAt = now;
            }
            if (!isPassiveForbidden(fighter, now) && !battle.activeAdminDonggyuTurrets.some((turret) => turret.ownerId === fighter.id)) {
                installAdminDonggyuTurrets(fighter, now);
            }
            const midTurretDelayMs = Math.max(0, (adminKimDonggyuPassiveEffects(fighter).midTurretDelay ?? 3) * 1000);
            if (!isPassiveForbidden(fighter, now) && !fighter.adminDonggyuMidTurretsInstalled && now - fighter.adminDonggyuSpawnedAt >= midTurretDelayMs) {
                addAdminDonggyuMidTurrets(fighter, now);
            }
            if (!isPassiveForbidden(fighter, now)) {
                updateAdminDonggyuHelicopterSummon(fighter, now);
            }
            const barrier = adminDonggyuBarrierFor(fighter);
            if (barrier?.element?.isConnected) {
                barrier.element.style.left = `${fighter.x}px`;
                barrier.element.style.top = `${fighter.y}px`;
                enforceAdminDonggyuBarrierCollision(fighter);

            if (fighter.adminDonggyuAirSupportUntil > now) {
                return true;
            }
            const cooldownMultiplier = fighter.cooldownSlowUntil > now ? fighter.cooldownSlowMultiplier || 0.5 : 1;
            fighter.skillCooldown = Math.max(0, fighter.skillCooldown - dt * cooldownMultiplier);
            if (fighter.skillCooldown <= 0 && !fighter.definition.skill?.passiveOnly) {
                useSkill(fighter, now);
            }
            return true;
        }

        function useKimDonggyuSkill(fighter, now) {
            if (!isKimDonggyu(fighter) || fighter.dead || isKimDonggyuDefibing(fighter, now)) {
                return false;
            }

            const modes = kimDonggyuModes(fighter);
            const modeIndex = (fighter.kimDonggyuModeIndex || 0) % modes.length;
            const mode = modes[modeIndex];
            fighter.kimDonggyuModeIndex = (modeIndex + 1) % modes.length;

            if (mode === "수류탄") {
                throwKimDonggyuGrenade(fighter, now);
                return true;
            }
            if (mode === "AR") {
                startKimDonggyuAr(fighter, now);
                return true;
            }
            if (mode === "12 gauge") {
                fireKimDonggyuShotgun(fighter, now);
                return true;
            }
            if (mode === "SR") {
                return startKimDonggyuSrAim(fighter, now);

        function createKwonCueElement(entry, className) {

        function removeKwonCue(entry) {

        function startKwonGisangSpiral(fighter, now) {
            if (!isKwonGisang(fighter) || fighter.dead) {
                return false;
            }

            const effects = kwonGisangSkillEffects(fighter);
            const count = Math.max(1, effects.cueCount || 20);
            const intervalMs = Math.max(20, (effects.spawnInterval || 0.2) * 1000);
            const warningMs = Math.max(0, (effects.warningDuration || 0.2) * 1000);
            const activeMs = Math.max(intervalMs * 3, (effects.activeDuration || 0.6) * 1000);
            const step = (effects.angleStep || 30) * Math.PI / 180;
            const centerX = battle.arenaSize / 2;
            const centerY = battle.arenaSize / 2;
            const length = battle.arenaSize * (effects.cueLengthMultiplier || 1.75);
            const width = bossAttackRange(fighter, battle.ballSize * (effects.cueWidthMultiplier || 0.42));
            const totalDuration = (count - 1) * intervalMs + activeMs;
            fighter.kwonGisangSpiralUntil = now + totalDuration;
            lockKwonGisangToCenter(fighter);

            for (let index = 0; index < count; index += 1) {
                const angle = -Math.PI / 2 + index * step;
                const spawnAt = now + index * intervalMs;
                battle.activeKwonGisangCues.push({
                    ownerId: fighter.id,
                    index,
                    centerX,
                    centerY,
                    angle,
                    directionX: -Math.cos(angle),
                    directionY: -Math.sin(angle),
                    length,
                    width,
                    damage: effects.damage || 200,
                    knockbackSpeed: effects.knockbackSpeed || 10000,
                    wallDamage: effects.wallDamage || 100,
                    spawnAt,
                    warningAt: spawnAt - warningMs,
                    expiresAt: spawnAt + activeMs,
                    warningDuration: warningMs,
                    duration: activeMs,
                    startOffset: effects.cueStartOffset ?? 42,
                    hitOffset: effects.cueHitOffset ?? 0,
                    endOffset: effects.cueEndOffset ?? -22,
                    imageSrc: effects.cueImageSrc || "images/당구채-transparent.png",
                    imageFallbackSrcs: effects.cueImageFallbackSrcs || ["images/당구채.png"],
                    color: fighter.definition.color,
                    hitIds: new Set(),
                    warningElement: null,
                    element: null
                });
            }

            screenFlash(fighter.definition.color);
            floatText("당구채 스파이럴", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;

        function applyKwonCueHit(cue, source, target, now) {
            if (cue.hitIds.has(target.id) || target.dead || target.offMapUntil > now || areAllies(source, target)) {
                return;
            }

            const halfLength = cue.length / 2;
            const ax = cue.centerX - Math.cos(cue.angle) * halfLength;
            const ay = cue.centerY - Math.sin(cue.angle) * halfLength;
            const bx = cue.centerX + Math.cos(cue.angle) * halfLength;
            const by = cue.centerY + Math.sin(cue.angle) * halfLength;
            const hitDistance = cue.width / 2 + fighterRadius(target);
            if (distanceToSegment(target.x, target.y, ax, ay, bx, by) > hitDistance) {
                return;
            }

            cue.hitIds.add(target.id);
            const dealt = applyDamage(target, cue.damage, source, "skill");
            if (target.dead || dealt <= 0) {
                return;
            }

            const direction = normalize(cue.directionX, cue.directionY);
            if (ignoreOrReflectKnockback(target, source, direction, cue.knockbackSpeed, { origin: target })) {
                return;
            }
            target.windmillMomentum = {
                source,
                phase: "toWall",
                speed: cue.knockbackSpeed,
                reboundSpeed: Math.max(1800, cue.knockbackSpeed * 0.42),
                decayAmount: Math.max(650, cue.knockbackSpeed * 0.18),
                decayInterval: 100,
                nextDecayAt: 0,
                wallDamage: cue.wallDamage,
                nextAfterimageAt: 0,
                afterimageInterval: scaledAfterimageInterval(28),
                afterimageLifetime: 300
            };
            target.vx = direction.x * scaledSpeed(cue.knockbackSpeed);
            target.vy = direction.y * scaledSpeed(cue.knockbackSpeed);
            impactStar(target.x, target.y, source.definition.color);
            burst(target.x, target.y, source.definition.color, 9);
            effectRing(target.x, target.y, battle.ballSize * 1.35, source.definition.color);
        }

        function updateKwonGisangCues(now) {

                const source = getFighterById(cue.ownerId);
                if (!source || source.dead || now >= cue.expiresAt) {
                    removeKwonCue(cue);
                    return false;
                }
                if (isKwonGisangSpiraling(source, now)) {
                    lockKwonGisangToCenter(source);
                }

                if (!cue.warningElement && now >= cue.warningAt && now < cue.spawnAt) {
                    cue.warningElement = createKwonCueElement(cue, "kwon-cue-warning");

                if (!cue.element && now >= cue.spawnAt) {
                    cue.warningElement?.remove();
                    cue.warningElement = null;
                    cue.element = createKwonCueElement(cue, "kwon-cue");

            });

            const progress = Math.max(0.02, Math.min(1, (now - fighter.kwonSoonbeomChargeStartedAt) / duration));

            const kiSize = Math.max(battle.ballSize * 2.1, battle.ballSize * (2.2 + progress * 2.8));
            [
                [fighter.kwonSoonbeomChargeInnerElement, centerDiameter],
                [fighter.kwonSoonbeomChargeOuterElement, outerDiameter],
                [fighter.kwonSoonbeomKiElement, kiSize]

                element.style.width = `${size}px`;
                element.style.height = `${size}px`;
            });
        }

        function startKwonSoonbeomGravityPunch(fighter, now) {

                return false;
            }

            const effects = kwonSoonbeomSkillEffects(fighter);

            lockKwonSoonbeomToCenter(fighter);

            fighter.kwonSoonbeomChargeDurationMs = chargeDurationMs;

            return true;
        }

        function interruptKwonSoonbeomCharge(fighter, now) {

            fighter.kwonSoonbeomCharging = false;
            fighter.kwonSoonbeomChargeStartedAt = 0;

            fighter.kwonSoonbeomChargeDurationMs = 0;
            fighter.kwonSoonbeomShieldHits = 0;
            clearKwonSoonbeomChargeVisuals(fighter);
            fighter.skillCooldown = skillCooldownDuration(fighter);
            floatText("차징 중단", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            applyDamage(fighter, effects.interruptedSelfDamage || 500, fighter, "skill", {
                unavoidable: true,
                ignoreKwonSoonbeomShield: true
            });

        function createKwonSoonbeomBlackHole(fighter) {

            element.style.top = `${battle.arenaSize / 2}px`;

            arena.appendChild(element);
            fighter.kwonSoonbeomBlackHoleElement = element;

            lockKwonSoonbeomToCenter(fighter);
            createKwonSoonbeomBlackHole(fighter);
            fighter.kwonSoonbeomPullUntil = now + (effects.blackHolePullDuration || 1.2) * 1000;
            fighter.kwonSoonbeomSlamDone = false;
            screenFlash("#000000");
            floatText("블랙홀", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
        }

        function tryKwonSoonbeomShieldBlock(target, amount, source, kind, options = {}, now = performance.now()) {
            if (!isKwonSoonbeomCharging(target) || options.ignoreKwonSoonbeomShield) {
                return false;
            }

            target.kwonSoonbeomShieldHits = Math.max(0, (target.kwonSoonbeomShieldHits || 0) - 1);
            floatText(`절대방어 ${target.kwonSoonbeomShieldHits}`, target.x, target.y - fighterRadius(target), target.definition.color);
            effectRing(target.x, target.y, fighterSize(target) * 1.45, target.definition.color);
            if (target.kwonSoonbeomShieldHits <= 0) {
                releaseKwonSoonbeomGravityPunch(target, now);
            }
            return true;
        }

        function tryKwonSoonbeomEffectBlock(target, source, kind = "effect", now = performance.now(), options = {}) {
            if (!target || target.dead || !isKwonSoonbeomCharging(target) || options.ignoreKwonSoonbeomShield) {
                return false;
            }
            if (source && source === target && !options.allowSelfBlock) {
                return false;
            }

            return tryKwonSoonbeomShieldBlock(target, 0, source, kind, options, now);
        }

        function pullUnitsToKwonSoonbeomBlackHole(fighter, dt, now) {
            const effects = kwonSoonbeomSkillEffects(fighter);
            const centerX = battle.arenaSize / 2;
            const centerY = battle.arenaSize / 2;
            const pullSpeed = scaledSpeed(effects.blackHolePullSpeed || 1700);
            const blackHoleRadius = bossAttackRange(fighter, effects.blackHoleDiameter || 200) / 2;
            const contactDamage = effects.blackHoleContactDamage || 10;
            const contactIntervalMs = Math.max(20, (effects.blackHoleContactDamageInterval || 0.1) * 1000);
            const applyBlackHoleContactDamage = (target) => {
                const contactDistance = Math.hypot(target.x - centerX, target.y - centerY);
                if (
                    !areAllies(fighter, target)
                    && contactDistance <= blackHoleRadius + fighterRadius(target)
                    && now >= (target.kwonSoonbeomBlackHoleNextDamageAt || 0)
                ) {
                    target.kwonSoonbeomBlackHoleNextDamageAt = now + contactIntervalMs;
                    applyDamage(target, contactDamage, fighter, "skill");
                }
            };
            battle.fighters.forEach((target) => {
                if (target === fighter || target.dead || target.offMapUntil > now) {
                    return;
                }

                const dx = centerX - target.x;
                const dy = centerY - target.y;
                const distance = Math.hypot(dx, dy);
                if (distance <= 2) {
                    target.x = centerX;
                    target.y = centerY;
                    target.vx = 0;
                    target.vy = 0;
                    applyBlackHoleContactDamage(target);
                    return;
                }

                const direction = normalize(dx, dy);
                const step = Math.min(distance, pullSpeed * Math.max(dt, 0.016));
                target.windmillMomentum = null;
                target.x = clampToArena(target.x + direction.x * step);
                target.y = clampToArena(target.y + direction.y * step);
                target.vx = direction.x * pullSpeed;
                target.vy = direction.y * pullSpeed;
                applyBlackHoleContactDamage(target);
            });
        }

            element.style.top = `${fighter.y}px`;

            const now = performance.now();

            });

        function finishKwonSoonbeomGravityPunch(fighter, now) {

        function updateTeacherPassive(fighter, now) {

            ghost.style.width = zone.someoneElement.style.width;
            ghost.style.height = zone.someoneElement.style.height;
            ghost.style.animationDuration = `${scaledAfterimageLifetime(420)}ms`;
            ghost.innerHTML = zone.someoneElement.innerHTML;
            arena.appendChild(ghost);
            setTimeout(() => ghost.remove(), scaledAfterimageLifetime(460));
        }

        function createParkMemoryZone(fighter, target, now, effects) {
            const size = bossAttackRange(fighter, effects.squareSize || 200);
            const half = size / 2;
            const front = normalize(fighter.vx || target.x - fighter.x || 1, fighter.vy || target.y - fighter.y || 0);
            const centerX = Math.max(half, Math.min(battle.arenaSize - half, fighter.x + front.x * size * 0.22));
            const centerY = Math.max(half, Math.min(battle.arenaSize - half, fighter.y + front.y * size * 0.22));
            const zone = {
                id: `park-memory-${Math.round(now)}-${Math.floor(Math.random() * 10000)}`,
                ownerId: fighter.id,
                targetId: target.id,
                centerX,
                centerY,
                size,
                hp: effects.wallHp || 100,
                maxHp: effects.wallHp || 100,
                expiresAt: now + (effects.duration || 5) * 1000,
                nextHitAt: now + 120,
                hitIndex: 0,
                wallHitAt: new Map(),
                collapsed: false,
                element: null,
                someoneElement: null,
                someoneX: centerX,
                someoneY: centerY
            };

            const element = document.createElement("div");
            element.className = "park-memory-zone";
            element.style.left = `${centerX}px`;
            element.style.top = `${centerY}px`;
            element.style.width = `${size}px`;
            element.style.height = `${size}px`;
            arena.appendChild(element);
            zone.element = element;

            const someone = document.createElement("div");
            someone.className = "park-someone";
            const someoneSize = battle.ballSize * 0.82;
            someone.style.width = `${someoneSize}px`;
            someone.style.height = `${someoneSize}px`;
            someone.innerHTML = parkSomeoneHtml(effects);
            arena.appendChild(someone);
            zone.someoneElement = someone;

            const lane = Math.min(size * 0.28, Math.max(24, battle.ballSize * 0.46));
            const perpendicular = { x: -front.y, y: front.x };
            const ownerPoint = clampPointToParkMemory(zone, centerX - front.x * lane, centerY - front.y * lane, fighterRadius(fighter));
            const targetPoint = clampPointToParkMemory(zone, centerX + front.x * lane, centerY + front.y * lane, fighterRadius(target));
            const someonePoint = clampPointToParkMemory(zone, centerX - perpendicular.x * lane, centerY - perpendicular.y * lane, someoneSize / 2);
            fighter.x = ownerPoint.x;
            fighter.y = ownerPoint.y;
            target.x = targetPoint.x;
            target.y = targetPoint.y;
            fighter.vx = 0;
            fighter.vy = 0;
            target.vx = 0;
            target.vy = 0;
            positionParkSomeone(zone, someonePoint.x, someonePoint.y);
            return zone;
        }

        function damageParkMemoryWall(zone, fighter, now) {
            if (!fighter || fighter.dead || fighter.id === zone.ownerId) {
                return;
            }
            const last = zone.wallHitAt.get(fighter.id) || 0;
            if (now - last < 420) {
                return;
            }
            zone.wallHitAt.set(fighter.id, now);
            const damage = Math.max(1, Math.round(fighter.attack || fighter.definition.baseAttack || 10));
            zone.hp -= damage;
            floatText(`벽 -${damage}`, zone.centerX, zone.centerY - zone.size * 0.58, "#6b7280");
            effectRing(zone.centerX, zone.centerY, zone.size, "#6b7280");
            if (zone.hp <= 0) {
                collapseParkMemoryZone(zone, now, "붕괴");
            }
        }

        function enforceParkMemoryWallForFighter(zone, fighter, now) {
            if (zone.collapsed || !fighter || fighter.dead || fighter.offMapUntil > now || isJiTaehyeokBusy(fighter)) {
                return;
            }
            const bounds = parkMemoryBounds(zone);
            const radius = fighterRadius(fighter);
            const participant = fighter.id === zone.ownerId || fighter.id === zone.targetId;
            if (participant) {
                const clamped = clampPointToParkMemory(zone, fighter.x, fighter.y, radius);
                if (Math.abs(clamped.x - fighter.x) > 0.1 || Math.abs(clamped.y - fighter.y) > 0.1) {
                    fighter.x = clamped.x;
                    fighter.y = clamped.y;
                    fighter.vx *= -0.35;
                    fighter.vy *= -0.35;
                    damageParkMemoryWall(zone, fighter, now);
                }
                return;
            }

            const intersects = fighter.x + radius > bounds.left
                && fighter.x - radius < bounds.right
                && fighter.y + radius > bounds.top
                && fighter.y - radius < bounds.bottom;
            if (!intersects) {
                return;
            }

            const candidates = [
                { x: bounds.left - radius, y: fighter.y, d: Math.abs(fighter.x - (bounds.left - radius)), dx: -1, dy: 0 },
                { x: bounds.right + radius, y: fighter.y, d: Math.abs(fighter.x - (bounds.right + radius)), dx: 1, dy: 0 },
                { x: fighter.x, y: bounds.top - radius, d: Math.abs(fighter.y - (bounds.top - radius)), dx: 0, dy: -1 },
                { x: fighter.x, y: bounds.bottom + radius, d: Math.abs(fighter.y - (bounds.bottom + radius)), dx: 0, dy: 1 }
            ].sort((a, b) => a.d - b.d)[0];
            fighter.x = Math.max(radius, Math.min(battle.arenaSize - radius, candidates.x));
            fighter.y = Math.max(radius, Math.min(battle.arenaSize - radius, candidates.y));
            setVelocityDirection(fighter, candidates.dx, candidates.dy, Math.max(120, moveSpeedOf(fighter, now)));
            fighter.forceMoveUntil = now + 180;
            damageParkMemoryWall(zone, fighter, now);
        }

        function performParkMemoryHit(zone, now) {
            const owner = getFighterById(zone.ownerId);
            const target = getFighterById(zone.targetId);
            if (!owner || owner.dead || !target || target.dead || target.offMapUntil > now) {
                collapseParkMemoryZone(zone, now, "붕괴");
                return;
            }

            const effects = parkSungbinSkillEffects(owner);
            const actorIsOwner = zone.hitIndex % 2 === 0;
            const fromX = actorIsOwner ? owner.x : zone.someoneX;
            const fromY = actorIsOwner ? owner.y : zone.someoneY;
            const direction = normalize(target.x - fromX, target.y - fromY);
            const start = clampPointToParkMemory(zone, target.x - direction.x * zone.size * 0.42, target.y - direction.y * zone.size * 0.42, actorIsOwner ? fighterRadius(owner) : battle.ballSize * 0.41);
            const end = clampPointToParkMemory(zone, target.x - direction.x * (fighterRadius(target) * 0.55), target.y - direction.y * (fighterRadius(target) * 0.55), actorIsOwner ? fighterRadius(owner) : battle.ballSize * 0.41);

            if (actorIsOwner) {
                owner.x = start.x;
                owner.y = start.y;
                createAfterimage(owner, { opacity: 0.45, scale: 0.96, lifetime: 420 });
                owner.x = end.x;
                owner.y = end.y;
                owner.vx = direction.x * scaledSpeed(effects.rushSpeed || 2000);
                owner.vy = direction.y * scaledSpeed(effects.rushSpeed || 2000);
                owner.forceMoveUntil = now + 180;
            } else {
                createParkSomeoneGhost(zone, start.x, start.y);
                positionParkSomeone(zone, end.x, end.y);
            }

            const dealt = applyDamage(target, effects.hitDamage || owner.attack || 20, owner, "skill", { unavoidable: true });
            if (dealt > 0 && !target.dead && !ignoreOrReflectKnockback(target, owner, direction, effects.hitKnockbackSpeed || 700, { origin: target })) {
                target.vx = direction.x * scaledSpeed(effects.hitKnockbackSpeed || 700);
                target.vy = direction.y * scaledSpeed(effects.hitKnockbackSpeed || 700);
                target.forceMoveUntil = now + 260;
            }
            impactStar(target.x, target.y, owner.definition.color);
            burst(target.x, target.y, owner.definition.color, 5);
            floatText(actorIsOwner ? "왼발" : "누군가", target.x, target.y - fighterRadius(target), owner.definition.color);

            zone.hitIndex += 1;
            zone.nextHitAt = now + (effects.hitInterval || 0.5) * 1000;
        }

        function collapseParkMemoryZone(zone, now, text = "붕괴", options = {}) {
            if (!zone || zone.collapsed) {
                return;
            }
            zone.collapsed = true;
            battle.activeParkMemoryZones = battle.activeParkMemoryZones.filter((item) => item !== zone);
            const owner = getFighterById(zone.ownerId);
            if (owner && owner.parkMemoryId === zone.id) {
                owner.parkMemoryId = null;
                owner.vx = 0;
                owner.vy = 0;
            }
            zone.element?.classList.add("is-collapsing");
            if (zone.someoneElement) {
                zone.someoneElement.style.opacity = "0";
                setTimeout(() => zone.someoneElement?.remove(), 180);
            }
            setTimeout(() => zone.element?.remove(), 560);
            if (!options.silent) {
                floatText(text, zone.centerX, zone.centerY, "#6b7280");
                burst(zone.centerX, zone.centerY, "#6b7280", 8);
            }
        }

        function collapseParkMemoryForOwner(owner, now, text = "붕괴", options = {}) {
            battle.activeParkMemoryZones
                .filter((zone) => zone.ownerId === owner.id)
                .forEach((zone) => collapseParkMemoryZone(zone, now, text, options));
        }

        function updateParkSungbinMemoryZones(now) {
            [...battle.activeParkMemoryZones].forEach((zone) => {
                if (zone.collapsed) {
                    return;
                }
                const owner = getFighterById(zone.ownerId);
                if (!owner || owner.dead || now >= zone.expiresAt) {
                    collapseParkMemoryZone(zone, now, "붕괴");
                    return;
                }
                battle.fighters.forEach((fighter) => enforceParkMemoryWallForFighter(zone, fighter, now));
                if (!zone.collapsed && now >= zone.nextHitAt) {
                    performParkMemoryHit(zone, now);
                }
            });
        }

        function startParkSungbinMemory(fighter, now) {
            if (!isParkSungbin(fighter) || fighter.dead || isParkSungbinMemoryBusy(fighter)) {
                return false;
            }
            const target = nearestEnemy(fighter);
            if (!target) {
                return false;
            }
            const effects = parkSungbinSkillEffects(fighter);
            const zone = createParkMemoryZone(fighter, target, now, effects);
            battle.activeParkMemoryZones.push(zone);
            fighter.parkMemoryId = zone.id;
            livingEnemiesOf(fighter).forEach((enemy) => {
                if (enemy === target) {
                    return;
                }
                const direction = normalize(enemy.x - zone.centerX, enemy.y - zone.centerY);
                setVelocityDirection(enemy, direction.x, direction.y, effects.outerKnockbackSpeed || 300);
                enemy.forceMoveUntil = now + 260;
            });
            floatText("회상", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            effectRing(zone.centerX, zone.centerY, zone.size, fighter.definition.color);
            return true;
        }

        function isParkSungbinRushBusy(fighter) {
            return Boolean(isParkSungbin(fighter) && fighter.parkRush);
        }

        function isParkSungbinActiveSkillBusy(fighter) {
            return Boolean(
                isParkSungbin(fighter)
                && (
                    fighter.parkRush?.mode === "active"
                    || battle.activeParkRisingSlashes.some((slash) => slash.ownerId === fighter.id)
                )
            );
        }

        function isParkSungbinPassiveRush(fighter) {
            return Boolean(isParkSungbinRushBusy(fighter) && fighter.parkRush.mode === "passive");
        }

        function parkOwnedBlossoms(fighter, options = {}) {
            const now = performance.now();
            return battle.activeParkBlossoms.filter((blossom) => (
                blossom.ownerId === fighter.id
                && !blossom.consumed
                && (!options.readyOnly || blossom.readyAt <= now)
            ));
        }

        function removeParkBlossom(blossom, options = {}) {
            if (!blossom || blossom.consumed) {
                return;
            }
            blossom.consumed = true;
            battle.activeParkBlossoms = battle.activeParkBlossoms.filter((item) => item !== blossom);
            if (options.instant) {
                blossom.element?.remove();
            } else {
                blossom.element?.classList.add("is-consumed");
                setTimeout(() => blossom.element?.remove(), options.delay ?? 240);
            }
        }

        function spawnParkBlossom(owner, now, options = {}) {
            const effects = parkSungbinPassiveEffects(owner);
            const size = bossProjectileSize(owner, options.size || effects.blossomSize || 28);
            const margin = Math.max(size, battle.ballSize * 0.52);
            const x = Math.max(margin, Math.min(battle.arenaSize - margin, options.x ?? (margin + Math.random() * (battle.arenaSize - margin * 2))));
            const y = Math.max(margin, Math.min(battle.arenaSize - margin, options.y ?? (margin + Math.random() * (battle.arenaSize - margin * 2))));
            const fallDuration = options.instant ? 0 : Math.max(0.1, options.fallDuration || effects.blossomFallDuration || 1);
            const element = document.createElement("div");
            element.className = "park-blossom";
            element.style.left = `${x}px`;
            element.style.top = options.instant ? `${y}px` : "0px";
            element.style.width = `${size}px`;
            element.style.height = `${size}px`;
            element.style.color = owner.definition.color;
            element.style.animationDuration = `${fallDuration * 1000}ms`;
            element.style.setProperty("--fall-y", `${y}px`);
            element.style.setProperty("--sway-start", `${(Math.random() - 0.5) * 34}px`);
            element.style.setProperty("--sway-mid", `${(Math.random() - 0.5) * 44}px`);
            element.style.setProperty("--sway-end", `${(Math.random() - 0.5) * 26}px`);
            element.innerHTML = `<img alt="벚꽃" ${imageAttrs(effects.blossomImageSrc || "images/박성빈/벚꽃.png", effects.blossomImageFallbackSrcs)}>`;
            arena.appendChild(element);

            const blossom = {
                id: `park-blossom-${Math.round(now)}-${Math.floor(Math.random() * 10000)}`,
                ownerId: owner.id,
                x,
                y,
                size,
                element,
                readyAt: now + fallDuration * 1000,
                consumed: false,
                fromSkill: Boolean(options.fromSkill)
            };
            battle.activeParkBlossoms.push(blossom);

            if (options.instant) {
                element.style.transform = "translate(-50%, -50%)";
                element.classList.add("is-ready");
            } else {
                setTimeout(() => {
                    if (!blossom.consumed && element.isConnected) {
                        element.style.top = `${y}px`;
                        element.style.transform = "translate(-50%, -50%)";
                        element.classList.add("is-ready");
                    }
                }, fallDuration * 1000);
            }
            return blossom;
        }

        function updateParkBlossoms(now) {
            battle.activeParkBlossoms.forEach((blossom) => {
                if (!blossom.consumed && now >= blossom.readyAt) {
                    blossom.element?.classList.add("is-ready");
                }
                const owner = getFighterById(blossom.ownerId);
                if (!owner || owner.dead) {
                    removeParkBlossom(blossom);
                }
            });
        }

        function parkGreedyBlossomPath(fighter, blossoms) {
            const remaining = [...blossoms];
            const path = [];
            let x = fighter.x;
            let y = fighter.y;
            while (remaining.length > 0) {
                remaining.sort((a, b) => Math.hypot(a.x - x, a.y - y) - Math.hypot(b.x - x, b.y - y));
                const next = remaining.shift();
                path.push(next);
                x = next.x;
                y = next.y;
            }
            return path;
        }

        function drawParkSlash(x, y, angle, length, options = {}) {
            const slash = document.createElement("div");
            slash.className = "park-rising-slash";
            slash.style.left = `${x}px`;
            slash.style.top = `${y}px`;
            slash.style.width = `${length}px`;
            slash.style.setProperty("--angle", `${angle}rad`);
            slash.style.setProperty("--duration", `${options.enhanced ? 340 : 280}ms`);
            arena.appendChild(slash);
            setTimeout(() => slash.remove(), options.enhanced ? 420 : 360);
        }

        function drawParkRushLine(x1, y1, x2, y2, duration = 0.72, options = {}) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const length = Math.hypot(dx, dy);
            if (length <= 1) {
                return;
            }

            const line = document.createElement("div");
            line.className = `park-rush-line${options.passive ? " is-passive" : ""}`;
            line.style.left = `${x1}px`;
            line.style.top = `${y1}px`;
            line.style.width = `${length}px`;
            line.style.setProperty("--angle", `${Math.atan2(dy, dx)}rad`);
            line.style.transform = `translate(0, -50%) rotate(var(--angle, 0rad))`;
            line.style.setProperty("--duration", `${duration * 1000}ms`);
            arena.appendChild(line);
            setTimeout(() => line.remove(), duration * 1000 + 80);
        }

        function maybeDrawParkRushLine(fighter, fromX, fromY, toX, toY, now) {
            const rush = fighter?.parkRush;
            if (!rush || rush.nextLineAt > now) {
                return;
            }
            const startX = Number.isFinite(rush.lineStartX) ? rush.lineStartX : fromX;
            const startY = Number.isFinite(rush.lineStartY) ? rush.lineStartY : fromY;
            drawParkRushLine(startX, startY, toX, toY, rush.lineDuration || 0.72, { passive: rush.mode === "passive" });
            rush.lineStartX = toX;
            rush.lineStartY = toY;
            rush.nextLineAt = now + (rush.lineInterval || 24);
        }

        function drawParkSpinSlash(x, y, diameter) {
            const slash = document.createElement("div");
            slash.className = "park-spin-slash";
            slash.style.left = `${x}px`;
            slash.style.top = `${y}px`;
            slash.style.width = `${diameter}px`;
            slash.style.height = `${diameter}px`;
            arena.appendChild(slash);
            setTimeout(() => slash.remove(), 460);
        }

        function createParkActiveRangeElement(fighter, range) {
            const element = document.createElement("div");
            element.className = "park-active-range";
            element.style.left = `${range.centerX}px`;
            element.style.top = `${range.centerY}px`;
            element.style.width = `${range.width}px`;
            element.style.height = `${range.height}px`;
            element.style.color = fighter.definition.color;
            if (/^#[0-9a-f]{6}$/i.test(fighter.definition.color)) {
                element.style.background = `${fighter.definition.color}2e`;
            }
            arena.appendChild(element);
            return element;
        }

        function isFighterInParkRange(target, range) {
            const radius = fighterRadius(target);
            return target.x + radius >= range.left
                && target.x - radius <= range.right
                && target.y + radius >= range.top
                && target.y - radius <= range.bottom;
        }

        function applyParkFixedSpeed(target, speed, duration, now, source) {
            if (tryKwonSoonbeomEffectBlock(target, source, "slow", now)) {
                return false;
            }
            target.parkFixedSpeedUntil = Math.max(target.parkFixedSpeedUntil || 0, now + duration * 1000);
            target.parkFixedSpeedValue = speed;
            setVelocitySpeed(target, moveSpeedOf(target, now));
            floatText("속도 10", target.x, target.y - fighterRadius(target), source.definition.color);
            return true;
        }

        function applyParkSlow(target, multiplier, duration, now, source) {
            if (tryKwonSoonbeomEffectBlock(target, source, "slow", now)) {
                return false;
            }
            target.slowMultiplier = target.slowUntil > now
                ? Math.min(target.slowMultiplier || 1, multiplier)
                : multiplier;
            target.slowUntil = Math.max(target.slowUntil || 0, now + duration * 1000);
            setVelocitySpeed(target, moveSpeedOf(target, now));
            floatText("감속", target.x, target.y - fighterRadius(target), source.definition.color);
            return true;
        }

        function performParkSlash(fighter, target, now, options = {}) {
            if (!target || target.dead || target.offMapUntil > now || areAllies(fighter, target)) {
                return;
            }
            const passive = parkSungbinPassiveEffects(fighter);
            const skill = parkSungbinSkillEffects(fighter);
            const damage = (options.enhanced ? (skill.enhancedSlashDamage || 100) : (passive.slashDamage || 20)) * (options.damageMultiplier || 1);
            const angle = options.angle ?? Math.random() * Math.PI * 2;
            const length = bossAttackRange(fighter, (passive.slashLength || 118) * (options.enhanced ? 1.35 : 1));
            drawParkSlash(target.x, target.y, angle, length, { enhanced: options.enhanced });
            const dealt = applyDamage(target, damage, fighter, options.enhanced ? "skill" : "passive");
            if (dealt > 0) {
                impactStar(target.x, target.y, fighter.definition.color);
                burst(target.x, target.y, fighter.definition.color, options.enhanced ? 8 : 5);
            }
            if (options.enhanced && dealt > 0 && !target.dead) {
                applyParkFixedSpeed(target, skill.fixedSpeed || 10, skill.fixedSpeedDuration || 1, now, fighter);
            }
            if (options.reduceCooldown !== false) {
                reduceCooldown(fighter, passive.slashCooldownReduction ?? 0.5, { ignoreControlLock: true });
            }
        }

        function performParkSpinSlash(fighter, point, now, options = {}) {
            const effects = parkSungbinPassiveEffects(fighter);
            const diameter = bossAttackRange(fighter, (effects.spinDiameter || 60) * (options.diameterMultiplier || 1));
            const radius = diameter / 2;
            const damage = (effects.spinDamage || 40) * (options.damageMultiplier || 1);
            drawParkSpinSlash(point.x, point.y, diameter);
            effectRing(point.x, point.y, diameter, fighter.definition.color);
            const targets = options.targets || livingEnemiesOf(fighter);
            targets.forEach((target) => {
                if (target.dead || areAllies(fighter, target)) {
                    return;
                }
                if (Math.hypot(target.x - point.x, target.y - point.y) <= radius + fighterRadius(target)) {
                    const dealt = applyDamage(target, damage, fighter, options.kind || "passive");
                    if (dealt > 0 && !target.dead && options.slowMultiplier) {
                        applyParkSlow(target, options.slowMultiplier, options.slowDuration || 1, now, fighter);
                    }
                }
            });
            if (options.reduceCooldown !== false) {
                reduceCooldown(fighter, effects.spinCooldownReduction ?? 1, { ignoreControlLock: true });
            }
            if (fighter.parkRush && options.pause !== false) {
                fighter.parkRush.pauseUntil = Math.max(fighter.parkRush.pauseUntil || 0, now + (effects.spinStunDuration || 0.1) * 1000);
                fighter.vx = 0;
                fighter.vy = 0;
            }
            floatText(options.label || "회전베기", point.x, point.y - radius, fighter.definition.color);
        }

        function performParkEnhancedSpinOnTargets(fighter, targets, now) {
            if (!targets.length) {
                return;
            }
            const effects = parkSungbinSkillEffects(fighter);
            const diameterMultiplier = effects.enhancedSpinDiameterMultiplier || 1.5;
            const damageMultiplier = effects.enhancedSpinDamageMultiplier || 1.5;
            targets.forEach((target) => {
                if (!target || target.dead || areAllies(fighter, target)) {
                    return;
                }
                performParkSpinSlash(fighter, { x: target.x, y: target.y }, now, {
                    targets: [target],
                    diameterMultiplier,
                    damageMultiplier,
                    slowMultiplier: effects.enhancedSlowMultiplier || 0.01,
                    slowDuration: effects.enhancedSlowDuration || 1,
                    pause: false,
                    kind: "skill",
                    label: "강화 회전베기"
                });
            });
        }

        function finishParkRush(fighter, now) {
            if (!fighter?.parkRush) {
                return;
            }
            const rush = fighter.parkRush;
            if (Number.isFinite(rush.lineStartX) && Number.isFinite(rush.lineStartY)) {
                drawParkRushLine(rush.lineStartX, rush.lineStartY, fighter.x, fighter.y, rush.lineDuration || 0.72, { passive: rush.mode === "passive" });
            }
            rush.rangeElement?.remove();
            if (rush.mode === "active") {
                const targets = (rush.activeTargetIds || [])
                    .map((id) => getFighterById(id))
                    .filter((target) => target && !target.dead);
                performParkEnhancedSpinOnTargets(fighter, targets, now);
            }
            fighter.parkRush = null;
            fighter.parkRushHitIds = new Set();
            fighter.forceMoveUntil = 0;
            fighter.element?.classList.remove("is-park-rushing");
            if (rush.mode !== "passive") {
                fighter.invulnerableUntil = Math.max(fighter.invulnerableUntil || 0, now + 80);
            }
            if (rush.mode === "active") {
                startParkRisingSlash(fighter, now);
            }
            if (!fighter.dead) {
                setVelocityDirection(fighter, Math.random() - 0.5, Math.random() - 0.5, fighter.speed);
            }
        }

        function startParkRush(fighter, path, now, options = {}) {
            if (!path.length || !isParkSungbin(fighter) || fighter.dead) {
                return false;
            }
            const effects = options.mode === "active" ? parkSungbinSkillEffects(fighter) : parkSungbinPassiveEffects(fighter);
            const pathIds = new Set(path.map((blossom) => blossom.id));
            parkOwnedBlossoms(fighter).forEach((blossom) => {
                if (!pathIds.has(blossom.id)) {
                    removeParkBlossom(blossom, { instant: true });
                }
            });
            fighter.parkRush = {
                mode: options.mode || "passive",
                phase: options.phase || "dash",
                path,
                targetIndex: 0,
                speed: effects.rushSpeed || 3000,
                pauseUntil: 0,
                prepareUntil: options.prepareUntil || 0,
                range: options.range || null,
                rangeElement: options.rangeElement || null,
                activeTargetIds: [],
                nextAfterimageAt: 0,
                afterimageInterval: scaledAfterimageInterval((effects.rushAfterimageInterval || 0.028) * 1000, 24),
                afterimageLifetime: effects.rushAfterimageLifetime || 420,
                nextLineAt: 0,
                lineStartX: fighter.x,
                lineStartY: fighter.y,
                lineInterval: Math.max(12, (effects.rushLineInterval || 0.024) * 1000),
                lineDuration: effects.rushLineDuration || 0.72,
                startedAt: now
            };
            fighter.parkRushHitIds = new Set();
            fighter.windmillMomentum = null;
            fighter.forceMoveUntil = now + 120000;
            fighter.element?.classList.add("is-park-rushing");
            floatText(options.mode === "active" ? "난무" : "쇄도", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function parkPassiveRushPath(fighter) {
            const effects = parkSungbinPassiveEffects(fighter);
            const count = Math.max(1, effects.rushCount || 7);
            const enemies = livingEnemiesOf(fighter);
            if (!enemies.length) {
                return [];
            }

            const repeatedMultiplier = effects.repeatedTargetDamageMultiplier || 0.5;
            const targetCounts = new Map();
            const path = [];
            let x = fighter.x;
            let y = fighter.y;
            for (let index = 0; index < count; index += 1) {
                const fresh = enemies.filter((target) => !targetCounts.has(target.id));
                const pool = fresh.length ? fresh : enemies;
                pool.sort((a, b) => Math.hypot(a.x - x, a.y - y) - Math.hypot(b.x - x, b.y - y));
                const target = pool[0];
                const previous = targetCounts.get(target.id) || 0;
                targetCounts.set(target.id, previous + 1);
                path.push({
                    x: target.x,
                    y: target.y,
                    targetId: target.id,
                    spinDamageMultiplier: previous > 0 ? repeatedMultiplier : 1,
                    spin: true
                });
                x = target.x;
                y = target.y;
            }
            return path;
        }

        function maybeStartParkPassiveRush(fighter, now) {
            if (!isParkSungbin(fighter) || fighter.dead || isParkSungbinRushBusy(fighter)) {
                return false;
            }
            const path = parkPassiveRushPath(fighter);
            if (!path.length) {
                return false;
            }
            return startParkRush(fighter, path, now, { mode: "passive" });
        }

        function updateParkSungbinPassive(fighter, now) {
            if (!isParkSungbin(fighter) || fighter.dead) {
                return;
            }
            const effects = parkSungbinPassiveEffects(fighter);
            const intervalMs = (effects.interval || 8) * 1000;
            if (isParkSungbinActiveSkillBusy(fighter)) {
                if (!fighter.parkNextBlossomAt) {
                    fighter.parkNextBlossomAt = now + intervalMs;
                }
                if (!fighter.parkPassiveCooldownPausedAt) {
                    fighter.parkPassiveCooldownPausedAt = now;
                }
                return;
            }
            if (isParkSungbinRushBusy(fighter)) {
                return;
            }
            if (fighter.parkPassiveCooldownPausedAt) {
                const pausedFor = Math.max(0, now - fighter.parkPassiveCooldownPausedAt);
                if (pausedFor > 0 && fighter.parkNextBlossomAt) {
                    fighter.parkNextBlossomAt += pausedFor;
                }
                fighter.parkPassiveCooldownPausedAt = 0;
            }
            if (!fighter.parkNextBlossomAt) {
                fighter.parkNextBlossomAt = now + intervalMs;
            }
            if (now < fighter.parkNextBlossomAt) {
                return;
            }
            const started = maybeStartParkPassiveRush(fighter, now);
            fighter.parkNextBlossomAt = now + (started ? intervalMs : 1000);
        }

        function checkParkRushEnemyHits(fighter, fromX, fromY, toX, toY, now) {
            const rush = fighter.parkRush;
            if (!rush) {
                return;
            }
            const hitDistance = fighterRadius(fighter) * 0.7 + battle.ballSize * 0.28;
            livingEnemiesOf(fighter).forEach((target) => {
                if (rush.mode === "passive" && fighter.parkRushHitIds.has(target.id)) {
                    return;
                }
                if (rush.mode === "active" && fighter.parkRushHitIds.has(target.id)) {
                    return;
                }
                if (distanceToSegment(target.x, target.y, fromX, fromY, toX, toY) > hitDistance + fighterRadius(target)) {
                    return;
                }
                fighter.parkRushHitIds.add(target.id);
                const angle = Math.atan2(target.y - fromY, target.x - fromX);
                performParkSlash(fighter, target, now, {
                    enhanced: rush.mode === "active",
                    angle,
                    damageMultiplier: rush.currentDamageMultiplier || 1
                });
            });
        }

        function updateParkSungbinRush(fighter, dt, now) {
            const rush = fighter?.parkRush;
            if (!rush || fighter.dead) {
                return false;
            }
            if (rush.pauseUntil > now) {
                fighter.vx = 0;
                fighter.vy = 0;
                return true;
            }
            if (rush.phase === "prepare") {
                fighter.vx = 0;
                fighter.vy = 0;
                if (now < rush.prepareUntil) {
                    return true;
                }
                rush.activeTargetIds = livingEnemiesOf(fighter)
                    .filter((target) => rush.range && isFighterInParkRange(target, rush.range))
                    .map((target) => target.id);
                rush.rangeElement?.remove();
                rush.rangeElement = null;
                rush.phase = "dash";
                rush.lineStartX = fighter.x;
                rush.lineStartY = fighter.y;
                rush.nextLineAt = 0;
            }
            const next = rush.path[rush.targetIndex];
            if (!next) {
                finishParkRush(fighter, now);
                return true;
            }

            const liveTarget = next.targetId ? getFighterById(next.targetId) : null;
            if (liveTarget && !liveTarget.dead && liveTarget.offMapUntil <= now && !areAllies(fighter, liveTarget)) {
                next.x = liveTarget.x;
                next.y = liveTarget.y;
            }
            const targetX = next.x;
            const targetY = next.y;
            rush.currentDamageMultiplier = next.spinDamageMultiplier || 1;
            const fromX = fighter.x;
            const fromY = fighter.y;
            const dx = targetX - fighter.x;
            const dy = targetY - fighter.y;
            const distance = Math.hypot(dx, dy);
            const step = scaledSpeed(rush.speed) * dt;
            if (!rush.nextAfterimageAt || now >= rush.nextAfterimageAt) {
                createAfterimage(fighter, {
                    opacity: rush.mode === "active" ? 0.5 : 0.42,
                    scale: rush.mode === "active" ? 1 : 0.96,
                    lifetime: rush.afterimageLifetime || 420,
                    className: "park-rush-afterimage"
                });
                rush.nextAfterimageAt = now + (rush.afterimageInterval || 28);
            }

            if (distance <= Math.max(1, step)) {
                fighter.x = targetX;
                fighter.y = targetY;
                fighter.vx = 0;
                fighter.vy = 0;
                maybeDrawParkRushLine(fighter, fromX, fromY, fighter.x, fighter.y, now);
                checkParkRushEnemyHits(fighter, fromX, fromY, fighter.x, fighter.y, now);
                if (next.element) {
                    removeParkBlossom(next);
                }
                if (next.spin !== false) {
                    const isRepeatedTarget = next.spinDamageMultiplier < 1;
                    performParkSpinSlash(fighter, next, now, {
                        damageMultiplier: next.spinDamageMultiplier || 1,
                        reduceCooldown: !isRepeatedTarget,
                        label: isRepeatedTarget ? "회전베기 약화" : "회전베기"
                    });
                }
                rush.targetIndex += 1;
            } else {
                const direction = normalize(dx, dy);
                fighter.vx = direction.x * scaledSpeed(rush.speed);
                fighter.vy = direction.y * scaledSpeed(rush.speed);
                fighter.x += direction.x * step;
                fighter.y += direction.y * step;
                maybeDrawParkRushLine(fighter, fromX, fromY, fighter.x, fighter.y, now);
                checkParkRushEnemyHits(fighter, fromX, fromY, fighter.x, fighter.y, now);
            }
            enforceJaeyoonDomainWall(fighter);
            return true;
        }

        function startParkSungbinSkill(fighter, now) {
            if (!isParkSungbin(fighter) || fighter.dead || isParkSungbinRushBusy(fighter)) {
                return false;
            }
            const effects = parkSungbinSkillEffects(fighter);
            const radius = fighterRadius(fighter);
            const centerX = battle.arenaSize / 2;
            fighter.x = centerX;
            fighter.y = battle.arenaSize - radius;
            fighter.vx = 0;
            fighter.vy = 0;

            parkOwnedBlossoms(fighter).forEach((blossom) => removeParkBlossom(blossom));
            const width = battle.arenaSize * (effects.dashRangeWidthRatio || 0.3);
            const top = radius;
            const bottom = battle.arenaSize - radius;
            const range = {
                left: centerX - width / 2,
                right: centerX + width / 2,
                top,
                bottom,
                centerX,
                centerY: (top + bottom) / 2,
                width,
                height: bottom - top
            };
            const rangeElement = createParkActiveRangeElement(fighter, range);
            const path = [{
                x: centerX,
                y: top,
                spin: false
            }];
            screenFlash(fighter.definition.color);
            floatText("준비", fighter.x, fighter.y - radius, fighter.definition.color);
            return startParkRush(fighter, path, now, {
