        function defeatFighter(target, now = performance.now(), source = null, options = {}) {
            if (!target || (target.dead && !options.force)) {
                return;
            }

            const wasRemovableSummon = target.isSummon && !target.jaeyoonRevivedOriginal;
            const wasWraith = target.summonType === "jaeyoon-wraith";
            target.hp = 0;
            target.dead = true;
            target.vx = 0;
            target.vy = 0;
            target.element.style.zIndex = "1";
            clearFighterActionState(target);
            if (isLeeDohyun(target)) {
                clearAllLeeDohyunFouls({ silent: true });
            }
            clearYuBleed(target);
            clearKimDonggyuBleed(target);
            if (isYuYejun(target)) {
                yuAnimalPets(target).forEach((pet) => returnYuAnimalPet(pet, now, { noHeal: true, silent: true, removeDelay: 120 }));
            }
            clearLeeDohyunFoul(target, { silent: true });
            finishLeeDohyunOffside(target);
            if (target.yawnHealingActive) {
                stopKimSihyeonYawnHealing(target);
            }
            if (wasWraith && !options.skipJaeyoonExplosion) {
                explodeJaeyoonWraith(target, now, source);
            }
            if (wasWraith) {
                registerJaeyoonDomainWraithDeath(target, now, options);
            }

            target.element.classList.toggle("is-dead", true);
            if (!options.silentDeathText) {
                burst(target.x, target.y, "#ba1a1a", 12);
                floatText("OUT", target.x, target.y, "#ba1a1a");
            }

            if (target.jaeyoonRevivedOriginal) {
                restoreJaeyoonRevivedOriginal(target);
            } else if (target.summonType === "lee-dohyun-clone") {
                absorbLeeDohyunClone(target, now, { silent: true, removeDelay: options.removeDelay ?? 300 });
            } else if (wasRemovableSummon) {
                setTimeout(() => removeSummonFromBattle(target), options.removeDelay ?? 700);
            }
        }

        function showJaeyoonScreenText(text, durationMs = 1000) {
            const overlay = document.createElement("div");
            overlay.className = "jaeyoon-domain-call";
            const label = document.createElement("div");
            label.className = "jaeyoon-domain-text";
            label.textContent = text;
            overlay.appendChild(label);
            arena.appendChild(overlay);
            setTimeout(() => {
                overlay.classList.add("is-closing");
                setTimeout(() => overlay.remove(), 260);
            }, durationMs);
            return overlay;
        }

        function createJaeyoonDomainElement(domain, extraClass = "") {
            const element = document.createElement("div");
            element.className = `jaeyoon-domain ${extraClass}`.trim();
            element.style.left = `${domain.centerX}px`;
            element.style.top = `${domain.centerY}px`;
            element.style.width = `${domain.radius * 2}px`;
            element.style.height = `${domain.radius * 2}px`;
            arena.appendChild(element);
            return element;
        }

        function isInsideJaeyoonDomain(fighter, domain) {
            return Math.hypot(fighter.x - domain.centerX, fighter.y - domain.centerY) <= domain.radius + fighterRadius(fighter);
        }

        function jaeyoonDomainEnemiesFor(owner, domain) {
            const now = performance.now();
            return battle.fighters.filter((target) => {
                if (target === owner || target.dead || target.offMapUntil > now || areAllies(owner, target)) {
                    return false;
                }
                return isInsideJaeyoonDomain(target, domain);
            });
        }

        function placeFighterInJaeyoonDomain(fighter, domain, index, total) {
            const point = randomPointInJaeyoonDomain(domain, fighterRadius(fighter), index, total);
            fighter.x = point.x;
            fighter.y = point.y;
            setVelocityDirection(fighter, Math.random() - 0.5, Math.random() - 0.5, fighter.speed || 180);
        }

        function reviveForJaeyoonDomain(owner, target, domain, index, total) {
            if (!target.dead || target.isSummon) {
                return;
            }

            target.jaeyoonRevivedOriginal = true;
            target.jaeyoonOriginalOwnerId = target.ownerId;
            target.jaeyoonOriginalIsSummon = target.isSummon;
            target.jaeyoonOriginalSummonType = target.summonType;
            target.jaeyoonOriginalSizeMultiplier = target.sizeMultiplier || 1;
            target.jaeyoonOriginalAttack = target.attack;
            target.isSummon = true;
            target.ownerId = owner.id;
            target.summonType = "jaeyoon-revived";
            target.sizeMultiplier = 1;
            target.jaeyoonDomainId = domain.id;
            target.jaeyoonDomainInside = true;
            target.jaeyoonDomainSummon = true;
            target.dead = false;
            target.hp = target.maxHp;
            if ((target.definition.baseAttack || 0) <= 0) {
                target.attack = 15;
            }
            target.offMapUntil = 0;
            target.invulnerableUntil = 0;
            target.stunnedUntil = 0;
            target.savedVelocity = null;
            target.windmillMomentum = null;
            target.element.style.zIndex = "13";
            target.element.classList.remove("is-dead");
            target.element.classList.add("is-jaeyoon-revived");
            target.element.style.setProperty("--jaeyoon-revive-color", colorWithAlpha(owner.definition.color, 0.8));
            clearFighterActionState(target);
            placeFighterInJaeyoonDomain(target, domain, index, total);
            floatText("부활", target.x, target.y - fighterRadius(target), owner.definition.color);
        }

        function activateKimJaeyoonDomain(fighter, now) {
            if (!isKimJaeyoon(fighter) || fighter.dead || !battle.isRunning) {
                return;
            }

            if (battle.jaeyoonDomain) {
                collapseKimJaeyoonDomain(now, { silent: true });
            }

            const effects = jaeyoonSkillEffects(fighter);
            const domain = {
                id: `jaeyoon-domain-${Math.round(now)}-${Math.floor(Math.random() * 10000)}`,
                ownerId: fighter.id,
                centerX: fighter.x,
                centerY: fighter.y,
                radius: (effects.radius || 150) * arenaScale(),
                endsAt: now + (effects.duration || 20) * 1000,
                enemyTargetIds: [],
                nextTargetIndex: 0,
                wraithDeathsSinceReplacement: 0,
                replacementSerial: 0,
                element: null
            };

            const trappedEnemies = jaeyoonDomainEnemiesFor(fighter, domain);
            if (trappedEnemies.length <= 0) {
                domain.element = createJaeyoonDomainElement(domain, "is-failing");
                showJaeyoonScreenText("실패...", 900);
                battle.scenePauseUntil = Math.max(battle.scenePauseUntil, now + 900);
                setTimeout(() => domain.element?.remove(), 820);
                return;
            }
            domain.enemyTargetIds = trappedEnemies.map((target) => target.id);

            domain.element = createJaeyoonDomainElement(domain);
            battle.jaeyoonDomain = domain;
            battle.fighters.forEach((target) => {
                target.jaeyoonDomainInside = isInsideJaeyoonDomain(target, domain);
            });
            fighter.jaeyoonDomainInside = true;
            fighter.vx = 0;
            fighter.vy = 0;
            screenFlash("#000000");
            floatText("영역전개", fighter.x, fighter.y - battle.ballSize, fighter.definition.color);

            const deadBalls = battle.fighters.filter((target) => target !== fighter && target.dead && !target.isSummon);
            if (deadBalls.length > 0) {
                deadBalls.forEach((target, index) => {
                    reviveForJaeyoonDomain(fighter, target, domain, index, deadBalls.length);
                    target.jaeyoonAssignedTargetId = nextJaeyoonDomainTargetId(domain, fighter);
                });
            }

            const count = trappedEnemies.length * (effects.domainWraithsPerEnemy || 3);
            for (let index = 0; index < count; index += 1) {
                spawnJaeyoonWraith(fighter, now, {
                    domain,
                    ignoreLimit: true,
                    index,
                    total: count,
                    assignedTargetId: nextJaeyoonDomainTargetId(domain, fighter)
                });
            }
        }

        function startKimJaeyoonDomain(fighter, now) {
            if (!isKimJaeyoon(fighter) || fighter.dead) {
                return;
            }

            const effects = jaeyoonSkillEffects(fighter);
            const lineMs = Math.max(400, (effects.cinematicLineDuration || 1) * 1000);
            const sequenceId = (battle.jaeyoonDomainSequence || 0) + 1;
            battle.jaeyoonDomainSequence = sequenceId;
            battle.scenePauseUntil = Math.max(battle.scenePauseUntil, now + lineMs * 2);
            fighter.vx = 0;
            fighter.vy = 0;

            const overlay = document.createElement("div");
            overlay.className = "jaeyoon-domain-call";
            const label = document.createElement("div");
            label.className = "jaeyoon-domain-text";
            label.textContent = "영역 전개";
            overlay.appendChild(label);
            arena.appendChild(overlay);

            setTimeout(() => {
                if (battle.jaeyoonDomainSequence === sequenceId && overlay.isConnected) {
                    label.textContent = "夜寮百鬼譚";
                }
            }, lineMs);

            setTimeout(() => {
                overlay.classList.add("is-closing");
                setTimeout(() => overlay.remove(), 260);
                const stillValid = battle.isRunning
                    && battle.fighters.includes(fighter)
                    && battle.jaeyoonDomainSequence === sequenceId
                    && !fighter.dead;
                if (stillValid) {
                    activateKimJaeyoonDomain(fighter, performance.now());
                }
            }, lineMs * 2);
        }

        function collapseKimJaeyoonDomain(now = performance.now(), options = {}) {
            const domain = battle.jaeyoonDomain;
            if (!domain) {
                return;
            }

            battle.jaeyoonDomain = null;
            if (domain.element?.isConnected) {
                domain.element.classList.add("is-collapsing");
                setTimeout(() => domain.element?.remove(), 760);
            }

            const owner = getFighterById(domain.ownerId);
            const domainSummons = [...battle.fighters].filter((fighter) => (
                !fighter.dead
                && fighter.ownerId === domain.ownerId
                && fighter.jaeyoonDomainId === domain.id
            ));
            domainSummons.forEach((summon) => defeatFighter(summon, now, owner || summon, {
                force: true,
                removeDelay: 650,
                skipJaeyoonReplacement: true,
                silentDeathText: true
            }));
            battle.fighters.forEach((fighter) => {
                if (fighter.jaeyoonDomainId === domain.id) {
                    fighter.jaeyoonDomainId = null;
                    fighter.jaeyoonDomainSummon = false;
                    fighter.jaeyoonAssignedTargetId = null;
                }
                fighter.jaeyoonDomainInside = false;
            });

            if (!options.silent && owner && !owner.dead) {
                showJaeyoonScreenText("영역 붕괴", 900);
            }
        }

        function updateKimJaeyoonDomain(now) {
            const domain = battle.jaeyoonDomain;
            if (!domain) {
                return;
            }

            const owner = getFighterById(domain.ownerId);
            if (!owner || owner.dead || now >= domain.endsAt) {
                collapseKimJaeyoonDomain(now);
            }
        }

        function enforceJaeyoonDomainWall(fighter) {
            const domain = battle.jaeyoonDomain;
            if (!domain || !fighter || fighter.dead) {
                return;
            }

            if (isKimJaeyoon(fighter) && domain.ownerId === fighter.id) {
                fighter.x = domain.centerX;
                fighter.y = domain.centerY;
                fighter.vx = 0;
                fighter.vy = 0;
                fighter.windmillMomentum = null;
                return;
            }

            const radius = fighterRadius(fighter);
            const dx = fighter.x - domain.centerX;
            const dy = fighter.y - domain.centerY;
            const distance = Math.hypot(dx, dy) || 1;
            const nx = dx / distance;
            const ny = dy / distance;
            const inside = Boolean(fighter.jaeyoonDomainInside);

            if (inside) {
                const maxDistance = Math.max(0, domain.radius - radius);
                if (distance > maxDistance) {
                    fighter.x = domain.centerX + nx * maxDistance;
                    fighter.y = domain.centerY + ny * maxDistance;
                    const outward = fighter.vx * nx + fighter.vy * ny;
                    if (outward > 0) {
                        fighter.vx -= outward * 1.8 * nx;
                        fighter.vy -= outward * 1.8 * ny;
                    }
                }
                return;
            }

            const minDistance = domain.radius + radius;
            if (distance < minDistance) {
                fighter.x = domain.centerX + nx * minDistance;
                fighter.y = domain.centerY + ny * minDistance;
                const inward = fighter.vx * nx + fighter.vy * ny;
                if (inward < 0) {
                    fighter.vx -= inward * 1.8 * nx;
                    fighter.vy -= inward * 1.8 * ny;
                }
            }
        }

        function nearestJaeyoonDomainEnemy(owner, domain) {
            return jaeyoonDomainEnemiesFor(owner, domain)
                .sort((a, b) => Math.hypot(a.x - owner.x, a.y - owner.y) - Math.hypot(b.x - owner.x, b.y - owner.y))[0] || null;
        }

        function steerJaeyoonSummonToward(fighter, target, owner, now) {
            const effects = jaeyoonSkillEffects(owner);
            const correction = Math.max(0.04, Math.min(0.75, effects.summonSteerCorrection ?? 0.24));
            const jitter = Math.max(0, Math.min(0.5, effects.summonSteerJitter ?? 0.16));
            const desired = normalize(target.x - fighter.x, target.y - fighter.y);
            const currentSpeed = Math.hypot(fighter.vx, fighter.vy);
            const current = currentSpeed > 1
                ? normalize(fighter.vx, fighter.vy)
                : normalize(Math.random() - 0.5, Math.random() - 0.5);
            const side = Math.random() < 0.5 ? -1 : 1;
            const wobble = (Math.random() - 0.5) * jitter;
            const blended = normalize(
                current.x * (1 - correction) + desired.x * correction + (-desired.y * side) * wobble,
                current.y * (1 - correction) + desired.y * correction + (desired.x * side) * wobble
            );
            setVelocityDirection(fighter, blended.x, blended.y, moveSpeedOf(fighter, now));
        }

        function updateJaeyoonSummonAI(fighter, now) {
            if (!fighter.isSummon || !fighter.ownerId || fighter.dead) {
                return false;
            }
            if (fighter.summonType !== "jaeyoon-wraith" && !fighter.jaeyoonDomainId) {
                return false;
            }

            const owner = getFighterById(fighter.ownerId);
            if (!owner || owner.dead) {
                return false;
            }

            let targets = livingEnemiesOf(fighter);
            const domain = battle.jaeyoonDomain;
            if (fighter.summonType === "jaeyoon-wraith") {
                const isDomainWraith = Boolean(
                    domain
                    && domain.ownerId === fighter.ownerId
                    && fighter.jaeyoonDomainInside
                    && isInsideJaeyoonDomain(fighter, domain)
                );
                if (!isDomainWraith) {
                    return false;
                }
                targets = targets.filter((target) => target.jaeyoonDomainInside && isInsideJaeyoonDomain(target, domain));
            } else if (domain && fighter.jaeyoonDomainId === domain.id) {
                targets = targets.filter((target) => target.jaeyoonDomainInside && isInsideJaeyoonDomain(target, domain));
            }
            let target = null;
            if (domain && fighter.jaeyoonDomainId === domain.id) {
                const assigned = getFighterById(fighter.jaeyoonAssignedTargetId);
                target = assigned && targets.includes(assigned) ? assigned : null;
                if (!target) {
                    fighter.jaeyoonAssignedTargetId = nextJaeyoonDomainTargetId(domain, owner);
                    const nextAssigned = getFighterById(fighter.jaeyoonAssignedTargetId);
                    target = nextAssigned && targets.includes(nextAssigned) ? nextAssigned : null;
                }
            } else {
                target = targets
                    .sort((a, b) => Math.hypot(a.x - fighter.x, a.y - fighter.y) - Math.hypot(b.x - fighter.x, b.y - fighter.y))[0] || null;
            }
            if (!target) {
                return false;
            }

            steerJaeyoonSummonToward(fighter, target, owner, now);
            return true;
        }

        function updateKimJaeyoonOwnerFlee(fighter, now) {
            const domain = battle.jaeyoonDomain;
            if (!isKimJaeyoon(fighter) || !domain || domain.ownerId !== fighter.id || fighter.dead) {
                return false;
            }

            fighter.x = domain.centerX;
            fighter.y = domain.centerY;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            return true;
        }

        function isLeeDohyun(fighter) {
            return Boolean(fighter && fighter.definition.id === "lee-dohyun");
        }

        function leeDohyunPassiveEffects(fighter) {
            return fighter.definition.passive?.effects || {};
        }

        function leeDohyunSkillEffects(fighter) {
            return fighter.definition.skill?.effects || {};
        }

        function leeDohyunRootId(fighter) {
            if (!isLeeDohyun(fighter)) {
                return null;
            }
            return fighter.summonType === "lee-dohyun-clone" ? fighter.ownerId : fighter.id;
        }

        function leeDohyunGroupMembers(fighter, options = {}) {
            const rootId = leeDohyunRootId(fighter);
            if (!rootId) {
                return [];
            }
            return battle.fighters.filter((member) => (
                isLeeDohyun(member)
                && !member.dead
                && member.offMapUntil <= performance.now()
                && leeDohyunRootId(member) === rootId
                && (!options.clonesOnly || member.summonType === "lee-dohyun-clone")
            ));
        }

        function isLeeDohyunLineDashing(fighter) {
            return Boolean(fighter?.leeDohyunLineDash);
        }

        function isLeeDohyunFouled(fighter) {
            return Boolean(fighter?.leeDohyunFoulActive && !fighter.dead);
        }

        function isLeeDohyunOffsideBusy(fighter) {
            return Boolean(fighter?.leeDohyunOffsideSkill && !fighter.dead);
        }

        function isLeeDohyunOffsideRushing(fighter) {
            return Boolean(fighter?.leeDohyunOffsideSkill?.phase === "rush" && !fighter.dead);
        }

        function clearLeeDohyunFoul(target, options = {}) {
            if (!target?.leeDohyunFoulActive) {
                return;
            }

            target.leeDohyunFoulActive = false;
            target.leeDohyunFouledById = null;
            target.element.classList.remove("is-lee-dohyun-fouled");
            const saved = target.leeDohyunFoulSavedVelocity;
            target.leeDohyunFoulSavedVelocity = null;
            if (!target.dead && saved && Math.hypot(saved.vx || 0, saved.vy || 0) > 4) {
                target.vx = saved.vx;
                target.vy = saved.vy;
                setVelocitySpeed(target, moveSpeedOf(target, performance.now()));
            }
            if (!options.silent && !target.dead) {
                floatText("해제", target.x, target.y - fighterRadius(target), target.definition.color);
            }
        }

        function clearAllLeeDohyunFouls(options = {}) {
            battle.fighters.forEach((fighter) => clearLeeDohyunFoul(fighter, options));
        }

        function applyLeeDohyunFoul(source, target, now, lineY) {
            if (!isLeeDohyun(source) || !target || target.dead || target.offMapUntil > now || source === target || areAllies(source, target)) {
                return false;
            }

            target.leeDohyunFoulActive = true;
            target.leeDohyunFouledById = source.id;
            target.leeDohyunFoulLineY = lineY;
            target.leeDohyunFoulSavedVelocity = { vx: target.vx, vy: target.vy };
            target.vx = 0;
            target.vy = 0;
            target.windmillMomentum = null;
            target.element.classList.add("is-lee-dohyun-fouled");
            floatText("반칙", target.x, target.y - fighterRadius(target), source.definition.color);
            effectRing(target.x, target.y, battle.ballSize * 1.08, source.definition.color);
            return true;
        }

        function createLeeDohyunOffsideLine(fighter, effects, lineY) {
            const line = document.createElement("div");
            const drawMs = Math.max(120, (effects.lineDrawDuration || 1) * 1000);
            const span = Math.max(fighter.x, battle.arenaSize - fighter.x) * 2 + battle.ballSize;
            line.className = "lee-dohyun-offside-line";
            line.style.left = `${fighter.x}px`;
            line.style.top = `${lineY}px`;
            line.style.width = "0px";
            line.style.transitionDuration = `${drawMs}ms, 260ms`;
            arena.appendChild(line);
            line.offsetWidth;
            line.style.width = `${span}px`;
            return line;
        }

        function startLeeDohyunOffside(fighter, now) {
            if (!isLeeDohyun(fighter) || fighter.dead || fighter.isSummon || fighter.leeDohyunOffsideSkill) {
                return false;
            }

            const effects = leeDohyunSkillEffects(fighter);
            const drawMs = Math.max(120, (effects.lineDrawDuration || 1) * 1000);
            const lineY = fighter.y;
            const line = createLeeDohyunOffsideLine(fighter, effects, lineY);
            fighter.leeDohyunOffsideSkill = {
                phase: "draw",
                lineY,
                startedAt: now,
                releaseAt: now + drawMs,
                targetIds: [],
                targetIndex: 0,
                lineElement: line,
                damage: effects.dashDamage || 120,
                speed: effects.dashSpeed || 1000,
                healPerTarget: effects.healPerTarget || 20,
                afterimageInterval: effects.afterimageInterval || 0.045,
                afterimageLifetime: effects.afterimageLifetime || 420
            };
            fighter.leeDohyunOffsideNextAfterimageAt = 0;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            floatText("오프사이드", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function finishLeeDohyunOffside(fighter) {
            const skill = fighter?.leeDohyunOffsideSkill;
            if (!skill) {
                return;
            }

            const line = skill.lineElement;
            if (line?.isConnected) {
                line.classList.add("is-fading");
                setTimeout(() => line.remove(), 260);
            }
            fighter.leeDohyunOffsideSkill = null;
            fighter.leeDohyunOffsideNextAfterimageAt = 0;
            fighter.element.classList.remove("is-lee-dohyun-offside-rushing");
        }

        function collectLeeDohyunOffsideTargets(fighter, skill, now) {
            return livingEnemiesOf(fighter)
                .filter((target) => target.offMapUntil <= now && target.y < skill.lineY)
                .sort((a, b) => a.x - b.x);
        }

        function nextLeeDohyunOffsideTarget(fighter, skill, now) {
            while (skill.targetIndex < skill.targetIds.length) {
                const target = getFighterById(skill.targetIds[skill.targetIndex]);
                if (target && !target.dead && target.offMapUntil <= now && !areAllies(fighter, target)) {
                    return target;
                }
                skill.targetIndex += 1;
            }

        function startYuRushSkill(fighter, now) {
            const effects = yuSkillEffects(fighter);

            const side = { x: -direction.y, y: direction.x };
            const spacing = effects.cloneSpacing || 50;
            const clonesPerSide = effects.clonesPerSide || 2;

            clearYuAfterimages(fighter);
            resetYuAfterimageDistance(fighter);
            clearYuRushClones(fighter);
            for (let sideSign of [-1, 1]) {
                for (let index = 1; index <= clonesPerSide; index += 1) {

                        fighter,
                        clampToArena(fighter.x + side.x * sideSign * spacing * index),
                        clampToArena(fighter.y + side.y * sideSign * spacing * index)
                    );
                }
            }

            fighter.yuRushPhase = "prepare";
            fighter.yuRushReleaseAt = now + (effects.prepareDuration || 2) * 1000;
            fighter.yuRushTargetId = null;

        function updateYuAnimalDash(fighter, dt, now) {
            const dash = fighter.yuAnimalDash;

            if (!target || target.dead || target.offMapUntil > now || now >= dash.expiresAt) {

            const direction = normalize(target.x - fighter.x, target.y - fighter.y);
            fighter.vx = direction.x * scaledSpeed(dash.speed);
            fighter.vy = direction.y * scaledSpeed(dash.speed);
            fighter.x += fighter.vx * dt;
            fighter.y += fighter.vy * dt;
            handleWallBounce(fighter);
            enforceJaeyoonDomainWall(fighter);

            if (Math.hypot(target.x - fighter.x, target.y - fighter.y) <= fighterRadius(fighter) + fighterRadius(target) * 0.9) {
                applyDamage(target, dash.damage, fighter, "passive", {

        function clearYuBleed(target) {

            const interval = effects.bleedTickInterval || 1;
            target.yuBleedUntil = now + duration * 1000;
            target.yuBleedNextTickAt = now + interval * 1000;
            target.yuBleedNextEffectAt = 0;
            target.yuBleedDamage = effects.bleedTickDamage || 10;
            target.yuBleedSourceId = source.id;

        function updateYuBleed(target, now) {
