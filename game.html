        function sanitizeFighterState(fighter) {
            if (!fighter) {
                return;
            }

            if (!Number.isFinite(fighter.maxHp) || fighter.maxHp <= 0) {
                fighter.maxHp = fighter.definition.maxHp || 1;
            }
            if (!Number.isFinite(fighter.hp)) {
                fighter.hp = fighter.dead ? 0 : fighter.maxHp;
            }
            fighter.hp = Math.max(0, Math.min(fighter.maxHp, fighter.hp));

            if (!Number.isFinite(fighter.skillCooldown)) {
                fighter.skillCooldown = skillCooldownDuration(fighter);
            }
            const center = battle.arenaSize / 2 || 300;
            if (!Number.isFinite(fighter.x)) {
                fighter.x = center;
            }
            if (!Number.isFinite(fighter.y)) {
                fighter.y = center;
            }
            if (!Number.isFinite(fighter.vx)) {
                fighter.vx = 0;
            }
            if (!Number.isFinite(fighter.vy)) {
                fighter.vy = 0;
            }
        }

        function healFighter(fighter, amount, source = fighter, options = {}) {
            if (!fighter || fighter.dead || !Number.isFinite(amount) || amount <= 0) {
                return 0;
            }

            if (!Number.isFinite(fighter.hp)) {
                fighter.hp = Math.max(1, fighter.maxHp);
            }

            if (!Number.isFinite(fighter.maxHp) || fighter.maxHp <= 0 || fighter.hp >= fighter.maxHp) {
                return 0;
            }

            const healed = Math.min(amount, fighter.maxHp - fighter.hp);
            if (!Number.isFinite(healed) || healed <= 0) {
                return 0;
            }

            fighter.hp += healed;
            recordHealStats(source || fighter, fighter, healed);
            if (!options.silent) {
                floatText(`+${Math.round(healed)}`, fighter.x, fighter.y - (options.offsetY || battle.ballSize / 2), options.color || "#006d36");
            }
            return healed;
        }

        function isYuYejun(fighter) {
            return Boolean(fighter && fighter.definition.id === "yu-yejun");
        }

        function yuPassiveEffects(fighter) {
            return fighter.definition.passive?.effects || {};
        }

        function yuSkillEffects(fighter) {
            return fighter.definition.skill?.effects || {};
        }

        function isYuBusy(fighter) {
            return Boolean((isYuYejun(fighter) && (fighter.yuChaseTargetId || fighter.yuRushPhase)) || isYuAnimalDashing(fighter));
        }

        function isYuRushing(fighter) {
            return isYuYejun(fighter) && fighter.yuRushPhase === "rush";
        }

        function isYuAnimalPet(fighter) {
            return Boolean(fighter && (fighter.summonType === "yu-cat" || fighter.summonType === "yu-dog"));
        }

        function isYuAnimalUnit(fighter) {
            return Boolean((isYuYejun(fighter) && (!fighter.isSummon || fighter.jaeyoonRevivedOriginal)) || isYuAnimalPet(fighter));
        }

        function yuAnimalKind(fighter) {
            if (isYuAnimalPet(fighter)) {
                return fighter.yuPetKind || (fighter.summonType === "yu-cat" ? "cat" : "dog");
            }
            return isYuYejun(fighter) ? "yu" : "";

        function yuAnimalOwner(fighter) {
            if (!fighter) {
                return null;
            }
            if (isYuYejun(fighter) && (!fighter.isSummon || fighter.jaeyoonRevivedOriginal)) {
                return fighter;
            }
            return isYuAnimalPet(fighter) ? getFighterById(fighter.ownerId) : null;
        }

        function yuAnimalPassiveEffects(fighter) {
            const owner = yuAnimalOwner(fighter);
            return owner?.definition.passive?.effects || {};
        }

        function yuAnimalSkillEffects(fighter) {
            const owner = yuAnimalOwner(fighter);
            return owner?.definition.skill?.effects || {};
        }

        function yuAnimalGroupMembers(owner) {
            if (!owner || owner.dead) {
                return [];
            }
            return battle.fighters.filter((fighter) => (
                !fighter.dead
                && fighter.offMapUntil <= performance.now()
                && (fighter === owner || (isYuAnimalPet(fighter) && fighter.ownerId === owner.id))
            ));
        }

        function yuAnimalPets(owner) {
            if (!owner) {
                return [];
            }
            return battle.fighters.filter((fighter) => !fighter.dead && isYuAnimalPet(fighter) && fighter.ownerId === owner.id);
        }

        function hasYuAnimalPets(owner) {
            return yuAnimalPets(owner).length > 0;
        }

        function splitYuYejunDamageToPets(owner, damage, source, now, options = {}) {
            if (!isYuYejun(owner) || owner.dead || options.ignoreYuDamageShare || !Number.isFinite(damage) || damage <= 0) {
                return damage;
            }
            const pets = yuAnimalPets(owner);
            if (pets.length === 0) {
                return damage;
            }
            const effects = yuSkillEffects(owner);
            const shareRatio = Math.max(0, Math.min(0.95, effects.petDamageShareRatio ?? 0.6));
            const sharedDamage = damage * shareRatio;
            const perPetDamage = sharedDamage / pets.length;
            pets.forEach((pet) => {
                applyDamage(pet, perPetDamage, source || owner, "shared", {
                    ...options,
                    allowFriendlyFire: true,
                    ignoreYuDamageShare: true,
                    unavoidable: true
                });
            });
            floatText(`분산 ${Math.round(sharedDamage)}`, owner.x, owner.y - fighterRadius(owner) * 1.25, owner.definition.color);

        function isYuAnimalDashing(fighter) {

        function setYuAnimalSharedCooldown(owner, readyAt) {
            if (!owner) {

            yuAnimalPets(owner).forEach((pet) => {
                pet.yuAnimalPassiveReadyAt = readyAt;
            });
        }

        function reduceYuSkillCooldownOnStagger(fighter) {
            if (!isYuYejun(fighter) || fighter.dead || fighter.skillCooldown <= 0) {
                return;

            const effects = yuPassiveEffects(fighter);
            const reductionRatio = effects.stunCooldownReductionRatio ?? 0.2;
            fighter.skillCooldown = Math.max(0, fighter.skillCooldown * (1 - reductionRatio));
            floatText("CD -20%", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
        }

        function applyYuStagger(source, target, seconds, now) {
            if (!isYuYejun(source) || !target || target.dead) {
                return;
            }

            if (!stun(target, seconds, now, source)) {
                return;
            }
            reduceYuSkillCooldownOnStagger(source);
            floatText("경직", target.x, target.y - battle.ballSize / 2, source.definition.color);
            effectRing(target.x, target.y, battle.ballSize * 1.22, source.definition.color);
        }

        function removeYuAfterimage(image) {
            if (image?.element?.isConnected) {
                image.element.remove();
            }
        }

        function clearYuAfterimages(fighter) {
            (fighter.yuAfterimages || []).forEach(removeYuAfterimage);
            fighter.yuAfterimages = [];
        }

        function resetYuAfterimageDistance(fighter) {
            fighter.yuAfterimageDistanceTravelled = 0;
            fighter.yuLastAfterimageX = fighter.x;
            fighter.yuLastAfterimageY = fighter.y;
        }

        function createYuAfterimage(fighter, now) {
            const effects = yuPassiveEffects(fighter);
            const image = document.createElement("div");
            image.className = "yu-afterimage";
            image.style.left = `${fighter.x}px`;
            image.style.top = `${fighter.y}px`;
            image.style.width = `${battle.ballSize}px`;
            image.style.height = `${battle.ballSize}px`;

            image.innerHTML = fighter.element.innerHTML;

                element: image,
                x: fighter.x,
                y: fighter.y,

                hitIds: new Set()
            });

            while (fighter.yuAfterimages.length > maxAfterimages) {
                removeYuAfterimage(fighter.yuAfterimages.shift());
            }
        }

        function startYuChase(fighter, target, now) {
            if (!isYuYejun(fighter) || fighter.dead || !target || target.dead || fighter.yuRushPhase) {
                return;
            }

            fighter.yuChaseTargetId = target.id;
            fighter.yuIgnoredSourceId = target.id;
            fighter.yuChaseIgnoreUntil = now + 1400;
            fighter.forceMoveUntil = now + 1400;
            floatText("추격", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
        }

        function updateYuAfterimages(fighter, now) {
            if (!isYuYejun(fighter)) {
                return;
            }
            if (fighter.dead) {
                clearYuAfterimages(fighter);
                return;
            }

            const effects = yuPassiveEffects(fighter);
            if (!Number.isFinite(effects.afterimageDistance)) {
                clearYuAfterimages(fighter);
                return;
            }
            if (!Number.isFinite(fighter.yuLastAfterimageX) || !Number.isFinite(fighter.yuLastAfterimageY)) {
                resetYuAfterimageDistance(fighter);
            } else {
                const travelled = Math.hypot(fighter.x - fighter.yuLastAfterimageX, fighter.y - fighter.yuLastAfterimageY);
                fighter.yuAfterimageDistanceTravelled += Number.isFinite(travelled) ? travelled : 0;
                fighter.yuLastAfterimageX = fighter.x;
                fighter.yuLastAfterimageY = fighter.y;

            const distanceThreshold = effects.afterimageDistance || 200;
            if (!fighter.yuRushPhase && distanceThreshold > 0) {

                while (fighter.yuAfterimageDistanceTravelled >= distanceThreshold && created < 3) {
                    createYuAfterimage(fighter, now);
                    fighter.yuAfterimageDistanceTravelled -= distanceThreshold;
                    created += 1;
                }
                if (created >= 3) {
                    fighter.yuAfterimageDistanceTravelled = 0;
                }
            }

            const hitRadius = bossAttackRange(fighter, battle.ballSize * 0.82);
            fighter.yuAfterimages.forEach((image) => {
                if (!image.element.isConnected) {
                    return;
                }

                livingEnemiesOf(fighter).forEach((target) => {
                    if (image.hitIds.has(target.id) || isStunned(target, now)) {
                        return;
                    }
                    if (Math.hypot(target.x - image.x, target.y - image.y) > hitRadius) {
                        return;
                    }

                    image.hitIds.add(target.id);
                    applyYuStagger(fighter, target, effects.staggerDuration || 1, now);
                    startYuChase(fighter, target, now);
                });
            });
        }

        function updateYuSpeedStacks(fighter, now) {
            if (!isYuYejun(fighter) || fighter.dead) {
                return;
            }

            const effects = yuPassiveEffects(fighter);
            if (!Number.isFinite(effects.speedStackInterval)) {
                return;
            }
            const intervalMs = (effects.speedStackInterval || 2) * 1000;
            if (!fighter.yuNextSpeedStackAt) {
                fighter.yuNextSpeedStackAt = now + intervalMs;
                return;
            }
            if (now < fighter.yuNextSpeedStackAt) {
                return;
            }

            let stacks = 0;
            while (now >= fighter.yuNextSpeedStackAt && stacks < 4) {
                fighter.yuNextSpeedStackAt += intervalMs;
                stacks += 1;
            }
            const multiplier = effects.speedStackMultiplier || 1.1;
            fighter.yuSpeedStacks = (fighter.yuSpeedStacks || 0) + stacks;
            fighter.speed *= Math.pow(multiplier, stacks);
            setVelocitySpeed(fighter, moveSpeedOf(fighter, now));
            floatText(`가속 ${fighter.yuSpeedStacks}`, fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
        }

        function updateYuChase(fighter, dt, now) {
            if (!isYuYejun(fighter) || !fighter.yuChaseTargetId || fighter.dead) {
                return false;
            }

            const target = getFighterById(fighter.yuChaseTargetId);
            if (!target || target.dead || target.offMapUntil > now) {
                fighter.yuChaseTargetId = null;
                fighter.yuIgnoredSourceId = null;
                fighter.yuChaseIgnoreUntil = 0;
                return false;
            }

            const effects = yuPassiveEffects(fighter);
            const direction = normalize(target.x - fighter.x, target.y - fighter.y);
            const chaseSpeed = moveSpeedOf(fighter, now) * (effects.chaseSpeedMultiplier || 2);
            fighter.vx = direction.x * scaledSpeed(chaseSpeed);
            fighter.vy = direction.y * scaledSpeed(chaseSpeed);
            createAfterimage(fighter, { opacity: 0.46, scale: 0.94, lifetime: 420 });

            fighter.x += fighter.vx * dt;
            fighter.y += fighter.vy * dt;
            handleWallBounce(fighter);

            if (Math.hypot(target.x - fighter.x, target.y - fighter.y) <= battle.ballSize * 0.92) {
                applyDamage(target, effects.chaseDamage || 30, fighter, "passive", { unavoidable: true });
                fighter.yuChaseTargetId = null;
                fighter.yuIgnoredSourceId = null;
                fighter.yuChaseIgnoreUntil = 0;
            }
            return true;
        }

        function farthestEnemy(fighter) {
            return livingEnemiesOf(fighter)
                .sort((a, b) => Math.hypot(b.x - fighter.x, b.y - fighter.y) - Math.hypot(a.x - fighter.x, a.y - fighter.y))[0] || null;
        }

        function createYuRushClone(fighter, x, y) {
            const clone = document.createElement("div");
            clone.className = "yu-rush-clone";
            clone.style.left = `${x}px`;
            clone.style.top = `${y}px`;
            clone.style.width = `${battle.ballSize}px`;
            clone.style.height = `${battle.ballSize}px`;
            clone.innerHTML = fighter.element.innerHTML;
            arena.appendChild(clone);
            fighter.yuRushClones.push({ element: clone, x, y });
        }

        function clearYuRushClones(fighter) {
            (fighter.yuRushClones || []).forEach((clone) => clone.element?.remove());
            fighter.yuRushClones = [];
        }

        function drawYuRushLine(x1, y1, x2, y2, duration) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const length = Math.hypot(dx, dy);
            if (length <= 1) {
                return;
            }

            const line = document.createElement("div");
            line.className = "yu-rush-line";
            line.style.left = `${x1}px`;
            line.style.top = `${y1}px`;
            line.style.width = `${length}px`;
            line.style.transform = `translate(0, -50%) rotate(${Math.atan2(dy, dx)}rad)`;
            line.style.animationDuration = `${duration * 1000}ms`;
            arena.appendChild(line);
            battle.activeYuRushLines.push(line);
            setTimeout(() => {
                line.remove();
                battle.activeYuRushLines = battle.activeYuRushLines.filter((item) => item !== line);
            }, duration * 1000 + 80);
        }

        function startYuRushSkill(fighter, now) {
            const effects = yuSkillEffects(fighter);
            const direction = normalize(fighter.vx || 1, fighter.vy || 0);
            const side = { x: -direction.y, y: direction.x };
            const spacing = effects.cloneSpacing || 50;
            const clonesPerSide = effects.clonesPerSide || 2;

            clearYuAfterimages(fighter);
            resetYuAfterimageDistance(fighter);
            clearYuRushClones(fighter);
            for (let sideSign of [-1, 1]) {
                for (let index = 1; index <= clonesPerSide; index += 1) {
                    createYuRushClone(
                        fighter,
                        clampToArena(fighter.x + side.x * sideSign * spacing * index),
                        clampToArena(fighter.y + side.y * sideSign * spacing * index)
                    );
                }
            }

            fighter.yuRushPhase = "prepare";
            fighter.yuRushReleaseAt = now + protestScaledMs(fighter, (effects.prepareDuration || 2) * 1000, now);
            fighter.yuRushTargetId = null;
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.forceMoveUntil = fighter.yuRushReleaseAt + 500;
            floatText("최고속도", fighter.x, fighter.y - battle.ballSize / 2, fighter.definition.color);
        }

        function releaseYuRushSkill(fighter, now) {
            const effects = yuSkillEffects(fighter);
            const target = farthestEnemy(fighter);
            if (!target) {
                clearYuRushClones(fighter);
                fighter.yuRushPhase = "";
                return;
            }

            const startX = fighter.x;
            const startY = fighter.y;
            const direction = normalize(target.x - startX, target.y - startY);
            const endX = clampToArena(target.x + direction.x * battle.ballSize * 0.95);
            const endY = clampToArena(target.y + direction.y * battle.ballSize * 0.95);
            const lineDuration = effects.rushLineDuration || 0.72;

            drawYuRushLine(startX, startY, target.x, target.y, lineDuration);
            (fighter.yuRushClones || []).forEach((clone) => {
                drawYuRushLine(clone.x, clone.y, target.x, target.y, lineDuration);
            });
            clearYuRushClones(fighter);

            fighter.yuRushPhase = "rush";
            fighter.x = endX;
            fighter.y = endY;
            resetYuAfterimageDistance(fighter);
            fighter.vx = direction.x * scaledSpeed(moveSpeedOf(fighter, now) * 2.4);
            fighter.vy = direction.y * scaledSpeed(moveSpeedOf(fighter, now) * 2.4);
            fighter.afterimageUntil = Math.max(fighter.afterimageUntil || 0, now + 620);
            fighter.nextAfterimageAt = 0;

            const extraSpeedPercent = Math.max(0, (fighter.speed / (fighter.yuBaseSpeed || fighter.definition.speed || 1) - 1) * 100);
            const damage = (effects.rushDamageBase || 100) + extraSpeedPercent;
            applyDamage(target, damage, fighter, "skill", { unavoidable: true });

        function startYuAnimalDash(runner, target, caller, now) {

        function updateYuAnimalDash(fighter, dt, now) {
            const dash = fighter.yuAnimalDash;

            if (isPassiveEffectForbidden(fighter, now)) {
                clearYuAnimalDash(fighter, now);
                return false;
            }

            const target = getFighterById(dash.targetId);
            if (!target || target.dead || target.offMapUntil > now || now >= dash.expiresAt) {
                clearYuAnimalDash(fighter, now);
                return false;
            }

            if (!fighter.yuAnimalNextAfterimageAt || now >= fighter.yuAnimalNextAfterimageAt) {
                createAfterimage(fighter, {
                    opacity: 0.48,
                    scale: 0.94,
                    lifetime: dash.afterimageLifetime
                });
                fighter.yuAnimalNextAfterimageAt = now + dash.afterimageInterval;
            }

            const direction = normalize(target.x - fighter.x, target.y - fighter.y);
            fighter.vx = direction.x * scaledSpeed(dash.speed);
            fighter.vy = direction.y * scaledSpeed(dash.speed);
            fighter.x += fighter.vx * dt;
            fighter.y += fighter.vy * dt;
            handleWallBounce(fighter);
            enforceJaeyoonDomainWall(fighter);

            if (Math.hypot(target.x - fighter.x, target.y - fighter.y) <= fighterRadius(fighter) + fighterRadius(target) * 0.9) {
                applyDamage(target, dash.damage, fighter, "passive", {

                    ignoreLeeDribble: true
                });

            if (!target.yuBleedNextEffectAt || now >= target.yuBleedNextEffectAt) {
                effectRing(target.x, target.y, battle.ballSize * 0.86, "#dc2626");

            if (target.yuBleedNextTickAt && now >= target.yuBleedNextTickAt) {

                });

        function applyYuAnimalCallerEffect(caller, target, owner, now) {

                if (tryKwonSoonbeomEffectBlock(target, caller, "slow", now)) {

                target.slowUntil = Math.max(target.slowUntil || 0, now + (effects.dogSlowDuration || 2) * 1000);
                target.slowMultiplier = Math.min(target.slowMultiplier || 1, effects.dogSlowMultiplier || 0.1);

        }

        function isKimDonggyuSrTargetable(target, now) {

        function farthestKimDonggyuSrEnemy(fighter, now) {

        function moveKimDonggyuToFarthestCorner(fighter, now, options = {}) {
            const radius = fighterRadius(fighter);
            const corners = arenaCorners().map((corner) => ({
                x: Math.max(radius, Math.min(battle.arenaSize - radius, corner.x)),
                y: Math.max(radius, Math.min(battle.arenaSize - radius, corner.y))

            const others = battle.fighters.filter((target) => (
                target !== fighter
                && !target.dead
                && target.offMapUntil <= now
                && (options.includeAllies || !areAllies(fighter, target))
            ));
            if (!corners.length || !others.length) {
                return false;
            }

            const best = corners
                .map((corner) => ({
                    ...corner,
                    score: others.reduce((sum, target) => sum + Math.hypot(target.x - corner.x, target.y - corner.y), 0)
                }))
                .sort((a, b) => b.score - a.score)[0];
            fighter.x = best.x;
            fighter.y = best.y;
            fighter.vx = 0;
            fighter.vy = 0;

        function registerKimDonggyuHpLoss(fighter, actual, now) {

            if (tryTriggerAdminKimDonggyuUpgrade(fighter, actual, now)) {
                return;
            }

            const effects = kimDonggyuPassiveEffects(fighter);
            const threshold = Math.max(1, effects.damageEscapeThreshold || 100);
            fighter.kimDonggyuDamageEscapeBank = (fighter.kimDonggyuDamageEscapeBank || 0) + actual;
            if (fighter.kimDonggyuDamageEscapeBank < threshold) {
                return;

            triggerKimDonggyuDamageEscape(fighter, now);

        function triggerAdminDonggyuDamageShockwave(fighter, now) {
            if (!isAdminKimDonggyu(fighter) || fighter.dead) {
                return false;
            }
            const effects = adminKimDonggyuPassiveEffects(fighter);
            const speed = effects.damageShockwaveKnockback || 700;
            livingEnemiesOf(fighter).forEach((enemy) => {
                const direction = normalize(enemy.x - fighter.x || enemy.vx || 1, enemy.y - fighter.y || enemy.vy || 0);
                if (!ignoreOrReflectKnockback(enemy, fighter, direction, speed, { origin: fighter })) {
                    enemy.windmillMomentum = null;
                    enemy.vx = direction.x * scaledSpeed(speed);
                    enemy.vy = direction.y * scaledSpeed(speed);
                    enemy.afterimageUntil = Math.max(enemy.afterimageUntil || 0, now + 240);
                    enemy.nextAfterimageAt = 0;
                }
            });
            effectRing(fighter.x, fighter.y, battle.ballSize * 3.1, fighter.definition.color);
            burst(fighter.x, fighter.y, fighter.definition.color, 10);
            floatText("충격파", fighter.x, fighter.y - fighterRadius(fighter), fighter.definition.color);
            return true;
        }

        function registerAdminDonggyuHpLoss(fighter, actual, now) {
            if (!isAdminKimDonggyu(fighter) || fighter.dead || !Number.isFinite(actual) || actual <= 0 || fighter.hp <= 0) {
                return;
            }
            const effects = adminKimDonggyuPassiveEffects(fighter);
            const shockwaveThreshold = Math.max(1, effects.damageShockwaveThreshold || 100);
            fighter.adminDonggyuDamageShockwaveBank = (fighter.adminDonggyuDamageShockwaveBank || 0) + actual;
            let shockwaves = 0;
            while (fighter.adminDonggyuDamageShockwaveBank >= shockwaveThreshold && shockwaves < 4) {
                fighter.adminDonggyuDamageShockwaveBank -= shockwaveThreshold;
                triggerAdminDonggyuDamageShockwave(fighter, now);
                shockwaves += 1;
            }

            const helicopterThreshold = Math.max(1, effects.damageHelicopterThreshold || 200);
            fighter.adminDonggyuDamageHelicopterBank = (fighter.adminDonggyuDamageHelicopterBank || 0) + actual;
            let helicopters = 0;
            while (fighter.adminDonggyuDamageHelicopterBank >= helicopterThreshold && helicopters < 3) {
                fighter.adminDonggyuDamageHelicopterBank -= helicopterThreshold;
                spawnAdminDonggyuHelicopter(fighter, now);
                helicopters += 1;
            }
        }

        function adminKimDonggyuDefinition(baseFighter) {
            if (battle.isBossMode && baseFighter?.bossRole) {
                return characterForBossBattle("admin-kim-donggyu", baseFighter.bossRole === "boss" ? "boss" : "normal");
            }
            if (battle.isTeamMode && baseFighter?.teamId && TEAM_CONFIG[baseFighter.teamId]) {
                return characterForBattle("admin-kim-donggyu", baseFighter.teamId);
            }
            return characterForBattle("admin-kim-donggyu");
        }

        function removeFighterForAdminDonggyuUpgrade(fighter) {
            if (!fighter || !battle.fighters.includes(fighter)) {
                return;
            }
            fighter.dead = true;
            fighter.hp = 0;
            fighter.vx = 0;
            fighter.vy = 0;
            clearFighterActionState(fighter);
            clearKimDonggyuAim(fighter, { silent: true });
            fighter.hiddenFromHud = true;
            fighter.hudElement?.remove();
            fighter.hudElement = null;
            fighter.element?.classList.add("is-dead");
        }

        function tryTriggerAdminKimDonggyuUpgrade(fighter, actual, now) {
            fighter.kimDonggyuAdminAwakenBank = (fighter.kimDonggyuAdminAwakenBank || 0) + actual;
            if (battle.adminDonggyuUpgradeTriggered || fighter.kimDonggyuAdminAwakenBank < 100) {
                return false;
            }

            const blocked = battle.fighters.some((target) => {
                if (target.isSummon) {
                    return false;
                }
                if (hasTeacherPassiveDefinition(target.definition)) {
                    return true;
                }
                return !target.dead && (target.definition.id === "nam-dongyun" || target.definition.id === "admin-kim-donggyu");
            });
            const kimDonggyus = battle.fighters.filter((target) => !target.dead && !target.isSummon && target.definition.id === "kim-donggyu");
            const kimSuyeongExists = battle.fighters.some((target) => !target.dead && !target.isSummon && target.definition.id === "kim-suyeong");
            if (blocked || !kimSuyeongExists || kimDonggyus.length < 2) {
                return false;
            }

            const definition = adminKimDonggyuDefinition(fighter);
            if (!definition) {
                return false;
            }

            battle.adminDonggyuUpgradeTriggered = true;
            const admin = createFighter(definition, battle.fighters.length, battle.fighters.length + 1, {
                id: `admin-kim-donggyu-${Math.floor(now)}`,
                isOriginalCombatant: true
            });
            admin.x = battle.arenaSize / 2;
            admin.y = battle.arenaSize / 2;
            admin.vx = 0;
            admin.vy = 0;
            admin.adminDonggyuSpawnedAt = now;
            battle.fighters.push(admin);
            battle.stats.set(admin.id, createEmptyStats(admin));
            battle.originalFighterIds.push(admin.id);

            kimDonggyus.forEach(removeFighterForAdminDonggyuUpgrade);
            renderHud();
            showJaeyoonScreenText("김동규도 관리자다", 1200);
            screenFlash(definition.color);
            effectRing(admin.x, admin.y, battle.ballSize * 2, definition.color);
            floatText("관리자 김동규", admin.x, admin.y - fighterRadius(admin), definition.color);
            installAdminDonggyuTurrets(admin, now);
            startAdminKimDonggyuAirSupport(admin, now, {
                targetMultiplier: definition.skill?.effects?.entryTargetMultiplier || 2,
                label: "등장 공중지원 x2"
            });
            return true;
        }

        function aimDirectionFor(fighter, preferredTarget = null) {
            const target = preferredTarget || nearestEnemy(fighter);
            if (target) {
                return normalize(target.x - fighter.x, target.y - fighter.y);
            }
            if (Math.hypot(fighter.vx, fighter.vy) > 1) {
                return normalize(fighter.vx, fighter.vy);
            }
            return { x: 1, y: 0 };
        }

        function createKimDonggyuProjectile(source, type, options = {}) {
            const direction = normalize(options.direction?.x ?? 1, options.direction?.y ?? 0);
            const size = bossProjectileSize(source, options.size || battle.ballSize * 0.24);
            const startOffset = options.startOffset ?? fighterRadius(source) + size * 0.55;
            const projectile = {
                sourceId: source.id,
                type,
                x: source.x + direction.x * startOffset,
                y: source.y + direction.y * startOffset,
                vx: direction.x * scaledSpeed(options.speed || 200),
                vy: direction.y * scaledSpeed(options.speed || 200),
                startX: source.x,
                startY: source.y,
                size,
                damage: options.damage || 0,
                explosionRadius: bossAttackRange(source, options.explosionRadius || 0),
                maxDistance: bossAttackRange(source, options.maxDistance || Infinity),
                bleedDamage: options.bleedDamage || 0,
                bleedDuration: options.bleedDuration || 0,
                targetId: options.targetId || null,
                turnRate: options.turnRate || 0,
                rotation: options.rotation || Math.atan2(direction.y, direction.x),
                passiveDerived: Boolean(options.passiveDerived),
                element: document.createElement("div")
            };

            projectile.element.className = `kim-donggyu-projectile is-${type}${options.extraClassName ? ` ${options.extraClassName}` : ""}`;
            projectile.element.style.left = `${projectile.x}px`;
            projectile.element.style.top = `${projectile.y}px`;
            projectile.element.style.width = `${size * (options.visualLengthMultiplier || 1)}px`;
            projectile.element.style.height = `${size * (options.visualThicknessMultiplier || 1)}px`;
            if (options.imageSrc) {
                projectile.element.innerHTML = `<img alt="${type}" ${imageAttrs(options.imageSrc, options.imageFallbackSrcs)}>`;
            }
            arena.appendChild(projectile.element);
            battle.activeKimDonggyuProjectiles.push(projectile);
            return projectile;
        }

        function removeKimDonggyuProjectile(projectile) {
            projectile.element?.remove();
            battle.activeKimDonggyuProjectiles = battle.activeKimDonggyuProjectiles.filter((item) => item !== projectile);
        }

        function targetForAdminHeliMissile(projectile, source) {
            const assigned = getFighterById(projectile.targetId);
            if (assigned && !assigned.dead && !areAllies(source, assigned)) {
                return assigned;
            }
            return livingEnemiesOf(source)
                .sort((a, b) => (
                    protestTargetDistanceScore(source, a, Math.hypot(a.x - projectile.x, a.y - projectile.y))
                    - protestTargetDistanceScore(source, b, Math.hypot(b.x - projectile.x, b.y - projectile.y))
                ))[0] || null;
        }

        function updateAdminHeliMissileHoming(projectile, source, dt) {
            if (projectile.type !== "admin-heli-missile") {
                return;
            }
            const target = targetForAdminHeliMissile(projectile, source);
            if (!target) {
                return;
            }
            projectile.targetId = target.id;
            const speed = Math.hypot(projectile.vx, projectile.vy) || scaledSpeed(520);
            const current = normalize(projectile.vx, projectile.vy);
            const desired = normalize(target.x - projectile.x, target.y - projectile.y);
            const blend = Math.max(0, Math.min(1, (projectile.turnRate || 4.2) * dt));
            const direction = normalize(
                current.x * (1 - blend) + desired.x * blend,
                current.y * (1 - blend) + desired.y * blend
            );
            projectile.vx = direction.x * speed;
            projectile.vy = direction.y * speed;
            projectile.rotation = Math.atan2(direction.y, direction.x);
        }

        function explodeAdminHeliMissile(projectile, now) {
            const source = getFighterById(projectile.sourceId);
            if (!source || source.dead) {
                removeKimDonggyuProjectile(projectile);
                return;
            }
            const radius = projectile.explosionRadius || 15;
            effectRing(projectile.x, projectile.y, radius * 2, "#9ca3af");
            burst(projectile.x, projectile.y, "#9ca3af", 7);
            livingEnemiesOf(source).forEach((target) => {
                if (Math.hypot(target.x - projectile.x, target.y - projectile.y) <= radius + fighterRadius(target)) {
                    applyDamage(target, projectile.damage || 30, source, "skill");
                }
            });
            removeKimDonggyuProjectile(projectile);
        }

        function explodeKimDonggyuGrenade(projectile, now) {
            const source = getFighterById(projectile.sourceId);
            if (!source || source.dead) {
                removeKimDonggyuProjectile(projectile);
                return;
            }

            const radius = projectile.explosionRadius || 75;
            effectRing(projectile.x, projectile.y, radius * 2, source.definition.color);
            burst(projectile.x, projectile.y, source.definition.color, 12);
            livingEnemiesOf(source).forEach((target) => {
                if (Math.hypot(target.x - projectile.x, target.y - projectile.y) <= radius + fighterRadius(target)) {
                    applyDamage(target, projectile.damage, source, "skill");
                }
            });
            removeKimDonggyuProjectile(projectile);
        }

        function applyKimDonggyuKnifeBleed(source, target, now, projectile) {
            if (!source || !target || target.dead) {
                return false;
            }
            if (tryKwonSoonbeomEffectBlock(target, source, "bleed", now)) {
                return false;
            }
            const duration = projectile.bleedDuration || 3;
            const ticks = Math.max(1, Math.round(duration / 0.5));
            target.kimDonggyuBleedUntil = now + duration * 1000;
            target.kimDonggyuBleedNextTickAt = now + 500;
            target.kimDonggyuBleedNextEffectAt = 0;
            target.kimDonggyuBleedTickDamage = (projectile.bleedDamage || 100) / ticks;
            target.kimDonggyuBleedSourceId = source.id;
            target.element.classList.add("is-kim-donggyu-bleeding");
            floatText("출혈", target.x, target.y - fighterRadius(target), source.definition.color);
            return true;
        }

        function clearKimDonggyuBleed(target) {
            if (!target) {
                return;
            }
            target.kimDonggyuBleedUntil = 0;
            target.kimDonggyuBleedNextTickAt = 0;
            target.kimDonggyuBleedNextEffectAt = 0;
            target.kimDonggyuBleedTickDamage = 0;
            target.kimDonggyuBleedSourceId = null;
            target.element?.classList.remove("is-kim-donggyu-bleeding");
        }

        function updateKimDonggyuBleed(target, now) {
            if (!target.kimDonggyuBleedUntil) {
                return;
            }
            if (target.dead || now >= target.kimDonggyuBleedUntil) {
                clearKimDonggyuBleed(target);
                return;
            }
            if (!target.kimDonggyuBleedNextEffectAt || now >= target.kimDonggyuBleedNextEffectAt) {
                effectRing(target.x, target.y, battle.ballSize * 0.82, "#dc2626");
                target.kimDonggyuBleedNextEffectAt = now + 360;
            }
            if (target.kimDonggyuBleedNextTickAt && now >= target.kimDonggyuBleedNextTickAt) {
                const source = getFighterById(target.kimDonggyuBleedSourceId) || null;
                applyDamage(target, target.kimDonggyuBleedTickDamage || 1, source, "passive");
                target.kimDonggyuBleedNextTickAt += 500;
            }
        }

        function updateKimDonggyuProjectiles(dt, now) {
            [...battle.activeKimDonggyuProjectiles].forEach((projectile) => {
                const source = getFighterById(projectile.sourceId);
                if (!source || source.dead || !projectile.element?.isConnected) {
                    removeKimDonggyuProjectile(projectile);
                    return;
                }
                if (projectile.passiveDerived && isPassiveEffectForbidden(source, now)) {
                    removeKimDonggyuProjectile(projectile);
                    return;
                }

                updateAdminHeliMissileHoming(projectile, source, dt);
                projectile.x += projectile.vx * dt;
                projectile.y += projectile.vy * dt;
                const travelled = Math.hypot(projectile.x - projectile.startX, projectile.y - projectile.startY);
                projectile.element.style.left = `${projectile.x}px`;
                projectile.element.style.top = `${projectile.y}px`;
                projectile.element.style.transform = `translate(-50%, -50%) rotate(${projectile.rotation}rad)`;

                const hitWall = projectile.x < 0 || projectile.x > battle.arenaSize || projectile.y < 0 || projectile.y > battle.arenaSize;
                if (hitWall || travelled >= projectile.maxDistance) {
                    if (projectile.type === "grenade") {
                        explodeKimDonggyuGrenade(projectile, now);
                    } else if (projectile.type === "admin-heli-missile") {
                        explodeAdminHeliMissile(projectile, now);
                    } else {
                        removeKimDonggyuProjectile(projectile);
                    }
                    return;
                }

                for (const target of livingEnemiesOf(source)) {
                    const projectileHitRadius = projectile.type === "admin-heli-missile"
                        ? Math.max(projectile.size * 0.45, projectile.explosionRadius || 0)
                        : projectile.size * 0.45;
                    if (Math.hypot(target.x - projectile.x, target.y - projectile.y) > fighterRadius(target) + projectileHitRadius) {
                        continue;
                    }

                    if (projectile.type === "grenade") {
                        explodeKimDonggyuGrenade(projectile, now);
                    } else if (projectile.type === "admin-heli-missile") {
                        explodeAdminHeliMissile(projectile, now);
                    } else if (projectile.type === "knife") {
                        applyKimDonggyuKnifeBleed(source, target, now, projectile);
                        impactStar(target.x, target.y, source.definition.color);
                        removeKimDonggyuProjectile(projectile);
                    } else {
                        applyDamage(target, projectile.damage, source, "skill");
                        impactStar(target.x, target.y, source.definition.color);
                        removeKimDonggyuProjectile(projectile);
                    }
                    return;
                }
            });
        }

        function adminDonggyuTurretInset() {
            return Math.max(battle.ballSize * 0.58, battle.ballSize * 0.45);
        }

        function adminDonggyuCornerTurretPoints() {
            const inset = adminDonggyuTurretInset();
            return [
                { x: inset, y: inset },
                { x: battle.arenaSize - inset, y: inset },
                { x: inset, y: battle.arenaSize - inset },
                { x: battle.arenaSize - inset, y: battle.arenaSize - inset }
            ];
        }

        function adminDonggyuMidTurretPoints() {
            const inset = adminDonggyuTurretInset();
            const center = battle.arenaSize / 2;
            return [
                { x: center, y: inset },
                { x: battle.arenaSize - inset, y: center },
                { x: center, y: battle.arenaSize - inset },
                { x: inset, y: center }
            ];
        }

        function createAdminDonggyuTurret(owner, effects, point, id, now, staggerIndex = 0) {
            const element = document.createElement("div");
            element.className = "admin-donggyu-turret";
            element.style.left = `${point.x}px`;
            element.style.top = `${point.y}px`;
            element.innerHTML = `<img alt="터렛" ${imageAttrs(effects.turretImageSrc, effects.turretImageFallbackSrcs)}>`;
            arena.appendChild(element);
            battle.activeAdminDonggyuTurrets.push({
                id,
                ownerId: owner.id,
                x: point.x,
                y: point.y,
                element,
                shotsFired: 0,
                nextShotAt: now + staggerIndex * 55,
                overheatedUntil: 0
            });
        }

        function installAdminDonggyuTurrets(owner, now) {
            if (!isAdminKimDonggyu(owner)) {
                return;
            }
            const effects = adminKimDonggyuPassiveEffects(owner);
            battle.activeAdminDonggyuTurrets
                .filter((turret) => turret.ownerId === owner.id)
                .forEach((turret) => turret.element?.remove());
            battle.activeAdminDonggyuTurrets = battle.activeAdminDonggyuTurrets.filter((turret) => turret.ownerId !== owner.id);
            owner.adminDonggyuMidTurretsInstalled = false;
            adminDonggyuCornerTurretPoints().forEach((point, index) => {
                createAdminDonggyuTurret(owner, effects, point, `${owner.id}-turret-corner-${index}`, now, index);
            });
        }

        function addAdminDonggyuMidTurrets(owner, now) {
            if (!isAdminKimDonggyu(owner) || owner.adminDonggyuMidTurretsInstalled) {
                return;
            }
            const effects = adminKimDonggyuPassiveEffects(owner);
            const existingIds = new Set(battle.activeAdminDonggyuTurrets
                .filter((turret) => turret.ownerId === owner.id)
                .map((turret) => turret.id));
            adminDonggyuMidTurretPoints().forEach((point, index) => {
                const id = `${owner.id}-turret-mid-${index}`;
                if (!existingIds.has(id)) {
                    createAdminDonggyuTurret(owner, effects, point, id, now, index + 4);
                }
            });
            owner.adminDonggyuMidTurretsInstalled = true;
            floatText("중점 터렛", owner.x, owner.y - fighterRadius(owner) * 1.55, owner.definition.color);
        }

        function updateAdminDonggyuTurrets(now) {
            battle.activeAdminDonggyuTurrets = battle.activeAdminDonggyuTurrets.filter((turret) => {
                const owner = getFighterById(turret.ownerId);
                if (!owner || owner.dead || !turret.element?.isConnected) {
                    turret.element?.remove();
                    return false;
                }
                const effects = adminKimDonggyuPassiveEffects(owner);
                const interval = 1000 / Math.max(1, effects.turretFireRate || 10);
                const statusDisabledUntil = Math.max(
                    owner.adminDonggyuTurretDisabledUntil || 0,
                    isAsleep(owner, now) ? owner.sleepUntil || 0 : 0,
                    isLeeDohyunFouled(owner) ? Number.POSITIVE_INFINITY : 0,
                    isPassiveForbidden(owner, now) ? Number.POSITIVE_INFINITY : 0
                );
                if (statusDisabledUntil > now) {
                    turret.element.classList.add("is-overheated");
                    turret.nextShotAt = now + interval;
                    return true;
                }
                if (now < turret.overheatedUntil) {
                    turret.element.classList.add("is-overheated");
                    return true;
                }
                turret.element.classList.remove("is-overheated");
                let fired = 0;
                while (now >= turret.nextShotAt && fired < 3) {
                    const target = livingEnemiesOf(owner)
                        .sort((a, b) => Math.hypot(a.x - turret.x, a.y - turret.y) - Math.hypot(b.x - turret.x, b.y - turret.y))[0] || null;
                    if (!target) {
                        turret.nextShotAt = now + interval;
                        break;
                    }
                    const direction = normalize(target.x - turret.x, target.y - turret.y);
                    const critical = Math.random() < (effects.turretCriticalChance ?? 0.2);
                    const damage = (effects.turretBulletDamage || 10) * (critical ? (effects.turretCriticalMultiplier || 2) : 1);
                    createKimDonggyuProjectile(owner, "bullet", {
                        direction,
                        speed: effects.turretBulletSpeed || 2000,
                        damage,
                        size: battle.ballSize * 0.14,
                        visualLengthMultiplier: effects.turretBulletLengthMultiplier || 2.8,
                        visualThicknessMultiplier: effects.turretBulletThicknessMultiplier || 0.55,
                        extraClassName: "is-turret-bullet",
                        passiveDerived: true,
                        startOffset: Math.hypot(owner.x - turret.x, owner.y - turret.y),
                        maxDistance: battle.arenaSize * 1.5,
                        rotation: Math.atan2(direction.y, direction.x)
                    });
                    const projectile = battle.activeKimDonggyuProjectiles[battle.activeKimDonggyuProjectiles.length - 1];
                    if (projectile) {
                        projectile.x = turret.x;
                        projectile.y = turret.y;
                        projectile.startX = turret.x;
                        projectile.startY = turret.y;
                        projectile.element.style.left = `${turret.x}px`;
                        projectile.element.style.top = `${turret.y}px`;
                    }
                    if (critical) {
                        floatText("CRIT", turret.x, turret.y - 20, owner.definition.color);
                    }
                    turret.shotsFired += 1;
                    turret.nextShotAt += interval;
                    fired += 1;
                    if (turret.shotsFired >= (effects.turretShotsBeforeOverheat || 100)) {
                        turret.shotsFired = 0;
                        turret.overheatedUntil = now + (effects.turretOverheatDuration || 2) * 1000;
                        turret.nextShotAt = turret.overheatedUntil;
                        turret.element.classList.add("is-overheated");
                        break;
                    }
                }
                return true;
            });
        }

        function isAdminDonggyuHelicopter(fighter) {
            return Boolean(fighter && fighter.summonType === "admin-donggyu-helicopter");
        }

        function createAdminDonggyuHelicopterDefinition(owner, effects) {
            const hp = effects.helicopterHp || 200;
            const speed = effects.helicopterSpeed || 150;
            return {
                id: "admin-donggyu-helicopter",
                name: "공격 헬기",
                shortName: "헬기",
                maxHp: hp,
                baseAttack: 0,
                speedLabel: String(speed),
                speed,
                colorName: owner.definition.colorName,
                color: owner.definition.color,
                textColor: owner.definition.textColor,
                avatarSrc: effects.helicopterImageSrc || "images/김동규 각성/공격헬기.png",
                avatarFallbackSrcs: effects.helicopterImageFallbackSrcs || [],
                avatarText: "헬기",
                traits: ["공격헬기", "기관총", "미사일"],
                skill: {
                    name: "공격 헬기",
                    passiveOnly: true,
                    cooldown: 0,
                    description: "적을 추적하며 기관총과 유도 미사일을 발사합니다."
                },
                cooldownOnBasicHit: 0,
                cooldownOnDamageTaken: 0,
                contactAttackDisabled: true,
                noPushCollision: true
            };
        }

        function spawnAdminDonggyuHelicopter(owner, now) {
            if (!isAdminKimDonggyu(owner) || owner.dead || isPassiveForbidden(owner, now)) {
                return null;
            }
            const effects = adminKimDonggyuPassiveEffects(owner);
            const angle = Math.random() * Math.PI * 2;
            const distance = battle.ballSize * (0.95 + Math.random() * 0.45);
            const definition = createAdminDonggyuHelicopterDefinition(owner, effects);
            const helicopter = createFighter(definition, battle.fighters.length, battle.fighters.length + 1, {
                id: `${owner.id}-helicopter-${Math.floor(now)}-${Math.floor(Math.random() * 1000)}`,
                ownerId: owner.id,
                teamId: owner.teamId,
                isSummon: true,
                summonType: "admin-donggyu-helicopter",
                statsOwnerId: owner.statsOwnerId || owner.id,
                sizeMultiplier: 0.86
            });
            helicopter.x = Math.max(fighterRadius(helicopter), Math.min(battle.arenaSize - fighterRadius(helicopter), owner.x + Math.cos(angle) * distance));
            helicopter.y = Math.max(fighterRadius(helicopter), Math.min(battle.arenaSize - fighterRadius(helicopter), owner.y + Math.sin(angle) * distance));
            helicopter.hp = effects.helicopterHp || 200;
            helicopter.maxHp = effects.helicopterHp || 200;
            helicopter.speed = effects.helicopterSpeed || 150;
            helicopter.noCollisionUntil = 0;
            helicopter.hiddenFromHud = true;
            helicopter.adminHeliNextBulletAt = now + 200;
            helicopter.adminHeliNextMissileAt = now + (effects.helicopterMissileInterval || 3) * 1000;
            helicopter.adminHeliMissileVolley = null;
            helicopter.adminHeliOrbitSign = Math.random() < 0.5 ? -1 : 1;
            battle.fighters.push(helicopter);
            floatText("공격 헬기", owner.x, owner.y - fighterRadius(owner) * 1.5, owner.definition.color);
            return helicopter;
        }

        function updateAdminDonggyuHelicopterSummon(owner, now) {
            if (!isAdminKimDonggyu(owner) || owner.dead) {
                return;
            }
            const effects = adminKimDonggyuPassiveEffects(owner);
            const interval = Math.max(0.5, effects.helicopterInterval || 5) * 1000;
            if (!owner.adminDonggyuNextHelicopterAt) {
                owner.adminDonggyuNextHelicopterAt = now + interval;
                return;
            }
            if (now < owner.adminDonggyuNextHelicopterAt) {
                return;
            }
            spawnAdminDonggyuHelicopter(owner, now);
            owner.adminDonggyuNextHelicopterAt = now + interval;
        }

        function fireAdminDonggyuHelicopterBullet(helicopter, owner, target, effects) {
            const direction = normalize(target.x - helicopter.x, target.y - helicopter.y);
            const projectile = createKimDonggyuProjectile(owner, "bullet", {

        function fireAdminDonggyuHelicopterMissile(helicopter, owner, target, effects, index, count) {
            const baseAngle = Math.atan2(target.y - helicopter.y, target.x - helicopter.x);
            const side = index % 2 === 0 ? 1 : -1;
            const pairIndex = Math.floor(index / 2);
            const spread = side * (0.28 + pairIndex * 0.11);
            const angle = baseAngle + spread;
            const direction = { x: Math.cos(angle), y: Math.sin(angle) };
            const projectile = createKimDonggyuProjectile(owner, "admin-heli-missile", {
                direction,
                speed: effects.helicopterMissileSpeed || 600,
                damage: effects.helicopterMissileDamage || 30,
                size: battle.ballSize * 0.15,
                explosionRadius: (effects.helicopterMissileExplosionDiameter || 30) / 2,
                maxDistance: battle.arenaSize * 1.6,
                targetId: target.id,
                turnRate: effects.helicopterMissileTurnRate || 4.2,
                extraClassName: "is-admin-heli-missile",
                passiveDerived: true,
                visualLengthMultiplier: 1.55,
                visualThicknessMultiplier: 0.72,
                rotation: angle
            });
            projectile.x = helicopter.x;
            projectile.y = helicopter.y;
            projectile.startX = helicopter.x;
            projectile.startY = helicopter.y;
            projectile.element.style.left = `${helicopter.x}px`;
            projectile.element.style.top = `${helicopter.y}px`;
            if (index === 0) {
                floatText("미사일", helicopter.x, helicopter.y - fighterRadius(helicopter), owner.definition.color);

        function startAdminDonggyuHelicopterMissileVolley(helicopter, target, effects, now) {
            helicopter.adminHeliMissileVolley = {
                targetId: target.id,
                count: Math.max(1, effects.helicopterMissileCount || 6),
                fired: 0,
                nextAt: now
            };
        }

        function updateAdminDonggyuHelicopterMissileVolley(helicopter, owner, effects, now) {
            const volley = helicopter.adminHeliMissileVolley;
            if (!volley) {
                return;
            }
            const launchInterval = Math.max(35, (effects.helicopterMissileLaunchInterval || 0.12) * 1000);
            let launches = 0;
            while (volley.fired < volley.count && now >= volley.nextAt && launches < 1) {
                let target = getFighterById(volley.targetId);
                if (!target || target.dead || target.offMapUntil > now || areAllies(owner, target)) {
                    target = livingEnemiesOf(owner)
                        .sort((a, b) => Math.hypot(a.x - helicopter.x, a.y - helicopter.y) - Math.hypot(b.x - helicopter.x, b.y - helicopter.y))[0] || null;
                    volley.targetId = target?.id || null;
                }
                if (!target) {
                    helicopter.adminHeliMissileVolley = null;
                    return;
                }
                fireAdminDonggyuHelicopterMissile(helicopter, owner, target, effects, volley.fired, volley.count);
                volley.fired += 1;
                volley.nextAt += launchInterval;
                launches += 1;
            }
            if (volley.fired >= volley.count) {
                helicopter.adminHeliMissileVolley = null;
            }
        }

        function updateAdminDonggyuHelicopterState(helicopter, dt, now) {
            if (!isAdminDonggyuHelicopter(helicopter) || helicopter.dead) {
                return false;
            }
            const owner = getFighterById(helicopter.ownerId);
            if (!owner || owner.dead) {
                removeSummonFromBattle(helicopter);
                return true;
            }
            restoreFromStun(helicopter, now);
            if (isPassiveEffectForbidden(helicopter, now) || isStunned(helicopter, now) || isAsleep(helicopter, now) || isLeeDohyunFouled(helicopter) || (helicopter.adminHeliDisabledUntil || 0) > now) {
                helicopter.vx = 0;
                helicopter.vy = 0;
                helicopter.windmillMomentum = null;
                return true;
            }
            const effects = adminKimDonggyuPassiveEffects(owner);
            const target = livingEnemiesOf(owner)
                .sort((a, b) => Math.hypot(a.x - helicopter.x, a.y - helicopter.y) - Math.hypot(b.x - helicopter.x, b.y - helicopter.y))[0] || null;
            if (target) {
                const toward = normalize(target.x - helicopter.x, target.y - helicopter.y);
                const distance = Math.max(1, Math.hypot(target.x - helicopter.x, target.y - helicopter.y));
                const preferredDistance = Math.max(battle.ballSize * 1.2, effects.helicopterPreferredDistance || 200);
                const radialCorrection = Math.max(-1, Math.min(1, (distance - preferredDistance) / preferredDistance));
                const orbitSign = helicopter.adminHeliOrbitSign || 1;
                const tangent = { x: -toward.y * orbitSign, y: toward.x * orbitSign };
                const direction = normalize(
                    toward.x * radialCorrection + tangent.x * 0.55,
                    toward.y * radialCorrection + tangent.y * 0.55
                );
                const speed = scaledSpeed(effects.helicopterSpeed || helicopter.speed || 150);
                helicopter.vx = direction.x * speed;
                helicopter.vy = direction.y * speed;
                helicopter.x = Math.max(fighterRadius(helicopter), Math.min(battle.arenaSize - fighterRadius(helicopter), helicopter.x + helicopter.vx * dt));
                helicopter.y = Math.max(fighterRadius(helicopter), Math.min(battle.arenaSize - fighterRadius(helicopter), helicopter.y + helicopter.vy * dt));

                const bulletInterval = 1000 / Math.max(1, effects.helicopterBulletRate || 5);
                if (!helicopter.adminHeliNextBulletAt) {
                    helicopter.adminHeliNextBulletAt = now;
                }
                let bullets = 0;
                while (now >= helicopter.adminHeliNextBulletAt && bullets < 3) {
                    fireAdminDonggyuHelicopterBullet(helicopter, owner, target, effects);
                    helicopter.adminHeliNextBulletAt += bulletInterval;
                    bullets += 1;
                }

                updateAdminDonggyuHelicopterMissileVolley(helicopter, owner, effects, now);
                if (!helicopter.adminHeliNextMissileAt) {
                    helicopter.adminHeliNextMissileAt = now + (effects.helicopterMissileInterval || 3) * 1000;
                }
                if (!helicopter.adminHeliMissileVolley && now >= helicopter.adminHeliNextMissileAt) {
                    startAdminDonggyuHelicopterMissileVolley(helicopter, target, effects, now);
                    updateAdminDonggyuHelicopterMissileVolley(helicopter, owner, effects, now);
                    helicopter.adminHeliNextMissileAt = now + (effects.helicopterMissileInterval || 3) * 1000;
                }
            } else {
                maintainMotion(helicopter, now);
                helicopter.x = Math.max(fighterRadius(helicopter), Math.min(battle.arenaSize - fighterRadius(helicopter), helicopter.x + helicopter.vx * dt));
                helicopter.y = Math.max(fighterRadius(helicopter), Math.min(battle.arenaSize - fighterRadius(helicopter), helicopter.y + helicopter.vy * dt));
            }
            return true;
        }

        function adminDonggyuBarrierFor(owner) {
            const barrier = battle.adminDonggyuBarrier;

        function createOrReinforceAdminDonggyuBarrier(owner, effects) {

                barrier.hp += effects.barrierBonusHp || 150;
                barrier.maxHp = Math.max(barrier.maxHp || 0, barrier.hp);

            barrier.element.style.left = `${owner.x}px`;
            barrier.element.style.top = `${owner.y}px`;
            barrier.element.style.width = `${size}px`;
            barrier.element.style.height = `${size}px`;

        }

        function damageAdminDonggyuBarrier(owner, amount, source, now) {
            const barrier = adminDonggyuBarrierFor(owner);
            if (!barrier || barrier.hp <= 0 || !Number.isFinite(amount) || amount <= 0) {
                return false;
            }
            barrier.hp -= amount;
            floatText(`방벽 -${Math.round(amount)}`, owner.x, owner.y - fighterRadius(owner), owner.definition.color);
            effectRing(owner.x, owner.y, barrier.size, owner.definition.color);
            if (barrier.hp <= 0) {
                barrier.element?.remove();
                if (battle.adminDonggyuBarrier === barrier) {
                    battle.adminDonggyuBarrier = null;
                }
                burst(owner.x, owner.y, owner.definition.color, 10);
            }
            return true;
        }

        function enforceAdminDonggyuBarrierCollision(owner) {
            const barrier = adminDonggyuBarrierFor(owner);
            if (!barrier || barrier.hp <= 0 || !barrier.element?.isConnected) {
                return;
            }
            const half = (barrier.size || 150) / 2;
            livingEnemiesOf(owner).forEach((enemy) => {
                if (enemy.offMapUntil > performance.now()) {
                    return;
                }
                const radius = fighterRadius(enemy);
                const left = owner.x - half - radius;
                const right = owner.x + half + radius;
                const top = owner.y - half - radius;
                const bottom = owner.y + half + radius;
                if (enemy.x < left || enemy.x > right || enemy.y < top || enemy.y > bottom) {
                    return;
                }
                const distances = [
                    { side: "left", value: Math.abs(enemy.x - left) },
                    { side: "right", value: Math.abs(right - enemy.x) },
                    { side: "top", value: Math.abs(enemy.y - top) },
                    { side: "bottom", value: Math.abs(bottom - enemy.y) }
                ].sort((a, b) => a.value - b.value);
                const side = distances[0]?.side || "right";
                const pushSpeed = scaledSpeed(140);
                enemy.windmillMomentum = null;
                if (side === "left") {
                    enemy.x = Math.max(radius, left);
                    enemy.vx = Math.min(enemy.vx, -pushSpeed);
                } else if (side === "right") {
                    enemy.x = Math.min(battle.arenaSize - radius, right);
                    enemy.vx = Math.max(enemy.vx, pushSpeed);
                } else if (side === "top") {
                    enemy.y = Math.max(radius, top);
                    enemy.vy = Math.min(enemy.vy, -pushSpeed);
                } else {
                    enemy.y = Math.min(battle.arenaSize - radius, bottom);
                    enemy.vy = Math.max(enemy.vy, pushSpeed);
                }
            });
        }

        function updateProtestLeaderPassive(fighter, now) {
            if (!isProtestLeaderGuMinchan(fighter) || fighter.dead || fighter.isSummon || now < (fighter.protestNextFlagAt || 0)) {
                return;
            }
            const effects = protestPassiveEffects(fighter);
            fighter.protestNextFlagAt = now + (effects.interval || 1) * 1000;
            const detectionRadius = bossAttackRange(fighter, effects.detectionRadius || 225);
            const enemies = livingEnemiesOf(fighter).filter((enemy) => (
                Math.hypot(enemy.x - fighter.x, enemy.y - fighter.y) <= detectionRadius + fighterRadius(enemy)
            ));
            if (enemies.length <= 0) {
                return;
            }

            createProtestFlagSpin(fighter, effects);
            fighter.protestFlagSpinUntil = Math.max(
                fighter.protestFlagSpinUntil || 0,
                now + Math.max(0.08, effects.flagSpinDuration || 0.24) * 1000
            );
            fighter.vx = 0;
            fighter.vy = 0;
            fighter.windmillMomentum = null;
            const flagReach = bossAttackRange(fighter, effects.flagLength || 125) + fighterRadius(fighter) * 0.65;
            let hitCount = 0;
            enemies.forEach((enemy) => {
                if (Math.hypot(enemy.x - fighter.x, enemy.y - fighter.y) > flagReach + fighterRadius(enemy)) {
                    return;
                }
                const dealt = applyDamage(enemy, effects.damage || 70, fighter, "passive");
                if (dealt <= 0 || enemy.dead) {
                    return;
                }
                hitCount += 1;
                const direction = normalize(enemy.x - fighter.x || enemy.vx || 1, enemy.y - fighter.y || enemy.vy || 0);
                const speed = scaledSpeed(effects.knockAwaySpeed || moveSpeedOf(enemy, now) || 230);
                enemy.windmillMomentum = null;
                enemy.vx = direction.x * speed;
                enemy.vy = direction.y * speed;
                enemy.afterimageUntil = Math.max(enemy.afterimageUntil || 0, now + 180);
                effectRing(enemy.x, enemy.y, battle.ballSize * 1.05, fighter.definition.color);
            });
            if (hitCount > 0) {
                const reduction = hitCount * (effects.cooldownReductionPerHit || 1);
                reduceCooldown(fighter, reduction, { ignoreControlLock: true, protestPassive: true });
                floatText(`CD -${reduction}`, fighter.x, fighter.y - fighterRadius(fighter) * 1.35, fighter.definition.color);
            }
        }

            const skill = {
