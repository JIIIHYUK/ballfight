    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .hard-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
        }

        .hard-shadow-sm {
            box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 1);
        }

        .brutal-border-thick {
            border: 4px solid #1c1b1b;
        }

        .brutal-border-thin {
            border: 2px solid #1c1b1b;
        }

        .btn-brutal {
            transition: all 0.1s ease;
        }

        .btn-brutal:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 1);
        }

        .fighter-ball {
            position: absolute;
            z-index: 12;
            border-radius: 9999px;
            border: 4px solid #1c1b1b;
            box-shadow: 4px 4px 0px 0px #1c1b1b;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
            user-select: none;
        }

        .fighter-ball.is-stunned::after {
            content: "!";
            position: absolute;
            inset: -4px;
            z-index: 4;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.72);
            color: #ba1a1a;
            font: 800 42px "Plus Jakarta Sans", sans-serif;
        }

        .fighter-ball.is-asleep::after {
            content: "Zzz";
            position: absolute;
            inset: -4px;
            z-index: 4;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.78);
            color: #2563eb;
            font: 900 28px "Plus Jakarta Sans", sans-serif;
            text-shadow: 2px 2px 0 #ffffff;
        }

        .fighter-ball.is-dead {
            filter: grayscale(1);
            opacity: 0.35;
        }

        .fighter-ball.is-jaeyoon-wraith {
            background: #f8fafc;
            border-color: #ffffff;
            box-shadow: 3px 3px 0 #1c1b1b, 0 0 22px rgba(255, 255, 255, 0.85);
            filter: contrast(1.16);
            opacity: 0.88;
        }

        .fighter-ball.is-jaeyoon-revived {
            border-color: #ffffff;
            outline: 4px solid rgba(255, 255, 255, 0.92);
            outline-offset: 3px;
            box-shadow:
                4px 4px 0 #1c1b1b,
                0 0 0 7px rgba(107, 114, 128, 0.5),
                0 0 28px rgba(255, 255, 255, 0.95);
        }

        .fighter-ball.is-offmap {
            opacity: 0;
            transform: translate(-140px, -140px) !important;
        }

        .fighter-ball.is-raging::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: rgba(220, 38, 38, var(--rage-alpha, 0));
            mix-blend-mode: multiply;
        }

        .fighter-ball.is-kang-combo::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: rgba(124, 58, 237, 0.72);
            mix-blend-mode: multiply;
        }

        .kang-combo-aura {
            position: absolute;
            z-index: 5;
            pointer-events: none;
            border-radius: 9999px;
            border: 4px solid rgba(124, 58, 237, 0.34);
            background: rgba(124, 58, 237, 0.12);
            box-shadow: 0 0 28px rgba(124, 58, 237, 0.32), inset 0 0 24px rgba(255, 255, 255, 0.18);
            filter: blur(1.5px);
            transform: translate(-50%, -50%);
        }

        .fighter-ball.is-kim-sihyeon-buffed::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background:
                radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.54), transparent 26%),
                rgba(0, 0, 0, 0.46);
            mix-blend-mode: hard-light;
        }

        .kim-sihyeon-darkness-bar {
            position: absolute;
            z-index: 11;
            height: 10px;
            display: none;
            pointer-events: none;
            transform: translate(-50%, 0);
            border: 3px solid #050505;
            border-radius: 0;
            background: rgba(214, 211, 209, 0.82);
            box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.88);
            overflow: hidden;
        }

        .kim-sihyeon-darkness-bar-fill {
            width: 0%;
            height: 100%;
            background: #020202;
            transition: width 90ms steps(2, end);
        }

        .kim-sihyeon-darkness-cross {
            position: absolute;
            z-index: 7;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.84);
            box-shadow: 0 0 34px rgba(0, 0, 0, 0.96), inset 0 0 18px rgba(0, 0, 0, 0.92);
            mix-blend-mode: multiply;
        }

        .kim-sihyeon-darkness-cross.is-horizontal {
            animation: darkness-cross-horizontal 620ms ease-out forwards;
        }

        .kim-sihyeon-darkness-cross.is-vertical {
            animation: darkness-cross-vertical 620ms ease-out forwards;
        }

        @keyframes darkness-cross-horizontal {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scaleX(0);
            }
            24% {
                opacity: 1;
                transform: translate(-50%, -50%) scaleX(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scaleX(1);
            }
        }

        @keyframes darkness-cross-vertical {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scaleY(0);
            }
            24% {
                opacity: 1;
                transform: translate(-50%, -50%) scaleY(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scaleY(1);
            }
        }

        .fighter-ball.is-lee-dribbling {
            opacity: 0.64;
            filter: saturate(1.4) blur(0.7px);
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 24px rgba(239, 68, 68, 0.86);
        }

        .fighter-ball.is-lee-charging {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 28px rgba(239, 68, 68, 0.88);
        }

        .fighter-ball.is-lee-charging::before {
            content: "";
            position: absolute;
            inset: -3px;
            z-index: 3;
            pointer-events: none;
            border: 4px solid rgba(239, 68, 68, 0.92);
            border-radius: 9999px;
            box-shadow: inset 0 0 18px rgba(239, 68, 68, 0.45), 0 0 16px rgba(239, 68, 68, 0.62);
        }

        .fighter-ball.is-jaeyoon-revived::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            background: var(--jaeyoon-revive-color, rgba(107, 114, 128, 0.8));
            mix-blend-mode: multiply;
        }

        .fighter-ball.is-lee-dohyun-clone {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 24px rgba(37, 99, 235, 0.82);
            filter: saturate(1.2) brightness(0.82);
        }

        .fighter-ball.is-lee-dohyun-clone::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            background: rgba(30, 64, 175, 0.42);
            mix-blend-mode: multiply;
        }

        .fighter-ball.is-lee-dohyun-line-dashing {
            z-index: 28;
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 30px rgba(37, 99, 235, 0.92);
        }

        .fighter-ball.is-yu-animal-pet {
            box-shadow: 3px 3px 0 #1c1b1b, 0 0 22px rgba(65, 105, 225, 0.76);
        }

        .fighter-ball.is-yu-animal-dashing {
            z-index: 27;
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 30px rgba(65, 105, 225, 0.92);
        }

        .fighter-ball.is-yu-bleeding {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 24px rgba(220, 38, 38, 0.9);
        }

        .fighter-ball.is-ji-dunking {
            z-index: 29;
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 30px rgba(249, 115, 22, 0.92);
        }

        .fighter-ball.is-ji-skill-transparent {
            opacity: 0;
            filter: none;
        }

        .ji-caffeine {
            position: absolute;
            z-index: 12;
            pointer-events: none;
            transform: translate(-50%, -50%);
            overflow: hidden;
            border-radius: 8px;
            filter: drop-shadow(3px 3px 0 #1c1b1b) drop-shadow(0 0 12px rgba(249, 115, 22, 0.62));
        }

        .ji-caffeine img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .ji-three-zone,
        .ji-three-shadow {
            position: absolute;
            pointer-events: none;
            border-radius: 9999px;
            transform: translate(-50%, -50%);
        }

        .ji-three-zone.is-shock {
            z-index: 10;
            border: 4px dashed rgba(249, 115, 22, 0.7);
            background: rgba(249, 115, 22, 0.08);
            box-shadow: inset 0 0 28px rgba(249, 115, 22, 0.2);
        }

        .ji-three-zone.is-warning {
            z-index: 11;
            border: 5px solid rgba(220, 38, 38, 0.9);
            background: rgba(220, 38, 38, 0.14);
            box-shadow: 0 0 22px rgba(220, 38, 38, 0.6);
        }

        .ji-three-shadow {
            z-index: 12;
            border: 12px solid rgba(28, 27, 27, 0.48);
            animation: ji-shadow-tighten 2s linear forwards;
        }

        @keyframes ji-shadow-tighten {
            from {
                width: var(--shadow-start-size, 500px);
                height: var(--shadow-start-size, 500px);
                opacity: 0.3;
            }

            to {
                width: var(--shadow-end-size, 125px);
                height: var(--shadow-end-size, 125px);
                opacity: 0.72;
            }
        }

        .ji-basketball,
        .ji-basketball-ghost {
            position: absolute;
            z-index: 28;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border-radius: 9999px;
            overflow: hidden;
            filter: drop-shadow(4px 4px 0 rgba(28, 27, 27, 0.72));
        }

        .ji-basketball-ghost {
            z-index: 26;
            opacity: 0.17;
            animation: ji-ball-ghost-fade 420ms ease-out forwards;
        }

        .ji-basketball.is-held {
            z-index: 30;
            filter: drop-shadow(3px 3px 0 rgba(28, 27, 27, 0.82)) drop-shadow(0 0 12px rgba(249, 115, 22, 0.72));
        }

        .ji-basketball img,
        .ji-basketball-ghost img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        @keyframes ji-ball-ghost-fade {
            to {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.84);
            }
        }

        .fighter-ball.is-ji-drone {
            border-radius: 10px;
            border-width: 2px;
            overflow: hidden;
            box-shadow: 3px 3px 0 #1c1b1b, 0 0 14px rgba(34, 197, 94, 0.48);
        }

        .fighter-ball.is-admin-donggyu-helicopter {
            border-radius: 12px;
            border-width: 2px;
            overflow: hidden;
            box-shadow: 3px 3px 0 #1c1b1b, 0 0 16px rgba(216, 195, 165, 0.64);
        }

        .protest-flag-spin {
            position: absolute;
            z-index: 27;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border-radius: 9999px;
            animation: protest-flag-spin 240ms linear forwards;
        }

        .protest-flag-arm {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--flag-length, 125px);
            height: 0;
            transform-origin: left center;
        }

        .protest-flag-arm.is-left {
            transform: scaleX(-1);
        }

        .protest-flag-arm::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: var(--flag-length, 125px);
            height: 6px;
            transform-origin: left center;
            transform: translateY(-50%);
            background: #451a1a;
            border: 2px solid #1c1b1b;
            box-shadow: 2px 2px 0 #1c1b1b;
        }

        .protest-flag-image {
            position: absolute;
            left: calc(var(--flag-length, 125px) - 10px);
            top: 0;
            width: calc(var(--flag-length, 125px) * 0.72);
            height: calc(var(--flag-length, 125px) * 0.48);
            object-fit: contain;
            object-position: left center;
            transform: translateY(-50%) rotate(90deg);
            transform-origin: left center;
            filter: drop-shadow(3px 3px 0 #1c1b1b);
        }

        .protest-flag-arm.is-left .protest-flag-image {
            transform: translateY(-50%) rotate(90deg) scaleY(-1);
        }

        @keyframes protest-flag-spin {
            from {
                opacity: 0.95;
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(-360deg);
            }
        }

        .protest-zone {
            position: absolute;
            z-index: 6;
            pointer-events: none;
            background: rgba(185, 28, 28, 0.24);
            border: 2px solid rgba(69, 10, 10, 0.32);
            box-shadow: inset 0 0 24px rgba(69, 10, 10, 0.18);
        }

        .protest-arrow-row {
            position: absolute;
            z-index: 7;
            pointer-events: none;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #ffffff;
            font: 900 72px "JetBrains Mono", monospace;
            letter-spacing: 28px;
            opacity: 0.62;
            text-shadow: 4px 4px 0 rgba(28, 27, 27, 0.82);
            animation: protest-arrow-blink 480ms steps(2, end) infinite;
        }

        @keyframes protest-arrow-blink {
            50% {
                opacity: 0.35;
                transform: translateX(12px);
            }
        }

        .protest-target-marker {
            position: absolute;
            z-index: 30;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border-radius: 9999px;
            border: 4px solid #450a0a;
            background: rgba(220, 38, 38, 0.42);
            box-shadow: 0 0 22px rgba(220, 38, 38, 0.62), inset 0 0 16px rgba(127, 29, 29, 0.55);
            animation: protest-target-pulse 620ms ease-in-out infinite;
        }

        .protest-target-arrow {
            position: absolute;
            color: #ffffff;
            font: 900 22px "JetBrains Mono", monospace;
            line-height: 1;
            text-shadow: 3px 3px 0 rgba(69, 10, 10, 0.9), 0 0 12px rgba(220, 38, 38, 0.85);
            animation: protest-target-arrow-pulse 520ms ease-in-out infinite;
        }

        .protest-target-arrow.is-top {
            left: 50%;
            top: -26px;
            transform: translateX(-50%);
        }

        .protest-target-arrow.is-bottom {
            left: 50%;
            bottom: -26px;
            transform: translateX(-50%);
        }

        .protest-target-arrow.is-left {
            left: -26px;
            top: 50%;
            transform: translateY(-50%);
        }

        .protest-target-arrow.is-right {
            right: -26px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes protest-target-arrow-pulse {
            50% {
                opacity: 0.58;
            }
        }

        @keyframes protest-target-pulse {
            50% {
                transform: translate(-50%, -50%) scale(1.12);
                opacity: 0.82;
            }
        }

        .fighter-ball.is-lee-sungwon-awakened {
            box-shadow: 4px 4px 0 #1c1b1b, 0 0 28px rgba(30, 58, 138, 0.9), 0 0 18px rgba(248, 113, 113, 0.72);
            filter: saturate(1.22) contrast(1.08);
        }

        .lee-sungwon-marker {
            position: absolute;
            z-index: 29;
            pointer-events: none;
            transform: translate(-50%, -100%);
            padding: 1px 6px;
            border: 2px solid #1c1b1b;
            background: rgba(255, 255, 255, 0.92);
            color: #1c1b1b;
            font-weight: 900;
            font-size: 13px;
            line-height: 1;
            box-shadow: 2px 2px 0 #1c1b1b;
        }

        .lee-sungwon-combo-aura {
            position: absolute;
            z-index: 9;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border-radius: 9999px;
            border: 3px solid rgba(30, 58, 138, 0.58);
            background: rgba(30, 58, 138, 0.12);
            box-shadow: 0 0 18px rgba(30, 58, 138, 0.48);
        }

        .lee-sungwon-breath-line {
            position: absolute;
            z-index: 23;
            height: 8px;
            pointer-events: none;
            transform-origin: left center;
            background: linear-gradient(90deg, rgba(30, 58, 138, 0), rgba(30, 58, 138, 0.95), rgba(248, 113, 113, 0.95));
            border-top: 2px solid rgba(255, 255, 255, 0.7);
            border-bottom: 2px solid rgba(28, 27, 27, 0.72);
            box-shadow: 0 0 14px rgba(30, 58, 138, 0.86);
            animation: lee-sungwon-breath-fade 420ms ease-out forwards;
        }

        .lee-sungwon-breath-text {
            position: absolute;
            z-index: 23;
            pointer-events: none;
            transform: translate(-50%, -50%);
            padding: 2px 8px;
            border: 3px solid #1c1b1b;
            background: rgba(255, 255, 255, 0.92);
            color: #1e3a8a;
            font: 900 20px "Plus Jakarta Sans", sans-serif;
            line-height: 1;
            text-shadow: 2px 2px 0 rgba(248, 113, 113, 0.65);
            box-shadow: 3px 3px 0 #1c1b1b, 0 0 16px rgba(30, 58, 138, 0.72);
            animation: lee-sungwon-breath-fade 420ms ease-out forwards;
        }

        @keyframes lee-sungwon-breath-fade {
            from {
                opacity: 0.95;
            }

            to {
                opacity: 0;
            }
        }

        .fighter-ball.is-ji-drone.is-empowered {
            overflow: visible;
            box-shadow: 3px 3px 0 #1c1b1b, 0 0 24px rgba(34, 197, 94, 0.9), 0 0 18px rgba(74, 222, 128, 0.72);
            filter: saturate(1.25) brightness(1.12);
        }

        .fighter-ball.is-ji-drone.is-empowered::after {
            content: "";
            position: absolute;
            inset: -7px;
            border-radius: 14px;
            pointer-events: none;
            border: 2px solid rgba(34, 197, 94, 0.72);
            box-shadow:
                0 0 8px rgba(34, 197, 94, 0.82),
                0 -7px 0 -4px rgba(187, 247, 208, 0.9),
                7px 2px 0 -4px rgba(21, 128, 61, 0.85),
                -6px 6px 0 -4px rgba(74, 222, 128, 0.85);

    <script src="./effects.js"></script>
    <script>
        const arena = document.getElementById("arena");
        const hud = document.getElementById("hud");
        const countdown = document.getElementById("countdown");
        const matchTitle = document.getElementById("match-title");
        const elapsedTime = document.getElementById("elapsed-time");
        const statsButton = document.getElementById("stats-button");
        const statsModal = document.getElementById("stats-modal");
        const statsSummary = document.getElementById("stats-summary");
        const statsBody = document.getElementById("stats-body");
        const allCharacters = window.HannamBalls.getCharacters();
        const selectableCharacters = allCharacters.filter((character) => character.selectable !== false);
        const adminSelectableCharacters = allCharacters.filter((character) => character.selectable !== false || character.adminSelectable);
        const TEAM_CONFIG = {
            blue: { id: "blue", label: "블루 팀", color: "#4169e1", colorName: "미디엄 로열 블루", textColor: "#ffffff" },
            red: { id: "red", label: "레드 팀", color: "#ef4444", colorName: "해피 레드", textColor: "#ffffff" }
        };

        function parseStoredJson(key, fallback) {
            try {
                return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
            } catch (error) {
                return fallback;
            }
        }

        function characterForBattle(id, teamId = null) {
            const character = window.HannamBalls.getCharacter(id);
            if (!character) {
                return null;
            }
            if (!teamId || !TEAM_CONFIG[teamId]) {
                return character;
            }
            const team = TEAM_CONFIG[teamId];
            return {
                ...character,
                teamId,
                teamLabel: team.label,
                originalColor: character.color,
                originalColorName: character.colorName,
                color: team.color,
                colorName: team.colorName,
                textColor: team.textColor
            };
        }

        function characterForBossBattle(id, role) {
            const character = window.HannamBalls.getCharacter(id);
            if (!character) {
                return null;
            }
            if (role !== "boss") {
                return {
                    ...character,
                    bossRole: "normal",
                    teamId: "boss-normal",
                    teamLabel: "일반"
                };
            }

            const boostedCooldown = character.skill?.passiveOnly
                ? character.skill.cooldown
                : (character.skill.cooldown || 0) * 2;
            return {
                ...character,
                maxHp: Math.round(character.maxHp * 10),
                baseAttack: Math.round((character.baseAttack || 0) * 1.5),
                skill: {
                    ...character.skill,
                    cooldown: boostedCooldown
                },
                sizeMultiplier: (character.sizeMultiplier || 1) * 2,
                bossBaseSizeMultiplier: character.sizeMultiplier || 1,
                bossProjectileSizeMultiplier: 1.5,
                bossAttackRangeMultiplier: 1.5,
                bossSummonSizeMultiplier: 1.5,
                bossRole: "boss",
                isBoss: true,
                teamId: "boss",
                teamLabel: "보스",
                traits: [...(character.traits || []), "보스"]
            };
        }

        const storedBattleMode = localStorage.getItem("hannamBallsBattleMode");
        const adminAccountUnlocked = sessionStorage.getItem("hannamBallsAdminUnlocked") === "true";
        const battleMode = ["free", "team", "boss"].includes(storedBattleMode) ? storedBattleMode : "free";
        const activeSelectableCharacters = adminAccountUnlocked ? adminSelectableCharacters : selectableCharacters;
        const storedSelection = parseStoredJson("hannamBallsSelection", []);
        const storedTeamSelection = parseStoredJson("hannamBallsTeamSelection", {});
        const storedBossSelection = parseStoredJson("hannamBallsBossSelection", {});
        const TEACHER_PASSIVE_NAME = "선생님들";

        function hasTeacherPassiveDefinition(definition) {
            return definition?.passive?.name === TEACHER_PASSIVE_NAME;
        }

        function limitTeacherPassiveCharacters(characters) {
            let hasTeacherPassive = false;
            return characters.filter((character) => {
                if (!hasTeacherPassiveDefinition(character)) {
                    return true;
                }
                if (hasTeacherPassive) {
                    return false;
                }
                hasTeacherPassive = true;
                return true;
            });
        }

        function isSelectableForBattle(character) {
            return adminAccountUnlocked
                ? character.selectable !== false || character.adminSelectable
                : character.selectable !== false;
        }

        let selectedCharacters = battleMode === "team"
            ? [
                ...(Array.isArray(storedTeamSelection.blue) ? storedTeamSelection.blue : []).map((id) => characterForBattle(id, "blue")),
                ...(Array.isArray(storedTeamSelection.red) ? storedTeamSelection.red : []).map((id) => characterForBattle(id, "red"))
            ].filter(Boolean)
            : battleMode === "boss"
                ? [
                    ...(Array.isArray(storedBossSelection.boss) ? storedBossSelection.boss.slice(0, 1) : []).map((id) => characterForBossBattle(id, "boss")),

        function distanceToSegment(px, py, ax, ay, bx, by) {
            const dx = bx - ax;
            const dy = by - ay;
            const lengthSquared = dx * dx + dy * dy;

                return Math.hypot(px - ax, py - ay);

            const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lengthSquared));

            const candidates = [
                base,
                rotateVector(base.x, base.y, Math.PI / 2),
                rotateVector(base.x, base.y, -Math.PI / 2),
                rotateVector(base.x, base.y, Math.PI / 4),
                rotateVector(base.x, base.y, -Math.PI / 4),
                normalize(battle.arenaSize / 2 - fighter.x, battle.arenaSize / 2 - fighter.y),
                normalize(Math.random() - 0.5, Math.random() - 0.5)
            ];
            let best = { x: startX, y: startY, moved: -1, direction: base };

            candidates.forEach((direction) => {
                const x = clampToArena(startX + direction.x * distance);
                const y = clampToArena(startY + direction.y * distance);
                const moved = Math.hypot(x - startX, y - startY);

        function getFighterById(id) {
            return battle.fighters.find((fighter) => fighter.id === id);
        }

        function createEmptyStats(fighter) {
            return {
                id: fighter.id,
                name: fighter.definition.name,
                color: fighter.definition.color,
                teamLabel: fighter.teamLabel || "",
                damageDealt: 0,
                healingDone: 0,
                damageTaken: 0,
                kills: [],
                killedBy: "",
                rank: null,
                eliminatedAt: null,
                eliminationOrder: null,
                goalkeeper: false
            };
        }

        function initializeBattleStats() {
            battle.stats = new Map();
            battle.originalFighterIds = battle.fighters
                .filter((fighter) => fighter.isOriginalCombatant)
                .map((fighter) => fighter.id);
            battle.fighters.forEach((fighter) => {
                if (fighter.isOriginalCombatant) {
                    battle.stats.set(fighter.id, createEmptyStats(fighter));
                }
            });
        }

        function statsOwnerFor(source) {
            if (!source) {
                return null;
            }

            let owner = source;
            const seen = new Set();
            while (owner && owner.statsOwnerId && !seen.has(owner.id)) {
                seen.add(owner.id);
                owner = getFighterById(owner.statsOwnerId) || owner;
                if (!owner.statsOwnerId) {
                    break;
                }
            }
            if (owner?.statsOwnerId) {
                owner = getFighterById(owner.statsOwnerId) || owner;
            }
            return owner || source;
        }

        function addBattleStat(fighterOrId, field, amount) {
            if (!Number.isFinite(amount) || amount <= 0) {
                return;
            }
            const id = typeof fighterOrId === "string" ? fighterOrId : fighterOrId?.id;
            const record = id ? battle.stats.get(id) : null;
            if (!record || !Number.isFinite(record[field])) {
                return;
            }
            record[field] += amount;
        }

        function recordDamageStats(source, target, actual) {
            addBattleStat(target?.id, "damageTaken", actual);
            const dealer = statsOwnerFor(source);
            if (dealer && dealer.id !== target?.id) {
                addBattleStat(dealer.id, "damageDealt", actual);
            }
        }

        function recordHealStats(source, target, healed) {
            const healer = statsOwnerFor(source || target);
            addBattleStat(healer?.id, "healingDone", healed);
        }

        function recordKillStats(target, source) {
            if (!target?.isOriginalCombatant) {
                return;
            }

            const targetRecord = battle.stats.get(target.id);
            const killer = statsOwnerFor(source);
            const killerRecord = killer?.id ? battle.stats.get(killer.id) : null;
            const killerName = killerRecord?.name || killer?.definition?.name || "환경";
            if (targetRecord?.killedBy) {
                return;
            }
            if (targetRecord && !targetRecord.killedBy) {
                targetRecord.killedBy = killer && killer.id !== target.id ? killerName : "환경";
            }
            if (killerRecord && killer.id !== target.id) {
                killerRecord.kills.push(target.definition.name);
            }
        }

        function statsRows() {
            return (battle.originalFighterIds || [])
                .map((id) => battle.stats.get(id))
                .filter(Boolean);
        }

        function recordFreeForAllElimination(fighter, now = performance.now()) {
            if (battle.isTeamMode || battle.isBossMode || !fighter?.isOriginalCombatant || fighter.isSummon) {
                return;
            }
            const record = battle.stats.get(fighter.id);
            if (!record || record.eliminatedAt !== null) {
                return;
            }
            record.eliminatedAt = now;
            record.eliminationOrder = battle.freeForAllEliminations.length + 1;
            battle.freeForAllEliminations.push(fighter.id);
        }

        function pickWeightedGoalkeepers(rankings, count = 2) {
            const pool = rankings
                .filter((record) => record.rank > 1)
                .map((record) => ({
                    record,
                    weight: Math.max(1, record.rank - 1)
                }));
            const picked = [];

            while (picked.length < count && pool.length > 0) {
                const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
                let roll = Math.random() * totalWeight;
                let pickedIndex = 0;
                for (let index = 0; index < pool.length; index += 1) {
                    roll -= pool[index].weight;
                    if (roll <= 0) {
                        pickedIndex = index;
                        break;
                    }
                }
                const [item] = pool.splice(pickedIndex, 1);
                item.record.goalkeeper = true;
                picked.push(item.record);
            }

            return picked;
        }

        function finalizeFreeForAllRankings(now, aliveOriginals = []) {
            if (battle.isTeamMode || battle.isBossMode) {
                return { rankings: [], goalkeepers: [] };
            }
            if (battle.freeForAllRankings.length > 0) {
                return {
                    rankings: battle.freeForAllRankings,
                    goalkeepers: battle.goalkeeperSelections
                };
            }

            const rankedIds = [];
            const addRankedId = (id) => {
                if (id && battle.originalFighterIds.includes(id) && !rankedIds.includes(id)) {
                    rankedIds.push(id);
                }
            };

            aliveOriginals
                .filter((fighter) => fighter?.isOriginalCombatant)
                .forEach((fighter) => addRankedId(fighter.id));

            battle.freeForAllEliminations
                .slice()
                .reverse()
                .forEach(addRankedId);

            battle.originalFighterIds.forEach(addRankedId);

            const rankings = rankedIds
                .map((id, index) => {
                    const record = battle.stats.get(id);
                    if (!record) {
                        return null;
                    }
                    record.rank = index + 1;
                    record.goalkeeper = false;
                    if (record.eliminatedAt === null && record.rank > 1) {
                        record.eliminatedAt = now;
                    }
                    return record;
                })
                .filter(Boolean);

            battle.freeForAllRankings = rankings;
            battle.goalkeeperSelections = pickWeightedGoalkeepers(rankings, 2);
            return {
                rankings: battle.freeForAllRankings,
                goalkeepers: battle.goalkeeperSelections
            };
        }

        function areAllies(a, b) {
            if (!a || !b) {
                return false;
            }
            if (a.teamId && b.teamId && a.teamId === b.teamId) {
                return true;
            }
            if (a.ownerId && (a.ownerId === b.id || a.ownerId === b.ownerId)) {
                return true;
            }
            if (b.ownerId && (b.ownerId === a.id || b.ownerId === a.ownerId)) {
                return true;
            }
            return false;
        }

        function livingEnemiesOf(fighter) {
            return battle.fighters.filter((target) => target !== fighter && !target.dead && target.offMapUntil <= performance.now() && !areAllies(fighter, target));
        }

        function livingAlliesOf(fighter, options = {}) {
            return battle.fighters.filter((target) => (
                target !== fighter
                && !target.dead
                && target.offMapUntil <= performance.now()
                && areAllies(fighter, target)
                && (!options.nonSummonOnly || !target.isSummon)
            ));
        }

        function isProtestLeaderGuMinchan(fighter) {
            return Boolean(fighter && fighter.definition.id === "protest-leader-gu-minchan");
        }

        function isProtestSkillActiveFor(fighter, now = performance.now()) {
            if (!fighter || !battle.activeProtestSkills) {
                return false;
            }
            return battle.activeProtestSkills.some((skill) => skill.ownerId === fighter.id && now < skill.until);
        }

        function isProtestTargeted(fighter, now = performance.now()) {
            return Boolean(fighter && !fighter.dead && (fighter.protestTargetUntil || 0) > now);
        }

        function isProtestBuffBanned(fighter, now = performance.now()) {
            return Boolean(fighter && !fighter.dead && (fighter.protestBuffBanUntil || 0) > now);
        }

        function isPassiveForbidden(fighter, now = performance.now()) {
            return Boolean(fighter && !fighter.dead && (isProtestTargeted(fighter, now) || isProtestBuffBanned(fighter, now)));
        }

        function passiveEffectOwnerFor(fighter) {
            if (!fighter?.ownerId) {
                return fighter || null;
            }
            return getFighterById(fighter.ownerId) || fighter;
        }

        function isPassiveEffectForbidden(fighter, now = performance.now()) {
            const owner = passiveEffectOwnerFor(fighter);
            return Boolean(
                isPassiveForbidden(fighter, now)
                || (owner && owner !== fighter && isPassiveForbidden(owner, now))
            );
        }

        function protestTargetOwnerFor(target) {
            return target?.protestTargetSourceId ? getFighterById(target.protestTargetSourceId) : null;
        }

        function protestTargetDistanceScore(source, target, distance) {
            if (!target || !isProtestTargeted(target) || source === target) {
                return distance;
            }
            const owner = protestTargetOwnerFor(target);
            if (!owner || owner.dead || !(source === owner || areAllies(source, owner))) {
                return distance;
            }
            const effects = owner.definition.skill?.effects || {};
            return distance * (effects.targetHomingBias ?? 0.5);
        }

        function hasTeacherPassiveUnit() {
            return battle.fighters.some((fighter) => (
                !fighter.dead
                && !fighter.isSummon
                && hasTeacherPassiveDefinition(fighter.definition)
            ));
        }

        function layoutFighters() {
            const rect = arena.getBoundingClientRect();
            battle.arenaSize = rect.width;
            battle.ballSize = scaledBallSize(battle.arenaSize);
            updateCachedCorners();
            const center = battle.arenaSize / 2;
            const radius = Math.max(battle.ballSize, battle.arenaSize * 0.34);

            if (battle.isTeamMode) {
                const placeTeam = (teamId, xRatio, directionX) => {
                    const members = battle.fighters.filter((fighter) => fighter.teamId === teamId);
                    const spacing = members.length <= 1
                        ? 0
                        : Math.min(battle.ballSize * 1.55, battle.arenaSize * 0.68 / Math.max(1, members.length - 1));
                    members.forEach((fighter, teamIndex) => {
                        const offset = (teamIndex - (members.length - 1) / 2) * spacing;
                        fighter.x = battle.arenaSize * xRatio;
                        fighter.y = Math.max(fighterRadius(fighter), Math.min(battle.arenaSize - fighterRadius(fighter), center + offset));
                        fighter.vx = directionX * scaledSpeed(moveSpeedOf(fighter)) * 1.35;
                        fighter.vy = (Math.random() - 0.5) * scaledSpeed(moveSpeedOf(fighter)) * 0.18;
                        fighter.element.style.width = `${fighterSize(fighter)}px`;
                        fighter.element.style.height = `${fighterSize(fighter)}px`;
                    });
                };
                placeTeam("blue", 0.22, 1);
                placeTeam("red", 0.78, -1);
                return;
            }

            if (battle.isBossMode) {
                const boss = battle.fighters.find((fighter) => fighter.bossRole === "boss") || battle.fighters[0];
                const normals = battle.fighters.filter((fighter) => fighter !== boss);
                if (boss) {
                    boss.x = battle.arenaSize * 0.25;
                    boss.y = center;
                    boss.vx = scaledSpeed(moveSpeedOf(boss)) * 0.8;
                    boss.vy = 0;
                    boss.element.style.width = `${fighterSize(boss)}px`;
                    boss.element.style.height = `${fighterSize(boss)}px`;
                }
                const spacing = normals.length <= 1
                    ? 0
                    : Math.min(battle.ballSize * 1.45, battle.arenaSize * 0.68 / Math.max(1, normals.length - 1));
                normals.forEach((fighter, index) => {
                    const offset = (index - (normals.length - 1) / 2) * spacing;
                    fighter.x = battle.arenaSize * 0.78;
                    fighter.y = Math.max(fighterRadius(fighter), Math.min(battle.arenaSize - fighterRadius(fighter), center + offset));
                    fighter.vx = -scaledSpeed(moveSpeedOf(fighter)) * 1.25;
                    fighter.vy = (Math.random() - 0.5) * scaledSpeed(moveSpeedOf(fighter)) * 0.24;
                    fighter.element.style.width = `${fighterSize(fighter)}px`;
                    fighter.element.style.height = `${fighterSize(fighter)}px`;
                });
                return;
            }

            battle.fighters.forEach((fighter, index) => {
                const angle = -Math.PI / 2 + (Math.PI * 2 * index) / battle.fighters.length;
                fighter.x = center + Math.cos(angle) * radius;
                fighter.y = center + Math.sin(angle) * radius;
                const direction = normalize(center - fighter.x, center - fighter.y);
                fighter.vx = direction.x * scaledSpeed(moveSpeedOf(fighter)) * 1.45;
                fighter.vy = direction.y * scaledSpeed(moveSpeedOf(fighter)) * 1.45;
                fighter.element.style.width = `${fighterSize(fighter)}px`;
                fighter.element.style.height = `${fighterSize(fighter)}px`;
            });
        }

                fighter.lastIsJiSkillTransparent = false;
                fighter.lastIsKimSihyeonBuffed = false;
            });

            hud.querySelectorAll(".info-button").forEach((button) => {
                button.addEventListener("click", () => {
                    const definition = allCharacters.find((character) => character.id === button.dataset.infoId)
                        || battle.fighters.find((fighter) => fighter.definition.id === button.dataset.infoId)?.definition;
                    showInfo(definition);

        }

        function updateHud(now) {
            battle.fighters.forEach((fighter) => {
                sanitizeFighterState(fighter);
                if (!fighter.hudElement) {
                    return;
                }

                updateKimGibeomAttack(fighter);
                const isDefibingForHud = isKimDonggyuDefibing(fighter, now);
                const defibEffects = isDefibingForHud ? kimDonggyuPassiveEffects(fighter) : {};
                const defibTempMax = Math.max(1, defibEffects.selfReviveTempHp || 100);
                const defibTempHp = Math.max(0, fighter.kimDonggyuDefibTempHp || 0);
                const hpRatio = isDefibingForHud
                    ? Math.max(0, Math.min(1, defibTempHp / defibTempMax))
                    : Math.max(0, fighter.hp / fighter.maxHp);
                const hpFillColor = isDefibingForHud ? "#6b7280" : "";
                const cooldownDuration = skillCooldownDuration(fighter);
                const skillReady = Math.max(0, 1 - fighter.skillCooldown / cooldownDuration);

                if (fighter.lastHpRatio !== hpRatio) {
                    fighter.hudHpFill.style.width = `${hpRatio * 100}%`;
                    fighter.lastHpRatio = hpRatio;
                }
                if (fighter.lastHpFillColor !== hpFillColor) {
                    fighter.hudHpFill.style.background = hpFillColor;
                    fighter.lastHpFillColor = hpFillColor;
                }

                let hpTextVal = isDefibingForHud
                    ? `임시 HP ${Math.ceil(defibTempHp)} / ${defibTempMax}`
                    : `HP ${Math.ceil(Math.max(0, fighter.hp))} / ${fighter.maxHp}`;
                if (fighter.lastHpText !== hpTextVal) {
                    fighter.hudHpText.textContent = hpTextVal;
                    fighter.lastHpText = hpTextVal;
                }

                if (fighter.lastSkillReady !== skillReady) {
                    fighter.hudSkillFill.style.width = `${skillReady * 100}%`;
                    fighter.lastSkillReady = skillReady;
                }

                let statusTextVal = "";
                let statusColor = "";
                if (fighter.dead) {
                    statusTextVal = "탈락";
                    statusColor = "#ba1a1a";
                } else if (isJiDeveloperReviving(fighter)) {
                    statusTextVal = "관리자 부활";
                    statusColor = fighter.definition.color;
                } else if (isJiCodeRaining(fighter, now)) {
                    statusTextVal = `프로그래밍 / CD ${Math.max(0, fighter.skillCooldown).toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (fighter.offMapUntil > now) {
                    statusTextVal = `맵 밖 ${(Math.max(0, fighter.offMapUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (isAsleep(fighter, now)) {
                    statusTextVal = `수면 ${(Math.max(0, fighter.sleepUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = "#2563eb";
                } else if (isProtestTargeted(fighter, now)) {
                    statusTextVal = `시위 대상 ${(Math.max(0, fighter.protestTargetUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = "#b91c1c";
                } else if (isProtestBuffBanned(fighter, now)) {
                    statusTextVal = `버프 금지 ${(Math.max(0, fighter.protestBuffBanUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = "#b91c1c";
                } else if (isStunned(fighter, now)) {
                    statusTextVal = `행동 불가 ${(Math.max(0, fighter.stunnedUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = "#ba1a1a";
                } else if (isKangComboing(fighter)) {
                    const effects = kangEffects(fighter);
                    const comboLimit = Math.min(
                        fighter.kangMastery || 0,
                        effects.comboFinisherHitThreshold || effects.finisherMasteryThreshold || fighter.kangMastery || 0
                    );
                    statusTextVal = `연타 중 ${fighter.kangComboCount || 0}/${comboLimit}`;
                    statusColor = fighter.definition.color;
                } else if (isKangFinishing(fighter)) {
                    statusTextVal = "간파";
                    statusColor = fighter.definition.color;
                } else if (isYuAnimalDashing(fighter)) {
                    statusTextVal = "동물 특공대";
                    statusColor = fighter.definition.color;
                } else if (isKimDonggyuDefibing(fighter, now)) {
                    const tempHp = Math.max(0, fighter.kimDonggyuDefibTempHp || 0);
                    const remaining = Math.max(0, fighter.kimDonggyuDefibUntil - now) / 1000;
                    statusTextVal = `자가제세동 ${Math.ceil(tempHp)} / ${remaining.toFixed(1)}초`;
                    statusColor = "#6b7280";
                } else if (isKimDonggyuAiming(fighter)) {
                    const remaining = Math.max(0, (fighter.kimDonggyuAim?.releaseAt || now) - now) / 1000;
                    statusTextVal = `SR 조준 ${remaining.toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (fighter.definition.id === "yu-yejun" && fighter.yuRushPhase === "prepare") {
                    statusTextVal = `최고속도 준비 ${(Math.max(0, fighter.yuRushReleaseAt - now) / 1000).toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (fighter.definition.id === "yu-yejun" && fighter.yuChaseTargetId) {
                    statusTextVal = "잔상 추격";
                    statusColor = fighter.definition.color;
                } else if (isLeeCharging(fighter)) {
                    const effects = leeSkillEffects(fighter);
                    statusTextVal = `차징 보호막 ${fighter.leeShieldHitsRemaining || 0}/${effects.shieldHits || 5}`;
                    statusColor = fighter.definition.color;
                } else if (isLeeDribbling(fighter, now)) {
                    statusTextVal = `드리블 ${(Math.max(0, fighter.leeDribbleUntil - now) / 1000).toFixed(1)}초`;
                    statusColor = fighter.definition.color;
                } else if (isLeeSungwon(fighter)) {
                    statusTextVal = fighter.leeSungwonAwakened
                        ? "각성"
                        : `콤보 ${fighter.leeSungwonComboCount || 0}/${leeSungwonEffects(fighter).awakenThreshold || 25}`;
                    statusColor = fighter.definition.color;
                } else if (fighter.definition.skill?.passiveOnly) {
                    statusTextVal = `패시브 ${fighter.definition.skill.name}`;
                    statusColor = fighter.definition.color;
                } else {
                    const remaining = Math.max(0, fighter.skillCooldown);
                    statusTextVal = remaining <= 0
                        ? `CD ${fighter.definition.skill.name} READY`
                        : `CD ${fighter.definition.skill.name} ${remaining.toFixed(1)} / ${cooldownDuration.toFixed(1)}초`;
                }

                if (fighter.lastStatusText !== statusTextVal) {
                    fighter.hudStatus.textContent = statusTextVal;
                    fighter.hudStatus.style.color = statusColor;
                    fighter.lastStatusText = statusTextVal;
                }

                const bonusParts = [];
                if (fighter.definition.id === "gu-minchan" && fighter.rageStacks > 0) {
                    bonusParts.push(`분노 ${fighter.rageStacks}회`);
                    const skillEffects = fighter.definition.skill?.effects || {};
                    const rageDamageBonus = Math.max(0, (fighter.rageStacks || 0) - (skillEffects.rageDamageThreshold || 10)) * (skillEffects.damagePerRageOverThreshold || 1);
                    if (rageDamageBonus > 0) {
                        bonusParts.push(`배구공 피해 +${rageDamageBonus}`);
                    }
                }
                if (fighter.definition.id === "kang-inchan") {
                    bonusParts.push(`숙련도 ${fighter.kangMastery || 0}`);
                }
                if (fighter.definition.id === "kim-gibeom") {
                    bonusParts.push(`공격력 ${Math.round(fighter.attack)}`);
                    bonusParts.push(`벽충돌 ${fighter.wallCrashCount || 0}/${kimGibeomEffects(fighter).earthquakeWallHits || 5}`);
                    if (fighter.slowUntil > now) {
                        bonusParts.push(`슬로우 ${((fighter.slowUntil - now) / 1000).toFixed(1)}초`);
                    }
                }
                if (fighter.definition.id === "developer-ji-taehyeok") {
                    const effects = jiPassiveEffects(fighter);
                    bonusParts.push(`드론 ${jiOwnedDrones(fighter).length}`);
                    bonusParts.push(`폭발 ${fighter.jiDroneExplosionCount || 0}/${effects.droneOverclockExplosionThreshold || 12}`);
                    if (isJiDroneOverclocked(fighter, now)) {
                        bonusParts.push(`오버클럭 ${((fighter.jiDroneOverclockUntil - now) / 1000).toFixed(1)}초`);
                    }
                    if (!fighter.jiDeveloperReviveUsed) {
                        bonusParts.push("관리자 부활 가능");
                    }
                }
                if (fighter.definition.id === "kim-sihyeon") {
                    if (isKimSihyeonBuffed(fighter, now)) {
                        bonusParts.push(`검은 영광 ${((fighter.kimSihyeonBuffUntil - now) / 1000).toFixed(1)}초`);
                    } else if (fighter.nextKimSihyeonPassiveAt > now) {
                        bonusParts.push(`패시브 ${((fighter.nextKimSihyeonPassiveAt - now) / 1000).toFixed(1)}초`);
                    }
                    if (fighter.yawnHealingActive) {
                        bonusParts.push("하품 힐");
                    }
                }
                if (fighter.definition.id === "yu-yejun") {
                    const pets = yuAnimalPets(fighter);
                    bonusParts.push(`동물 ${pets.length}/2`);
                    if (pets.length > 0) {
                        const returnAt = Math.max(...pets.map((pet) => pet.yuPetExpiresAt || now));
                        bonusParts.push(`귀환 ${((returnAt - now) / 1000).toFixed(1)}초`);
                    }
                    if ((fighter.yuAnimalPassiveReadyAt || 0) > now) {
                        bonusParts.push(`특공대 ${((fighter.yuAnimalPassiveReadyAt - now) / 1000).toFixed(1)}초`);
                    } else {
                        bonusParts.push("특공대 READY");
                    }
                }
                if (fighter.definition.id === "lee-taehwan") {
                    bonusParts.push(`앵클 ${fighter.leeAnkleBreakCount || 0}`);
                    if (isLeeCharging(fighter)) {
                        bonusParts.push(`차징 ${((now - (fighter.leeChargeStartedAt || now)) / 1000).toFixed(1)}초`);
                    }
                }
                if (fighter.definition.id === "lee-sungwon") {
                    if ((fighter.leeSungwonShield || 0) > 0) {
                        bonusParts.push(`보호막 ${Math.ceil(fighter.leeSungwonShield)}`);
                    }
                    if (fighter.leeSungwonAwakened) {
                        bonusParts.push(`낙인 ${leeSungwonActiveBrands(fighter).length}/${leeSungwonEffects(fighter).maxBrands || 2}`);
                        if ((fighter.leeSungwonStolenTexts || []).length > 0) {
                            bonusParts.push(`탈취 ${fighter.leeSungwonStolenTexts.join(" / ")}`);
                        }
                    } else if (fighter.leeSungwonComboExpireAt > now && (fighter.leeSungwonComboCount || 0) > 0) {
                        bonusParts.push(`유지 ${((fighter.leeSungwonComboExpireAt - now) / 1000).toFixed(1)}초`);
                    }
                }
                if (fighter.definition.id === "kim-donggyu") {
                    bonusParts.push(`모드 ${kimDonggyuCurrentMode(fighter)}`);
                    if (fighter.kimDonggyuArShotsRemaining > 0) {
                        bonusParts.push(`AR ${fighter.kimDonggyuArShotsRemaining}`);
                    }
                    if (!fighter.kimDonggyuSelfReviveUsed) {
                        bonusParts.push("제세동 가능");
                    }
                }
                if (fighter.definition.id === "protest-leader-gu-minchan") {
                    const active = battle.activeProtestSkills.find((skill) => skill.ownerId === fighter.id);
                    if (active) {
                        bonusParts.push(`시위 ${(Math.max(0, active.until - now) / 1000).toFixed(1)}초`);
                    }
                }
                if (fighter.protestAllyBuffUntil > now) {
                    bonusParts.push(`시위 쿨감 ${((fighter.protestAllyBuffUntil - now) / 1000).toFixed(1)}초`);
                }
                if (fighter.definition.id === "ji-taehyeok") {
                    const nextSkillAt = fighter.jiNextSkillAt || now + jiSkillIntervalMs(fighter);
                    bonusParts.push(`카페인 ${fighter.jiCaffeineConsumed || 0}`);
                    if (!isJiTaehyeokBusy(fighter)) {
                        bonusParts.push(`스킬 ${Math.max(0, (nextSkillAt - now) / 1000).toFixed(1)}초`);
                    }
                    if (fighter.jiRegenPerSecond > 0) {
                        bonusParts.push(`회복 ${Math.round(fighter.jiRegenPerSecond)}/s`);
                    }
                    bonusParts.push(`최대HP ${fighter.maxHp}`);
                }
                if (fighter.definition.id === "park-sungbin" && fighter.parkMemoryId) {
                    const zone = battle.activeParkMemoryZones.find((item) => item.id === fighter.parkMemoryId);
                    if (zone && !zone.collapsed) {
                        bonusParts.push(`회상벽 ${Math.max(0, Math.ceil(zone.hp))}/${zone.maxHp}`);
                    }
                }
                if (fighter.definition.id === "park-sungbin") {
                    const effects = parkSungbinPassiveEffects(fighter);
                    let nextRushAt = fighter.parkNextBlossomAt || now + (effects.interval || 8) * 1000;
                    if (fighter.parkPassiveCooldownPausedAt && isParkSungbinActiveSkillBusy(fighter)) {
                        nextRushAt += Math.max(0, now - fighter.parkPassiveCooldownPausedAt);
                    }
                    bonusParts.push(`질주 ${Math.max(0, (nextRushAt - now) / 1000).toFixed(1)}초`);
                    if (isParkSungbinRushBusy(fighter)) {
                        bonusParts.push(fighter.parkRush.mode === "active" ? "난무" : "쇄도");
                    }
                }

                if (bonusParts.length > 0) {
                    const bonusTextVal = bonusParts.join(" / ");
                    if (fighter.lastStatBonusText !== bonusTextVal) {
                        fighter.hudStatBonus.classList.remove("hidden");
                        fighter.hudStatBonus.textContent = bonusTextVal;
                        fighter.lastStatBonusText = bonusTextVal;
                    }
                } else {
                    if (fighter.lastStatBonusText !== "hidden") {
                        fighter.hudStatBonus.classList.add("hidden");
                        fighter.lastStatBonusText = "hidden";
                    }
                }
            });
        }

        function renderFighters(now) {
            battle.fighters.forEach((fighter) => {
                const stunState = !fighter.dead && isStunned(fighter, now);
                if (fighter.lastIsStunned !== stunState) {
                    fighter.element.classList.toggle("is-stunned", stunState);
                    fighter.lastIsStunned = stunState;
                }

                const sleepState = !fighter.dead && isAsleep(fighter, now);
                if (fighter.lastIsAsleep !== sleepState) {
                    fighter.element.classList.toggle("is-asleep", sleepState);
                    fighter.lastIsAsleep = sleepState;
                }

                if (fighter.lastDead !== fighter.dead) {
                    fighter.element.classList.toggle("is-dead", fighter.dead);
                    fighter.lastDead = fighter.dead;
                }

                const offmapState = !fighter.dead && fighter.offMapUntil > now && !isJiTaehyeokBusy(fighter);
                if (fighter.lastIsOffmap !== offmapState) {
                    fighter.element.classList.toggle("is-offmap", offmapState);
                    fighter.lastIsOffmap = offmapState;
                }

                const jiSkillTransparentState = !fighter.dead && isJiTaehyeokBusy(fighter);
                if (fighter.lastIsJiSkillTransparent !== jiSkillTransparentState) {
                    fighter.element.classList.toggle("is-ji-skill-transparent", jiSkillTransparentState);
                    fighter.lastIsJiSkillTransparent = jiSkillTransparentState;
                }

                const rageState = !fighter.dead && fighter.definition.id === "gu-minchan" && fighter.rageStacks > 0;
                if (fighter.lastIsRaging !== rageState) {
                    fighter.element.classList.toggle("is-raging", rageState);
                    fighter.lastIsRaging = rageState;
                }
                if (fighter.definition.id === "gu-minchan") {
                    fighter.element.style.setProperty("--rage-alpha", Math.min(0.62, (fighter.rageStacks || 0) * 0.075).toFixed(3));
                }

                const leeSungwonAwakenedState = !fighter.dead && isLeeSungwon(fighter) && fighter.leeSungwonAwakened;
                if (fighter.lastIsLeeSungwonAwakened !== leeSungwonAwakenedState) {
                    fighter.element.classList.toggle("is-lee-sungwon-awakened", leeSungwonAwakenedState);
                    fighter.lastIsLeeSungwonAwakened = leeSungwonAwakenedState;
                }
                if (fighter.leeSungwonMarkerElement) {
                    const hasMarker = !fighter.dead && (fighter.leeSungwonMarkedById || fighter.leeSungwonBrandById);
                    fighter.leeSungwonMarkerElement.style.display = hasMarker ? "block" : "none";
                    if (hasMarker) {
                        const markerColor = fighter.leeSungwonBrandById ? "#7f1d1d" : "#1e3a8a";
                        fighter.leeSungwonMarkerElement.style.left = `${fighter.x}px`;
                        fighter.leeSungwonMarkerElement.style.top = `${fighter.y - fighterRadius(fighter) - 8}px`;
                        fighter.leeSungwonMarkerElement.style.borderColor = markerColor;
                        fighter.leeSungwonMarkerElement.style.color = markerColor;
                    }
                }
                if (fighter.leeSungwonAuraElement) {
                    const auraActive = !fighter.dead && isLeeSungwonComboAuraActive(fighter);
                    fighter.leeSungwonAuraElement.style.display = auraActive ? "block" : "none";
                    if (auraActive) {
                        const radius = leeSungwonComboAuraRadius(fighter);
                        fighter.leeSungwonAuraElement.style.left = `${fighter.x}px`;
                        fighter.leeSungwonAuraElement.style.top = `${fighter.y}px`;
                        fighter.leeSungwonAuraElement.style.width = `${radius * 2}px`;
                        fighter.leeSungwonAuraElement.style.height = `${radius * 2}px`;
                    }
                }

                const kangComboState = !fighter.dead && isKangComboing(fighter);
                if (fighter.lastIsKangCombo !== kangComboState) {
                    fighter.element.classList.toggle("is-kang-combo", kangComboState);
                    fighter.lastIsKangCombo = kangComboState;
                }
                if (fighter.kangAuraElement) {
                    const effects = kangEffects(fighter);
                    const radius = bossAttackRange(fighter, effects.comboTriggerRadius || 100);
                    fighter.kangAuraElement.style.display = fighter.dead || fighter.offMapUntil > now ? "none" : "block";
                    fighter.kangAuraElement.style.left = `${fighter.x}px`;
                    fighter.kangAuraElement.style.top = `${fighter.y}px`;
                    fighter.kangAuraElement.style.width = `${radius * 2}px`;
                    fighter.kangAuraElement.style.height = `${radius * 2}px`;
                }

                const kimSihyeonBuffState = !fighter.dead && isKimSihyeonBuffed(fighter, now);
                if (fighter.lastIsKimSihyeonBuffed !== kimSihyeonBuffState) {
                    fighter.element.classList.toggle("is-kim-sihyeon-buffed", kimSihyeonBuffState);
                    fighter.lastIsKimSihyeonBuffed = kimSihyeonBuffState;
                }

                const leeDribbleState = !fighter.dead && isLeeDribbling(fighter, now);
                if (fighter.lastIsLeeDribbling !== leeDribbleState) {
                    fighter.element.classList.toggle("is-lee-dribbling", leeDribbleState);
                    fighter.lastIsLeeDribbling = leeDribbleState;
                }

                const leeChargingState = !fighter.dead && isLeeCharging(fighter);
                if (fighter.lastIsLeeCharging !== leeChargingState) {
                    fighter.element.classList.toggle("is-lee-charging", leeChargingState);
                    fighter.lastIsLeeCharging = leeChargingState;
                }

                const kimDonggyuAimState = !fighter.dead && isKimDonggyuAiming(fighter);
                if (fighter.lastIsKimDonggyuAiming !== kimDonggyuAimState) {
                    fighter.element.classList.toggle("is-kim-donggyu-aiming", kimDonggyuAimState);
                    fighter.lastIsKimDonggyuAiming = kimDonggyuAimState;
                }

                const kimDonggyuDefibState = !fighter.dead && isKimDonggyuDefibing(fighter, now);
                if (fighter.lastIsKimDonggyuDefib !== kimDonggyuDefibState) {
                    fighter.element.classList.toggle("is-kim-donggyu-defib", kimDonggyuDefibState);
                    fighter.lastIsKimDonggyuDefib = kimDonggyuDefibState;
                }

                const kimDonggyuBleedState = !fighter.dead && fighter.kimDonggyuBleedUntil > now;
                if (fighter.lastIsKimDonggyuBleeding !== kimDonggyuBleedState) {
                    fighter.element.classList.toggle("is-kim-donggyu-bleeding", kimDonggyuBleedState);
                    fighter.lastIsKimDonggyuBleeding = kimDonggyuBleedState;
                }

                const size = fighterSize(fighter);
                fighter.element.style.width = `${size}px`;
                fighter.element.style.height = `${size}px`;
                fighter.element.style.transform = `translate(${fighter.x - size / 2}px, ${fighter.y - size / 2}px)`;
                updateKimSihyeonDarknessBar(fighter, size, now);
            });
        }

        function effectRing(x, y, size, color) {
            if (activeEffects.rings >= EFFECT_LIMITS.rings) {
                return;
            }

            activeEffects.rings++;
            const ring = document.createElement("div");
            ring.className = "effect-ring";
            ring.style.left = `${x}px`;
            ring.style.top = `${y}px`;
            ring.style.width = `${size}px`;
            ring.style.height = `${size}px`;
            ring.style.color = color;
            arena.appendChild(ring);
            setTimeout(() => {
                ring.remove();
                activeEffects.rings--;
            }, 560);
        }

        function screenFlash(color) {
            if (activeEffects.flashes >= EFFECT_LIMITS.flashes) {
                return;
            }

            activeEffects.flashes++;
            const flash = document.createElement("div");
            flash.className = "arena-flash";
            flash.style.color = color;
            arena.appendChild(flash);
            setTimeout(() => {
                flash.remove();
                activeEffects.flashes--;
            }, 240);
        }

        function impactStar(x, y, color) {
            if (activeEffects.stars >= EFFECT_LIMITS.stars) {
                return;
            }

            activeEffects.stars++;
            const star = document.createElement("div");
            star.className = "impact-star";
            star.style.left = `${x}px`;
            star.style.top = `${y}px`;
            star.style.color = color;
            arena.appendChild(star);
            setTimeout(() => {
                star.remove();
                activeEffects.stars--;
            }, 560);
        }

        function burst(x, y, color, count = 8) {
            const allowed = Math.max(0, Math.min(count, EFFECT_LIMITS.bursts - activeEffects.bursts, 8));

            for (let index = 0; index < allowed; index += 1) {
                activeEffects.bursts++;
                const shard = document.createElement("div");
                const angle = (Math.PI * 2 * index) / allowed;
                const distance = 28 + Math.random() * 28;
                shard.className = "effect-burst";
                shard.style.left = `${x}px`;
                shard.style.top = `${y}px`;
                shard.style.color = color;
                shard.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
                shard.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
                arena.appendChild(shard);
                setTimeout(() => {
                    shard.remove();
                    activeEffects.bursts--;
                }, 500);
            }
        }

        function megaBurst(x, y, color, count = 8) {
            burst(x, y, color, count);

        function createGjeRushVisual(caller, target, effects) {
            const size = battle.ballSize * (effects.helperSizeMultiplier || 0.92);

        function createWallThrowAfterimages(target, startX, startY, endX, endY, effects) {
            const count = scaledAfterimageCount(Math.max(4, Math.min(10, effects.helperAfterimages || 7)), 2);
            for (let index = 0; index < count; index += 1) {
                const ratio = (index + 1) / (count + 1);
                createAfterimage(target, {
                    x: startX + (endX - startX) * ratio,
                    y: startY + (endY - startY) * ratio,
                    opacity: Math.max(0.18, 0.5 - ratio * 0.24),
                    scale: Math.max(0.78, 1 - ratio * 0.12),
                    lifetime: 720
                });
            }
        }

        function gjeThrowToWall(caller, target, effects, now) {
            if (!target || target.dead) {
                return;
            }

            createGjeRushVisual(caller, target, effects);
            const wallDirection = directionToNearestWall(target);
            const fallbackDamage = effects.responseDamage || 1000;
            const initialDamage = effects.responseInitialDamage ?? Math.round(fallbackDamage / 2);
            const wallDamage = effects.responseWallDamage ?? Math.max(0, fallbackDamage - initialDamage);

            applyDamage(target, initialDamage, caller, "skill", { unavoidable: true });
            if (target.dead) {
                return;
            }

            if (ignoreOrReflectKnockback(target, caller, wallDirection, effects.responseThrowSpeed || 1400, { origin: target })) {
                impactStar(target.x, target.y, caller.definition.color);
                burst(target.x, target.y, caller.definition.color, 8);
                return;
            }
            const radius = battle.ballSize / 2;
            const startX = target.x;
            const startY = target.y;
            let endX = target.x;
            let endY = target.y;

            if (wallDirection.x < 0) {
                endX = radius;
            } else if (wallDirection.x > 0) {
                endX = battle.arenaSize - radius;
            }
            if (wallDirection.y < 0) {
                endY = radius;
            } else if (wallDirection.y > 0) {
                endY = battle.arenaSize - radius;
            }

            createWallThrowAfterimages(target, startX, startY, endX, endY, effects);
            target.windmillMomentum = null;
            if (isKangComboing(target)) {
                finishKangCombo(target);
            }
            target.x = endX;
            target.y = endY;
            target.vx = 0;
            target.vy = 0;
            target.afterimageUntil = now + (effects.targetAfterimageDuration || 0.75) * 1000;
            target.nextAfterimageAt = 0;

            impactStar(target.x, target.y, caller.definition.color);
            burst(target.x, target.y, caller.definition.color, 12);
            effectRing(target.x, target.y, battle.ballSize * 1.7, caller.definition.color);
            floatText("ㄱㅈㅇ!", target.x, target.y - battle.ballSize / 2, caller.definition.color);
            applyDamage(target, wallDamage, caller, "skill", { unavoidable: true });
        }

        function closeGjeScreen(overlay) {
            if (!overlay || !overlay.isConnected) {
